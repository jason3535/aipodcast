# 自定义 Pages 部署。两类偶发故障(2026-07 起)已在此处处理:
#  1) 激活极慢 → deploy 超时(默认 10min)放宽,避免超时→取消→僵尸部署循环;
#  2) 激活硬失败("Deployment failed, try again later",与超时无关,秒级返回)
#     → 自动重试 2 次(间隔 30s / 90s),免去手动空提交换 SHA。
name: Deploy Pages
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment2.outputs.page_url || steps.deployment3.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      # 尝试 1
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
        continue-on-error: true
      # 尝试 2(等 30s)
      - if: steps.deployment.outcome == 'failure'
        run: 'echo "激活失败,30s 后重试…"; sleep 30'
      - id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
        continue-on-error: true
      # 尝试 3(再等 90s;此次失败则整体失败)
      - if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: 'echo "再次失败,90s 后最后重试…"; sleep 90'
      - id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
