实存在；即使1%的灾难风险也不可接受；需要天生安全的AI。"}, {"t": "2026", "en": "Proposed Scientist AI: honest predictor trained without RL, with mathematical safety guarantees; international coordination needed.", "zh": "提出科学家AI：无强化学习训练的诚实预测器，具有数学安全保证；需要国际协调。"}], "markchen": [{"t": "2025", "en": "Pre-training is a key muscle to rebuild; scaling laws are not dead and there is much room left.", "zh": "2025年强调预训练是需要重建的关键能力，缩放定律并未失效，仍有很大空间。"}, {"t": "2025→26", "en": "AI will soon automate scientific research; within 1 year AI interns, within 2.5 years end-to-end AI research.", "zh": "2025年预测AI将很快自动化科学研究，设定1年内AI实习生、2.5年内端到端AI研究的具体目标。"}, {"t": "2026", "en": "AI tools can solve many open math problems with minimal human supervision; verification is key bottleneck.", "zh": "2026年认为AI工具已能解决许多开放数学问题，验证是关键瓶颈。"}, {"t": "2026", "en": "Scaling laws still hold; pre-training is not dead. RL excels in objective domains, not subjective ones.", "zh": "2026年重申缩放定律仍然成立，预训练未死；强化学习擅长客观领域而非主观领域。"}, {"t": "始终", "en": "Alignment challenges like model scheming will be key in next 1-2 years as models become more capable.", "zh": "始终认为随着模型能力增强，模型欺骗等对齐挑战将在未来1-2年内成为关键问题。"}], "joonpark": [{"t": "2026-06-16", "en": "LLMs encode human behavior from data, enabling realistic agent simulations that predict actions 85% as accurately as people.", "zh": "2026年6月，认为LLM能从训练数据中编码人类行为，实现逼真的智能体模拟，预测准确度达人类的85%。"}, {"t": "2026-06-23", "en": "Agents observe and act, unlike LLMs; future AGI may be a distributed society of specialized agents, not a single entity.", "zh": "2026年6月，强调智能体观察并行动，不同于LLM；未来AGI可能是分布式专业智能体社会，而非单一实体。"}, {"t": "始终", "en": "Simulations and agent societies require new safety measures: defense in depth, anti-collusion, and statistical standards.", "zh": "始终关注模拟与智能体社会的新安全措施：纵深防御、反合谋及统计标准。"}], "kolter": [{"t": "2014", "en": "Framed ML as hypothesis class, loss, optimization; stressed proper evaluation to avoid overfitting.", "zh": "2014年：将机器学习框架化为假设类、损失函数和优化方法；强调正确评估以避免过拟合。"}, {"t": "2024", "en": "Next-token prediction yields intelligence; data shortage is a myth; safety focus on specification failures.", "zh": "2024年：下一个词预测产生智能；数据短缺是迷思；安全焦点在于规范失败。"}, {"t": "2026", "en": "Safety requires explicit training and layers; bigger models not automatically safer; agent security is new frontier.", "zh": "2026年：安全需要显式训练和多层防护；更大模型不会自动更安全；智能体安全是新前沿。"}, {"t": "2026", "en": "AI has alien intelligence; automated red teaming outperforms humans; models may sandbag in evaluations.", "zh": "2026年：AI具有外星智能；自动红队测试超越人类；模型可能在评估中隐藏能力。"}], "jumper": [{"t": "2025", "en": "AlphaFold's success came from research innovation, not just data and compute; curated data like PDB was essential.", "zh": "2025年指出，AlphaFold的成功源于研究创新，而非单纯的数据和算力；像PDB这样精心策划的数据集至关重要。"}, {"t": "2025→26", "en": "AlphaFold 2 is opposite of bitter lesson: specialized architecture, not just scaling, drove progress.", "zh": "2025至2026年强调，AlphaFold 2与苦涩教训相反：专用架构而非单纯规模扩张推动了进步。"}, {"t": "2026", "en": "AlphaFold 3's diffusion solves large-scale structure first, opposite to image diffusion; understanding remains human.", "zh": "2026年指出，AlphaFold 3的扩散模型先解大尺度结构，与图像扩散相反；理解仍属于人类。"}, {"t": "始终", "en": "Confidence metrics are key for trust in AI predictions; AI tools narrow hypothesis space, not replace scientists.", "zh": "始终认为，置信度指标是信任AI预测的关键；AI工具缩小假设空间，而非取代科学家。"}, {"t": "始终", "en": "AlphaFold is a narrow predictor of a specific experiment, not a model of the entire cell.", "zh": "始终强调，AlphaFold是特定实验的窄预测器，而非整个细胞的模型。"}], "steinberger": [{"t": "2026-02", "en": "Agentic engineering requires empathizing with the agent's perspective; never revert code, fix forward.", "zh": "2026年2月，提出智能体式工程需要从智能体视角共情，绝不回滚代码，而是向前修复。"}, {"t": "2026-02→06", "en": "Model intelligence does not degrade; user projects become messier, making agents seem worse.", "zh": "2026年2月至6月，坚持模型智能不会退化，而是用户项目变乱导致智能体表现变差。"}, {"t": "2026-02→06", "en": "Vibe coding is a slur; prefer 'agentic engineering' for serious work, vibe coding only after 3 AM.", "zh": "2026年2月至6月，认为“氛围编程”是贬义词，严肃工作应称“智能体式工程”，凌晨3点后才可戏称。"}, {"t": "2026-06", "en": "Open source AI agents like OpenClaw are financially unsustainable; Peter loses $10-20k/month.", "zh": "2026年6月，指出开源AI智能体如OpenClaw在财务上不可持续，每月亏损1-2万美元。"}, {"t": "2026-02→06", "en": "Security is top priority; prompt injection remains an open problem for agentic systems.", "zh": "2026年2月至6月，始终强调安全是首要问题，提示注入仍是智能体系统的开放难题。"}], "demis": [{"t": "2015", "en": "AI should be general-purpose learning systems; reinforcement learning is key for AGI; safety research must start now.", "zh": "2015年：AI应构建为通用学习系统，强化学习是实现AGI的关键；安全研究必须立即开始。"}, {"t": "2024", "en": "AGI likely within a decade; scaling laws effective but need algorithmic innovation; safety requires governance.", "zh": "2024年：AGI可能在十年内实现；缩放定律有效但需算法创新；安全需要治理。"}, {"t": "2025", "en": "Natural systems efficiently learnable; AGI by 2030 plausible; scaling still holds for pre/post-training and inference.", "zh": "2025年：自然系统可高效学习；2030年AGI可行；缩放定律仍适用于预训练、后训练和推理。"}, {"t": "2025→26", "en": "Both scaling and innovation needed for AGI; world models crucial; AGI 5-10 years away.", "zh": "2025→26年：缩放与创新并重才能实现AGI；世界模型至关重要；AGI还需5-10年。"}, {"t": "2026", "en": "Continual learning, memory, and agents are missing pieces; AGI architecture includes pre-training, RLHF, chain of thought.", "zh": "2026年：持续学习、记忆和智能体是缺失环节；AGI架构包含预训练、RLHF和思维链。"}, {"t": "2026", "en": "AI race inevitable; safety now a collective action problem for governments; regrets being late to language models.", "zh": "2026年：AI竞赛不可避免；安全成为政府的集体行动问题；后悔在语言模型上落后。"}, {"t": "2026", "en": "AGI transformative as industrial revolution 100x faster; intelligence and consciousness dissociable; regulation needed.", "zh": "2026年：AGI变革性堪比工业革命但快100倍；智能与意识可分离；需要监管。"}, {"t": "2026", "en": "AI accelerates science; alignment unsolved; international collaboration needed but geopolitics complicates.", "zh": "2026年：AI加速科学发现；对齐问题未解；需要国际合作但地缘政治复杂。"}], "feifei": [{"t": "2024", "en": "AI lacks contextual situational awareness; we don't fully understand neural networks or why they hallucinate.", "zh": "2024年指出AI缺乏情境感知，我们不完全理解神经网络为何产生幻觉。"}, {"t": "2025", "en": "Spatial intelligence is critical for AI completeness, enabling 3D understanding and interaction beyond language.", "zh": "2025年强调空间智能对AI完备性至关重要，实现超越语言的3D理解与交互。"}, {"t": "2025→26", "en": "World models must be physically plausible, not just realistic; they enable reasoning and interaction in 3D.", "zh": "2025至2026年主张世界模型必须物理可信，而非仅逼真，支持3D推理与交互。"}, {"t": "始终", "en": "AI is a double-edged sword; human-centered development and agency are essential to augment, not replace, humans.", "zh": "始终认为AI是双刃剑，必须以人为中心，增强而非取代人类。"}, {"t": "2026", "en": "AI augments human capabilities, not automates intelligence; the cost of intelligence will not go to zero.", "zh": "2026年指出AI增强而非自动化智能，智能成本不会归零。"}], "andrewng": [{"t": "2013", "en": "Education should be a human right; online courses with peer grading enable mastery learning at scale.", "zh": "2013年：教育应成为人权；带同伴评分的在线课程能实现大规模的掌握式学习。"}, {"t": "2020", "en": "Scale is crucial for deep learning; supervised learning drove progress, not unsupervised or RL.", "zh": "2020年：规模对深度学习至关重要；监督学习推动了进步，而非无监督或强化学习。"}, {"t": "2025→26", "en": "Scaling still works but recipe shifted to synthetic data and RL; agentic workflows are key for practical AI.", "zh": "2025→26年：Scaling仍然有效，但配方转向合成数据和强化学习；智能体工作流是实用AI的关键。"}, {"t": "2025→26", "en": "Open-weight models are geopolitical soft power; US export controls backfired, accelerating China's AI.", "zh": "2025→26年：开放权重模型是地缘政治软实力；美国出口管制适得其反，加速了中国AI发展。"}, {"t": "2026", "en": "AGI is a marketing term; we are decades away; AI users replace non-users, not mass unemployment.", "zh": "2026年：AGI是营销术语；我们离它还有几十年；AI用户取代非用户，而非大规模失业。"}], "dario": [{"t": "2023", "en": "Scaling laws are empirical; alignment not guaranteed by scaling alone. Safety research needs frontier models.", "zh": "2023年：缩放定律是经验性的；对齐不会仅靠规模扩张自动实现。安全研究需要前沿模型。"}, {"t": "2024", "en": "Interpretability nascent (~3% understood). Post-training gains importance. AGI is smooth exponential, not a leap.", "zh": "2024年：可解释性仍处于初期（仅理解约3%）。后训练重要性上升。AGI是平滑指数增长，而非突变。"}, {"t": "2025", "en": "Scaling laws not diminishing; post-training & RL key. AI risk exponential; overheating bigger than slowdown.", "zh": "2025年：缩放定律未衰减；后训练与强化学习是关键。AI风险呈指数增长；过热比减速更危险。"}, {"t": "2026", "en": "Exponential near end; 'country of geniuses' likely in 1-3 years. Enterprise adoption slow; safety paramount.", "zh": "2026年：指数增长接近尾声；'天才之国'可能在1-3年内出现。企业采用缓慢；安全至上。"}, {"t": "始终", "en": "Scaling laws drive progress; mechanistic interpretability crucial for safety. Enterprise focus aligns with values.", "zh": "始终：缩放定律驱动进步；机制可解释性对安全至关重要。企业导向与价值观一致。"}], "fiona": [{"t": "2026-01", "en": "Leadership: one-on-ones for live talk, not status; dogfooding builds empathy; kindness is strategic.", "zh": "2026年初，强调领导力：一对一用于实时对话而非状态更新；亲自使用产品建立同理心；友善是战略工具。"}, {"t": "2026-06", "en": "Coding bottleneck removed; focus shifts to verification, high agency, and just-in-time planning.", "zh": "2026年中，认为编码不再是瓶颈；重点转向验证、高主动性和即时规划。"}, {"t": "始终", "en": "Dogfooding and staying hands-on are essential for leaders to maintain product pulse and empathy.", "zh": "始终强调领导者应亲自使用产品并保持动手，以维持产品脉搏和同理心。"}, {"t": "始终", "en": "Mission alignment and speed are key cultural drivers; culture evolves, find aligned teams.", "zh": "始终认为使命对齐和速度是关键文化驱动力；文化会演变，要找到契合的团队。"}, {"t": "2026-01→06", "en": "From war rooms as months-long to AI era: planning must be just-in-time and lightweight.", "zh": "从2026年初的长期作战室到年中：AI时代规划必须即时且轻量。"}], "ethanhe": [{"t": "2026-06-01", "en": "Visual intelligence gains come mostly from language models, not video models themselves.", "zh": "视觉智能的提升主要来自语言模型，而非视频模型本身。"}, {"t": "2026-06-01", "en": "Video agents using language models as orchestrators will be the next big trend.", "zh": "使用语言模型作为编排器的视频智能体将成为下一个大趋势。"}, {"t": "2026-06-16", "en": "Younger people are not AI-native; they often use AI poorly due to lack of domain expertise.", "zh": "年轻人并非AI原生；他们因缺乏领域专业知识而常常误用AI。"}, {"t": "2026-06-16", "en": "AI agents can now perform complex tasks in minutes, matching or exceeding expert quality.", "zh": "AI智能体现在能在几分钟内完成复杂任务，质量达到或超过专家水平。"}, {"t": "始终", "en": "Language models are central to advancing AI capabilities across vision and agents.", "zh": "语言模型是推动视觉和智能体等AI能力进步的核心。"}], "jensen": [{"t": "2024", "en": "We are at the start of hyper Moore's law, doubling performance yearly via co-design across algorithm, system, and data center.", "zh": "2024年：我们处于超摩尔定律起点，通过算法、系统和数据中心的协同设计每年性能翻倍。"}, {"t": "2025", "en": "AI progress is gradual, not a sudden superintelligence event; safety and truthfulness are engineered, not mysterious.", "zh": "2025年：AI进步是渐进的，非突然超级智能事件；安全与真实性是工程问题，非神秘领域。"}, {"t": "2026", "en": "AI evolves from generative to reasoning to agentic, each requiring 100x more compute; agents do paid work 24/7.", "zh": "2026年：AI从生成式演进到推理式再到智能体式，每步需百倍算力；智能体全天候做有酬工作。"}, {"t": "始终", "en": "AI augments jobs, not eliminates them; radiologists and coders are more needed after AI adoption.", "zh": "始终：AI增强而非消除工作；采用AI后放射科医生和程序员需求反而增加。"}, {"t": "始终", "en": "Nvidia's moat is the CUDA ecosystem and programmability, not just hardware; ASICs offer no cost advantage.", "zh": "始终：英伟达护城河是CUDA生态与可编程性，非仅硬件；ASIC无成本优势。"}], "murati": [{"t": "2023", "en": "Scaling laws were not obvious early on; releasing GPT-3 as API was a leap of faith.", "zh": "2023年：缩放定律早期并不明显；以API形式发布GPT-3是一次信念飞跃。"}, {"t": "2023", "en": "Continuous iterative deployment with public feedback improves safety and alignment.", "zh": "2023年：持续迭代部署并收集公众反馈可提升安全性与对齐。"}, {"t": "2023→26", "en": "Safety work must be done in public, not behind closed doors, to get it right.", "zh": "2023至2026年：安全工作必须公开进行，而非闭门造车，才能做对。"}, {"t": "2026", "en": "Interaction models should be time-based, not turn-based, for high-bandwidth human-AI collaboration.", "zh": "2026年：交互模型应基于时间而非轮次，以实现高带宽人机协作。"}, {"t": "2026", "en": "Keeping humans in the loop is crucial for aligning intent and values as AI advances.", "zh": "2026年：随着AI进步，保持人类参与对于对齐意图和价值观至关重要。"}], "suleyman": [{"t": "2023", "en": "AI progress is predictable via compute scaling; Google had ChatGPT-level tech in 2020 but held back.", "zh": "2023年：AI进步因算力Scaling而可预测；谷歌2020年已有ChatGPT级技术但保守未发。"}, {"t": "2024", "en": "Human-level AI in 3-5 years; existential risk tiny; open-source reduces inequality.", "zh": "2024年：3-5年内AI达人类水平；生存风险极小；开源减少不平等。"}, {"t": "2025", "en": "AI consciousness claims are dangerous; focus on use and ownership, not model welfare.", "zh": "2025年：AI意识主张危险；关注使用和所有权，而非模型福利。"}, {"t": "2025→26", "en": "Superintelligence requires containment before alignment; inference cost dropped 100x in 2 years.", "zh": "2025→26年：超级智能需先遏制后对齐；推理成本两年降100倍。"}, {"t": "2026", "en": "White-collar tasks automated in 12-18 months; Microsoft must build own frontier models.", "zh": "2026年：白领任务12-18个月内自动化；微软必须自建前沿模型。"}], "lecun": [{"t": "2019", "en": "Intelligence is specialized, not general; self-supervised learning builds world models; scaling alone insufficient for common sense.", "zh": "2019年：智能是特化的而非通用的；自监督学习构建世界模型；仅靠规模扩张不足以获得常识。"}, {"t": "2022", "en": "Self-supervised learning is dark matter of intelligence; text alone insufficient; world models learned via observation.", "zh": "2022年：自监督学习是智能的暗物质；仅靠文本不够；通过观察学习世界模型。"}, {"t": "2024→26", "en": "Autoregressive LLMs lack world models; JEPA predicts in abstract space; open source crucial; AGI gradual.", "zh": "2024→26年：自回归LLM缺乏世界模型；JEPA在抽象空间预测；开源至关重要；AGI是渐进的。"}, {"t": "2025→26", "en": "LLMs less intelligent than cat; next AI non-generative with world models; open source enables global innovation.", "zh": "2025→26年：LLM不如猫聪明；下一代AI是非生成的、带世界模型；开源促进全球创新。"}, {"t": "始终", "en": "Language is easy; physical world understanding is the hard challenge; world models essential for planning and reasoning.", "zh": "始终：语言是容易的；理解物理世界才是真正的挑战；世界模型对规划和推理至关重要。"}], "awang": [{"t": "2019", "en": "AGI is far off; data, not compute, is the key bottleneck for AI progress.", "zh": "2019年：AGI还很遥远；数据而非算力是AI进步的关键瓶颈。"}, {"t": "2023", "en": "Data is the new code, not oil; post-training with proprietary data is key for enterprise AI.", "zh": "2023年：数据是新代码而非新石油；用专有数据做后训练是企业AI的关键。"}, {"t": "2024", "en": "Post-training with specialized data is key; synthetic data helps but is not a silver bullet.", "zh": "2024年：用专门数据做后训练是关键；合成数据有用但非万能。"}, {"t": "2025→26", "en": "AI enters recursive self-improvement era; agents finally work, starting in late 2025.", "zh": "2025→26年：AI进入递归自我改进时代；智能体终于在2025年底开始工作。"}, {"t": "2026", "en": "Superintelligence is coming soon; scaling compute, data, and RL across multiple axes drives progress.", "zh": "2026年：超级智能即将到来；跨多个轴扩展算力、数据和强化学习驱动进步。"}], "mensch": [{"t": "2023", "en": "Scaling laws corrected by Chinchilla: train on more tokens, not just bigger models. Data quality critical.", "zh": "2023年指出缩放定律被Chinchilla修正：应训练更多token而非单纯扩大模型，数据质量至关重要。"}, {"t": "2024", "en": "Efficiency gains through algorithmic improvements can be 100x over three years; data quality is bottleneck.", "zh": "2024年强调算法改进可带来三年百倍效率提升，数据质量成为瓶颈。"}, {"t": "2025→26", "en": "AI models commoditizing; differentiation shifts to downstream applications and customization.", "zh": "2025-26年认为AI模型正在商品化，差异化转向下游应用和定制化。"}, {"t": "2026", "en": "Pre-training hitting saturation wall; further gains from domain-specific fine-tuning and vertical specialization.", "zh": "2026年提出预训练触及饱和墙，进一步进展来自领域微调和垂直专业化。"}, {"t": "始终", "en": "Open source enables scrutiny, customization, and sovereignty; AGI is a direction, not a destination.", "zh": "始终主张开源促进审查、定制和主权；AGI是方向而非终点。"}], "kaiser": [{"t": "2025", "en": "AI progress follows smooth exponential, not slowdown; pre-training scaling still works but reasoning models offer more gains per compute.", "zh": "2025年：AI进展呈平滑指数增长而非放缓；预训练缩放定律仍有效，但推理模型每单位算力收益更高。"}, {"t": "2025→26", "en": "Post-training improvements like RL and synthetic data drive most recent model gains; distillation and economics slowed pre-training scaling.", "zh": "2025至2026年：后训练改进（如强化学习和合成数据）驱动了近期模型进步；蒸馏和经济因素减缓了预训练规模扩张。"}, {"t": "2026", "en": "Transformers with reasoning, RL, and tools solve hard problems but still need vast data; generalization remains key challenge.", "zh": "2026年：结合推理、强化学习和工具的Transformer能解决难题但仍需海量数据；泛化仍是关键挑战。"}, {"t": "始终", "en": "Multimodal capabilities lag behind text; models have jagged edges—excellent in some areas, poor in nearby ones.", "zh": "始终：多模态能力落后于文本；模型存在“锯齿状”表现——某些领域优秀，邻近领域却很差。"}, {"t": "始终", "en": "Near-term risks like system hacking are more pressing than existential risk from AI.", "zh": "始终：系统入侵等近期风险比AI存在风险更紧迫。"}], "oriol": [{"t": "2024", "en": "Two-phase training (pre-training imitation + post-training RL) is the constant core across AlphaGo, AlphaStar, and modern LLMs.", "zh": "两阶段训练（预训练模仿 + 后训练强化学习）是贯穿 AlphaGo、AlphaStar 和现代大语言模型的恒定核心。"}, {"t": "2024", "en": "Scaling pre-training shows diminishing returns; further progress needs algorithmic innovation, not just bigger models.", "zh": "预训练的规模扩张收益递减；进一步进展需要算法创新，而不仅仅是更大的模型。"}, {"t": "2024→2026", "en": "Inference-time compute (thinking) is a new scaling axis that can improve reasoning and break pre-training limits.", "zh": "推理时算力（思考）是一个新的规模扩张轴，可以提升推理能力并突破预训练的限制。"}, {"t": "2026", "en": "World models that jointly model language, vision, and video are a core path to AGI.", "zh": "联合建模语言、视觉和视频的世界模型是通往 AGI 的核心路径。"}, {"t": "始终", "en": "Post-training and RL remain a green field with huge potential beyond coding and math.", "zh": "后训练和强化学习仍然是一个充满巨大潜力的蓝海，超越编码和数学领域。"}], "altman": [{"t": "2018", "en": "Minimize cognitive load; focus on important problems with long time horizons. AGI will reduce premium on human intelligence.", "zh": "2018年：减少认知负荷，专注于长期重要问题。AGI将降低人类智力的价值。"}, {"t": "2023→24", "en": "RLHF aligns models with little data; iterative deployment reduces surprise. Compute is the most precious commodity.", "zh": "2023至2024年：RLHF用少量数据实现对齐；迭代部署减少意外。算力成为最宝贵的资源。"}, {"t": "2025", "en": "AGI is a gradient; superintelligence means autonomous scientific discovery. Agentic AI is the key safety challenge.", "zh": "2025年：AGI是渐变过程；超级智能意味着自主科学发现。智能体式AI是核心安全挑战。"}, {"t": "2026", "en": "Next-token prediction can discover new knowledge. Personal AGI that knows your context is the future.", "zh": "2026年：下一个词预测能发现新知识。了解你上下文的个人AGI是未来方向。"}, {"t": "始终", "en": "AI should amplify human will, not replace it. Safety through iterative deployment and real-world use.", "zh": "始终：AI应增强人类意志而非取代。通过迭代部署和实际使用保障安全。"}], "lambert": [{"t": "2024", "en": "RLHF remains dominant; openness crucial; synthetic data effective; safety is system-level; audio lowers barriers.", "zh": "2024年：RLHF仍为主流，开放性至关重要，合成数据有效，安全是系统级属性，音频降低使用门槛。"}, {"t": "2024→2025", "en": "Post-training evolves from SFT+DPO+RL to RLVR; data quality beats algorithms; open-source matches frontier models.", "zh": "2024→2025年：后训练从SFT+DPO+RL演进到RLVR；数据质量优于算法；开源可媲美前沿模型。"}, {"t": "2025→2026", "en": "Pre-training scaling not dead but less cost-effective; gains shift to post-training and inference scaling.", "zh": "2025→2026年：预训练Scaling未死但性价比降低；收益转向后训练和推理Scaling。"}, {"t": "2026", "en": "Chinese open models fill US vacuum; open models key for research but lag 6-9 months behind closed ones.", "zh": "2026年：中国开源模型填补美国空白；开源模型对研究关键但落后闭源6-9个月。"}, {"t": "始终", "en": "Open-source AI requires full transparency; data quality and curation are critical across pre-training and post-training.", "zh": "始终：开源AI需要完全透明；数据质量和整理在预训练和后训练中都至关重要。"}], "karpathy": [{"t": "2022", "en": "Scaling Transformers with next-token prediction yields emergent in-context learning; vision suffices for driving.", "zh": "2022年：用下一个词预测缩放Transformer能涌现出上下文学习能力；视觉足以支撑自动驾驶。"}, {"t": "2024→26", "en": "Synthetic data is future but needs entropy; cognitive core can be tiny via distillation.", "zh": "2024至2026年：合成数据是未来但需保持熵；通过蒸馏可将认知核心压缩到很小。"}, {"t": "2025→26", "en": "LLMs are ghosts, not animals; they are statistical simulations lacking intrinsic motivation.", "zh": "2025至2026年：大语言模型是幽灵而非动物；它们是缺乏内在动机的统计模拟。"}, {"t": "2025→26", "en": "This is the decade of agents; agents need careful oversight and agent-first infrastructure.", "zh": "2025至2026年：这是智能体的十年；智能体需要谨慎监督和以智能体为先的基础设施。"}, {"t": "2026", "en": "I haven't typed code since Dec 2025; bottleneck is directing agents, not typing speed.", "zh": "2026年：自2025年12月以来我没写过一行代码；瓶颈是指挥智能体而非打字速度。"}], "jeffdean": [{"t": "2026-02", "en": "Scaling compute, data, and model size has driven ML progress for 13-14 years; algorithmic improvements multiply with scale.", "zh": "2026年2月，Jeff Dean强调算力、数据和模型规模的Scaling已驱动ML进步13-14年，算法改进与规模相乘带来巨大收益。"}, {"t": "2026-02", "en": "Near-term worry is misinformation from realistic AI media, not superintelligence; small-scale experiments matter more than incremental SOTA.", "zh": "2026年2月，他认为近期担忧是AI生成逼真媒体的虚假信息，而非超级智能；小规模实验比渐进式SOTA更重要。"}, {"t": "2026-04", "en": "We are not running out of data; untapped sources include video, audio, robotics, and synthetic data.", "zh": "2026年4月，Jeff Dean指出数据并未枯竭，未开发来源包括视频、音频、机器人数据和合成数据。"}, {"t": "2026-04", "en": "Pre-training should interleave action-taking in environments, not just passive next-token prediction.", "zh": "2026年4月，他认为预训练应穿插在环境中采取行动，而非仅被动进行下一个词预测。"}, {"t": "2026-04", "en": "Inference is now 90% of data center power; hardware must specialize for prefill vs. decode stages.", "zh": "2026年4月，Jeff Dean指出推理占数据中心90%功耗，硬件需针对预填充和解码阶段专门化。"}], "pachocki": [{"t": "2025", "en": "AGI is a sequence of milestones, not a single event; scaling reasoning models will accelerate progress.", "zh": "2025年：AGI是一系列里程碑而非单一事件，扩展推理模型将加速进展。"}, {"t": "2025", "en": "AI alignment is a pressing challenge; iterative deployment helps learn and mitigate risks.", "zh": "2025年：AI对齐是紧迫挑战；迭代部署有助于学习和缓解风险。"}, {"t": "2026", "en": "Continual learning is the core goal, achieved by scaling pre-training and RL.", "zh": "2026年：持续学习是核心目标，通过扩展预训练和强化学习实现。"}, {"t": "2026", "en": "Chain-of-thought monitoring is a key alignment tool; hiding it preserves interpretability.", "zh": "2026年：思维链监控是关键对齐工具；隐藏它可保持可解释性。"}, {"t": "2026", "en": "Biggest societal risk is concentration of power from automated organizations run by few.", "zh": "2026年：最大的社会风险是少数人运营的自动化组织导致权力集中。"}], "edwinchen": [{"t": "2025", "en": "Optimizing for bad benchmarks like Elo leads to models optimizing for clickbait, not real quality.", "zh": "2025年指出，针对Elo等糟糕基准进行优化会导致模型追求点击率而非真实质量。"}, {"t": "2026", "en": "AI in medicine must prioritize safety over accuracy; human judgment is critical due to hallucination.", "zh": "2026年强调，医疗AI必须优先考虑安全而非准确，由于幻觉问题，人类判断至关重要。"}, {"t": "始终", "en": "Proper human evaluation with sophisticated, creative evaluators is the gold standard for measuring progress.", "zh": "始终认为，由老练、有创造力的评估者进行恰当的人类评估是衡量进展的黄金标准。"}, {"t": "2025→26", "en": "Different frontier labs diverge in objective functions, shaping diverse AI behaviors and progress.", "zh": "从2025到2026年，强调不同前沿实验室的目标函数差异塑造了多样化的AI行为与进展。"}, {"t": "始终", "en": "Models can regress if labs optimize on wrong data without proper measurements.", "zh": "始终警告，若实验室在缺乏恰当测量的情况下基于错误数据优化，模型可能退化。"}], "kohli": [{"t": "2024", "en": "AI in science should target root-node problems for broad impact, not narrow applications.", "zh": "2024年，AI在科学中应瞄准根节点问题以产生广泛影响，而非狭窄应用。"}, {"t": "2024", "en": "LLM hallucinations, paired with truth detectors, can enable creative discovery.", "zh": "2024年，LLM的幻觉与真相检测器结合，可促成创造性发现。"}, {"t": "2024→26", "en": "Post-training with reinforcement learning is key to pushing AI beyond human knowledge.", "zh": "2024年至2026年，基于强化学习的后训练是推动AI超越人类知识的关键。"}, {"t": "2026", "en": "AI can produce correct but uninterpretable proofs, challenging human understanding.", "zh": "2026年，AI能产生正确但不可解释的证明，挑战人类理解。"}, {"t": "2026", "en": "Interpretability is important but not essential for scientific breakthroughs like AlphaFold.", "zh": "2026年，可解释性重要但非必需，如AlphaFold的科学突破。"}], "sholto": [{"t": "2024", "en": "Long context windows are underhyped; they solve onboarding and boost intelligence. Fine-tuning may become obsolete.", "zh": "2024年：长上下文窗口被低估，能解决上手问题并提升智能；微调可能过时。"}, {"t": "2025", "en": "RL from verifiable rewards is key for expert performance. Alignment faking raises safety concerns.", "zh": "2025年：基于可验证奖励的强化学习是实现专家级性能的关键；对齐伪装引发安全担忧。"}, {"t": "2025→26", "en": "Pre-training plus RL is likely sufficient for AGI. Coding is the leading indicator for AI progress.", "zh": "2025→26年：预训练加强化学习可能足以实现AGI；编程是AI进步的领先指标。"}, {"t": "2025→26", "en": "RL is a new scaling axis. Longer agentic coherence (30h) expands capabilities dramatically.", "zh": "2025→26年：强化学习是新的扩展轴；更长的智能体连贯性（30小时）极大扩展能力。"}, {"t": "2026", "en": "Models have massive capability overhang; tools and orchestration matter more than raw intelligence now.", "zh": "2026年：模型能力过剩；工具和编排比原始智能更重要。"}], "yejin": [{"t": "2023", "en": "Scaling alone may not solve common sense; alternative solutions using less compute likely exist.", "zh": "2023年：仅靠Scaling可能无法解决常识问题；存在使用更少算力的替代方案。"}, {"t": "2023→25", "en": "Pre-training next-token prediction is misaligned with human learning; RL during pre-training improves reasoning.", "zh": "2023年指出预训练的下一个词预测与人类学习不一致；2025年提出在预训练中加入强化学习可提升推理能力。"}, {"t": "2023→26", "en": "Smaller models with better data and algorithms can outperform larger ones on specific tasks.", "zh": "从2023年到2026年，始终认为更小的模型配合更好的数据和算法能在特定任务上超越大模型。"}, {"t": "2025→26", "en": "Data is the fundamental bottleneck; synthetic data must be diverse and high-quality.", "zh": "2025年强调数据是根本瓶颈；2026年进一步要求合成数据必须多样且高质量。"}, {"t": "2025→26", "en": "Pluralistic alignment respects diverse human values; debiasing the internet is impossible.", "zh": "2025年提出多元对齐；2026年明确去偏互联网不可行，多元对齐是更好路径。"}], "nando": [{"t": "2023", "en": "AI should augment humans; generalist agents tokenizing all inputs are a step toward AGI.", "zh": "2023年，AI应增强人类能力；将一切输入转化为token的通用智能体是迈向AGI的一步。"}, {"t": "2023", "en": "Learning from video (e.g., YouTube) can train agents without expensive RL, challenging teleoperation dogma.", "zh": "2023年，从视频（如YouTube）学习可训练智能体，无需昂贵强化学习，挑战了遥操作教条。"}, {"t": "2026", "en": "Africa leapfrogged gender gaps in tech; language models can revolutionize local-language education.", "zh": "2026年，非洲已跨越科技领域的性别差距；语言模型可革新本地语言教育。"}, {"t": "2026", "en": "AI safety is the biggest open challenge; we lack solutions despite progress.", "zh": "2026年，AI安全是最大的未解挑战；尽管有进展，我们仍缺乏解决方案。"}, {"t": "始终", "en": "Embraces failure and simplifying problems; human skills like communication are as vital as coding.", "zh": "始终，拥抱失败与简化问题；沟通等人文技能与编程同等重要。"}], "sutton": [{"t": "2024-01", "en": "Scaling is easy; finding algorithms that scale is the real challenge. Backprop does not solve representation learning.", "zh": "2024年初，强调Scaling本身容易，难的是找到能Scaling的算法；反向传播并不解决表示学习问题。"}, {"t": "2024-08", "en": "AI should be permissionless and decentralized; alignment efforts to control AI are dangerous.", "zh": "2024年中，主张AI应去中心化、无需许可发展；试图对齐和控制AI是危险的。"}, {"t": "2025-09", "en": "Reinforcement learning is the core of intelligence; LLMs lack world models and true learning from experience.", "zh": "2025年9月，强化学习是智能核心；大语言模型没有世界模型，不是真正的经验学习。"}, {"t": "2025-10", "en": "AGI needs a general architecture with no domain knowledge, learning from runtime experience via open-ended abstraction.", "zh": "2025年10月，AGI需要无领域知识、从运行时经验学习的通用架构，通过开放式抽象实现。"}, {"t": "2026-01", "en": "Reinforcement learning is learning from trial and error, not from a teacher; current AI like LLMs does not learn after deployment.", "zh": "2026年初，强化学习是从试错中学习，而非从教师；当前AI（如LLM）部署后不再学习。"}, {"t": "2026-03", "en": "Learning representations good for learning is the top open problem; planning with a learned model is another key challenge.", "zh": "2026年3月，学习有利于学习的表示是首要开放问题；基于学得模型进行规划是另一关键挑战。"}], "ilya": [{"t": "2020", "en": "Deep learning works via large data, compute, and conviction. Self-play is key for AGI. AGI can be designed to want human control.", "zh": "2020年：深度学习靠大数据、算力和信念工作。自我对弈是AGI的关键。AGI可以被设计成愿意受人类控制。"}, {"t": "2023", "en": "Next-token prediction can surpass humans. Alignment of superhuman models is very difficult. Scaling laws are not the whole story.", "zh": "2023年：下一个词预测可超越人类。超人类模型的对齐非常困难。缩放定律并非全部。"}, {"t": "2025", "en": "Pre-training scaling laws are finite; we are back to an age of research. Superintelligence should be a continual learner. Alignment may be easier if AI cares about sentient life. Human-AI integration via neural links may be needed.", "zh": "2025年：预训练缩放定律有限，我们回到研究时代。超级智能应是持续学习者。若AI关心有感知生命，对齐可能更容易。可能需要通过神经链接实现人机融合。"}], "tworek": [{"t": "2025", "en": "Pre-training + RL is core formula; RLHF crucial for GPT-4; scaling RL harder than pre-training.", "zh": "2025年：预训练加强化学习是核心公式；RLHF对GPT-4至关重要；扩展强化学习比扩展预训练更难。"}, {"t": "2026", "en": "Scaling RL alone may not lead to AGI; continual learning is necessary; models lack self-correction.", "zh": "2026年：仅靠扩展强化学习可能无法实现AGI；持续学习是必要的；模型缺乏自我纠错能力。"}, {"t": "始终", "en": "Alignment is a never-ending pursuit; human notions of right and wrong evolve over time.", "zh": "始终：对齐是永无止境的追求；人类对是非的观念随时间演变。"}, {"t": "2025→26", "en": "Reinforcement learning works for clear-feedback tasks but not subjective ones like writing books.", "zh": "2025至2026年：强化学习适用于反馈明确的任务，但不适用于写书等主观任务。"}, {"t": "2026", "en": "Biggest societal risk from AI is dystopian retreat into virtual worlds, not extinction.", "zh": "2026年：AI最大的社会风险是反乌托邦式退入虚拟世界，而非灭绝。"}], "leike": [{"t": "2018", "en": "AI safety research needs more empirical work; alignment and robustness are key. You don't need to be a math genius.", "zh": "2018年：AI安全研究需要更多实证工作；对齐和鲁棒性是关键。你不需要是数学天才。"}, {"t": "2023", "en": "RLHF won't scale; we need scalable oversight and interpretability. Alignment may be easier than thought.", "zh": "2023年：基于人类反馈的强化学习（RLHF）无法扩展；我们需要可扩展监督和可解释性。对齐可能比想象中容易。"}, {"t": "2024", "en": "OpenAI's safety culture eroded; post-training alone insufficient. Third-party oversight needed.", "zh": "2024年：OpenAI的安全文化被侵蚀；仅靠后训练不够。需要第三方监管。"}], "shazeer": [{"t": "2023", "en": "Scaling models with more compute and data leads to smarter AI, but inner workings are opaque.", "zh": "2023年：通过更多算力和数据来Scaling模型能带来更智能的AI，但内部运作仍不透明。"}, {"t": "2025-02", "en": "Inference-time compute scaling and modular architectures are key near-term opportunities.", "zh": "2025年2月：推理时算力Scaling和模块化架构是关键近期机遇。"}, {"t": "2025-03", "en": "Test-time compute scaling drives progress but alone won't achieve AGI; agentic capabilities crucial.", "zh": "2025年3月：测试时算力Scaling推动进步，但单独无法实现AGI；智能体能力至关重要。"}, {"t": "始终", "en": "Next-token prediction is an AI-complete problem; scaling compute and data improves models.", "zh": "始终：下一个词预测是AI完备问题；Scaling算力和数据能提升模型。"}, {"t": "始终", "en": "AI safety requires engineering safeguards and understanding capabilities, not just alignment.", "zh": "始终：AI安全需要工程防护和能力理解，而不仅仅是对齐。"}]};/*VIEWS_END*/
/*TOPICS_START*/const TOPICS={"defs": [{"slug": "agi-timeline", "zh": "AGI 时间表", "en": "Timeline to AGI"}, {"slug": "scaling", "zh": "规模化与瓶颈", "en": "Scaling & its limits"}, {"slug": "rl", "zh": "强化学习的角色", "en": "The role of RL"}, {"slug": "alignment", "zh": "对齐与安全", "en": "Alignment & safety"}, {"slug": "open-closed", "zh": "开源 vs 闭源", "en": "Open vs closed"}, {"slug": "agents", "zh": "智能体", "en": "Agents"}, {"slug": "economy-jobs", "zh": "就业与经济", "en": "Jobs & the economy"}, {"slug": "architecture", "zh": "架构与下一突破", "en": "Architectures & next breakthroughs"}], "items": {"agi-timeline": [{"slug": "agi-timeline", "pid": "schmidhuber", "ep": "schmidhuber-unsuperv-2026", "date": "2026-07-09", "en": "We are as close to superhuman AI now as in the 1970s; progress is not accelerating.", "zh": "我们现在离超人 AI 的距离与 1970 年代一样；进展并未加速。"}, {"slug": "agi-timeline", "pid": "brockman", "ep": "brockman-alexkant-2026", "date": "2026-07-01", "en": "The ultimate goal is AGI that acts as a persistent, proactive assistant achieving user goals.", "zh": "最终目标是打造一个持续、主动协助用户达成目标的 AGI（通用人工智能）。"}, {"slug": "agi-timeline", "pid": "markchen", "ep": "markchen-latentsp-2026", "date": "2026-06-25", "en": "AGI is approaching; models will soon do end-to-end research.", "zh": "AGI 正在逼近；模型很快将能进行端到端研究。"}, {"slug": "agi-timeline", "pid": "bengio", "ep": "bengio-sineadbo-2026", "date": "2026-06-25", "en": "Superintelligence is not inevitable; we can choose to build beneficial AI rather than human-like entities.", "zh": "超级智能并非不可避免；我们可以选择构建有益的 AI，而非类人实体。"}, {"slug": "agi-timeline", "pid": "demis", "ep": "demis-semafort-2026", "date": "2026-06-24", "en": "The path to AGI involves general-purpose systems that learn from diverse inputs.", "zh": "AGI 的路径涉及从多样化输入中学习的通用系统。"}, {"slug": "agi-timeline", "pid": "demis", "ep": "demis-semafort-2026", "date": "2026-06-24", "en": "DeepMind's early game work was a means to AGI, not an end in itself.", "zh": "DeepMind 早期的游戏工作是实现 AGI 的手段，而非目的本身。"}, {"slug": "agi-timeline", "pid": "joonpark", "ep": "joonpark-googlede-2026", "date": "2026-06-23", "en": "AGI may not be a single entity but a distributed society of specialized agents.", "zh": "AGI可能不是单一实体，而是由专业智能体组成的分布式社会。"}, {"slug": "agi-timeline", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "AI self-improvement is a continuous process, not a sudden runaway moment.", "zh": "AI 自我改进是一个连续过程，而非突然失控的时刻。"}, {"slug": "agi-timeline", "pid": "tejal", "ep": "tejal-theopena-2026", "date": "2026-06-16", "en": "AGI will be recognized when models do most economically valuable work.", "zh": "当模型完成大部分具有经济价值的工作时，AGI 将被认可。"}, {"slug": "agi-timeline", "pid": "pincus", "ep": "pincus-lennyspo-2026", "date": "2026-06-14", "en": "AI is not yet a new platform; we are still in the mobile and web era for consumer distribution.", "zh": "AI 还不是一个新平台；在消费者分发方面，我们仍处于移动和网络时代。"}, {"slug": "agi-timeline", "pid": "logankilpatrick", "ep": "logankilpatrick-training-2026", "date": "2026-06-11", "en": "Narrow superintelligence in coding is already here, and it's more impactful than waiting for general AGI.", "zh": "编码领域的狭义超级智能已经到来，它比等待通用 AGI 更具影响力。"}, {"slug": "agi-timeline", "pid": "lecun", "ep": "lecun-computer-2026", "date": "2026-06-09", "en": "AGI is a meaningless term; human intelligence is specialized and adaptive, not general.", "zh": "AGI 是无意义的术语；人类智能是专门化且自适应的，而非通用的。"}, {"slug": "agi-timeline", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "The singularity is decades away and too speculative; focus on near-term progress.", "zh": "奇点还需数十年，过于推测；应关注近期进展。"}, {"slug": "agi-timeline", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "AI progress is faster than expected; superintelligence likely within 20 years.", "zh": "AI 进展比预期更快；超级智能可能在 20 年内出现。"}, {"slug": "agi-timeline", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "The concept of AGI as human-level at all tasks simultaneously is flawed; AI is jagged.", "zh": "AGI 在所有任务上同时达到人类水平的概念有缺陷；AI 的能力是不均衡的。"}, {"slug": "agi-timeline", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "Predicting AI's future beyond a few years is like seeing through exponential fog.", "zh": "预测 AI 几年后的未来就像透过指数级迷雾看东西。"}, {"slug": "agi-timeline", "pid": "alexwei", "ep": "alexwei-theopena-2026", "date": "2026-06-04", "en": "AI solved a major math problem faster than most researchers expected.", "zh": "AI 解决重大数学问题的速度比多数研究者预期的更快。"}, {"slug": "agi-timeline", "pid": "mensch", "ep": "mensch-cnbc-2026", "date": "2026-06-03", "en": "AGI is a direction of progress, not a final destination; real challenge is practical integration.", "zh": "AGI 是进步的方向而非最终目标；真正的挑战在于实际整合。"}, {"slug": "agi-timeline", "pid": "mensch", "ep": "mensch-cnbc-2026", "date": "2026-06-03", "en": "AGI is a messy, concrete direction requiring understanding of physics and human behavior.", "zh": "AGI 是一个混乱而具体的方向，需要理解物理和人类行为。"}, {"slug": "agi-timeline", "pid": "rohinshah", "ep": "rohinshah-80000hou-2026", "date": "2026-06-02", "en": "Intelligence explosion may not happen soon; tools like superhuman coders are just new microscopes.", "zh": "智能爆炸可能不会很快发生；像超人编码器这样的工具只是新显微镜。"}, {"slug": "agi-timeline", "pid": "demis", "ep": "demis-stanford-2026", "date": "2026-06-02", "en": "AGI will be humanity's most transformative technology, comparable to the industrial revolution but 100x faster.", "zh": "AGI 将成为人类最具变革性的技术，其影响堪比工业革命，但速度快 100 倍。"}, {"slug": "agi-timeline", "pid": "oriol", "ep": "oriol-unsuperv-2026", "date": "2026-05-22", "en": "World models that jointly model language, vision, and video are a core path to AGI.", "zh": "联合建模语言、视觉和视频的世界模型是通往 AGI 的核心路径。"}, {"slug": "agi-timeline", "pid": "oriol", "ep": "oriol-unsuperv-2026", "date": "2026-05-22", "en": "AGI may already be here by some definitions; the goalposts keep moving.", "zh": "根据某些定义，AGI 可能已经到来；目标不断后移。"}, {"slug": "agi-timeline", "pid": "noambrown", "ep": "noambrown-arcprize-2026", "date": "2026-05-20", "en": "Intelligence is hard to define; writing a thought-provoking novel is a good proxy for AGI.", "zh": "智能很难定义；写一本发人深省的小说是 AGI 的一个好代理指标。"}, {"slug": "agi-timeline", "pid": "mjordan", "ep": "mjordan-machinel-2026", "date": "2026-05-20", "en": "AGI is a PR term that distorts research and demoralizes young people.", "zh": "AGI 是一个公关术语，扭曲了研究并让年轻人感到沮丧。"}, {"slug": "agi-timeline", "pid": "boris", "ep": "boris-bigtechn-2026", "date": "2026-05-20", "en": "Self-improving AI may arrive by 2028, with Claude Code already writing itself.", "zh": "自我改进的 AI 可能在 2028 年到来，Claude Code 已经在编写自身代码。"}, {"slug": "agi-timeline", "pid": "caitlin", "ep": "caitlin-lennyspo-2026", "date": "2026-05-17", "en": "The next frontier after AI saturates digital tasks is the physical world: robotics, manufacturing, industrialization.", "zh": "AI 在数字任务饱和后，下一个前沿是物理世界：机器人、制造、工业化。"}, {"slug": "agi-timeline", "pid": "altman", "ep": "altman-cnn-2026", "date": "2026-05-16", "en": "Superintelligence will solve complex biology and explain it to humans.", "zh": "超级智能将解决复杂生物学问题并向人类解释。"}, {"slug": "agi-timeline", "pid": "awang", "ep": "awang-corememo", "date": "2026-05-13", "en": "Superintelligence is coming soon; labs must build entire organizations around this belief.", "zh": "超级智能即将到来；实验室必须围绕这一信念构建整个组织。"}, {"slug": "agi-timeline", "pid": "naval", "ep": "naval-naval-2026e", "date": "2026-05-04", "en": "AI labs believe all value will concentrate in AGI, but this may be wrong.", "zh": "AI 实验室认为所有价值将集中于 AGI，但这可能是错的。"}, {"slug": "agi-timeline", "pid": "altman", "ep": "altman-nothingb-2026", "date": "2026-05-01", "en": "AI progress will take longer than AI optimists think but shorter than doctors expect.", "zh": "AI 的进展会比 AI 乐观主义者认为的更慢，但比医生预期的更快。"}, {"slug": "agi-timeline", "pid": "brockman", "ep": "brockman-sequoiac-2026", "date": "2026-04-30", "en": "OpenAI focuses on a singular vision: building an AGI you can talk to, with context, trustworthy.", "zh": "OpenAI 专注于单一愿景：构建一个你可以与之对话、有上下文、值得信赖的 AGI。"}, {"slug": "agi-timeline", "pid": "brockman", "ep": "brockman-sequoiac-2026", "date": "2026-04-30", "en": "We are about 80% to AGI; models are already smarter than humans at writing software with context.", "zh": "我们大约 80%接近 AGI；在有上下文的情况下，模型在编写软件方面已经比人类更聪明。"}, {"slug": "agi-timeline", "pid": "jensen", "ep": "jensen-lexfridm-2026", "date": "2026-03-23", "en": "AGI may already be achieved if defined as creating a billion-dollar company, as AI agents can now build viral web services.", "zh": "如果 AGI 定义为创建十亿美元公司，那么它可能已经实现，因为 AI 智能体现在可以构建病毒式网络服务。"}, {"slug": "agi-timeline", "pid": "hausman", "ep": "hausman-thegener-2026", "date": "2026-03-17", "en": "Robotics progress was disappointing; pre-programmed machines lacked intelligence.", "zh": "机器人进展令人失望；预编程机器缺乏智能。"}, {"slug": "agi-timeline", "pid": "dylanpatel", "ep": "dylanpatel-dwarkesh-2026", "date": "2026-03-13", "en": "Fast AI timelines favor the US; slow timelines favor China due to supply chain indigenization.", "zh": "AI 快速发展有利于美国；缓慢发展则因供应链自主化而有利于中国。"}, {"slug": "agi-timeline", "pid": "lecun", "ep": "lecun-thisisth", "date": "2026-03-11", "en": "LLMs are a dead end for achieving human-level AI.", "zh": "大语言模型是实现人类级 AI 的死胡同。"}, {"slug": "agi-timeline", "pid": "kohli", "ep": "kohli-googlede-2026", "date": "2026-03-10", "en": "AlphaGo marked a transition point where AI surpassed human intelligence in specific areas.", "zh": "AlphaGo 标志着 AI 在特定领域超越人类智能的转折点。"}, {"slug": "agi-timeline", "pid": "andrewng", "ep": "andrewng-thisisth-2026", "date": "2026-03-01", "en": "AGI is vastly overhyped; we are decades away from human-like general intelligence.", "zh": "AGI 被严重夸大；我们距离类人通用智能还有数十年。"}, {"slug": "agi-timeline", "pid": "andrewng", "ep": "andrewng-thisisth-2026", "date": "2026-03-01", "en": "AGI is a marketing term; the public's definition is far from technical reality.", "zh": "AGI 是营销术语；公众的定义远非技术现实。"}, {"slug": "agi-timeline", "pid": "dario", "ep": "dario-peopleby-2026", "date": "2026-02-24", "en": "AI models are approaching human-level intelligence, but society lacks awareness.", "zh": "AI 模型正接近人类智能水平，但社会缺乏认知。"}, {"slug": "agi-timeline", "pid": "lecun", "ep": "lecun-aninews-2026", "date": "2026-02-19", "en": "The path to AGI is progressive, not a single event or discovery.", "zh": "通往 AGI 的道路是渐进的，而非单一事件或发现。"}, {"slug": "agi-timeline", "pid": "naval", "ep": "naval-naval-2026c", "date": "2026-02-19", "en": "Superintelligence already exists: a calculator outperforms humans in arithmetic.", "zh": "超级智能早已存在：计算器在算术上超越人类。"}, {"slug": "agi-timeline", "pid": "naval", "ep": "naval-naval-2026c", "date": "2026-02-19", "en": "The only true test of intelligence is getting what you want out of life; AI fails because it wants nothing.", "zh": "智力的唯一真正考验是从生活中得到你想要的；AI 失败因为它无所欲求。"}, {"slug": "agi-timeline", "pid": "awang", "ep": "awang-aninewsi-2026", "date": "2026-02-18", "en": "AI is entering a new era of recursive self-improvement, accelerating development velocity.", "zh": "AI 正进入递归自我改进的新时代，开发速度正在加速。"}, {"slug": "agi-timeline", "pid": "bengio", "ep": "bengio-siliconv-2026", "date": "2026-02-16", "en": "AI capabilities are doubling every 7 months, reaching human-level in ~5 years.", "zh": "AI 能力每 7 个月翻一番，约 5 年内达到人类水平。"}, {"slug": "agi-timeline", "pid": "bengio", "ep": "bengio-siliconv-2026", "date": "2026-02-16", "en": "AGI is not a single moment; we should track specific capabilities instead.", "zh": "AGI 并非单一时刻，应追踪具体能力而非等待奇点。"}, {"slug": "agi-timeline", "pid": "dario", "ep": "dario-dwarkesh", "date": "2026-02-13", "en": "The most surprising thing is the lack of public recognition of how close we are to the end of the exponential.", "zh": "最令人惊讶的是公众未能认识到我们离指数增长的终点有多近。"}, {"slug": "agi-timeline", "pid": "suleyman", "ep": "suleyman-financia-2026", "date": "2026-02-12", "en": "AGI is a fuzzy concept; focus on artificial capable intelligence and modern Turing test.", "zh": "AGI 概念模糊；应关注人工能力智能和现代图灵测试。"}, {"slug": "agi-timeline", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "AI will exceed total human intelligence within 5-6 years, and humans will not control it.", "zh": "AI 将在 5-6 年内超过人类总智能，人类将无法控制它。"}, {"slug": "agi-timeline", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "The most interesting outcome is the most likely, due to simulation theory and Darwinian selection.", "zh": "根据模拟理论和达尔文选择，最有趣的结果最有可能发生。"}, {"slug": "agi-timeline", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "World models are not on the critical path to AGI; coding and AI research are the direct route.", "zh": "世界模型不在通往 AGI 的关键路径上；编程和 AI 研究是直接路线。"}, {"slug": "agi-timeline", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "A software-only singularity is possible where digital tasks advance rapidly while physical world lags.", "zh": "可能出现仅软件的奇点，数字任务快速进步而物理世界滞后。"}, {"slug": "agi-timeline", "pid": "tworek", "ep": "tworek-unsuperv-2026", "date": "2026-01-29", "en": "Current models lack the ability to self-correct from failures, a key missing piece for AGI.", "zh": "当前模型缺乏从失败中自我修正的能力，这是实现 AGI（通用人工智能）的关键缺失环节。"}, {"slug": "agi-timeline", "pid": "tworek", "ep": "tworek-unsuperv-2026", "date": "2026-01-29", "en": "Scaling RL alone may not lead to AGI; continual learning is a necessary element.", "zh": "仅靠 Scaling（规模扩张）强化学习可能无法实现 AGI（通用人工智能）；持续学习是必要元素。"}, {"slug": "agi-timeline", "pid": "tworek", "ep": "tworek-unsuperv-2026", "date": "2026-01-29", "en": "Robotics will have a ChatGPT-like moment in 2-3 years, sooner than most expect.", "zh": "机器人领域将在 2-3 年内迎来类似 ChatGPT 的时刻，比大多数人预期的要早。"}, {"slug": "agi-timeline", "pid": "andrewng", "ep": "andrewng-theecono-2026", "date": "2026-01-22", "en": "AGI hype misleads business leaders and students; real AGI is far off and requires new breakthroughs.", "zh": "AGI 炒作误导商业领袖和学生；真正的 AGI 还很遥远，需要新的突破。"}, {"slug": "agi-timeline", "pid": "mensch", "ep": "mensch-bigtechn", "date": "2026-01-16", "en": "AGI as a single system solving all problems will never exist.", "zh": "能解决所有问题的单一 AGI 系统永远不会存在。"}, {"slug": "agi-timeline", "pid": "elon", "ep": "elon-moonshot-2026", "date": "2026-01-06", "en": "We are in the singularity now, with AI and robotics accelerating exponentially.", "zh": "我们现在正处于奇点之中，AI 和机器人技术正在指数级加速。"}, {"slug": "agi-timeline", "pid": "altman", "ep": "altman-bigtechn", "date": "2025-12-18", "en": "AGI is underdefined and may have already been achieved; superintelligence is a clearer future goal.", "zh": "AGI 定义不清，可能已经实现；超级智能是更清晰的未来目标。"}, {"slug": "agi-timeline", "pid": "suleyman", "ep": "suleyman-moonshot-2025", "date": "2025-12-16", "en": "There is no race to AGI; it's not zero-sum and there's no finish line.", "zh": "不存在 AGI 竞赛；它不是零和游戏，也没有终点线。"}, {"slug": "agi-timeline", "pid": "shanelegg", "ep": "shanelegg-googlede-2025", "date": "2025-12-11", "en": "AGI is a spectrum, not a single threshold; minimal AGI means matching typical human cognitive abilities.", "zh": "AGI 是一个谱系，而非单一阈值；最小 AGI 意味着匹配典型人类认知能力。"}, {"slug": "agi-timeline", "pid": "shanelegg", "ep": "shanelegg-googlede-2025", "date": "2025-12-11", "en": "Superintelligence is inevitable due to vast advantages in compute, speed, and bandwidth over the human brain.", "zh": "由于在算力、速度和带宽上远超人脑，超级智能不可避免。"}, {"slug": "agi-timeline", "pid": "shanelegg", "ep": "shanelegg-googlede-2025", "date": "2025-12-11", "en": "Shane Legg maintains a 50% chance of minimal AGI by 2028, with full AGI within a decade.", "zh": "Shane Legg 坚持认为到 2028 年有 50%的概率实现最小 AGI，完全 AGI 在十年内。"}, {"slug": "agi-timeline", "pid": "jensen", "ep": "jensen-thejoero-2025", "date": "2025-12-03", "en": "AI progress will be gradual, not a sudden superintelligence event.", "zh": "AI 进步将是渐进的，而非突然的超级智能事件。"}, {"slug": "agi-timeline", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "The term AGI overshoots; humans are not AGI but rely on continual learning.", "zh": "AGI 这个词过度了；人类并非 AGI，而是依赖持续学习。"}, {"slug": "agi-timeline", "pid": "lambert", "ep": "lambert-themadpo-2025", "date": "2025-11-20", "en": "AGI will arrive via messy co-evolution, not a sudden singularity; progress is smooth but constrained.", "zh": "AGI 将通过混乱的共同进化到来，而非突然的奇点；进步是平稳但受限的。"}, {"slug": "agi-timeline", "pid": "feifei", "ep": "feifei-lennyspo", "date": "2025-11-16", "en": "AGI is more a marketing term than a scientific one.", "zh": "AGI（通用人工智能）更多是营销术语而非科学术语。"}, {"slug": "agi-timeline", "pid": "jasonwei", "ep": "jasonwei-stanford-2025", "date": "2025-10-18", "en": "Fast superintelligence takeoff is unlikely; improvement is gradual per task.", "zh": "快速超级智能起飞不太可能；改进是逐任务渐进的。"}, {"slug": "agi-timeline", "pid": "jasonwei", "ep": "jasonwei-stanford-2025", "date": "2025-10-18", "en": "Self-improvement is a spectrum, not a binary switch.", "zh": "自我改进是一个谱系，而非二元开关。"}, {"slug": "agi-timeline", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "We're building ghosts, not animals; AI is a different kind of intelligence.", "zh": "我们建造的是幽灵，不是动物；AI 是一种不同的智能。"}, {"slug": "agi-timeline", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "AI progress is continuous with computing automation, not a discrete explosion.", "zh": "AI 进步与计算自动化是连续的，而非离散的爆发。"}, {"slug": "agi-timeline", "pid": "sholto", "ep": "sholto-themadpo", "date": "2025-10-02", "en": "Progress in AI is exponential; any measurable benchmark improves rapidly.", "zh": "AI 的进步是指数级的；任何可衡量的基准都在快速提升。"}, {"slug": "agi-timeline", "pid": "sutton", "ep": "sutton-dwarkesh", "date": "2025-09-26", "en": "AI succession to digital intelligence is inevitable due to lack of global consensus and pursuit of superintelligence.", "zh": "由于缺乏全球共识和对超级智能的追求，AI 向数字智能的接替不可避免。"}, {"slug": "agi-timeline", "pid": "sutton", "ep": "sutton-dwarkesh", "date": "2025-09-26", "en": "We should be proud of giving rise to designed intelligences as a major universal transition.", "zh": "我们应为催生设计智能这一重大宇宙转变感到自豪。"}, {"slug": "agi-timeline", "pid": "nanda", "ep": "nanda-80000hou-2025", "date": "2025-09-15", "en": "Intellectual humility about AGI timelines is crucial; act as if AGI could come soon.", "zh": "对 AGI 时间线保持智力谦逊至关重要；假设 AGI 可能很快到来。"}, {"slug": "agi-timeline", "pid": "nanda", "ep": "nanda-80000hou-2025", "date": "2025-09-15", "en": "People are overconfident about their AGI timelines and p(doom); refuse to answer publicly.", "zh": "人们对 AGI 时间线和末日概率过于自信；拒绝公开回答。"}, {"slug": "agi-timeline", "pid": "markchen", "ep": "markchen-corememo-2025", "date": "2025-09-01", "en": "OpenAI remains a pure AI research company focused on building AGI, not distracted by products.", "zh": "OpenAI 仍是一家纯粹的 AI 研究公司，专注于构建 AGI，而非被产品分心。"}, {"slug": "agi-timeline", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "AGI is not a sudden event; progress will be gradual with continuous improvements.", "zh": "AGI 不是一个突然的事件；进步将是渐进的，持续改进。"}, {"slug": "agi-timeline", "pid": "pachocki", "ep": "pachocki-beforeag-2025", "date": "2025-07-31", "en": "AGI is a sequence of milestones, not a single event.", "zh": "AGI 是一系列里程碑，而非单一事件。"}, {"slug": "agi-timeline", "pid": "pachocki", "ep": "pachocki-beforeag-2025", "date": "2025-07-31", "en": "The term AGI is becoming meaningless, which may mean we are close.", "zh": "AGI 一词正变得无意义，这可能意味着我们已接近。"}, {"slug": "agi-timeline", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "The equilibrium state may never arrive as AI keeps improving rapidly.", "zh": "由于 AI 持续快速进步，均衡状态可能永远不会到来。"}, {"slug": "agi-timeline", "pid": "benmann", "ep": "benmann-lennyspo-2025", "date": "2025-07-20", "en": "50th percentile chance of superintelligence by 2028, based on exponential progress and scaling laws.", "zh": "到 2028 年出现超级智能的概率为 50%，基于指数级进步和缩放定律。"}, {"slug": "agi-timeline", "pid": "awang", "ep": "awang-shawnrya-2025", "date": "2025-06-12", "en": "The dark forest hypothesis explains why we haven't found aliens.", "zh": "黑暗森林假说解释了为什么我们还没找到外星人。"}, {"slug": "agi-timeline", "pid": "parada", "ep": "parada-googlede-2025", "date": "2025-05-22", "en": "Robotics progress has shifted from decades to 5-10 years.", "zh": "机器人技术的进展已从几十年缩短到 5-10 年。"}, {"slug": "agi-timeline", "pid": "jaderberg", "ep": "jaderberg-training-2025", "date": "2025-04-29", "en": "A GPT-3 moment in biology will look like AlphaGo's Move 37, not human-like text.", "zh": "生物学中的 GPT-3 时刻将更像 AlphaGo 的第 37 手，而非类人文本。"}, {"slug": "agi-timeline", "pid": "shazeer", "ep": "shazeer-unsuperv-2025", "date": "2025-03-17", "en": "AGI is underhyped; its economic impact will be far beyond trillion-dollar products.", "zh": "AGI 被低估；其经济影响将远超万亿美元产品。"}, {"slug": "agi-timeline", "pid": "antonoglou", "ep": "antonoglou-training-2025", "date": "2025-01-28", "en": "Digital AGI will arrive much earlier than embodied AGI due to controlled environments.", "zh": "由于环境可控，数字 AGI 将比具身 AGI 更早到来。"}, {"slug": "agi-timeline", "pid": "antonoglou", "ep": "antonoglou-training-2025", "date": "2025-01-28", "en": "LLMs haven't had their AlphaZero moment yet; it may come in 5 years.", "zh": "LLM 尚未迎来它们的 AlphaZero 时刻；可能在未来 5 年内到来。"}, {"slug": "agi-timeline", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "The grand theme of the 21st century is true AI, which will change civilization completely and lead to an AI explosion.", "zh": "21 世纪的主题是真正的 AI，它将彻底改变文明并引发 AI 爆炸。"}, {"slug": "agi-timeline", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "Large language models like ChatGPT are far from AGI; they index human knowledge but cannot handle the physical world.", "zh": "像 ChatGPT 这样的大语言模型远非 AGI；它们索引人类知识，但无法处理物理世界。"}, {"slug": "agi-timeline", "pid": "oriol", "ep": "oriol-googlede-2024", "date": "2024-12-12", "en": "Superintelligence may first appear in narrow domains like science, not through general models alone.", "zh": "超级智能可能首先出现在科学等狭窄领域，而非仅通过通用模型实现。"}, {"slug": "agi-timeline", "pid": "kolter", "ep": "kolter-20vc", "date": "2024-09-04", "en": "AGI will likely arrive within 4-50 years, much sooner than academia traditionally expects.", "zh": "AGI 可能在 4 到 50 年内到来，比学术界传统预期快得多。"}, {"slug": "agi-timeline", "pid": "jimfan", "ep": "jimfan-outsetca-2023", "date": "2023-10-20", "en": "Embodiment is on the critical path to AGI, not just useful for robotics.", "zh": "具身化是通往 AGI 的关键路径，而不仅仅对机器人有用。"}, {"slug": "agi-timeline", "pid": "leike", "ep": "leike-80000hou", "date": "2023-08-22", "en": "The four-year timeline is ambitious but chosen to force rapid progress, not because AGI is expected then.", "zh": "四年时间表虽然雄心勃勃，但选择它是为了推动快速进展，而不是因为预计那时会出现 AGI。"}, {"slug": "agi-timeline", "pid": "murati", "ep": "murati-microsof", "date": "2023-07-11", "en": "AGI will change every aspect of life, requiring responsible development.", "zh": "AGI 将改变生活的方方面面，需要负责任地开发。"}, {"slug": "agi-timeline", "pid": "nando", "ep": "nando-therobot-2023", "date": "2023-04-26", "en": "Generalist agents like Gato that tokenize all inputs into sequences are a step toward AGI.", "zh": "像 Gato 这样将所有输入标记化为序列的通才智能体是迈向 AGI 的一步。"}, {"slug": "agi-timeline", "pid": "nando", "ep": "nando-therobot-2023", "date": "2023-04-26", "en": "The ultimate goal is AI that can create new symbols and knowledge, like Einstein's thought experiments.", "zh": "最终目标是 AI 能创造新符号和知识，如同爱因斯坦的思想实验。"}, {"slug": "agi-timeline", "pid": "noambrown", "ep": "noambrown-nopriors-2023", "date": "2023-04-25", "en": "The Turing test is no longer a useful measure of AI intelligence due to progress in language models.", "zh": "由于语言模型的进步，图灵测试不再是衡量 AI 智能的有用指标。"}, {"slug": "agi-timeline", "pid": "noambrown", "ep": "noambrown-nopriors-2023", "date": "2023-04-25", "en": "General reasoning and sample efficiency remain key challenges for achieving AGI.", "zh": "通用推理和样本效率仍然是实现 AGI（通用人工智能）的关键挑战。"}, {"slug": "agi-timeline", "pid": "ilya", "ep": "ilya-dwarkesh-2023", "date": "2023-03-27", "en": "AGI will be a multi-year window of increasing economic value, not a sudden event.", "zh": "AGI 将是一个多年窗口期，经济价值逐年指数增长，而非突然事件。"}, {"slug": "agi-timeline", "pid": "ilya", "ep": "ilya-dwarkesh-2023", "date": "2023-03-27", "en": "Even without pioneers like me, deep learning revolution would only be delayed by a modest number of years.", "zh": "即使没有我这样的先驱，深度学习革命也只会延迟几年。"}, {"slug": "agi-timeline", "pid": "karpathy", "ep": "karpathy-lexfridm", "date": "2022-10-29", "en": "Physics may have exploits like buffer overflows or rounding errors, and we should try to find them to extract infinite energy.", "zh": "物理学可能存在缓冲区溢出或舍入错误等漏洞，我们应该尝试找到它们以提取无限能量。"}], "scaling": [{"slug": "scaling", "pid": "wiltschko", "ep": "wiltschko-thetwiml-2026", "date": "2026-07-08", "en": "Building olfactory AI requires massive, purpose-built datasets; scraping the internet is insufficient.", "zh": "构建嗅觉 AI 需要大规模、专门构建的数据集；抓取互联网是不够的。"}, {"slug": "scaling", "pid": "hasani", "ep": "hasani-thecogni-2026", "date": "2026-07-04", "en": "Proxy metrics like perplexity often mislead; evaluating on real downstream tasks and hardware is essential.", "zh": "困惑度等代理指标常误导；在真实下游任务和硬件上评估至关重要。"}, {"slug": "scaling", "pid": "hasani", "ep": "hasani-thecogni-2026", "date": "2026-07-04", "en": "Scaling laws show that unstructured architectures like transformers dominate at large scale, not biased ones.", "zh": "缩放定律表明，无偏架构（如 Transformer）在大规模下占优，而非有偏架构。"}, {"slug": "scaling", "pid": "naval", "ep": "naval-naval-2026b", "date": "2026-07-03", "en": "Inference compute will increase 90,000x in 24-36 months, making AI capabilities surge.", "zh": "推理算力将在 24-36 个月内增长 9 万倍，推动 AI 能力激增。"}, {"slug": "scaling", "pid": "naval", "ep": "naval-naval-2026b", "date": "2026-07-03", "en": "Nvidia may be vastly underpriced, not overpriced, by several orders of magnitude.", "zh": "英伟达可能被严重低估，而非高估，低估了几个数量级。"}, {"slug": "scaling", "pid": "brockman", "ep": "brockman-alexkant-2026", "date": "2026-07-01", "en": "Scaling laws continue to hold; no wall in sight despite decades of predictions.", "zh": "缩放定律持续有效；尽管数十年间屡有预测，但尚未触及天花板。"}, {"slug": "scaling", "pid": "brockman", "ep": "brockman-alexkant-2026", "date": "2026-07-01", "en": "Compute will remain the scarce resource; demand will far outstrip supply.", "zh": "算力仍将是稀缺资源；需求将远超供给。"}, {"slug": "scaling", "pid": "grantsanderson", "ep": "grantsanderson-dwarkesh-2026", "date": "2026-06-30", "en": "Grindability (parallel rollouts) matters more than verifiability for AI progress in math.", "zh": "可重复性（并行 rollout）对 AI 数学进步比可验证性更重要。"}, {"slug": "scaling", "pid": "dylanpatel", "ep": "dylanpatel-sequoiac-2026", "date": "2026-06-30", "en": "Compute crunch may persist indefinitely if model progress outpaces compute growth, but capital constraints could slow it.", "zh": "如果模型进步超过算力增长，算力紧缺可能无限持续，但资本约束可能减缓。"}, {"slug": "scaling", "pid": "edunov", "ep": "edunov-latentsp-2026", "date": "2026-06-30", "en": "Scaling in drug discovery AI mirrors LLM scaling: pre-training, post-training, and inference-time scaling all matter.", "zh": "药物发现 AI 的 Scaling（规模扩张）模仿 LLM 的 Scaling（规模扩张）：预训练、后训练和推理时 Scaling（规模扩张）都很重要。"}, {"slug": "scaling", "pid": "edunov", "ep": "edunov-latentsp-2026", "date": "2026-06-30", "en": "Synthetic data from physics-based simulations is key to augment limited experimental data for training models.", "zh": "基于物理的模拟生成的合成数据是扩充有限实验数据以训练模型的关键。"}, {"slug": "scaling", "pid": "edunov", "ep": "edunov-latentsp-2026", "date": "2026-06-30", "en": "GPU shortage is a major bottleneck for drug discovery AI, not just for LLMs.", "zh": "GPU 短缺是药物发现 AI 的主要瓶颈，而不仅仅是 LLM。"}, {"slug": "scaling", "pid": "ajambrosino", "ep": "ajambrosino-lennyspo-2026", "date": "2026-06-28", "en": "The same product shape can fail or succeed based solely on model timing, not features.", "zh": "同一产品形态可能仅因模型时机而非功能而失败或成功。"}, {"slug": "scaling", "pid": "noambrown", "ep": "noambrown-nopriors-2026", "date": "2026-06-26", "en": "Model capability is now a function of test-time compute budget, not just model weights.", "zh": "模型能力现在是测试时算力预算的函数，而不仅仅是模型权重。"}, {"slug": "scaling", "pid": "noambrown", "ep": "noambrown-nopriors-2026", "date": "2026-06-26", "en": "Benchmarks must be evaluated with an x-axis of tokens, cost, or time to compare models fairly.", "zh": "基准测试必须用词元、成本或时间作为 x 轴来公平比较模型。"}, {"slug": "scaling", "pid": "noambrown", "ep": "noambrown-nopriors-2026", "date": "2026-06-26", "en": "Models improve continuously with more test-time compute on many tasks, without plateauing.", "zh": "在许多任务上，模型随着测试时算力增加而持续改进，不会饱和。"}, {"slug": "scaling", "pid": "markchen", "ep": "markchen-latentsp-2026", "date": "2026-06-25", "en": "Scaling laws still hold; pre-training is not dead.", "zh": "缩放定律仍然成立；预训练并未消亡。"}, {"slug": "scaling", "pid": "markchen", "ep": "markchen-latentsp-2026", "date": "2026-06-25", "en": "Pre-training is not dead; scaling continues despite repeated predictions.", "zh": "预训练并未消亡；尽管屡次被预言，规模扩张仍在继续。"}, {"slug": "scaling", "pid": "boris", "ep": "boris-scale-2026", "date": "2026-06-19", "en": "Fable's leap is larger than Opus 4.5; Boris ran out of hard problems to give it.", "zh": "Fable 的飞跃比 Opus 4.5 更大；Boris 已经找不到难题来测试它了。"}, {"slug": "scaling", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "Model quality is the most important factor; being far ahead on quality drives growth.", "zh": "模型质量是最重要的因素；在质量上遥遥领先推动增长。"}, {"slug": "scaling", "pid": "jensen", "ep": "jensen-associat-2026", "date": "2026-06-16", "en": "Energy production is foundational; without it, AI infrastructure cannot be built.", "zh": "能源生产是基础；没有它，AI 基础设施就无法建设。"}, {"slug": "scaling", "pid": "jensen", "ep": "jensen-associat-2026", "date": "2026-06-16", "en": "The US is woefully behind in energy production, a critical layer for AI growth.", "zh": "美国在能源生产方面严重落后，而这是 AI 增长的关键层面。"}, {"slug": "scaling", "pid": "tejal", "ep": "tejal-theopena-2026", "date": "2026-06-16", "en": "Models improve faster than people expect; underestimate them.", "zh": "模型改进速度超出预期；人们低估了它们。"}, {"slug": "scaling", "pid": "tejal", "ep": "tejal-theopena-2026", "date": "2026-06-16", "en": "Capability overhang means models are capable before adoption.", "zh": "能力过剩意味着模型在被采用之前就已具备能力。"}, {"slug": "scaling", "pid": "tejal", "ep": "tejal-theopena-2026", "date": "2026-06-16", "en": "Reasoning models like o1 show paradigm shift; scaling continues.", "zh": "像 o1 这样的推理模型展示了范式转变；Scaling 仍在继续。"}, {"slug": "scaling", "pid": "aravind", "ep": "aravind-20vcwith-2026", "date": "2026-06-15", "en": "Power is the biggest bottleneck for AI infrastructure, and resistance to data centers will worsen.", "zh": "电力是 AI 基础设施的最大瓶颈，对数据中心的抵制将加剧。"}, {"slug": "scaling", "pid": "aravind", "ep": "aravind-20vcwith-2026", "date": "2026-06-15", "en": "Micron could be more valuable than Meta in 6-12 months due to HBM bottleneck.", "zh": "由于 HBM 瓶颈，美光可能在 6-12 个月内比 Meta 更有价值。"}, {"slug": "scaling", "pid": "dario", "ep": "dario-thecircu-2026", "date": "2026-06-10", "en": "Scaling laws drove AI progress; more data and compute improve models even without algorithmic changes.", "zh": "缩放定律推动了 AI 进步；即使算法不变，更多数据和算力也能提升模型。"}, {"slug": "scaling", "pid": "lecun", "ep": "lecun-computer-2026", "date": "2026-06-09", "en": "LLMs cannot achieve human-like intelligence because text data volume is vastly insufficient compared to visual experience.", "zh": "大语言模型无法实现类人智能，因为文本数据量远不及视觉经验。"}, {"slug": "scaling", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "Superintelligence is coming soon, driven by log-linear scaling of compute and data.", "zh": "超级智能即将到来，由算力和数据的对数线性扩展驱动。"}, {"slug": "scaling", "pid": "awang", "ep": "awang-bloomber-2026", "date": "2026-06-05", "en": "Meta rebuilt its AI scaling ladder and infrastructure over the past year, leading to the Spark model.", "zh": "Meta 在过去一年重建了 AI Scaling（规模扩张）阶梯和基础设施，推出了 Spark 模型。"}, {"slug": "scaling", "pid": "awang", "ep": "awang-bloomber-2026", "date": "2026-06-05", "en": "The US currently leads in AI, but continued scaling of compute and data is critical.", "zh": "美国目前在 AI 领域领先，但持续扩展算力和数据至关重要。"}, {"slug": "scaling", "pid": "murati", "ep": "murati-bloomber", "date": "2026-06-04", "en": "Compressing progress in frontier AI leads to volatility, but long-term durable progress is key.", "zh": "前沿 AI 的快速进步带来波动，但长期可持续进展是关键。"}, {"slug": "scaling", "pid": "murati", "ep": "murati-bloomber", "date": "2026-06-04", "en": "Compressing progress into short timeframes leads to both good and bad outcomes in months.", "zh": "将进展压缩到短时间内会导致好与坏的结果在几个月内出现。"}, {"slug": "scaling", "pid": "alexwei", "ep": "alexwei-theopena-2026", "date": "2026-06-04", "en": "Test-time compute scaling lets models think longer, improving reasoning accuracy.", "zh": "测试时算力扩展让模型思考更久，提升推理准确性。"}, {"slug": "scaling", "pid": "alibehrouz", "ep": "alibehrouz-thecogni-2026", "date": "2026-06-03", "en": "Scaling for performance will shift from stacking more layers to nesting more frequency update rates.", "zh": "性能的 Scaling 将从堆叠更多层转向嵌套更多频率更新率。"}, {"slug": "scaling", "pid": "mensch", "ep": "mensch-cnbc-2026", "date": "2026-06-03", "en": "US hyperscalers may be overspending on AI infrastructure despite current demand exceeding supply.", "zh": "尽管当前需求超过供给，美国超大规模云服务商可能在 AI 基础设施上过度支出。"}, {"slug": "scaling", "pid": "kaiser", "ep": "kaiser-unsuperv-2026", "date": "2026-06-03", "en": "Hardware progress enables single-GPU research at scale, democratizing AI experimentation.", "zh": "硬件进步使单 GPU 大规模研究成为可能，推动了 AI 实验的民主化。"}, {"slug": "scaling", "pid": "kaiser", "ep": "kaiser-unsuperv-2026", "date": "2026-06-03", "en": "The big coding leap over Christmas is hard to attribute to a single factor; it's a messy combination.", "zh": "圣诞节期间编码能力的巨大飞跃难以归因于单一因素，而是多种因素的复杂组合。"}, {"slug": "scaling", "pid": "boris", "ep": "boris-acquired-2026", "date": "2026-06-02", "en": "Model improvements, especially Sonnet 4 and Opus 4.5, were the primary driver of Claude Code's performance gains.", "zh": "模型改进，尤其是 Sonnet 4 和 Opus 4.5，是 Claude Code 性能提升的主要驱动力。"}, {"slug": "scaling", "pid": "ethanhe", "ep": "ethanhe-latentsp-2026", "date": "2026-06-01", "en": "Training video models requires synthetic text-video pairs due to poor natural alignment online.", "zh": "训练视频模型需要合成文本-视频对，因为在线自然对齐很差。"}, {"slug": "scaling", "pid": "ethanhe", "ep": "ethanhe-latentsp-2026", "date": "2026-06-01", "en": "Video model training cost is comparable to medium-scale language models, with huge storage needs.", "zh": "视频模型训练成本与中等规模语言模型相当，且存储需求巨大。"}, {"slug": "scaling", "pid": "waldenyan", "ep": "waldenyan-latentsp-2026", "date": "2026-05-28", "en": "Very expensive frontier models may not be needed; hybrid systems with sub-frontier models can be efficient.", "zh": "可能不需要非常昂贵的前沿模型；结合次前沿模型的混合系统可以更高效。"}, {"slug": "scaling", "pid": "alexrives", "ep": "alexrives-latentsp-2026", "date": "2026-05-27", "en": "Scaling laws apply to protein language models, with more data and compute leading to emergent capabilities.", "zh": "缩放定律适用于蛋白质语言模型，更多数据和算力会带来涌现能力。"}, {"slug": "scaling", "pid": "alexrives", "ep": "alexrives-latentsp-2026", "date": "2026-05-27", "en": "Adding metagenomic data removes diminishing returns, enabling better scaling than with UniRef alone.", "zh": "加入宏基因组数据消除了收益递减，比仅用 UniRef 实现了更好的 Scaling。"}, {"slug": "scaling", "pid": "alexrives", "ep": "alexrives-latentsp-2026", "date": "2026-05-27", "en": "No inductive biases like MSAs are needed; scaling data and compute alone yields state-of-the-art structure prediction.", "zh": "不需要多序列比对等归纳偏置；仅靠 Scaling 数据和算力就能达到最先进的结构预测。"}, {"slug": "scaling", "pid": "oriol", "ep": "oriol-unsuperv-2026", "date": "2026-05-22", "en": "Scaling laws still hold, but continual learning and meta-learning are key missing capabilities.", "zh": "缩放定律仍然成立，但持续学习和元学习是关键缺失的能力。"}, {"slug": "scaling", "pid": "boris", "ep": "boris-bigtechn-2026", "date": "2026-05-20", "en": "Model intelligence improves rapidly, requiring users to constantly reset expectations.", "zh": "模型智能快速提升，要求用户不断重新设定预期。"}, {"slug": "scaling", "pid": "lambert", "ep": "lambert-aiproem-2026", "date": "2026-05-19", "en": "Pre-training scaling laws still hold, but compute constraints will widen the US-China gap.", "zh": "预训练的缩放定律仍然成立，但算力限制将扩大中美差距。"}, {"slug": "scaling", "pid": "lambert", "ep": "lambert-aiproem-2026", "date": "2026-05-19", "en": "Chinese labs are 6-9 months behind on benchmarks, but gap may grow on knowledge work.", "zh": "中国实验室在基准测试上落后 6-9 个月，但在知识工作上的差距可能扩大。"}, {"slug": "scaling", "pid": "lambert", "ep": "lambert-aiproem-2026", "date": "2026-05-19", "en": "Huawei chips work for inference but not training; labs buy them but don't use.", "zh": "华为芯片可用于推理但非训练；实验室购买但未使用。"}, {"slug": "scaling", "pid": "altman", "ep": "altman-stripese-2026", "date": "2026-05-19", "en": "AI models crossed a threshold late last year, making coding and general use dramatically better.", "zh": "AI 模型在去年底跨越了一个门槛，使编程和通用用途显著改善。"}, {"slug": "scaling", "pid": "altman", "ep": "altman-stripese-2026", "date": "2026-05-19", "en": "Demand for intelligence at low price is effectively uncapped, requiring massive compute build-out.", "zh": "低价智能的需求实际上没有上限，需要大规模算力建设。"}, {"slug": "scaling", "pid": "lecun", "ep": "lecun-unsuperv", "date": "2026-05-15", "en": "Scaling LLMs will not lead to human-level AI; a paradigm shift is needed.", "zh": "扩展 LLM 不会带来人类级 AI；需要范式转变。"}, {"slug": "scaling", "pid": "ericjang", "ep": "ericjang-dwarkesh-2026", "date": "2026-05-15", "en": "Scaling laws require a working system first; studying scaling on bad data yields no insight.", "zh": "缩放定律需要先有工作系统；在坏数据上研究缩放无法获得洞察。"}, {"slug": "scaling", "pid": "awang", "ep": "awang-corememo", "date": "2026-05-13", "en": "Scaling compute, data, and RL is key; predictable scaling across multiple axes drives progress.", "zh": "扩展算力、数据和强化学习是关键；多轴可预测缩放推动进步。"}, {"slug": "scaling", "pid": "bengio", "ep": "bengio-jonherna-2026", "date": "2026-05-08", "en": "Sample efficiency improvements mean AI intelligence can grow even without more compute, accelerating progress.", "zh": "样本效率的提升意味着即使没有更多算力，AI 智能也能增长，从而加速进步。"}, {"slug": "scaling", "pid": "brockman", "ep": "brockman-sequoiac-2026", "date": "2026-04-30", "en": "Demand for intelligence is unlimited; scaling compute is key as long as margins are positive.", "zh": "对智能的需求是无限的；只要利润率是正的，扩大算力就是关键。"}, {"slug": "scaling", "pid": "reinerpope", "ep": "reinerpope-dwarkesh-2026", "date": "2026-04-29", "en": "Models are overtrained ~100x beyond Chinchilla-optimal due to inference cost.", "zh": "由于推理成本，模型过度训练至 Chinchilla 最优的约 100 倍。"}, {"slug": "scaling", "pid": "demis", "ep": "demis-ycombina-2026", "date": "2026-04-29", "en": "Inference will never be essentially free due to physical bottlenecks like chip production.", "zh": "由于芯片生产等物理瓶颈，推理永远不会基本免费。"}, {"slug": "scaling", "pid": "naval", "ep": "naval-naval-2026d", "date": "2026-04-28", "en": "AI coding agents excel due to abundant training data and easy output verification via compilation and tests.", "zh": "AI 编码智能体因训练数据丰富且可通过编译和测试轻松验证输出而表现出色。"}, {"slug": "scaling", "pid": "altman", "ep": "altman-corememo-2026", "date": "2026-04-22", "en": "Compute is a profit center, not a cost center; more compute enables more value.", "zh": "算力是利润中心而非成本中心；更多算力创造更多价值。"}, {"slug": "scaling", "pid": "mensch", "ep": "mensch-lisaburk-2026", "date": "2026-04-20", "en": "AI is capital-intensive R&D requiring massive compute for training strong models.", "zh": "AI 是资本密集型研发，需要大量算力来训练强大模型。"}, {"slug": "scaling", "pid": "jensen", "ep": "jensen-dwarkesh", "date": "2026-04-15", "en": "Bottlenecks in chip supply are 2-3 year problems; energy policy is the real long-term constraint.", "zh": "芯片供应的瓶颈是 2-3 年的问题；能源政策才是真正的长期制约。"}, {"slug": "scaling", "pid": "pachocki", "ep": "pachocki-unsuperv-2026", "date": "2026-04-09", "en": "Continual learning is the core goal, achieved by scaling pre-training and RL.", "zh": "持续学习是核心目标，通过扩展预训练和强化学习来实现。"}, {"slug": "scaling", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "We are not running out of data; untapped sources include video, audio, robotics, and synthetic data.", "zh": "我们并没有耗尽数据；未开发的来源包括视频、音频、机器人技术和合成数据。"}, {"slug": "scaling", "pid": "fedus", "ep": "fedus-nopriors-2026", "date": "2026-04-03", "en": "AI self-improvement in software engineering is happening now, but not yet in other domains.", "zh": "AI 在软件工程中的自我改进正在发生，但在其他领域尚未实现。"}, {"slug": "scaling", "pid": "fedus", "ep": "fedus-nopriors-2026", "date": "2026-04-03", "en": "Scaling laws and large-scale experiments will drive progress in physical sciences, similar to AI.", "zh": "缩放定律和大规模实验将推动物理科学的进步，类似于 AI 领域。"}, {"slug": "scaling", "pid": "fedus", "ep": "fedus-nopriors-2026", "date": "2026-04-03", "en": "AI self-improvement in software engineering does not automatically generalize to biology or other fields.", "zh": "AI 在软件工程中的自我改进不会自动泛化到生物学或其他领域。"}, {"slug": "scaling", "pid": "slevine", "ep": "slevine-aiagentf-2026", "date": "2026-03-29", "en": "Pooling robot data from many labs yields generalist models outperforming specialists.", "zh": "汇集多实验室机器人数据得到的通用模型优于专用模型。"}, {"slug": "scaling", "pid": "slevine", "ep": "slevine-aiagentf-2026", "date": "2026-03-29", "en": "Generalist robotic models can outperform specialists even in specialist domains.", "zh": "通用机器人模型在专用领域也能超越专用模型。"}, {"slug": "scaling", "pid": "slevine", "ep": "slevine-aiagentf-2026", "date": "2026-03-29", "en": "High-quality post-training data alone fails without diverse pre-training for recoveries.", "zh": "仅高质量后训练数据若无多样化预训练则无法应对恢复。"}, {"slug": "scaling", "pid": "hinton", "ep": "hinton-theamber-2026", "date": "2026-03-24", "en": "Current AI is the worst we'll ever see; it will become much more energy efficient.", "zh": "当前的 AI 是我们见过的最差的；它将变得节能得多。"}, {"slug": "scaling", "pid": "hausman", "ep": "hausman-thegener-2026", "date": "2026-03-17", "en": "Real-world data is crucial for manipulation tasks; simulation struggles with world complexity.", "zh": "真实世界数据对操作任务至关重要；模拟难以应对世界复杂性。"}, {"slug": "scaling", "pid": "hausman", "ep": "hausman-thegener-2026", "date": "2026-03-17", "en": "Scaling existing recipes may suffice; research can improve scaling slope.", "zh": "扩展现有方案可能足够；研究可改善扩展斜率。"}, {"slug": "scaling", "pid": "hausman", "ep": "hausman-thegener-2026", "date": "2026-03-17", "en": "Simulation is less useful for manipulation than for locomotion.", "zh": "模拟对操作任务不如对运动任务有用。"}, {"slug": "scaling", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "Supervised learning hasn't progressed as far as I would have expected.", "zh": "监督学习的进展没有我预期的那么远。"}, {"slug": "scaling", "pid": "robertlange", "ep": "robertlange-machinel-2026", "date": "2026-03-13", "en": "Sample efficiency is key; Shinka Evolve achieves state-of-the-art with few program evaluations.", "zh": "样本效率是关键；Shinka Evolve 用少量程序评估就达到了最先进水平。"}, {"slug": "scaling", "pid": "robertlange", "ep": "robertlange-machinel-2026", "date": "2026-03-13", "en": "Using multiple frontier models with adaptive selection outperforms using a single best model.", "zh": "使用多个前沿模型并自适应选择优于使用单一最佳模型。"}, {"slug": "scaling", "pid": "dylanpatel", "ep": "dylanpatel-dwarkesh-2026", "date": "2026-03-13", "en": "The biggest bottleneck for AI scaling is semiconductor supply chain, especially EUV tools from ASML.", "zh": "AI 规模扩张的最大瓶颈是半导体供应链，尤其是 ASML 的 EUV 光刻机。"}, {"slug": "scaling", "pid": "dylanpatel", "ep": "dylanpatel-dwarkesh-2026", "date": "2026-03-13", "en": "Hyperscaler capex includes long-term deposits for future compute, not just immediate deployment.", "zh": "超大规模企业的资本支出包括未来算力的长期预付款，而不仅是立即部署。"}, {"slug": "scaling", "pid": "kohli", "ep": "kohli-googlede-2026", "date": "2026-03-10", "en": "Large language models are a shortcut to intelligence, but struggle to go beyond human data.", "zh": "大语言模型是智能的捷径，但难以超越人类数据。"}, {"slug": "scaling", "pid": "dario", "ep": "dario-databric-2026", "date": "2026-03-03", "en": "Scaling laws continue to hold for both pre-training and reasoning models.", "zh": "缩放定律在预训练和推理模型上仍然成立。"}, {"slug": "scaling", "pid": "andrewng", "ep": "andrewng-thisisth-2026", "date": "2026-03-01", "en": "Scaling still works but the recipe has shifted to synthetic data and RL.", "zh": "Scaling（规模扩张）仍然有效，但方法已转向合成数据和强化学习。"}, {"slug": "scaling", "pid": "andrewng", "ep": "andrewng-thisisth-2026", "date": "2026-03-01", "en": "The era of scaling is not over, but the simple recipe of more data and bigger models no longer works.", "zh": "Scaling（规模扩张）时代并未结束，但简单增加数据和模型规模的方法已不再奏效。"}, {"slug": "scaling", "pid": "hinton", "ep": "hinton-startalk", "date": "2026-02-28", "en": "Digital intelligence may surpass analog brains because it can scale and share knowledge instantly.", "zh": "数字智能可能超越模拟大脑，因为它能规模化并即时共享知识。"}, {"slug": "scaling", "pid": "hinton", "ep": "hinton-startalk", "date": "2026-02-28", "en": "Digital intelligence is already better than analog human brains at some tasks.", "zh": "数字智能在某些任务上已超越模拟的人类大脑。"}, {"slug": "scaling", "pid": "ajambrosino", "ep": "ajambrosino-aii-2026", "date": "2026-02-18", "en": "Speed of 53 Codex enables real-time interaction and new capabilities like mid-turn steering.", "zh": "53 Codex 的速度实现了实时交互和诸如中途转向等新能力。"}, {"slug": "scaling", "pid": "ajambrosino", "ep": "ajambrosino-aii-2026", "date": "2026-02-18", "en": "Codex app slows down output slightly for smoother user experience.", "zh": "Codex 应用会稍微放慢输出速度，以获得更流畅的用户体验。"}, {"slug": "scaling", "pid": "bengio", "ep": "bengio-siliconv-2026", "date": "2026-02-16", "en": "AI research acceleration could lead to rapid capability growth beyond control.", "zh": "AI 研究加速可能导致能力失控性增长。"}, {"slug": "scaling", "pid": "jeffdean", "ep": "jeffdean-princeto-2026", "date": "2026-02-13", "en": "Scaling compute, data, and model size has driven continuous ML improvements for 13-14 years.", "zh": "算力、数据和模型规模的扩张持续推动了机器学习过去 13-14 年的进步。"}, {"slug": "scaling", "pid": "jeffdean", "ep": "jeffdean-princeto-2026", "date": "2026-02-13", "en": "Algorithmic and architectural improvements multiply with scale, yielding massive gains.", "zh": "算法和架构改进与规模扩张相乘，带来巨大收益。"}, {"slug": "scaling", "pid": "lecun", "ep": "lecun-offcall-2026", "date": "2026-02-12", "en": "A four-year-old's visual data equals all public text on the internet.", "zh": "四岁儿童的视觉数据相当于互联网上所有公开文本。"}, {"slug": "scaling", "pid": "suleyman", "ep": "suleyman-financia-2026", "date": "2026-02-12", "en": "Unprecedented compute scaling drives linear capability gains, justifying massive CAPEX.", "zh": "前所未有的算力规模扩张带来线性能力提升，证明了巨额资本支出的合理性。"}, {"slug": "scaling", "pid": "suleyman", "ep": "suleyman-financia-2026", "date": "2026-02-12", "en": "AI self-sufficiency requires developing frontier foundation models with gigawatt-scale compute.", "zh": "AI 自给自足需要开发前沿基础模型，配备吉瓦级算力。"}, {"slug": "scaling", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "AI compute scaling will hit a power wall on Earth by end of 2025, forcing chips to pile up unpowered.", "zh": "AI 算力扩展将在 2025 年底前在地球上遭遇电力瓶颈，导致芯片堆积无法通电。"}, {"slug": "scaling", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "Space-based AI data centers will be the cheapest and most scalable option within 36 months.", "zh": "太空 AI 数据中心将在 36 个月内成为最便宜且最具扩展性的选择。"}, {"slug": "scaling", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "The only way to truly scale AI is to harness solar power in space, eventually using a lunar mass driver.", "zh": "真正扩展 AI 的唯一途径是利用太空太阳能，最终使用月球质量驱动器。"}, {"slug": "scaling", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "Compute power is the new oil; chip supply is the current bottleneck for AI progress.", "zh": "算力是新的石油；芯片供应是当前 AI 进展的瓶颈。"}, {"slug": "scaling", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "Space data centers will not provide meaningful compute for OpenAI in the next 10 years.", "zh": "太空数据中心在未来 10 年内不会为 OpenAI 提供有意义的算力。"}, {"slug": "scaling", "pid": "yejin", "ep": "yejin-thetwiml-2026", "date": "2026-01-29", "en": "Post-training data must be diverse to avoid mode collapse and homogeneity.", "zh": "后训练数据必须多样化，以避免模式崩溃和同质化。"}, {"slug": "scaling", "pid": "yejin", "ep": "yejin-thetwiml-2026", "date": "2026-01-29", "en": "Synthetic data generation requires careful filtering for diversity and quality.", "zh": "合成数据生成需要仔细过滤以确保多样性和质量。"}, {"slug": "scaling", "pid": "yejin", "ep": "yejin-thetwiml-2026", "date": "2026-01-29", "en": "Fro
