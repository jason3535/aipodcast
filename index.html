<style>
  :root{
    --bg:#ffffff; --bg-alt:#fbfbfd; --surface:#ffffff; --surface-2:#f5f5f7;
    --text:#1d1d1f; --text-2:#6e6e73; --text-3:#86868b; --line:#d2d2d7;
    --nav:rgba(251,251,253,.72); --accent:#0066cc;
    --shadow:0 4px 24px rgba(0,0,0,.06); --shadow-lg:0 12px 40px rgba(0,0,0,.10);
    --radius:18px; --read-scale:1;
    --ui:-apple-system,"SF Pro Text",system-ui,"PingFang SC","Helvetica Neue",sans-serif;
    --serif:ui-serif,"New York",Georgia,"Songti SC",serif;
    --han:"PingFang SC","Songti SC",-apple-system,sans-serif;
    --f-dl:#0a84ff; --f-nlp:#5e5ce6; --f-vision:#30d158; --f-rl:#ff9f0a; --f-safety:#ff453a; --f-robotics:#bf5af2;
  }
  [data-theme="dark"]{
    --bg:#000000; --bg-alt:#0a0a0b; --surface:#1c1c1e; --surface-2:#161618;
    --text:#f5f5f7; --text-2:#a1a1a6; --text-3:#8e8e93; --line:#2a2a2c;
    --nav:rgba(20,20,22,.72); --accent:#2997ff;
    --shadow:0 4px 24px rgba(0,0,0,.5); --shadow-lg:0 12px 40px rgba(0,0,0,.6);
  }
  [data-size="s"]{--read-scale:.9} [data-size="m"]{--read-scale:1} [data-size="l"]{--read-scale:1.18}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:var(--ui);
    -webkit-font-smoothing:antialiased;line-height:1.5;letter-spacing:-.01em;
    transition:background .4s,color .4s}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  ::selection{background:rgba(0,102,204,.18)}

  /* ---------- NAV ---------- */
  .nav{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;
    gap:28px;padding:0 max(22px,env(safe-area-inset-left));
    background:var(--nav);backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)}
  .brand{font-weight:600;font-size:18px;letter-spacing:-.02em;cursor:pointer;display:flex;align-items:center;gap:7px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--f-nlp),var(--f-dl))}
  .nav .links{display:flex;gap:24px;font-size:14px;color:var(--text-2)}
  .nav .links a{cursor:pointer;transition:color .2s;white-space:nowrap}
  .nav .links a:hover,.nav .links a.on{color:var(--text)}
  .nav .spacer{flex:1}
  .nav .icon{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;cursor:pointer;
    color:var(--text-2);transition:background .2s,color .2s;font-size:15px;border:none;background:transparent}
  .nav .icon:hover{background:var(--surface-2);color:var(--text)}
  .nav .icon svg{width:17px;height:17px;display:block}
  .nav .kbd{display:none;font-size:11px;color:var(--text-3);border:1px solid var(--line);border-radius:6px;
    padding:2px 6px;margin-left:-14px}
  @media(min-width:760px){.nav .kbd{display:inline-block}}
  @media(max-width:640px){.nav .links{gap:15px;font-size:13.5px}.nav{gap:10px}}

  /* ---------- SEARCH OVERLAY ---------- */
  .search-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.32);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    display:flex;justify-content:center;align-items:flex-start;padding:11vh 22px 22px;
    opacity:0;pointer-events:none;transition:opacity .22s}
  .search-overlay.on{opacity:1;pointer-events:auto}
  [data-theme="dark"] .search-overlay{background:rgba(0,0,0,.55)}
  .search-panel{width:100%;max-width:620px;background:var(--surface);border-radius:18px;
    box-shadow:var(--shadow-lg);border:1px solid var(--line);overflow:hidden;
    transform:translateY(-12px) scale(.98);transition:transform .22s cubic-bezier(.22,.61,.36,1)}
  .search-overlay.on .search-panel{transform:none}
  .si-wrap{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line)}
  .si-wrap .si-icon{font-size:19px;color:var(--text-3)}
  .search-input{flex:1;border:none;background:transparent;outline:none;font-family:var(--ui);
    font-size:17px;color:var(--text);letter-spacing:-.01em}
  .search-input::placeholder{color:var(--text-3)}
  .si-esc{font-size:11px;color:var(--text-3);border:1px solid var(--line);border-radius:6px;
    padding:3px 7px;background:transparent;cursor:pointer;font-family:var(--ui)}
  .search-results{max-height:min(56vh,460px);overflow-y:auto;padding:8px}
  .sr-group{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--text-3);padding:12px 12px 6px}
  .sr-row{display:flex;align-items:center;gap:13px;padding:9px 12px;border-radius:12px;cursor:pointer;transition:background .15s}
  .sr-row:hover,.sr-row.sel{background:var(--surface-2)}
  .sr-row .av{width:40px;height:40px;font-size:15px}
  .sr-ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:#fff;font-size:14px;flex:0 0 auto}
  .sr-meta{min-width:0}
  .sr-t{font-size:14.5px;font-weight:500;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sr-s{font-size:12.5px;color:var(--text-2);margin-top:1px;font-family:var(--han);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sr-snip{font-size:12.5px;color:var(--text-3);margin-top:4px;font-family:var(--han);line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sr-empty{text-align:center;color:var(--text-3);padding:34px 0;font-size:14px}

  /* ---------- LAYOUT ---------- */
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}
  .reveal{opacity:0;transform:translateY(16px);transition:opacity .7s cubic-bezier(.22,.61,.36,1),transform .7s cubic-bezier(.22,.61,.36,1)}
  .reveal.in{opacity:1;transform:none}
  section{padding:64px 0}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
  h2.title{font-size:30px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px}
  .sub{color:var(--text-2);font-size:15px}

  /* 顶部一行安静的站点定位（不与 hero 争夺视觉） */
  .site-tag{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
    padding:22px 24px 0;font-family:var(--ui);font-size:13px;font-weight:500;color:var(--text-2);letter-spacing:.01em}
  .site-tag .st-n{color:var(--text-3);font-weight:400;padding-left:12px;border-left:1px solid var(--line)}
  @media(max-width:600px){.site-tag{font-size:12px;gap:8px;padding-top:16px}.site-tag .st-n{padding-left:8px}}

  /* ---------- HERO ---------- */
  .hero{padding:18px 0 8px}
  .hero-card{position:relative;border-radius:28px;overflow:hidden;background:var(--surface);
    box-shadow:var(--shadow-lg);display:grid;grid-template-columns:1.05fr 1fr;min-height:420px}
  .hero-art{position:relative;display:grid;place-items:center;overflow:hidden}
  .hero-art .av{width:230px;height:230px;font-size:84px;box-shadow:0 8px 30px rgba(0,0,0,.16)}
  .hero-art::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 120% at 30% 20%,transparent 40%,rgba(0,0,0,.04))}
  .hero-body{padding:54px 48px;display:flex;flex-direction:column;justify-content:center}
  .hero-body .eyebrow{color:var(--accent)}
  .hero-body h1{font-size:38px;line-height:1.14;font-weight:600;letter-spacing:-.02em;margin:6px 0 4px;font-family:var(--han)}
  .hero-ten{color:var(--text-2);font-size:15px;line-height:1.4;margin:2px 0 6px;letter-spacing:-.01em}
  .hero-ten:empty{display:none}
  .hero-body .who{color:var(--text-2);font-size:17px;margin-bottom:18px}
  .hero-body .quote{font-family:var(--serif);font-size:22px;line-height:1.5;color:var(--text);margin-bottom:8px}
  .hero-body .quote-zh{font-family:var(--han);font-size:17px;color:var(--text-2);margin-bottom:26px;line-height:1.7}
  @media(max-width:820px){.hero-card{grid-template-columns:1fr;min-height:0}.hero-art{padding:40px 0}.hero-art .av{width:150px;height:150px;font-size:56px}.hero-body{padding:32px 26px}.hero-body h1{font-size:32px}}

  .btn{display:inline-flex;align-items:center;gap:8px;align-self:flex-start;
    background:var(--accent);color:#fff;border:none;border-radius:980px;
    padding:11px 22px;font-size:15px;font-weight:500;cursor:pointer;font-family:var(--ui);
    transition:transform .15s,filter .2s}
  .btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .btn.ghost{background:var(--surface-2);color:var(--text)}

  /* ---------- RAIL / CARDS ---------- */
  .rail{display:flex;gap:18px;overflow-x:auto;scroll-snap-type:x mandatory;padding:6px 2px 14px;margin:0 -2px;scrollbar-width:none}
  .rail::-webkit-scrollbar{display:none}
  .ep-card{scroll-snap-align:start;flex:0 0 300px;background:var(--surface);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s;border:1px solid transparent}
  .ep-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
  [data-theme="dark"] .ep-card{border-color:var(--line)}
  .ep-cover{height:152px;position:relative;overflow:hidden}
  .ep-cover .pod{position:absolute;top:16px;left:18px;right:18px;font-size:12px;color:#fff;opacity:.95;font-weight:500;
    display:flex;align-items:center;gap:7px;text-shadow:0 1px 2px rgba(0,0,0,.18)}
  .ep-cover .pod>span,.ep-cover .pod{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ep-cover .av{position:absolute;right:16px;bottom:15px;width:66px;height:66px;font-size:24px;
    box-shadow:0 2px 10px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.25)}
  .ep-cover .ct{position:absolute;left:18px;bottom:16px;max-width:56%;color:#fff}
  .ep-cover .ct b{font-weight:600;font-size:15.5px;display:block;letter-spacing:-.01em;line-height:1.2;
    text-shadow:0 1px 3px rgba(0,0,0,.22)}
  .ep-cover .ct span{font-size:12px;opacity:.88;text-shadow:0 1px 2px rgba(0,0,0,.2)}
  .ep-meta{padding:16px 18px 18px}
  .ep-meta .t{font-size:15.5px;font-weight:600;letter-spacing:-.02em;line-height:1.32;margin-bottom:5px}
  .ep-meta .tz{font-size:13px;color:var(--text-2);line-height:1.45;margin-bottom:13px;font-family:var(--han)}
  .ep-meta .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  /* 封面角标（右上，单一容器避免互相叠压）:NEW / ★待读 / 读到 N 章 / 已读 */
  .ep-card{position:relative}
  .cover-badges{position:absolute;top:12px;right:12px;z-index:3;display:flex;gap:6px;align-items:center}
  .read-badge,.prog-badge,.new-badge,.later-badge{display:none;align-items:center;gap:3px;
    font-family:var(--ui);font-size:10.5px;font-weight:700;letter-spacing:.02em;color:#fff;
    border-radius:980px;padding:3px 9px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .read-badge{background:rgba(20,140,90,.94)}
  .prog-badge{display:inline-flex;background:rgba(0,113,227,.92)}
  .new-badge{display:inline-flex;background:rgba(255,69,58,.93);font-weight:800;font-size:10px;letter-spacing:.04em}
  .later-badge{background:rgba(255,159,10,.95)}
  .ep-card.read .read-badge{display:inline-flex}
  .ep-card.read .ep-cover{filter:saturate(.9) brightness(.97)}
  /* 阅读栏底部进度线 */
  .read-prog{position:absolute;left:0;bottom:-1px;height:2px;width:0;background:var(--accent);transition:width .15s linear;pointer-events:none}
  .readbtn.on{background:rgba(20,140,90,.14);color:#0a7d4a;border-color:rgba(20,140,90,.4)}
  [data-theme="dark"] .readbtn.on{background:rgba(46,190,120,.18);color:#3ec77f}
  .laterbtn.on{background:rgba(255,159,10,.15);color:#c77700;border-color:rgba(255,159,10,.45)}
  [data-theme="dark"] .laterbtn.on{background:rgba(255,178,46,.18);color:#ffb22e}

  /* grid of episodes */
  .ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
  .ep-grid .ep-card{flex:auto;width:auto}
  /* 小节标题行 + 「查看全部」 */
  .row-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
  .see-all{flex:none;font-family:var(--ui);font-size:14px;font-weight:500;color:var(--accent);cursor:pointer;white-space:nowrap;padding-bottom:4px}
  .see-all:hover{text-decoration:underline;text-underline-offset:3px}
  /* rail 末尾引流卡 */
  .more-card{display:grid;place-items:center;background:var(--surface-2);box-shadow:none;border:1px dashed var(--line)}
  .more-card:hover{border-color:var(--accent);transform:translateY(-4px)}
  .more-inner{text-align:center;color:var(--text-2);font-family:var(--ui)}
  .more-inner b{display:block;font-size:26px;letter-spacing:-.02em;color:var(--text);margin-bottom:6px}
  .more-inner span{font-size:13.5px}

  /* ---------- CHIPS / TAGS ---------- */
  .chips{display:flex;gap:9px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--text);
    background:var(--surface-2);border:1px solid transparent;border-radius:980px;padding:7px 14px;cursor:pointer;
    transition:all .18s;font-family:var(--ui);white-space:nowrap}
  .chip:hover{border-color:var(--line)}
  .chip .fdot{width:8px;height:8px;border-radius:50%}
  .chip.on{background:var(--text);color:var(--bg)}
  .chip.on .fdot{outline:2px solid var(--bg)}
  .tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);font-weight:500}
  .tag .fdot{width:7px;height:7px;border-radius:50%}
  .dur{font-size:12px;color:var(--text-3)}

  /* ---------- AVATAR (monogram, field-gradient) ---------- */
  .av{border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:600;
    font-family:var(--ui);letter-spacing:-.02em;flex:0 0 auto;box-shadow:inset 0 1px 0 rgba(255,255,255,.25);
    position:relative;overflow:hidden}
  .av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}

  /* ---------- PODCAST LOGO ---------- */
  .podlogo{width:22px;height:22px;border-radius:6px;object-fit:cover;flex:0 0 auto;
    box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .pod-logo-lg{width:130px;height:130px;border-radius:28px;object-fit:cover;flex:0 0 auto;box-shadow:var(--shadow)}
  .pod-logo-lg.fallback{display:grid;place-items:center;font-size:38px;font-weight:600;color:#fff;
    background:linear-gradient(135deg,var(--f-nlp),var(--f-dl))}

  /* ---------- TTS 选中朗读 ---------- */
  .sel-bar{position:absolute;display:none;align-items:center;gap:7px;z-index:90;transform:translateX(-50%)}
  .hl{border-bottom:2px solid var(--accent);cursor:pointer;background:linear-gradient(transparent 62%,color-mix(in srgb,var(--accent) 15%,transparent) 0);border-radius:1px}
  [data-theme="dark"] .hl{background:linear-gradient(transparent 62%,color-mix(in srgb,var(--accent) 28%,transparent) 0)}
  .hl.flash{animation:hlflash 1.3s ease}
  @keyframes hlflash{0%,100%{background-color:transparent}35%{background-color:color-mix(in srgb,var(--accent) 42%,transparent)}}
  .hl-toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(8px);z-index:120;background:var(--text);color:var(--bg);font-family:var(--ui);font-size:13px;padding:9px 16px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;box-shadow:var(--shadow-lg)}
  .hl-toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .marks-list{display:flex;flex-direction:column;gap:26px;max-width:760px}
  .mk-ep .mk-eph{display:flex;align-items:baseline;justify-content:space-between;gap:12px;cursor:pointer;padding-bottom:9px;border-bottom:1px solid var(--line);margin-bottom:12px}
  .mk-ep .mk-eph b{font-family:var(--han);font-size:16px;font-weight:600;color:var(--text)}
  .mk-ep .mk-eph span{font-family:var(--ui);font-size:12px;color:var(--text-3);white-space:nowrap}
  .mk-item{display:flex;gap:10px;align-items:flex-start;padding:7px 0}
  .mk-item .mk-q{flex:1;font-family:var(--serif);font-size:15px;line-height:1.6;color:var(--text-2);cursor:pointer;border-left:2px solid var(--accent);padding-left:11px}
  .mk-item .mk-q:hover{color:var(--text)}
  .mk-item .mk-del{border:none;background:none;color:var(--text-3);font-size:18px;line-height:1;cursor:pointer;padding:0 4px;flex-shrink:0}
  .mk-item .mk-del:hover{color:var(--text)}
  /* 手机：底部固定工具条（选区常驻，不与系统文本菜单抢位、滚动不消失） */
  .sel-bar.dock{position:fixed;left:50%;top:auto;bottom:84px;z-index:96;
    max-width:calc(100vw - 20px);flex-wrap:wrap;justify-content:center;
    background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:8px;box-shadow:var(--shadow-lg)}
  /* 双语模式下已实时对照，无需「看译文」按钮 */
  body[data-lang="both"] #peekSelBtn{display:none}
  .sel-btn{display:inline-flex;align-items:center;gap:6px;background:var(--text);color:var(--bg);border:none;
    border-radius:980px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;box-shadow:var(--shadow-lg);
    font-family:var(--ui);white-space:nowrap}
  .tts-btn.loading{cursor:default;pointer-events:none}
  .tts-btn.loading .lbl::before{content:"";display:inline-block;width:11px;height:11px;margin-right:8px;
    border:2px solid currentColor;border-right-color:transparent;border-radius:50%;vertical-align:-1px;
    animation:ttsspin .6s linear infinite}
  .tts-btn.playing .lbl::before{content:"";display:inline-block;width:9px;height:11px;margin-right:8px;
    border-left:3px solid currentColor;border-right:3px solid currentColor;box-sizing:border-box;vertical-align:-1px}
  @keyframes ttsspin{to{transform:rotate(360deg)}}
  /* 朗读跟读条：字符级进度高亮 */
  #ttsBar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%) translateY(8px);
    width:min(720px,calc(100vw - 32px));max-height:34vh;display:none;flex-direction:column;
    background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);
    z-index:140;opacity:0;transition:opacity .2s,transform .2s;overflow:hidden}
  #ttsBar.on{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
  #ttsBar .tb-h{display:flex;align-items:center;gap:8px;padding:10px 14px;font-family:var(--ui);
    font-size:12px;font-weight:600;color:var(--text-3);border-bottom:1px solid var(--border);letter-spacing:.02em}
  #ttsBar .tb-title{color:var(--text-2)}
  #ttsBar .tb-toggle{border:none;background:transparent;color:var(--accent);
    font-family:var(--ui);font-size:12px;font-weight:600;padding:4px 8px;cursor:pointer}
  #ttsBar .tb-x{border:none;background:var(--surface-2);color:var(--text-2);
    font-family:var(--ui);font-size:12px;padding:4px 12px;border-radius:980px;cursor:pointer}
  #ttsBar .tb-pp{border:none;background:var(--surface-2);color:var(--text);
    font-family:var(--ui);font-size:12px;font-weight:600;padding:4px 12px;border-radius:980px;cursor:pointer}
  #ttsBar .tb-prog{height:14px;flex:none;cursor:pointer;
    background:linear-gradient(var(--border),var(--border)) 0 6px/100% 2px no-repeat}
  #ttsBar .tb-prog i{display:block;height:2px;margin-top:6px;width:var(--p,0%);background:var(--accent);transition:width .2s linear;pointer-events:none}
  #ttsBar .tb-speed{display:inline-flex;align-items:center;gap:7px;margin-left:auto}
  #ttsBar .tb-speed input{width:64px;accent-color:var(--accent);cursor:pointer;height:3px}
  #ttsBar .tb-rate{min-width:30px;text-align:right;font-variant-numeric:tabular-nums;
    font-weight:600;color:var(--text-2)}
  #ttsBar.min{width:min(420px,calc(100vw - 32px))}
  #ttsBar.min .tb-h{border-bottom:none}
  #ttsBar.min .tb-prog,#ttsBar.min .tb-body{display:none}
  #ttsBar .tb-body{padding:14px 16px 16px;overflow-y:auto;font-family:var(--serif);
    font-size:18px;line-height:1.72;color:var(--text-3);scroll-behavior:smooth}
  #ttsBar .tb-body span.spoken{color:var(--text)}
  #ttsBar .tb-body span.cur{color:var(--accent);font-weight:600;background:rgba(255,193,7,.30);border-radius:3px}
  [data-theme="dark"] #ttsBar .tb-body span.cur{background:rgba(255,209,71,.22)}
  #ttsBar .tb-eq{display:inline-flex;gap:2px;align-items:flex-end;height:12px}
  #ttsBar .tb-eq i{width:3px;background:var(--accent);border-radius:2px;animation:eq 1s ease-in-out infinite}
  #ttsBar .tb-eq i:nth-child(1){height:6px;animation-delay:0s}
  #ttsBar .tb-eq i:nth-child(2){height:12px;animation-delay:.2s}
  #ttsBar .tb-eq i:nth-child(3){height:8px;animation-delay:.4s}
  @keyframes eq{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
  /* 中英选中互定位：只高亮对应那一句（句子级） */
  .turn .xseg{background:rgba(255,193,7,.32);border-radius:4px;box-shadow:0 0 0 2px rgba(255,193,7,.32)}
  [data-theme="dark"] .turn .xseg{background:rgba(255,209,71,.22);box-shadow:0 0 0 2px rgba(255,209,71,.22)}
  /* 单语模式：就地展开对应译文（原文），方便查不会的词 */
  body[data-lang="en"] .turn.peek .zh,body[data-lang="zh"] .turn.peek .en{
    display:block;margin-top:8px;padding:8px 12px;border-left:2px solid var(--accent);
    background:var(--surface-2);border-radius:0 9px 9px 0;font-family:var(--han);
    font-size:calc(15px*var(--read-scale));line-height:1.8;color:var(--text-2)}
  body[data-lang="zh"] .turn.peek .en{font-family:var(--serif)}

  /* ---------- PEOPLE GRID ---------- */
  .ppl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:22px}
  /* 议题聚合 */
  .topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
  .topic-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 20px;cursor:pointer;transition:transform .15s,box-shadow .15s}
  .topic-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .topic-card .tc-zh{font-family:var(--han);font-size:19px;font-weight:600;color:var(--text)}
  .topic-card .tc-en{font-family:var(--ui);font-size:13px;color:var(--text-3);margin-top:3px}
  .topic-card .tc-meta{font-family:var(--ui);font-size:12px;color:var(--accent);margin-top:14px;font-weight:600}
  .topic-list{display:flex;flex-direction:column;gap:30px;max-width:820px}
  .tp-person .tp-head{display:flex;align-items:center;gap:11px;cursor:pointer;margin-bottom:12px}
  .tp-person .tp-name{font-family:var(--ui);font-weight:600;font-size:15px;color:var(--text)}
  .tp-person .tp-name i{font-style:normal;color:var(--text-3);font-weight:400;margin-left:7px;font-size:13px}
  .tp-quotes{display:flex;flex-direction:column;gap:12px;padding-left:13px;border-left:2px solid var(--line)}
  .tp-q{cursor:pointer;padding:11px 14px;background:var(--surface-2);border-radius:10px;transition:background .15s}
  .tp-q:hover{background:var(--surface);box-shadow:var(--shadow)}
  .tp-q .tq-zh{font-family:var(--han);font-size:15px;line-height:1.7;color:var(--text)}
  .tp-q .tq-en{font-family:var(--serif);font-size:13.5px;line-height:1.55;color:var(--text-3);margin-top:4px}
  .tp-q .tq-src{font-family:var(--ui);font-size:11.5px;color:var(--accent);margin-top:7px}
  .ppl-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:26px 18px;text-align:center;cursor:pointer;transition:transform .25s,box-shadow .25s;border:1px solid transparent}
  .ppl-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
  [data-theme="dark"] .ppl-card{border-color:var(--line)}
  .ppl-card .av{width:96px;height:96px;font-size:36px;margin:0 auto 14px}
  .ppl-card .n{font-size:16px;font-weight:600;letter-spacing:-.02em}
  .ppl-card .nz{font-size:13px;color:var(--text-2);font-family:var(--han);margin-top:1px}
  .ppl-card .ti{font-size:12px;color:var(--text-3);margin-top:7px;line-height:1.4}
  .ppl-card .cnt{margin-top:12px;font-size:12px;color:var(--accent);font-weight:500}

  /* ---------- PERSON PAGE ---------- */
  .pp-head{display:flex;gap:32px;align-items:center;padding:40px 0 12px}
  .pp-head .av{width:140px;height:140px;font-size:52px}
  .pp-head h1{font-size:38px;font-weight:600;letter-spacing:-.03em}
  .pp-head .nz{font-size:18px;color:var(--text-2);font-family:var(--han);margin-top:2px}
  .pp-head .ti{font-size:16px;color:var(--text-2);margin:10px 0 14px}
  .pp-bio{max-width:720px;margin:8px 0 4px}
  .pp-bio .en{font-family:var(--serif);font-size:18px;line-height:1.6;color:var(--text)}
  .pp-bio .zh{font-family:var(--han);font-size:15px;line-height:1.8;color:var(--text-2);margin-top:8px}
  .viewlist{list-style:none;display:flex;flex-direction:column;gap:22px;max-width:760px;margin-top:20px}
  .viewlist li{position:relative;padding-left:26px;border-left:2px solid var(--line);padding-bottom:2px}
  .viewlist li::before{content:'';position:absolute;left:-6px;top:5px;width:10px;height:10px;border-radius:50%;
    background:var(--accent);border:2px solid var(--surface);box-shadow:0 0 0 1px var(--line)}
  .viewlist .vt{display:block;font-family:var(--ui);font-size:12px;font-weight:700;color:var(--accent);
    letter-spacing:.02em;margin-bottom:5px}
  .evhint{font-family:var(--ui);font-size:12px;font-weight:500;color:var(--text-3);margin-left:8px}
  .viewlist .ve{display:block;font-family:var(--serif);font-size:16px;line-height:1.55;color:var(--text)}
  .viewlist .vz{display:block;font-family:var(--han);font-size:14px;line-height:1.75;color:var(--text-2);margin-top:4px}
  body[data-lang="en"] .viewlist .vz{display:none}
  body[data-lang="zh"] .viewlist .ve{display:none}
  .xlinks{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px}
.xlink{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--text);padding:8px 14px;border:1px solid var(--line);border-radius:999px;cursor:pointer;text-decoration:none;transition:border-color .15s,background .15s}
.xlink:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent)}
.xlink svg{width:15px;height:15px;color:var(--accent);flex:none}
  @media(max-width:640px){.pp-head{flex-direction:column;text-align:center;gap:18px}.pp-head .av{width:110px;height:110px}}

  /* ---------- READING VIEW ---------- */
  .read-bar{position:sticky;top:52px;z-index:90;background:var(--nav);
    backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--line);height:48px;display:flex;align-items:center;gap:14px;padding:0 22px}
  .read-bar .back{font-size:14px;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:6px;min-width:0}
  .read-bar .back b{color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .read-bar .tools{margin-left:auto;display:flex;align-items:center;gap:10px}
  .seg{display:inline-flex;background:var(--surface-2);border-radius:9px;padding:2px}
  .seg button{border:none;background:transparent;font-family:var(--ui);font-size:12.5px;color:var(--text-2);
    padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .15s;white-space:nowrap}
  .seg button.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12)}
  [data-theme="dark"] .seg button.on{background:#3a3a3c}
  .ordbtn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--surface-2);
    color:var(--text-2);font-family:var(--ui);font-size:12.5px;border-radius:9px;padding:5px 11px;cursor:pointer;
    white-space:nowrap;transition:color .15s,border-color .15s}
  .ordbtn:hover{color:var(--text);border-color:var(--text-3)}
  body:not([data-lang="both"]) #orderBtn{display:none}
  @media(max-width:560px){.ordbtn .ol{display:none}.ordbtn{padding:6px 9px}}
  /* 移动端:标题栏只留 返回+语言+⋯,其余收进下拉面板 */
  .rb-more{display:none;border:none;background:var(--surface-2);color:var(--text);font-size:17px;line-height:1;
    padding:7px 12px;border-radius:9px;cursor:pointer;font-family:var(--ui)}
  .rb-drop{display:contents}
  @media(max-width:600px){
    .read-bar .rb-drop{display:none}
    .read-bar.rb-open .rb-drop{display:flex;position:absolute;top:calc(100% + 8px);right:10px;z-index:95;
      flex-wrap:wrap;gap:9px;max-width:calc(100vw - 20px);justify-content:flex-end;
      background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px;box-shadow:var(--shadow-lg)}
    .rb-more{display:inline-flex}
    .read-bar.rb-open .rb-more{background:var(--text);color:var(--bg)}
    .read-bar.rb-open .rb-drop .ordbtn .ol{display:inline}
    .read-bar.rb-open .rb-drop .ordbtn{padding:6px 12px}
  }

  .reader{max-width:780px;margin:0 auto;padding:46px 24px 120px}
  .reader .ep-head{margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--line)}
  .reader .ep-head .pod{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .reader .ep-head h1{font-size:34px;font-weight:600;letter-spacing:-.03em;line-height:1.12;margin:12px 0 6px;font-family:var(--serif)}
  .reader .ep-head .hz{font-size:18px;color:var(--text-2);font-family:var(--han);line-height:1.5;margin-bottom:16px}
  .reader .ep-head .info{display:flex;gap:14px;align-items:center;flex-wrap:wrap;color:var(--text-3);font-size:13px}
  .info .srclink{display:inline-flex;align-items:center;gap:5px;color:var(--text-2);border:1px solid var(--line);border-radius:999px;padding:3px 11px;transition:color .15s,border-color .15s}
  .info .srclink:hover{color:var(--accent);border-color:var(--accent)}
  .reader .ep-head .info .who{display:flex;align-items:center;gap:8px;color:var(--text);cursor:pointer}
  .reader .ep-head .info .who .av{width:30px;height:30px;font-size:12px}

  .sec-h{font-family:var(--ui);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--text-3);margin:40px 0 22px}
  /* 目录/章节标题：中文模式显示中文标题（secZh） */
  .sec-h .sz,.toc-i .sz{display:none}
  body[data-lang="zh"] .sec-h .se,body[data-lang="zh"] .toc-i .se{display:none}
  body[data-lang="zh"] .sec-h .sz,body[data-lang="zh"] .toc-i .sz{display:inline;font-family:var(--han);text-transform:none}
  .ts-loading{display:flex;align-items:center;gap:10px;color:var(--text-3);font-family:var(--ui);
    font-size:14px;padding:48px 0}
  .ts-spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:ttsspin .7s linear infinite}
  .turn{display:flex;flex-direction:column;gap:9px;margin-bottom:22px}
  .locate-flash{animation:locflash 2.6s ease;border-radius:8px}
  @keyframes locflash{0%,18%{background:rgba(255,193,7,.26);box-shadow:0 0 0 8px rgba(255,193,7,.26)}100%{background:transparent;box-shadow:0 0 0 8px transparent}}
  .turn .spk{order:0;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3)}
  .turn .en{order:1;font-family:var(--serif);font-size:calc(20px*var(--read-scale));line-height:1.62;color:var(--text)}
  .turn .zh{order:2;font-family:var(--han);font-size:calc(16.5px*var(--read-scale));line-height:1.85;color:var(--text-2)}
  body[data-lang="en"] .turn .zh{display:none}
  body[data-lang="zh"] .turn .en{display:none}
  body[data-lang="zh"] .turn .zh{color:var(--text);font-size:calc(19px*var(--read-scale));line-height:1.85}
  /* 双语·译文在前：交换顺序并把译文设为主、原文设为次 */
  body[data-lang="both"][data-order="zh"] .turn .zh{order:1;color:var(--text);font-size:calc(19px*var(--read-scale));line-height:1.85}
  body[data-lang="both"][data-order="zh"] .turn .en{order:2;color:var(--text-2);font-size:calc(16.5px*var(--read-scale));line-height:1.66}
  .term{border-bottom:1px dashed var(--text-3);cursor:help}

  /* ---------- 共识 / 反共识 速览 ---------- */
  .insights{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:0 0 18px;
    padding-bottom:32px;border-bottom:1px solid var(--line)}
  .ins-col{border-radius:16px;padding:18px 20px;background:var(--surface-2);border:1px solid var(--line)}
  .ins-h{font-size:12.5px;font-weight:700;letter-spacing:.04em;margin-bottom:12px}
  .ins-col.consensus .ins-h{color:var(--f-vision)}
  .ins-col.contrarian .ins-h{color:var(--f-rl)}
  .ins-col ul{list-style:none;display:flex;flex-direction:column;gap:11px}
  .ins-col li{position:relative;padding-left:15px;line-height:1.5}
  .ins-col li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%}
  .ins-col.consensus li::before{background:var(--f-vision)}
  .ins-col.contrarian li::before{background:var(--f-rl)}
  .ins-col .ie{display:block;font-size:calc(13.5px*var(--read-scale));color:var(--text);font-family:var(--ui);letter-spacing:-.01em}
  .ins-col .iz{display:block;font-size:calc(13px*var(--read-scale));color:var(--text-2);font-family:var(--han);margin-top:2px}
  body[data-lang="en"] .ins-col .iz{display:none}
  body[data-lang="zh"] .ins-col .ie{display:none}
  @media(max-width:760px){.insights{grid-template-columns:1fr;gap:12px}}
  /* 核心观点/反共识 点击跳原文出处 */
  .ins-col li.jmp{cursor:pointer}
  .ins-col li.jmp:hover .ie{text-decoration:underline;text-underline-offset:2px}
  .ins-col li.jmp::after{content:"›";position:absolute;right:0;top:0;color:var(--text-3);opacity:0;transition:opacity .15s}
  .ins-col li.jmp:hover::after{opacity:.7}
  .ins-col li.jmp{padding-right:14px}
  /* B 速览卡 */
  .brief{background:var(--surface-2);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin:0 0 18px}
  .brief .br-h{font-size:12.5px;font-weight:700;letter-spacing:.04em;color:var(--accent);margin-bottom:12px}
  .brief .br-h2{margin-top:18px}
  .brief ul{list-style:none;display:flex;flex-direction:column;gap:10px}
  .brief .br-tldr li{position:relative;padding-left:15px}
  .brief .br-tldr li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
  .brief .br-qs li{position:relative;padding-left:15px;border-left:2px solid var(--line)}
  .brief .ie{display:block;font-family:var(--serif);font-size:calc(15px*var(--read-scale));line-height:1.5;color:var(--text)}
  .brief .iz{display:block;font-family:var(--han);font-size:calc(13.5px*var(--read-scale));line-height:1.6;color:var(--text-2);margin-top:2px}
  .brief .br-qs .ie{font-family:var(--ui);font-size:calc(14px*var(--read-scale));color:var(--text-2)}
  body[data-lang="en"] .brief .iz{display:none}
  body[data-lang="zh"] .brief .ie{display:none}
  .brief .br-meta{margin-top:18px;font-family:var(--ui);font-size:12px;color:var(--text-3)}
  /* 问这期 grounded 问答 */
  .chat{border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin:0 0 18px;background:var(--surface)}
  .chat-h{font-size:12.5px;font-weight:700;letter-spacing:.04em;color:var(--accent);margin-bottom:12px}
  .chat-thread{display:flex;flex-direction:column;gap:12px;max-height:48vh;overflow-y:auto}
  .chat-thread:empty{display:none}
  .cmsg{font-size:calc(14px*var(--read-scale));line-height:1.6;max-width:92%}
  .cmsg.cu{align-self:flex-end;background:var(--accent);color:#fff;border-radius:14px 14px 4px 14px;padding:8px 13px;font-family:var(--ui)}
  .cmsg.ca{align-self:flex-start;background:var(--surface-2);border-radius:14px 14px 14px 4px;padding:10px 14px;font-family:var(--han);color:var(--text)}
  /* Markdown 渲染（仅助手气泡内） */
  .cmsg.ca .cmp{margin:0 0 8px}
  .cmsg.ca .cmp:last-child,.cmsg.ca>:last-child{margin-bottom:0}
  .cmsg.ca .cmh{font-weight:700;line-height:1.35;margin:12px 0 6px}
  .cmsg.ca .cmh:first-child{margin-top:0}
  .cmsg.ca .cmh1{font-size:1.18em}
  .cmsg.ca .cmh2{font-size:1.1em}
  .cmsg.ca .cmh3{font-size:1.03em}
  .cmsg.ca .cmh4{font-size:1em;color:var(--text-2)}
  .cmsg.ca .cml{margin:4px 0 8px;padding-left:1.35em}
  .cmsg.ca .cml li{margin:3px 0}
  .cmsg.ca .cml li::marker{color:var(--text-3)}
  .cmsg.ca .cmq{margin:6px 0;padding:2px 0 2px 12px;border-left:3px solid var(--line);color:var(--text-2)}
  .cmsg.ca .cmhr{border:none;border-top:1px solid var(--line);margin:12px 0}
  .cmsg.ca .cpre{margin:8px 0;padding:10px 12px;background:var(--surface);border:1px solid var(--line);
    border-radius:9px;overflow-x:auto}
  .cmsg.ca .cpre code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.86em;line-height:1.5;white-space:pre;color:var(--text)}
  .cmsg.ca .cinl{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.86em;
    background:var(--surface);border:1px solid var(--line);border-radius:5px;padding:.5px 5px}
  .cmsg.ca strong{font-weight:700}
  .cmsg.ca em{font-style:italic}
  .cmsg.ca a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
  .cdots{color:var(--text-3)}
  .cite{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 4px;margin:0 2px;
    font-family:var(--ui);font-size:11px;font-weight:700;color:var(--accent);background:rgba(0,113,227,.13);
    border:none;border-radius:5px;cursor:pointer;vertical-align:1px}
  .cite:hover{background:rgba(0,113,227,.24)}
  [data-theme="dark"] .cite{background:rgba(94,160,255,.18);color:#5ea0ff}
  .chat-sugg-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}

  'reinerpope':{en:'Reiner Pope',zh:'赖纳·波普',init:'RP',tiEn:'Co-founder & CEO, MatX; ex-Google (LLM serving)',tiZh:'MatX 联合创始人兼 CEO；前 Google（大模型推理）',fields:['deep-learning'],

  'ethanhe':{en:'Ethan He',zh:'伊森·何',init:'EH',tiEn:'Member of Technical Staff, xAI (Grok Imagine); ex-NVIDIA (Cosmos)',tiZh:'xAI 技术成员（Grok Imagine）；前 NVIDIA（Cosmos 世界模型）',fields:['vision','deep-learning'],

  'alibehrouz':{en:'Ali Behrouz',zh:'阿里·贝赫鲁兹',init:'AB',tiEn:'Researcher, Google; PhD student, Cornell (continual learning)',tiZh:'Google 研究员、康奈尔博士生（持续学习）',fields:['deep-learning'],

  'robertlange':{en:'Robert Lange',zh:'罗伯特·兰格',init:'RL',tiEn:'Founding Researcher, Sakana AI',tiZh:'Sakana AI 创始研究员',fields:['deep-learning'],

  'dylanpatel':{en:'Dylan Patel',zh:'迪伦·帕特尔',init:'DP',tiEn:'Founder & Chief Analyst, SemiAnalysis',tiZh:'SemiAnalysis 创始人兼首席分析师',fields:['deep-learning'],

  'alexrives':{en:'Alex Rives',zh:'亚历克斯·里夫斯',init:'AR',tiEn:'Co-founder & Chief Scientist, EvolutionaryScale; creator of ESM',tiZh:'EvolutionaryScale 联合创始人兼首席科学家；ESM 蛋白质模型作者',fields:['deep-learning'],

  'mattwhite':{en:'Matt White',zh:'马特·怀特',init:'MW',tiEn:'AI CTO, Linux Foundation; ED, PyTorch Foundation',tiZh:'Linux 基金会 AI CTO；PyTorch 基金会执行董事',fields:['deep-learning'],

  'pincus':{en:'Mark Pincus',zh:'马克·平卡斯',init:'MP',tiEn:'Founder, Zynga',tiZh:'Zynga 创始人',fields:['deep-learning'],

  'tejal':{en:'Tejal Patwardhan',zh:'泰贾尔·帕特瓦尔丹',init:'TP',tiEn:'Frontier Evals Lead, OpenAI',tiZh:'OpenAI 前沿评估负责人',fields:['deep-learning','safety'],

  'justinjohnson':{en:'Justin Johnson',zh:'贾斯汀·约翰逊',init:'JJ',tiEn:'Co-founder, World Labs',tiZh:'World Labs 联合创始人',fields:['vision','deep-learning'],

  'parada':{en:'Carolina Parada',zh:'卡罗琳娜·帕拉达',init:'CP',tiEn:'Head of Robotics, Google DeepMind',tiZh:'Google DeepMind 机器人负责人',fields:['robotics'],

  'batson':{en:'Josh Batson',zh:'乔什·巴特森',init:'JB',tiEn:'Interpretability Researcher, Anthropic',tiZh:'Anthropic 可解释性研究员',fields:['safety'],

  'tworek':{en:'Jerry Tworek',zh:'杰里·特沃雷克',init:'JT',tiEn:'VP of Research, OpenAI',tiZh:'OpenAI 研究副总裁',fields:['deep-learning','rl'],

  'bricken':{en:'Trenton Bricken',zh:'特伦顿·布里肯',init:'TB',tiEn:'Interpretability Researcher, Anthropic',tiZh:'Anthropic 可解释性研究员',fields:['safety'],

  'kohli':{en:'Pushmeet Kohli',zh:'普什米特·科利',init:'PK',tiEn:'VP of Research (AI for Science), Google DeepMind',tiZh:'Google DeepMind 研究副总裁（AI 科学）',fields:['deep-learning'],

  'jasonwei':{en:'Jason Wei',zh:'杰森·魏',init:'JW',tiEn:'AI Researcher (ex-OpenAI)',tiZh:'AI 研究员（前 OpenAI）',fields:['nlp','deep-learning'],

  'antonoglou':{en:'Ioannis Antonoglou',zh:'扬尼斯·安东诺格鲁',init:'IA',tiEn:'Co-founder & CTO, Reflection AI',tiZh:'Reflection AI 联合创始人兼 CTO',fields:['rl','deep-learning'],

  'rohinshah':{en:'Rohin Shah',zh:'罗欣·沙阿',init:'RS',tiEn:'Head of AGI Safety & Alignment, Google DeepMind',tiZh:'Google DeepMind AGI 安全与对齐负责人',fields:['safety'],

  'kendall':{en:'Alex Kendall',zh:'亚历克斯·肯德尔',init:'AK',tiEn:'Co-founder & CEO, Wayve',tiZh:'Wayve 联合创始人兼 CEO',fields:['robotics'],

  'hafner':{en:'Danijar Hafner',zh:'达尼亚尔·哈夫纳',init:'DH',tiEn:'Research Scientist, Google DeepMind',tiZh:'Google DeepMind 研究科学家',fields:['rl','deep-learning'],

  'fulford':{en:'Isa Fulford',zh:'伊莎·富尔福德',init:'IF',tiEn:'Research Scientist, OpenAI',tiZh:'OpenAI 研究科学家',fields:['nlp','deep-learning'],

  'tombrown':{en:'Tom Brown',zh:'汤姆·布朗',init:'TB',tiEn:'Co-founder, Anthropic',tiZh:'Anthropic 联合创始人',fields:['deep-learning'],

  'davidsp':{en:'David Soria Parra',zh:'大卫·索里亚·帕拉',init:'DS',tiEn:'Co-creator of MCP, Anthropic',tiZh:'MCP 联合创造者 · Anthropic',fields:['nlp'],

  'karina':{en:'Karina Nguyen',zh:'卡丽娜·阮',init:'KN',tiEn:'Research, OpenAI',tiZh:'OpenAI 研究员',fields:['nlp','deep-learning'],

  'caitlin':{en:'Caitlin Kalinowski',zh:'凯特琳·卡利诺夫斯基',init:'CK',tiEn:'Head of Robotics & Hardware, OpenAI',tiZh:'OpenAI 机器人与硬件负责人',fields:['robotics'],

 'naval':{en:'Naval Ravikant',zh:'纳瓦尔·拉维坎特',init:'NR',tiEn:'Co-founder, AngelList; angel investor & philosopher',tiZh:'AngelList 联合创始人；天使投资人与思想者',fields:['deep-learning'],

 'ajambrosino':{en:'Andrew Ambrosino',zh:'安德鲁·安布罗西诺',init:'AA',tiEn:'Codex App Lead, OpenAI',tiZh:'OpenAI Codex 应用负责人',fields:['nlp','deep-learning'],

 'fedus':{en:'Liam Fedus',zh:'利亚姆·费杜斯',init:'LF',tiEn:'Co-founder, Periodic Labs (ex-OpenAI)',tiZh:'Periodic Labs 联合创始人（原 OpenAI）',fields:['nlp'],
    bioEn:'Led post-training for GPT-4o at OpenAI; co-founded Periodic Labs to use AI for scientific discovery.',
    bioZh:'在 OpenAI 主导 GPT-4o 的后训练；联合创办 Periodic Labs，用 AI 推动科学发现。'},
 'jeffdean':{en:'Jeff Dean',zh:'杰夫·迪恩',init:'JD',tiEn:'Chief Scientist, Google',tiZh:'Google 首席科学家',fields:['deep-learning','nlp'],
    bioEn:'Chief Scientist at Google; co-creator of MapReduce, TensorFlow and the systems behind Google AI. A foundational figure in large-scale machine learning.',
    bioZh:'Google 首席科学家；MapReduce、TensorFlow 及谷歌 AI 背后系统的共同缔造者。大规模机器学习的奠基性人物。'},
 'shazeer':{en:'Noam Shazeer',zh:'诺姆·沙泽尔',init:'NS',tiEn:'Co-lead, Google Gemini',tiZh:'谷歌 Gemini 负责人',fields:['nlp','deep-learning'],
    bioEn:'Co-author of the Transformer paper (Attention Is All You Need), founder of Character.AI, now a co-lead of Google Gemini. One of the most influential architects of modern LLMs.',
    bioZh:'Transformer 论文（Attention Is All You Need）作者之一，Character.AI 创始人，现为谷歌 Gemini 负责人之一。现代大模型最具影响力的架构师之一。'},
 'schulman':{en:'John Schulman',zh:'约翰·舒尔曼',init:'JhS',tiEn:'Co-founder, OpenAI',tiZh:'OpenAI 联合创始人',fields:['rl','nlp'],
    bioEn:'Co-founder of OpenAI and inventor of PPO and much of the RLHF stack behind ChatGPT; later joined Anthropic. A central figure in RL for language models.',
    bioZh:'OpenAI 联合创始人，PPO 算法及 ChatGPT 背后大量 RLHF 技术的发明者，后加入 Anthropic。语言模型强化学习的核心人物。'},
 'noambrown':{en:'Noam Brown',zh:'诺姆·布朗',init:'NB',tiEn:'Research Scientist, OpenAI',tiZh:'OpenAI 研究科学家',fields:['rl','nlp'],
    bioEn:'Behind superhuman poker (Libratus) and Diplomacy (CICERO); now leads reasoning work at OpenAI behind the o-series. A pioneer of test-time search.',
    bioZh:'超人扑克 AI（Libratus）与外交游戏 AI（CICERO）的核心研究者，现于 OpenAI 主导 o 系列推理工作。测试时搜索的开拓者。'},
 'kaplan':{en:'Jared Kaplan',zh:'贾里德·卡普兰',init:'JK',tiEn:'Co-founder, Anthropic',tiZh:'Anthropic 联合创始人',fields:['nlp','safety'],
    bioEn:'Co-founder of Anthropic and a physicist; lead author of the neural scaling laws that shaped how labs scale models. Bridges theoretical physics and AI.',
    bioZh:'Anthropic 联合创始人、物理学家；神经网络缩放定律的主要作者，深刻影响各实验室的扩模方式。连接理论物理与 AI。'},
 'schmidhuber':{en:'Jürgen Schmidhuber',zh:'于尔根·施密德胡伯',init:'JuS',tiEn:'Director, KAUST AI',tiZh:'KAUST AI 负责人',fields:['deep-learning'],
    bioEn:'Pioneer of deep learning and co-inventor of the LSTM, the recurrent network behind years of sequence modeling. A provocative voice on AGI and credit for ideas.',
    bioZh:'深度学习先驱、LSTM 共同发明者——多年序列建模的基石。在 AGI 与思想溯源上观点犀利、长期发声。'},
 'abbeel':{en:'Pieter Abbeel',zh:'彼得·阿贝尔',init:'PA',tiEn:'Professor, UC Berkeley',tiZh:'加州大学伯克利分校教授',fields:['robotics','rl'],
    bioEn:'Professor at UC Berkeley and a leader in deep reinforcement learning and robot learning; co-founded Covariant and hosts The Robot Brains. Brings RL into the physical world.',
    bioZh:'加州大学伯克利分校教授，深度强化学习与机器人学习领军人物；联合创办 Covariant，主持 The Robot Brains 播客。把强化学习带入物理世界。'},
 'aravind':{en:'Aravind Srinivas',zh:'阿拉文德·斯里尼瓦斯',init:'AS',tiEn:'Co-founder & CEO, Perplexity',tiZh:'Perplexity 联合创始人兼 CEO',fields:['nlp'],
    bioEn:'Co-founder and CEO of Perplexity, the AI answer engine challenging traditional search. Former researcher at OpenAI, DeepMind and Google.',
    bioZh:'Perplexity 联合创始人兼 CEO——挑战传统搜索的 AI 答案引擎。曾在 OpenAI、DeepMind、谷歌从事研究。'},
 'scottwu':{en:'Scott Wu',zh:'吴一',init:'SW',tiEn:'Co-founder & CEO, Cognition',tiZh:'Cognition 联合创始人兼 CEO',fields:['nlp'],
    bioEn:'Co-founder and CEO of Cognition, maker of Devin, the autonomous AI software engineer. A competitive-programming prodigy turned AI-agent builder.',
    bioZh:'Cognition 联合创始人兼 CEO，旗下 Devin 是自主 AI 软件工程师。从竞赛编程天才转型为 AI 智能体构建者。'},
 'truell':{en:'Michael Truell',zh:'迈克尔·特鲁埃尔',init:'MT',tiEn:'Co-founder & CEO, Cursor',tiZh:'Cursor 联合创始人兼 CEO',fields:['nlp'],
    bioEn:'Co-founder and CEO of Anysphere, maker of Cursor — the AI-native code editor that became one of the fastest-growing developer tools. Focused on what programming becomes when models write most of the code.',
    bioZh:'Anysphere 联合创始人兼 CEO，旗下 Cursor 是增长最快的 AI 原生代码编辑器之一。关注当模型写下大部分代码后，编程会变成什么样。'},
 'steinberger':{en:'Peter Steinberger',zh:'彼得·施泰因贝格尔',init:'PS',tiEn:'Creator of OpenClaw; founder of PSPDFKit',tiZh:'OpenClaw 作者；PSPDFKit 创始人',fields:['nlp'],
    bioEn:'Austrian developer who built PSPDFKit, then created OpenClaw — a viral open-source personal AI agent that reached tens of thousands of GitHub stars in weeks. Joined OpenAI in 2026 to push personal AI agents.',
    bioZh:'奥地利开发者，先做出 PSPDFKit，后打造 OpenClaw——爆红的开源个人 AI 智能体，几周内获数万 GitHub star。2026 年加入 OpenAI 推进个人 AI 智能体。'},
  'ilya':{en:'Ilya Sutskever',zh:'伊利亚·苏茨克维尔',init:'IS',tiEn:'Co-founder, Safe Superintelligence',tiZh:'SSI 联合创始人',fields:['deep-learning','safety'],
    bioEn:'Co-invented AlexNet and co-founded OpenAI as Chief Scientist. In 2024 left to found Safe Superintelligence Inc. (SSI), a lab with a single mission: build safe superintelligence.',
    bioZh:'AlexNet 的共同发明者，OpenAI 联合创始人兼首席科学家。2024 年离开，创办 Safe Superintelligence(SSI)——一家只有一个使命的实验室：安全地构建超级智能。'},
  'demis':{en:'Demis Hassabis',zh:'杰米斯·哈萨比斯',init:'DH',tiEn:'CEO, Google DeepMind',tiZh:'Google DeepMind CEO',fields:['deep-learning','rl'],
    bioEn:'Co-founder and CEO of DeepMind. Led the teams behind AlphaGo and AlphaFold; shared the 2024 Nobel Prize in Chemistry for protein-structure prediction.',
    bioZh:'DeepMind 联合创始人兼 CEO。领导了 AlphaGo 与 AlphaFold 背后的团队；因蛋白质结构预测获 2024 年诺贝尔化学奖。'},
  'dario':{en:'Dario Amodei',zh:'达里奥·阿莫迪',init:'DA',tiEn:'CEO, Anthropic',tiZh:'Anthropic CEO',fields:['nlp','safety'],
    bioEn:'Former VP of Research at OpenAI; co-founded Anthropic in 2021 to build reliable, interpretable and steerable AI. Author of the essay "Machines of Loving Grace".',
    bioZh:'前 OpenAI 研究副总裁；2021 年联合创办 Anthropic，致力于构建可靠、可解释、可引导的 AI。长文《充满爱意的机器》作者。'},
  'karpathy':{en:'Andrej Karpathy',zh:'安德烈·卡帕西',init:'AK',tiEn:'Founder, Eureka Labs',tiZh:'Eureka Labs 创始人',fields:['nlp','vision'],
    bioEn:'Founding member of OpenAI and former Director of AI at Tesla. Now building Eureka Labs, an "AI-native" school. Known for popularizing "Software 2.0".',
    bioZh:'OpenAI 创始成员，前特斯拉 AI 总监。如今创办 Eureka Labs——一所“AI 原生”学校。以提出并推广“软件 2.0”著称。'},
  'feifei':{en:'Fei-Fei Li',zh:'李飞飞',init:'FL',tiEn:'Co-founder, World Labs',tiZh:'World Labs 联合创始人',fields:['vision'],
    bioEn:'Stanford professor and creator of ImageNet, which catalyzed the deep-learning era. Co-founded World Labs to build "spatial intelligence". A leading voice for human-centered AI.',
    bioZh:'斯坦福教授，ImageNet 的缔造者——它点燃了深度学习时代。联合创办 World Labs，构建“空间智能”。“以人为本的 AI”的代表性倡导者。'},
  'bengio':{en:'Yoshua Bengio',zh:'约书亚·本吉奥',init:'YB',tiEn:'Professor, Mila',tiZh:'Mila 教授',fields:['deep-learning','safety'],
    bioEn:'A "godfather of deep learning" and 2018 Turing Award laureate. In recent years has turned his focus to AI safety, proposing the cautious "Scientist AI" paradigm.',
    bioZh:'“深度学习教父”之一，2018 年图灵奖得主。近年将重心转向 AI 安全，提出审慎的“科学家 AI”范式。'},
  'hinton':{en:'Geoffrey Hinton',zh:'杰弗里·辛顿',init:'GH',tiEn:'Professor Emeritus, U of Toronto',tiZh:'多伦多大学荣休教授',fields:['deep-learning','safety'],
    bioEn:'A "godfather of deep learning" and 2018 Turing Award laureate; shared the 2024 Nobel Prize in Physics. In 2023 he left Google to speak freely about the risks of the technology he helped create.',
    bioZh:'“深度学习教父”之一，2018 年图灵奖得主，2024 年诺贝尔物理学奖得主。2023 年从谷歌离职，以便能更自由地谈论他亲手缔造的这项技术所带来的风险。'},
  'lecun':{en:'Yann LeCun',zh:'杨立昆',init:'YL',tiEn:'Chief AI Scientist, Meta',tiZh:'Meta 首席 AI 科学家',fields:['deep-learning','vision'],
    bioEn:'Inventor of convolutional neural networks and 2018 Turing Award laureate. A vocal skeptic of pure LLM scaling, he argues that "world models" are the path to real machine intelligence.',
    bioZh:'卷积神经网络的发明者，2018 年图灵奖得主。他直言不讳地质疑纯粹的 LLM 规模扩张，认为“世界模型”才是通向真正机器智能的道路。'},
  'leike':{en:'Jan Leike',zh:'扬·莱克',init:'JL',tiEn:'Alignment Lead, Anthropic',tiZh:'Anthropic 对齐负责人',fields:['safety','nlp'],
    bioEn:'Former co-lead of OpenAI\'s Superalignment team; joined Anthropic in 2024 to keep working on aligning superhuman systems. Known for scalable-oversight and weak-to-strong generalization research.',
    bioZh:'前 OpenAI 超级对齐团队联合负责人；2024 年加入 Anthropic，继续研究如何对齐超人类系统。以“可扩展监督”与“弱到强泛化”研究著称。'},
  'suleyman':{en:'Mustafa Suleyman',zh:'穆斯塔法·苏莱曼',init:'MS',tiEn:'CEO, Microsoft AI',tiZh:'微软 AI CEO',fields:['nlp','safety'],
    bioEn:'Co-founder of DeepMind and Inflection AI, now CEO of Microsoft AI. Author of "The Coming Wave", a widely-read argument for containing fast-moving general-purpose technologies.',
    bioZh:'DeepMind 与 Inflection AI 联合创始人，现任微软 AI CEO。著有《浪潮将至》——一部广受关注、主张对快速演进的通用技术加以“遏制”的作品。'},
  'jensen':{en:'Jensen Huang',zh:'黄仁勋',init:'JH',tiEn:'Founder & CEO, NVIDIA',tiZh:'NVIDIA 创始人兼 CEO',fields:['deep-learning','robotics'],
    bioEn:'Founder and CEO of NVIDIA, whose GPUs power nearly all of modern AI. He has steered the company to the center of the AI buildout and is now betting on "physical AI" and robotics.',
    bioZh:'NVIDIA 创始人兼 CEO，其 GPU 几乎支撑了所有现代 AI。他把公司带到了 AI 基建的中心，如今正押注「物理 AI」与机器人。'},
  'altman':{en:'Sam Altman',zh:'萨姆·奥尔特曼',init:'SA',tiEn:'CEO, OpenAI',tiZh:'OpenAI CEO',fields:['nlp','safety'],
    bioEn:'Co-founder and CEO of OpenAI, the lab behind ChatGPT and GPT-5. Former president of Y Combinator, and one of the most central — and polarizing — figures in the race to AGI.',
    bioZh:'OpenAI 联合创始人兼 CEO——ChatGPT 与 GPT-5 背后的实验室。前 Y Combinator 总裁；通往 AGI 竞赛中最核心、也最具争议的人物之一。'},
  'murati':{en:'Mira Murati',zh:'米拉·穆拉蒂',init:'MM',tiEn:'Founder & CEO, Thinking Machines Lab',tiZh:'Thinking Machines Lab 创始人兼 CEO',fields:['nlp'],
    bioEn:'Former CTO of OpenAI, where she led the development of ChatGPT, DALL·E and GPT-4. In 2025 she founded Thinking Machines Lab to build more understandable and customizable AI.',
    bioZh:'前 OpenAI CTO，主导了 ChatGPT、DALL·E 与 GPT-4 的研发。2025 年创办 Thinking Machines Lab，致力于构建更可理解、可定制的 AI。'},
  'andrewng':{en:'Andrew Ng',zh:'吴恩达',init:'AN',tiEn:'Founder, DeepLearning.AI',tiZh:'DeepLearning.AI 创始人',fields:['deep-learning','nlp'],
    bioEn:'Co-founder of Google Brain and Coursera, and founder of DeepLearning.AI. One of the most influential educators in AI, and a measured voice on hype, agents, and how people should actually learn the field.',
    bioZh:'Google Brain 与 Coursera 联合创始人，DeepLearning.AI 创始人。AI 领域最具影响力的教育者之一；对炒作、智能体，以及“普通人该如何学 AI”有冷静务实的看法。'},
  'sutton':{en:'Richard Sutton',zh:'理查德·萨顿',init:'RS',tiEn:'Professor, U of Alberta',tiZh:'阿尔伯塔大学教授',fields:['rl','deep-learning'],
    bioEn:'The father of reinforcement learning and 2024 Turing Award laureate, author of "The Bitter Lesson". A pointed skeptic who argues today\'s LLMs are a dead end on the road to real intelligence.',
    bioZh:'强化学习之父，2024 年图灵奖得主，《苦涩的教训》作者。一位犀利的怀疑者——他认为当今的 LLM，是通往真正智能路上的一条死路。'},
  'brockman':{en:'Greg Brockman',zh:'格雷格·布罗克曼',init:'GB',tiEn:'President & Co-founder, OpenAI',tiZh:'OpenAI 总裁兼联合创始人',fields:['nlp','safety'],
    bioEn:'Co-founder and President of OpenAI and its longtime technical backbone. Former CTO of Stripe, and a central builder behind GPT and OpenAI\'s push toward self-improving AI.',
    bioZh:'OpenAI 联合创始人兼总裁，长期的技术中坚。前 Stripe CTO;GPT 与 OpenAI “自我改进 AI” 路线背后的核心建造者。'},
  'mensch':{en:'Arthur Mensch',zh:'阿瑟·门施',init:'AM',tiEn:'Co-founder & CEO, Mistral AI',tiZh:'Mistral AI 联合创始人兼 CEO',fields:['nlp'],
    bioEn:'Co-founder and CEO of Mistral AI, Europe\'s leading open-weight model lab. A former DeepMind researcher and a prominent voice for open models and European AI sovereignty.',
    bioZh:'Mistral AI 联合创始人兼 CEO——欧洲领先的开放权重模型实验室。前 DeepMind 研究员；开放模型与“欧洲 AI 主权”的代表性倡导者。'},
  'elon':{en:'Elon Musk',zh:'埃隆·马斯克',init:'EM',tiEn:'Founder, xAI',tiZh:'xAI 创始人',fields:['nlp','robotics'],
    bioEn:'Founder of xAI (Grok) and CEO of Tesla and SpaceX. A central and polarizing force in AI through xAI, Tesla\'s self-driving, and the Optimus robot, and an outspoken voice on AI risk.',
    bioZh:'xAI（Grok）创始人，特斯拉与 SpaceX CEO。通过 xAI、特斯拉自动驾驶与 Optimus 机器人，他是 AI 领域核心而又极具争议的力量，也常就 AI 风险高调发声。'},
  'kaiser':{en:'Łukasz Kaiser',zh:'武卡什·凯泽',init:'ŁK',tiEn:'Researcher, OpenAI',tiZh:'OpenAI 研究员',fields:['nlp','deep-learning'],
    bioEn:'A co-author of "Attention Is All You Need" (the Transformer paper) and co-creator of TensorFlow\'s Tensor2Tensor. Now at OpenAI, working on reasoning models.',
    bioZh:'Transformer 奠基论文《Attention Is All You Need》的共同作者，TensorFlow Tensor2Tensor 的共同创造者。现于 OpenAI 研究推理模型。'},
  'kolter':{en:'Zico Kolter',zh:'齐科·科尔特',init:'ZK',tiEn:'Professor, CMU · OpenAI board',tiZh:'CMU 教授 · OpenAI 董事',fields:['safety','deep-learning'],
    bioEn:'A Carnegie Mellon professor and head of its machine learning department, and a member of OpenAI\'s board. Known for work on adversarial robustness and deep learning theory.',
    bioZh:'卡内基梅隆大学教授、机器学习系主任，OpenAI 董事会成员。以对抗鲁棒性与深度学习理论的研究著称。'},
  'sholto':{en:'Sholto Douglas',zh:'肖尔托·道格拉斯',init:'SD',tiEn:'Researcher, Anthropic',tiZh:'Anthropic 研究员',fields:['nlp','rl'],
    bioEn:'A researcher at Anthropic focused on scaling and reinforcement learning, and a prominent young voice on how far today\'s models can really go.',
    bioZh:'Anthropic 研究员，专注于规模扩张与强化学习；关于「当前模型究竟能走多远」的代表性青年声音。'},
  'lambert':{en:'Nathan Lambert',zh:'内森·兰伯特',init:'NL',tiEn:'Research Scientist, Ai2',tiZh:'Ai2 研究科学家',fields:['rl','nlp'],
    bioEn:'A research scientist at the Allen Institute for AI (Ai2) working on RLHF and open models (OLMo), and author of the widely-read Interconnects newsletter.',
    bioZh:'艾伦人工智能研究所（Ai2）研究科学家，从事 RLHF 与开放模型（OLMo）;广受关注的 Interconnects 通讯作者。'},
  'awang':{en:'Alexandr Wang',zh:'亚历山大·王',init:'AW',tiEn:'Founder, Scale AI · Meta Superintelligence',tiZh:'Scale AI 创始人 · Meta 超智能',fields:['nlp','deep-learning'],
    bioEn:'Founder and former CEO of Scale AI, which built much of the data infrastructure behind modern AI. In 2025 he joined Meta to lead its Superintelligence Labs.',
    bioZh:'Scale AI 创始人兼前 CEO——它构建了现代 AI 背后的大量数据基础设施。2025 年加入 Meta，领导其超级智能实验室。'},
  'boris':{en:'Boris Cherny',zh:'鲍里斯·切尔尼',init:'BC',tiEn:'Creator of Claude Code, Anthropic',tiZh:'Claude Code 创造者 · Anthropic',fields:['nlp'],
    bioEn:'Creator and lead of Claude Code, Anthropic\'s agentic command-line coding tool, and a central figure in the shift to AI-driven software engineering.',
    bioZh:'Anthropic 智能体命令行编程工具 Claude Code 的创造者与负责人；AI 驱动软件工程浪潮中的核心人物。'},
  'catwu':{en:'Cat Wu',zh:'凯特·吴',init:'CW',tiEn:'Product, Claude Code · Anthropic',tiZh:'Claude Code 产品 · Anthropic',fields:['nlp'],
    bioEn:'A product manager on Claude Code at Anthropic, shaping how developers work with agentic coding tools and how the team ships so fast.',
    bioZh:'Anthropic Claude Code 团队产品经理，塑造开发者与智能体编程工具协作的方式，以及团队的高速迭代。'},
  'fiona':{en:'Fiona Fung',zh:'菲奥娜·冯',init:'FF',tiEn:'Claude Code & Cowork Lead · Anthropic',tiZh:'Claude Code 与 Cowork 负责人 · Anthropic',fields:['nlp'],
    bioEn:'Manager of the Claude Code and Cowork teams at Anthropic, overseeing engineering and product (including Boris Cherny and Cat Wu). A 25-year engineer who earlier built TypeScript and Visual Studio at Microsoft and started Facebook Marketplace at Meta.',
    bioZh:'Anthropic Claude Code 与 Cowork 团队负责人，统管工程与产品（含鲍里斯·切尔尼、凯特·吴）。25 年工龄的工程师，早年在微软打造 TypeScript 与 Visual Studio，在 Meta 创立 Facebook Marketplace。'},
  'oriol':{en:'Oriol Vinyals',zh:'奥里奥尔·维尼亚尔斯',init:'OV',tiEn:'VP of Research & Gemini Co-lead · Google DeepMind',tiZh:'Google DeepMind 研究副总裁 · Gemini 共同负责人',fields:['nlp','rl'],
    bioEn:'VP of Research at Google DeepMind and a co-lead of Gemini. Pioneered sequence-to-sequence learning and AlphaStar (StarCraft II), and contributed to AlphaFold — a central architect of frontier models and agents.',
    bioZh:'Google DeepMind 研究副总裁、Gemini 共同负责人。序列到序列学习的开创者、AlphaStar（星际争霸 II）主导者，亦参与 AlphaFold——前沿模型与智能体的核心架构师。'},
  'jaderberg':{en:'Max Jaderberg',zh:'马克斯·亚德伯格',init:'MJ',tiEn:'Chief AI Officer · Isomorphic Labs',tiZh:'Isomorphic Labs 首席 AI 官',fields:['rl','deep-learning'],
    bioEn:'Chief AI Officer at Isomorphic Labs, applying AI to drug discovery. Earlier at DeepMind he led reinforcement-learning breakthroughs — Capture the Flag, population-based training and AlphaStar.',
    bioZh:'Isomorphic Labs 首席 AI 官，用 AI 攻坚药物发现。早年在 DeepMind 主导强化学习突破——夺旗（Capture the Flag）、群体训练（PBT）与 AlphaStar。'},
  'shanahan':{en:'Murray Shanahan',zh:'默里·沙纳汉',init:'MS',tiEn:'Principal Scientist · Google DeepMind; Professor, Imperial College',tiZh:'Google DeepMind 首席科学家 · 帝国理工教授',fields:['robotics'],
    bioEn:'Principal Scientist at Google DeepMind and Professor of Cognitive Robotics at Imperial College London. Works on AI reasoning, embodiment and the philosophy of mind; scientific advisor on the film Ex Machina.',
    bioZh:'Google DeepMind 首席科学家、帝国理工学院认知机器人学教授。研究 AI 推理、具身与心智哲学；电影《机械姬》（Ex Machina）的科学顾问。'},

/* 文末「接着读」:同人物 → 同议题他人 → 同领域，未读优先，最多 4 期 */
function nextReads(e){
  const out=[],seen=new Set([e.id]);
  const push=x=>{if(x&&!seen.has(x.id)){seen.add(x.id);out.push(x);}};
  const unread=id=>!readHas(id);
  const same=epsOf(e.pid).filter(x=>x.id!==e.id);
  push(same.find(x=>unread(x.id))||same[0]);
  for(const slug in TOPICS.items){
    if((TOPICS.items[slug]||[]).some(it=>it.ep===e.id)){
      const other=(TOPICS.items[slug]||[]).find(it=>it.pid!==e.pid&&!seen.has(it.ep)&&unread(it.ep));
      if(other)push(EPISODES.find(x=>x.id===other.ep));
      break;
    }
  }
  const f=e.fields[0];
  for(const x of EPISODES){if(out.length>=4)break;
    if(x.id!==e.id&&x.pid!==e.pid&&x.fields.includes(f)&&unread(x.id))push(x);}
  return out.slice(0,4);
}

  while(n=w.nextNode()){if(n===container)return sum+off;sum+=n.nodeValue.length;}
  return sum;
}
// 字符偏移 → 该偏移落在第几句
function sentAt(sents,pos){let a=0,si=0;
  for(let i=0;i<sents.length;i++){si=i;if(pos<a+sents[i].length)break;a+=sents[i].length;}return si;}
/* 句级对照核心：在 turn 内，把 src（mid 字符处）映射到另一语言的对应句并高亮；
   被 syncCross（双语实时）与 peekSel（单语显式按钮）共用 */
function crossMark(turn,srcIsEn,mid){
  const enDiv=turn.querySelector('.en'),zhDiv=turn.querySelector('.zh');
  const src=srcIsEn?enDiv:zhDiv, cp=srcIsEn?zhDiv:enDiv;
  if(!src||!cp)return;
  const srcLen=src.textContent.length||1, cpLen=cp.textContent.length;
  const srcSents=sentsOf(src.textContent,!srcIsEn), cpSents=sentsOf(cp.textContent,srcIsEn);
  // 映射到 cp 句子：句数相同→同序；否则按字符比例落点
  let ci;
  if(srcSents.length===cpSents.length){ci=sentAt(srcSents,mid);}
  else{ci=sentAt(cpSents,(mid/srcLen)*cpLen);}
  ci=Math.max(0,Math.min(cpSents.length-1,ci));
  crossOrig.push({el:cp,html:cp.innerHTML});
  cp.innerHTML=cpSents.map((s,i)=>i===ci?`<span class="xseg">${escHtml(s)}</span>`:escHtml(s)).join('');
  if(getComputedStyle(cp).display==='none')turn.classList.add('peek');   // 单语：就地展开
}
function syncCross(){
  if(_peekHold){_peekHold=false;return;}            // 「看译文」刚点下，别立刻清掉
  const sel=window.getSelection();const selText=(sel?sel.toString():'').trim();
  clearCross();
  if(document.body.dataset.lang!=='both')return;   // 仅双语模式做对照；单语（中/英）下不自动展开（有显式按钮）
  if(!selText||!sel.rangeCount||!sel.anchorNode||!inReader(sel.anchorNode))return;
  const node=sel.anchorNode.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;
  const turn=node&&node.closest?node.closest('.turn'):null;if(!turn)return;
  const srcIsEn=!!node.closest('.en'),srcIsZh=!!node.closest('.zh');
  if(!srcIsEn&&!srcIsZh)return;
  const src=turn.querySelector(srcIsEn?'.en':'.zh');if(!src)return;
  const rg=sel.getRangeAt(0);
  let a=offsetInEl(src,rg.startContainer,rg.startOffset);
  let b=offsetInEl(src,rg.endContainer,rg.endOffset);
  if(b<a)[a,b]=[b,a];
  const mid=Math.min((src.textContent.length||1)-1,Math.max(0,(a+b)/2));
  crossMark(turn,srcIsEn,mid);
}

// 轻量 Markdown → HTML(无依赖):代码块/行内码/标题/列表/引用/分割线/加粗斜体/链接。
// 先转义 HTML，再结构化；引用记号 [#n]/[@id] 不是 [text](url) 链接，原样保留给 citeHtml 处理。
function mdHtml(src){
  const blocks=[];let s=escH(src||'');
  s=s.replace(/```[a-zA-Z]*\n?([\s\S]*?)```/g,(_,c)=>{blocks.push('<pre class="cpre"><code>'+c.replace(/\n$/,'')+'</code></pre>');return '\u0000'+(blocks.length-1)+'\u0000';});
  s=s.replace(/`([^`\n]+)`/g,(_,c)=>{blocks.push('<code class="cinl">'+c+'</code>');return '\u0000'+(blocks.length-1)+'\u0000';});
  const lines=s.split('\n'),out=[];let list=null;
  const closeL=()=>{if(list){out.push('</'+list+'>');list=null;}};
  for(const line of lines){let m;
    if(/^\u0000\d+\u0000$/.test(line)){closeL();out.push(line);continue;}
    if(/^\s*$/.test(line)){closeL();continue;}
    if(m=line.match(/^\s{0,3}(#{1,4})\s+(.*)$/)){closeL();out.push('<div class="cmh cmh'+m[1].length+'">'+m[2]+'</div>');continue;}
    if(/^\s{0,3}([-*_])\1{2,}\s*$/.test(line)){closeL();out.push('<hr class="cmhr">');continue;}
    if(m=line.match(/^\s{0,3}&gt;\s?(.*)$/)){closeL();out.push('<blockquote class="cmq">'+m[1]+'</blockquote>');continue;}
    if(m=line.match(/^\s*[-*+]\s+(.*)$/)){if(list!=='ul'){closeL();out.push('<ul class="cml">');list='ul';}out.push('<li>'+m[1]+'</li>');continue;}
    if(m=line.match(/^\s*\d+[.)]\s+(.*)$/)){if(list!=='ol'){closeL();out.push('<ol class="cml">');list='ol';}out.push('<li>'+m[1]+'</li>');continue;}
    closeL();out.push('<p class="cmp">'+line+'</p>');}
  closeL();s=out.join('');
  s=s.replace(/\*\*([^\n]+?)\*\*/g,'<strong>$1</strong>')
     .replace(/(^|[^*\w])\*([^*\n]+?)\*(?!\w)/g,'$1<em>$2</em>')
     .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="nofollow noopener">$1</a>');
  return s.replace(/\u0000(\d+)\u0000/g,(_,i)=>blocks[+i]);
}

}

async function askEp(preset){

  const key=chatKey();if(!key)return;track(chatMode==='all'?'ask_all':'ask');CHAT[key]=CHAT[key]||[];
  const hist=CHAT[key].filter(m=>m.content&&m.content!=='…').slice(-4).map(m=>({role:m.role,content:m.content}));
  CHAT[key].push({role:'user',content:q},{role:'assistant',content:'…'});
  if(inp)inp.value='';
  const ai=CHAT[key].length-1;
  const refresh=()=>{const t=$('#chatThread');if(t){t.innerHTML=renderThread(key);t.scrollTop=t.scrollHeight;}};
  refresh();

    const payload={mode:chatMode,question:q.slice(0,500),history:hist};
    if(chatMode==='episode')payload.id=chatEpId;
    const r=await fetch(CHAT_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!r.ok||!r.body){let msg=r.status;try{msg=(await r.json()).error||msg}catch(_){}CHAT[key][ai]={role:'assistant',content:'（出错：'+msg+'）'};refresh();return;}
    const reader=r.body.getReader(),dec=new TextDecoder();let acc='';CHAT[key][ai].content='';
    for(;;){const {done,value}=await reader.read();if(done)break;acc+=dec.decode(value,{stream:true});CHAT[key][ai].content=acc;refresh();}
    if(!acc){CHAT[key][ai].content='（没有返回内容）';refresh();}
  }catch(e){CHAT[key][ai]={role:'assistant',content:'（网络错误，请重试）'};refresh();}
}

/* 盘古之白：中文与英文/数字之间自动补空格（渲染时处理文本节点，纯英文节点不受影响） */
const CJK='\\u4e00-\\u9fff\\u3040-\\u30ff\\u3400-\\u4dbf';
const RE1=new RegExp('(['+CJK+'])([A-Za-z0-9%])','g');
const RE2=new RegExp('([A-Za-z0-9%\\)\\]])(['+CJK+'])','g');
/* 中文标点规范：CJK 相邻的半角标点转全角（并吸收多余空格）;仅对含 CJK 的文本节点生效 */
const FW={',':'，',';':'；','!':'！','?':'？',':':'：'};
const RE_PUNC=new RegExp('(['+CJK+'])[ \\t]*([,;!?:])[ \\t]*','g');
const RE_OP=new RegExp('\\([ \\t]*(['+CJK+'])','g');
const RE_CP=new RegExp('(['+CJK+'])[ \\t]*\\)','g');
function pangu(t){
  t=t.replace(RE_PUNC,(_,c,p)=>c+FW[p]).replace(RE_OP,'（$1').replace(RE_CP,'$1）');
  return t.replace(RE1,'$1 $2').replace(RE2,'$1 $2');
}
function pangufy(root){
  const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT),nodes=[];let n;
  while(n=w.nextNode())nodes.push(n);
  const cjk=/[一-鿿]/;
  nodes.forEach(nd=>{const v=nd.nodeValue;if(v&&cjk.test(v)){const nv=pangu(v);if(nv!==v)nd.nodeValue=nv;}});
}

let _sid=(localStorage.syncSidFor&&localStorage.syncSidFor===localStorage.syncCode?localStorage.syncSid:'')||'';
async function syncSid(){
  const c=syncCode();if(!c){_sid='';return;}
  if(localStorage.syncSidFor===c&&localStorage.syncSid){_sid=localStorage.syncSid;return;}
  try{const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('uv|'+c));
    _sid=[...new Uint8Array(buf)].slice(0,8).map(x=>x.toString(16).padStart(2,'0')).join('');
    localStorage.syncSid=_sid;localStorage.syncSidFor=c;}catch(_){_sid='';}

  if((pf.t||0)>(+localStorage.prefsT||0)){
    ['size','lang','order','theme'].forEach(k=>{if(pf[k])localStorage[k]=pf[k];});
    localStorage.prefsT=pf.t;changed=true;
    if(pf.theme)document.documentElement.dataset.theme=pf.theme;
    ['size','lang','order'].forEach(k=>{if(pf[k])document.body.dataset[k]=pf[k];});
  }
  // 「上次看到」合并:两端 recent ∪ 时间戳(缺失回退阅读位置 t),按新→旧取 6
  {
    const lt=recentTGet(),rt=r.recentT||{};
    const tOf=id=>Math.max(lt[id]||0,rt[id]||0,(lp[id]&&lp[id].t)||0);
    const ids=[...new Set([...(recentGet()),...(r.recent||[])])];
    if(ids.length){
      const merged=ids.sort((a,b)=>tOf(b)-tOf(a)).slice(0,6);
      if(JSON.stringify(merged)!==JSON.stringify(recentGet())){
        localStorage.recentEpisodes=JSON.stringify(merged);_recentSnap=localStorage.recentEpisodes;changed=true;}
      const nt={};ids.forEach(id=>{const t=tOf(id);if(t)nt[id]=t;});
      try{localStorage.recentT=JSON.stringify(nt)}catch(_){}
    }
  }
  const rh=r.hl;
  if(rh&&typeof rh==='object'){const lh=hlGet();let hc=false;
    for(const id in rh){const la=lh[id]||[];const seen=new Set(la.map(x=>x.sec+'|'+x.ti+'|'+x.lang+'|'+x.s+'|'+x.e));
      (rh[id]||[]).forEach(x=>{const k=x.sec+'|'+x.ti+'|'+x.lang+'|'+x.s+'|'+x.e;if(!seen.has(k)){la.push(x);seen.add(k);hc=true;}});
      if(la.length)lh[id]=la;}
    if(hc){hlSave(lh);changed=true;}}
  return changed;
}
let _syncTimer=null,_syncBusy=false,_syncLastPull=0;
function syncTouch(){if(!syncCode())return;clearTimeout(_syncTimer);_syncTimer=setTimeout(syncPush,5000);}
let _syncErr='';
async function syncPush(){
  const c=syncCode();if(!c||_syncBusy)return;_syncBusy=true;
  try{const r=await syncFetch('/s/'+c,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(syncCollect())});
    if(!r.ok)throw new Error('HTTP '+r.status);
    localStorage.syncT=Date.now();_syncErr='';}
  catch(e){_syncErr='连不上同步服务器（部分网络屏蔽 workers.dev）';}
  _syncBusy=false;syncPanelRefresh();
}
async function syncPull(){
  const c=syncCode();if(!c)return;_syncLastPull=Date.now();
  try{const r=await syncFetch('/s/'+c,{cache:'no-store'});
    if(r.status===404){await syncPush();return;}
    if(r.ok){const changed=syncMerge(await r.json());localStorage.syncT=Date.now();_syncErr='';
      const onHome=!(location.hash||'#/').slice(2).split('?')[0].split('/').filter(Boolean).length;
      if(changed&&onHome)render();else syncPanelRefresh();
      await syncPush();   // 合并结果回写,双向收敛
    }else throw new Error('HTTP '+r.status);
  }catch(e){_syncErr='连不上同步服务器（部分网络屏蔽 workers.dev）';syncPanelRefresh();}
}
function syncStart(){localStorage.syncCode=syncGen();localStorage.prefsT=localStorage.prefsT||Date.now();syncSid();syncPush();syncPanelRefresh();track('sync');}
async function syncJoin(code){
  code=(code||'').toUpperCase().replace(/[^A-Z2-7]/g,'');
  if(!/^[A-Z2-7]{20}$/.test(code)){alert('同步码应为 20 位字母数字（不含 0/1/8/9）');return false;}
  localStorage.syncCode=code;await syncSid();await syncPull();syncPanelRefresh();return true;
}
function syncJoinInput(){const el=document.getElementById('syncIn');if(el)syncJoin(el.value);}
function syncOff(){localStorage.removeItem('syncCode');localStorage.removeItem('syncT');localStorage.removeItem('syncSid');localStorage.removeItem('syncSidFor');_sid='';syncPanelRefresh();}
function syncCopy(what){
  const c=syncCode();if(!c)return;
  const v=what==='link'?('https://aipodcast.jasonlin.tech/#sync='+c):c.replace(/(.{4})(?=.)/g,'$1-');
  if(navigator.clipboard)navigator.clipboard.writeText(v);
  const b=document.getElementById(what==='link'?'syncCpL':'syncCpC');
  if(b){const t=b.textContent;b.textContent='已复制 ✓';setTimeout(()=>b.textContent=t,1500);}
}
async function syncNow(b){b.textContent='同步中…';await syncPull();b.textContent=_syncErr?'重试':'已同步 ✓';setTimeout(()=>{const x=document.getElementById('syncNowBtn');if(x)x.textContent='立即同步';},2000);}
function syncAgo(){const t=+localStorage.syncT||0;if(!t)return '尚未同步';
  const m=Math.round((Date.now()-t)/60000);return m<1?'刚刚已同步':m<60?`${m} 分钟前同步`:`${Math.round(m/60)} 小时前同步`;}
function syncPanelHtml(){

    <span class="mcp-tools">另一台设备打开配对链接即完成；码即身份，勿公开分享。</span>`;
}

/* ====== 匿名访问统计（无 Cookie / 不收集个人信息；数据进自有 D1，可在 Claude Code 直接查） ====== */
const STATS_URL='https://stats.jasonlin.tech';
const _dev=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)?'mobile':'desktop';
const _ref=(()=>{try{return document.referrer?new URL(document.referrer).host:'';}catch(_){return '';}})();
let _lastView=null;
function track(type,path){
  try{const p=path||(location.hash.replace(/^#/,'').split('?')[0]||'/');
    const body=JSON.stringify({type,path:p,ua:_dev,ref:_ref,sid:_sid||''});
    if(navigator.sendBeacon)navigator.sendBeacon(STATS_URL,new Blob([body],{type:'text/plain'}));  // text/plain 才能免预检跨域发出
    else fetch(STATS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body,keepalive:true});
  }catch(_){}}
function trackView(){const p=location.hash.replace(/^#/,'').split('?')[0]||'/';if(p===_lastView)return;_lastView=p;track('view',p);}
function render(){
  if(typeof ttsStop==='function')ttsStop(true);   // 切页时停朗读、收起跟读条
  // 配对深链:#sync=<码> → 保存并拉取合并
  if(location.hash.startsWith('#sync=')){
    const code=location.hash.slice(6);
    history.replaceState(null,'','#/');
    syncJoin(code).then(ok=>{if(ok)setTimeout(()=>alert('配对成功，阅读记录已同步 ✓'),300);});
  }
  const h=location.hash||'#/';
  const[path,query]=h.slice(2).split('?');
  const parts=path.split('/').filter(Boolean);
  let html;
  if(query){const qp=new URLSearchParams(query);
    if(qp.get('field')){bf={person:'',year:'',pod:'',field:qp.get('field'),read:''};
      if(parts[0]==='browse')history.replaceState(null,'','#/browse');}   // 应用一次即剥离,避免每次 render 重置筛选
    if(parts[0]==='episode'&&(qp.get('at')!=null||qp.get('hl')))pendingLocate={id:parts[1],at:qp.get('at'),hl:qp.get('hl')};}
  if(!parts.length)html=vHome();
  else if(parts[0]==='people')html=vPeople();
  else if(parts[0]==='ask')html=vAsk();
  else if(parts[0]==='topics')html=vTopics();
  else if(parts[0]==='topic')html=vTopic(parts[1]);
  else if(parts[0]==='fields')html=vFields();
  else if(parts[0]==='browse')html=vBrowse();
  else if(parts[0]==='person')html=vPerson(parts[1]);
  else if(parts[0]==='pod')html=vPod(parts[1]);
  else if(parts[0]==='episode')html=vEpisode(parts[1]);
  else if(parts[0]==='marks')html=vMarks();
  else html=vHome();
  $('#app').innerHTML=html;
  pangufy($('#app'));
  applyHls();hlUpdNav();
  document.body.dataset.route=parts[0]||'home';
  document.querySelectorAll('.nav .links a').forEach(a=>a.classList.toggle('on',a.dataset.route===parts[0]));
  updateMeta(parts);
  window.scrollTo(0,0);
  syncSeg();
  observeReveals();
  initTOC();
  placeAsk();
  if(parts[0]==='episode')initReadMark(parts[1]);
  // 无显式 ?at/?hl 时，自动回到上次读到的章节（阅读位置永不丢）
  if(parts[0]==='episode'&&!pendingLocate){const rp=readPosGet()[parts[1]];if(rp&&rp.s>0&&!readHas(parts[1]))pendingLocate={id:parts[1],at:rp.s,hl:''};}
  applyLocate();
  trackView();
}
let pendingLocate=null;
function applyLocate(){
  if(!pendingLocate)return;
  const {id,at,hl}=pendingLocate;
  if((location.hash||'').indexOf('/episode/'+id)<0){pendingLocate=null;return;}  // 已离开该期
  if(!document.querySelector('.reader .sec-h'))return;   // 逐字稿还没加载，等下次 render
  pendingLocate=null;
  let target=null;
  if(hl){const base=(hl||'').replace(/\s/g,'');   // 去空格/换行（选区可能跨发言、含说话人标签）
    if(base.length>=6){const els=[...document.querySelectorAll('.reader .turn .en,.reader .turn .zh')];
      for(const L of [40,30,22,16,10]){const snip=base.slice(0,Math.min(L,base.length));if(snip.length<6)continue;
        const hit=els.find(el=>el.textContent.replace(/\s/g,'').includes(snip));   // 逐步缩短前缀，命中选区开头那条
        if(hit){target=hit.offsetParent?hit:hit.closest('.turn');break;}}}}   // 命中隐藏行（跨语言）→定位其发言块
  if(!target&&at!=null&&at!==''){target=document.getElementById('sec-'+at);}
  if(!target)return;
  const go=()=>{const top=target.getBoundingClientRect().top+window.scrollY-92;   // 顶对齐到阅读栏下方
    window.scrollTo({top:Math.max(0,top),behavior:'smooth'});};
  requestAnimationFrame(go); setTimeout(go,420);   // rAF 等首帧 + 二次校正字体/布局回流
  target.classList.add('locate-flash');setTimeout(()=>target.classList.remove('locate-flash'),2800);
}
/* 按路由更新标题/描述/OG —— 微信在内置浏览器分享当前页时会读实时标题 */
function metaSet(key,isProp,val){const sel=isProp?`meta[property="${key}"]`:`meta[name="${key}"]`;
  let m=document.querySelector(sel);if(!m){m=document.createElement('meta');m.setAttribute(isProp?'property':'name',key);document.head.appendChild(m);}
  m.setAttribute('content',val);}
function updateMeta(parts){
  let title='AI Podcast · AI 播客 — 双语播客全文阅读';
  let desc='知名 AI 人物的播客 · 双语全文阅读，原文与翻译对照，核心观点速览。';
  if(parts[0]==='episode'){const e=EPISODES.find(x=>x.id===parts[1]);if(e){const p=PEOPLE[e.pid];
    title=`${e.tZh} · ${p.zh} — AI Podcast`;desc=`${p.zh}（${e.pod.zh}）双语全文 + 核心观点。${e.sZh||''}`;}}
  else if(parts[0]==='person'){const p=PEOPLE[parts[1]];if(p){title=`${p.zh} · ${p.en} — AI Podcast`;desc=`${p.zh}（${p.tiZh}）的播客，双语全文阅读。`;}}
  else if(parts[0]==='pod'){const k=POD_SLUG[parts[1]],i=POD_INFO[k];if(i){title=`${k} · ${i.zh} — AI Podcast`;desc=i.cn;}}
  else if(parts[0]==='ask'){title='问全站 · 向 AI 人物的观点提问 — AI Podcast';desc='基于全站播客的核心观点综合回答，对比不同 AI 人物的看法，出处可溯。';}
  else if(parts[0]==='topics'){title='议题 · 同一议题不同声音 — AI Podcast';desc='把不同 AI 人物对 AGI 时间表、规模化、对齐安全、开源闭源等议题的观点聚到一起横向对照。';}
  else if(parts[0]==='topic'){const d=(typeof TOPICS!=='undefined')&&TOPICS.defs.find(x=>x.slug===parts[1]);if(d){title=`${d.zh} · ${d.en} — AI Podcast 议题`;desc=`不同 AI 人物对「${d.zh}」的观点对照。`;}}
  document.title=title;
  metaSet('description',false,desc);
  metaSet('og:title',true,title);metaSet('twitter:title',true,title);
  metaSet('og:description',true,desc);metaSet('twitter:description',true,desc);
  metaSet('og:url',true,'https://aipodcast.jasonlin.tech/'+(location.hash||''));
}
function observeReveals(){
  const io=new IntersectionObserver((es)=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:0,rootMargin:'0px 0px -5% 0px'});
  document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));
}
