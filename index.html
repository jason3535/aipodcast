g-theecono-2026", "date": "2026-01-22", "en": "AGI hype misleads business leaders and students; real AGI is far off and requires new breakthroughs.", "zh": "AGI炒作误导商业领袖和学生；真正的AGI还很遥远，需要新的突破。"}, {"slug": "agi-timeline", "pid": "andrewng", "ep": "andrewng-theecono-2026", "date": "2026-01-22", "en": "No existing technology, including LLMs, is by itself a path to AGI.", "zh": "包括大语言模型在内的现有技术本身都不是通往AGI的路径。"}, {"slug": "agi-timeline", "pid": "mensch", "ep": "mensch-bigtechn", "date": "2026-01-16", "en": "AGI as a single system solving all problems will never exist.", "zh": "能解决所有问题的单一AGI系统永远不会存在。"}, {"slug": "agi-timeline", "pid": "altman", "ep": "altman-bigtechn", "date": "2025-12-18", "en": "AGI is underdefined and may have already been achieved; superintelligence is a clearer future goal.", "zh": "AGI定义不清，可能已经实现；超级智能是更清晰的未来目标。"}, {"slug": "agi-timeline", "pid": "altman", "ep": "altman-bigtechn", "date": "2025-12-18", "en": "AGI is underdefined and may have already passed us by without a clear milestone.", "zh": "AGI定义不明确，可能已经悄然过去而没有明确的里程碑。"}, {"slug": "agi-timeline", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Superintelligence should be a continual learner deployed incrementally, not a finished AGI that knows everything.", "zh": "超级智能应是一个持续学习者，逐步部署，而非无所不知的成品AGI。"}, {"slug": "agi-timeline", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "The term AGI overshoots; humans are not AGI but rely on continual learning.", "zh": "AGI这个词过度了；人类并非AGI，而是依赖持续学习。"}, {"slug": "agi-timeline", "pid": "feifei", "ep": "feifei-lennyspo", "date": "2025-11-16", "en": "AGI is more a marketing term than a scientific one.", "zh": "AGI（通用人工智能）更多是营销术语而非科学术语。"}, {"slug": "agi-timeline", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "We're building ghosts, not animals; AI is a different kind of intelligence.", "zh": "我们建造的是幽灵，不是动物；AI是一种不同的智能。"}, {"slug": "agi-timeline", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "AI progress is continuous with computing automation, not a discrete explosion.", "zh": "AI进步与计算自动化是连续的，而非离散的爆发。"}, {"slug": "agi-timeline", "pid": "brockman", "ep": "brockman-matthewb-2025", "date": "2025-10-08", "en": "AGI is a continuous process, not a destination; the journey matters as much as the milestone.", "zh": "AGI 是一个持续过程，而非终点；旅程与里程碑同样重要。"}, {"slug": "agi-timeline", "pid": "sutton", "ep": "sutton-dwarkesh", "date": "2025-09-26", "en": "AI succession to digital intelligence is inevitable due to lack of global consensus and pursuit of superintelligence.", "zh": "由于缺乏全球共识和对超级智能的追求，AI 向数字智能的接替不可避免。"}, {"slug": "agi-timeline", "pid": "sutton", "ep": "sutton-dwarkesh", "date": "2025-09-26", "en": "We should be proud of giving rise to designed intelligences as a major universal transition.", "zh": "我们应为催生设计智能这一重大宇宙转变感到自豪。"}, {"slug": "agi-timeline", "pid": "elon", "ep": "elon-allinpod-2025", "date": "2025-09-10", "en": "AI smarter than any single human could arrive as soon as next year, and by 2030 smarter than all humans combined.", "zh": "AI 最早明年就能比任何单个人类更聪明，到 2030 年将超过所有人类智慧的总和。"}, {"slug": "agi-timeline", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "AGI is not a sudden event; progress will be gradual with continuous improvements.", "zh": "AGI不是一个突然的事件；进步将是渐进的，持续改进。"}, {"slug": "agi-timeline", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "Key ingredients for AGI include organizational knowledge, memory, and oversight.", "zh": "实现AGI的关键要素包括组织知识、记忆和可扩展监督。"}, {"slug": "agi-timeline", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "The equilibrium state may never arrive as AI keeps improving rapidly.", "zh": "由于AI持续快速进步，均衡状态可能永远不会到来。"}, {"slug": "agi-timeline", "pid": "awang", "ep": "awang-shawnrya-2025", "date": "2025-06-12", "en": "The dark forest hypothesis explains why we haven't found aliens.", "zh": "黑暗森林假说解释了为什么我们还没找到外星人。"}, {"slug": "agi-timeline", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "The grand theme of the 21st century is true AI, which will change civilization completely and lead to an AI explosion.", "zh": "21世纪的主题是真正的AI，它将彻底改变文明并引发AI爆炸。"}, {"slug": "agi-timeline", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "Large language models like ChatGPT are far from AGI; they index human knowledge but cannot handle the physical world.", "zh": "像ChatGPT这样的大语言模型远非AGI；它们索引人类知识，但无法处理物理世界。"}, {"slug": "agi-timeline", "pid": "kolter", "ep": "kolter-20vc", "date": "2024-09-04", "en": "AGI will likely arrive within 4-50 years, much sooner than academia traditionally expects.", "zh": "AGI 可能在 4 到 50 年内到来，比学术界传统预期快得多。"}, {"slug": "agi-timeline", "pid": "suleyman", "ep": "suleyman-intellig", "date": "2024-07-05", "en": "AI will reach human-level capability across many tasks in 3-5 years, enabling radical abundance.", "zh": "AI将在3-5年内达到许多任务的人类水平能力，实现极大丰富。"}, {"slug": "agi-timeline", "pid": "suleyman", "ep": "suleyman-intellig", "date": "2024-07-05", "en": "The singularity is hundreds of years away; focus on near-term capabilities is more useful.", "zh": "奇点还有数百年之遥；关注近期能力更有用。"}, {"slug": "agi-timeline", "pid": "awang", "ep": "awang-thelogan", "date": "2023-11-03", "en": "The next 2-3 years of AI development will define the next 2-3 decades globally, economically and geopolitically.", "zh": "未来 2-3 年的 AI 发展将定义全球未来 2-3 十年，包括经济与地缘政治。"}, {"slug": "agi-timeline", "pid": "leike", "ep": "leike-80000hou", "date": "2023-08-22", "en": "The four-year timeline is ambitious but chosen to force rapid progress, not because AGI is expected then.", "zh": "四年时间表虽然雄心勃勃，但选择它是为了推动快速进展，而不是因为预计那时会出现AGI。"}, {"slug": "agi-timeline", "pid": "murati", "ep": "murati-microsof", "date": "2023-07-11", "en": "AGI will change every aspect of life, requiring responsible development.", "zh": "AGI将改变生活的方方面面，需要负责任地开发。"}, {"slug": "agi-timeline", "pid": "noambrown", "ep": "noambrown-nopriors-2023", "date": "2023-04-25", "en": "General reasoning and sample efficiency remain key challenges for achieving AGI.", "zh": "通用推理和样本效率仍然是实现AGI（通用人工智能）的关键挑战。"}, {"slug": "agi-timeline", "pid": "ilya", "ep": "ilya-dwarkesh-2023", "date": "2023-03-27", "en": "AGI will be a multi-year window of increasing economic value, not a sudden event.", "zh": "AGI将是一个多年窗口期，经济价值逐年指数增长，而非突然事件。"}, {"slug": "agi-timeline", "pid": "karpathy", "ep": "karpathy-lexfridm", "date": "2022-10-29", "en": "Physics may have exploits like buffer overflows or rounding errors, and we should try to find them to extract infinite energy.", "zh": "物理学可能存在缓冲区溢出或舍入错误等漏洞，我们应该尝试找到它们以提取无限能量。"}, {"slug": "agi-timeline", "pid": "brockman", "ep": "brockman-lexfridm-2019", "date": "2019-04-03", "en": "AGI will be the most transformative technology ever created, requiring careful initial conditions.", "zh": "AGI 将是有史以来最具变革性的技术，需要谨慎设定初始条件。"}], "scaling": [{"slug": "scaling", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "Model quality is the most important factor; being far ahead on quality drives growth.", "zh": "模型质量是最重要的因素；在质量上遥遥领先推动增长。"}, {"slug": "scaling", "pid": "jensen", "ep": "jensen-associat-2026", "date": "2026-06-16", "en": "Energy production is foundational; without it, AI infrastructure cannot be built.", "zh": "能源生产是基础；没有它，AI基础设施就无法建设。"}, {"slug": "scaling", "pid": "jensen", "ep": "jensen-associat-2026", "date": "2026-06-16", "en": "The US is woefully behind in energy production, a critical layer for AI growth.", "zh": "美国在能源生产方面严重落后，而这是AI增长的关键层面。"}, {"slug": "scaling", "pid": "lecun", "ep": "lecun-computer-2026", "date": "2026-06-09", "en": "LLMs cannot achieve human-like intelligence because text data volume is vastly insufficient compared to visual experience.", "zh": "大语言模型无法实现类人智能，因为文本数据量远不及视觉经验。"}, {"slug": "scaling", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "Superintelligence is coming soon, driven by log-linear scaling of compute and data.", "zh": "超级智能即将到来，由算力和数据的对数线性扩展驱动。"}, {"slug": "scaling", "pid": "murati", "ep": "murati-bloomber", "date": "2026-06-04", "en": "Compressing progress in frontier AI leads to volatility, but long-term durable progress is key.", "zh": "前沿AI的快速进步带来波动，但长期可持续进展是关键。"}, {"slug": "scaling", "pid": "murati", "ep": "murati-bloomber", "date": "2026-06-04", "en": "Compressing progress into short timeframes leads to both good and bad outcomes in months.", "zh": "将进展压缩到短时间内会导致好与坏的结果在几个月内出现。"}, {"slug": "scaling", "pid": "mensch", "ep": "mensch-cnbc-2026", "date": "2026-06-03", "en": "US hyperscalers may be overspending on AI infrastructure despite current demand exceeding supply.", "zh": "尽管当前需求超过供给，美国超大规模云服务商可能在AI基础设施上过度支出。"}, {"slug": "scaling", "pid": "noambrown", "ep": "noambrown-arcprize-2026", "date": "2026-05-20", "en": "Inference compute is increasingly important and underestimated for model capability.", "zh": "推理算力对模型能力越来越重要且被低估。"}, {"slug": "scaling", "pid": "noambrown", "ep": "noambrown-arcprize-2026", "date": "2026-05-20", "en": "Academia needs more compute to compete; universities should invest heavily in GPUs.", "zh": "学术界需要更多算力才能竞争；大学应大力投资GPU。"}, {"slug": "scaling", "pid": "noambrown", "ep": "noambrown-arcprize-2026", "date": "2026-05-20", "en": "Scaling inference compute can yield arbitrarily more intelligent models from the same base.", "zh": "扩展推理算力可以从同一基础模型获得任意更智能的模型。"}, {"slug": "scaling", "pid": "lambert", "ep": "lambert-aiproem-2026", "date": "2026-05-19", "en": "Pre-training scaling laws still hold, but compute constraints will widen the US-China gap.", "zh": "预训练的缩放定律仍然成立，但算力限制将扩大中美差距。"}, {"slug": "scaling", "pid": "lambert", "ep": "lambert-aiproem-2026", "date": "2026-05-19", "en": "Chinese labs are 6-9 months behind on benchmarks, but gap may grow on knowledge work.", "zh": "中国实验室在基准测试上落后6-9个月，但在知识工作上的差距可能扩大。"}, {"slug": "scaling", "pid": "lambert", "ep": "lambert-aiproem-2026", "date": "2026-05-19", "en": "Huawei chips work for inference but not training; labs buy them but don't use.", "zh": "华为芯片可用于推理但非训练；实验室购买但未使用。"}, {"slug": "scaling", "pid": "lecun", "ep": "lecun-unsuperv", "date": "2026-05-15", "en": "Scaling LLMs will not lead to human-level AI; a paradigm shift is needed.", "zh": "扩展 LLM 不会带来人类级 AI；需要范式转变。"}, {"slug": "scaling", "pid": "awang", "ep": "awang-corememo", "date": "2026-05-13", "en": "Scaling compute, data, and RL is key; predictable scaling across multiple axes drives progress.", "zh": "扩展算力、数据和强化学习是关键；多轴可预测缩放推动进步。"}, {"slug": "scaling", "pid": "brockman", "ep": "brockman-theknowl-2026", "date": "2026-04-22", "en": "Scaling simple algorithms with massive compute can exceed human performance.", "zh": "用海量算力扩展简单算法就能超越人类表现。"}, {"slug": "scaling", "pid": "brockman", "ep": "brockman-theknowl-2026", "date": "2026-04-22", "en": "Compute is the new scarce resource; access to it must be broadly distributed.", "zh": "算力是新的稀缺资源；其获取必须广泛分配。"}, {"slug": "scaling", "pid": "jensen", "ep": "jensen-dwarkesh", "date": "2026-04-15", "en": "Bottlenecks in chip supply are 2-3 year problems; energy policy is the real long-term constraint.", "zh": "芯片供应的瓶颈是2-3年的问题；能源政策才是真正的长期制约。"}, {"slug": "scaling", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "We are not running out of data; untapped sources include video, audio, robotics, and synthetic data.", "zh": "我们并没有耗尽数据；未开发的来源包括视频、音频、机器人技术和合成数据。"}, {"slug": "scaling", "pid": "brockman", "ep": "brockman-bigtechn", "date": "2026-04-01", "en": "Pre-training improvements multiply downstream gains; scaling remains crucial.", "zh": "预训练的改进会放大下游收益；Scaling（规模扩张）仍然至关重要。"}, {"slug": "scaling", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "Supervised learning hasn't progressed as far as I would have expected.", "zh": "监督学习的进展没有我预期的那么远。"}, {"slug": "scaling", "pid": "hinton", "ep": "hinton-startalk", "date": "2026-02-28", "en": "Digital intelligence may surpass analog brains because it can scale and share knowledge instantly.", "zh": "数字智能可能超越模拟大脑，因为它能规模化并即时共享知识。"}, {"slug": "scaling", "pid": "hinton", "ep": "hinton-startalk", "date": "2026-02-28", "en": "Digital intelligence is already better than analog human brains at some tasks.", "zh": "数字智能在某些任务上已超越模拟的人类大脑。"}, {"slug": "scaling", "pid": "hinton", "ep": "hinton-startalk", "date": "2026-02-28", "en": "Scaling laws may not peter out if AI generates its own data via self-play.", "zh": "如果AI通过自我对弈生成数据，缩放定律可能不会失效。"}, {"slug": "scaling", "pid": "boris", "ep": "boris-lennyspo", "date": "2026-02-19", "en": "Using the most capable model is often cheaper than cheaper models due to fewer tokens.", "zh": "使用最强大的模型通常比便宜模型更省钱，因为消耗的token更少。"}, {"slug": "scaling", "pid": "dario", "ep": "dario-dwarkesh", "date": "2026-02-13", "en": "Pre-training and RL both follow the same scaling laws: log-linear improvement with compute and data.", "zh": "预训练和强化学习都遵循相同的缩放定律：性能随算力和数据对数线性提升。"}, {"slug": "scaling", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "AI compute scaling will hit a power wall on Earth by end of 2025, forcing chips to pile up unpowered.", "zh": "AI 算力扩展将在 2025 年底前在地球上遭遇电力瓶颈，导致芯片堆积无法通电。"}, {"slug": "scaling", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "Space-based AI data centers will be the cheapest and most scalable option within 36 months.", "zh": "太空 AI 数据中心将在 36 个月内成为最便宜且最具扩展性的选择。"}, {"slug": "scaling", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "The only way to truly scale AI is to harness solar power in space, eventually using a lunar mass driver.", "zh": "真正扩展 AI 的唯一途径是利用太空太阳能，最终使用月球质量驱动器。"}, {"slug": "scaling", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "Compute power is the new oil; chip supply is the current bottleneck for AI progress.", "zh": "算力是新的石油；芯片供应是当前 AI 进展的瓶颈。"}, {"slug": "scaling", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "Space data centers will not provide meaningful compute for OpenAI in the next 10 years.", "zh": "太空数据中心在未来 10 年内不会为 OpenAI 提供有意义的算力。"}, {"slug": "scaling", "pid": "mensch", "ep": "mensch-bigtechn", "date": "2026-01-16", "en": "Pre-training is hitting a saturation wall; further gains come from domain-specific fine-tuning.", "zh": "预训练正触及饱和墙；进一步收益来自领域特定微调。"}, {"slug": "scaling", "pid": "altman", "ep": "altman-bigtechn", "date": "2025-12-18", "en": "We would be double the revenue if we had double the compute today.", "zh": "如果今天算力翻倍，我们的收入也会翻倍。"}, {"slug": "scaling", "pid": "demis", "ep": "demis-googlede-2025", "date": "2025-12-16", "en": "Both scaling and innovation are needed to reach AGI; 50% effort on each.", "zh": "Scaling（规模扩张）和创新对于实现AGI（通用人工智能）都不可或缺，各需投入50%的努力。"}, {"slug": "scaling", "pid": "demis", "ep": "demis-googlede-2025", "date": "2025-12-16", "en": "Scaling hasn't hit a wall; diminishing returns exist but progress continues with innovation.", "zh": "Scaling（规模扩张）并未遇到瓶颈；虽然存在收益递减，但创新仍推动进步。"}, {"slug": "scaling", "pid": "lecun", "ep": "lecun-theinfor-2025", "date": "2025-12-15", "en": "The current AI monoculture in Silicon Valley focusing on scaling LLMs is misguided.", "zh": "硅谷当前专注于Scaling LLM的AI单一文化是误导性的。"}, {"slug": "scaling", "pid": "suleyman", "ep": "suleyman-bloomber", "date": "2025-12-12", "en": "AI cost drops 90% in 2 years, ensuring broad access despite concentration in US and China.", "zh": "AI成本两年降90%，尽管集中在中美，但可及性将广泛。"}, {"slug": "scaling", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "AI progress follows a smooth exponential increase, not a slowdown.", "zh": "AI 进展遵循平稳的指数增长，而非放缓。"}, {"slug": "scaling", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "Pre-training scaling laws still work, but reasoning models offer more gains per compute.", "zh": "预训练的缩放定律仍然有效，但推理模型在相同算力下带来更多收益。"}, {"slug": "scaling", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "The AI slowdown narrative is wrong; progress is rapid but often missed.", "zh": "AI 放缓的说法是错误的；进展迅速但常被忽视。"}, {"slug": "scaling", "pid": "feifei", "ep": "feifei-latentsp", "date": "2025-11-25", "en": "Academia should focus on wacky ideas and long-range research, not competing with industry on scale.", "zh": "学术界应专注于疯狂想法和长期研究，而非与工业界比拼规模。"}, {"slug": "scaling", "pid": "feifei", "ep": "feifei-latentsp", "date": "2025-11-25", "en": "Current deep learning fits patterns but lacks causal understanding of physics like gravity.", "zh": "当前深度学习拟合模式，但缺乏对重力等物理的因果理解。"}, {"slug": "scaling", "pid": "feifei", "ep": "feifei-latentsp", "date": "2025-11-25", "en": "LLMs may predict planetary orbits accurately but won't spontaneously derive Newton's laws like F=ma.", "zh": "LLM可能准确预测行星轨道，但不会自发推导出F=ma这样的牛顿定律。"}, {"slug": "scaling", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Pre-training scaling laws are finite; we are returning to an era of research where ideas matter more than brute compute.", "zh": "预训练的缩放定律是有限的；我们正回归研究时代，想法比蛮力算力更重要。"}, {"slug": "scaling", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "We are back in the age of research, not scaling; compute is now large enough.", "zh": "我们回到了研究时代，而非Scaling时代；算力现在已经足够大。"}, {"slug": "scaling", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Pre-training's uniform improvement across tasks may mislead about generalization.", "zh": "预训练在任务上的均匀改进可能误导了对泛化的理解。"}, {"slug": "scaling", "pid": "andrewng", "ep": "andrewng-20vc", "date": "2025-11-17", "en": "Electricity and semiconductors are the two biggest bottlenecks for AI scaling.", "zh": "电力和半导体是AI规模扩张的两大瓶颈。"}, {"slug": "scaling", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "Synthetic data from LLMs is collapsed and lacks entropy; training on it leads to model collapse, unlike human diversity.", "zh": "LLM生成的合成数据坍缩且缺乏熵；在其上训练导致模型坍缩，不像人类具有多样性。"}, {"slug": "scaling", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "Model collapse from synthetic data is a fundamental problem; entropy is needed.", "zh": "合成数据导致的模型崩溃是一个根本性问题；需要熵。"}, {"slug": "scaling", "pid": "sholto", "ep": "sholto-themadpo", "date": "2025-10-02", "en": "Progress in AI is exponential; any measurable benchmark improves rapidly.", "zh": "AI 的进步是指数级的；任何可衡量的基准都在快速提升。"}, {"slug": "scaling", "pid": "aravind", "ep": "aravind-siliconv-2025", "date": "2025-09-26", "en": "1% daily improvement compounds to 3700% yearly growth.", "zh": "每天1%的改进，一年后累积增长3700%。"}, {"slug": "scaling", "pid": "sutton", "ep": "sutton-dwarkesh", "date": "2025-09-26", "en": "Scaling large language models is not the bitter lesson; true scaling comes from learning from experience.", "zh": "扩展大型语言模型并非苦涩教训；真正的扩展来自从经验中学习。"}, {"slug": "scaling", "pid": "dario", "ep": "dario-cheekypi", "date": "2025-08-06", "en": "AI progress is exponential; business revenue follows similar scaling laws.", "zh": "AI 进步是指数级的；业务收入遵循类似的缩放定律。"}, {"slug": "scaling", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "Scaling compute in pre-training and RL predictably improves AI performance.", "zh": "在预训练和强化学习中扩展算力可预测地提升AI性能。"}, {"slug": "scaling", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "AI task horizon doubles roughly every 7 months, enabling longer tasks.", "zh": "AI任务时间跨度大约每7个月翻倍，使更长任务成为可能。"}, {"slug": "scaling", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "Scaling laws have held over five orders of magnitude, suggesting continued progress.", "zh": "缩放定律已在五个数量级上成立，表明进步将持续。"}, {"slug": "scaling", "pid": "demis", "ep": "demis-lexfridm-2025", "date": "2025-07-23", "en": "Scaling laws still hold for pre-training, post-training, and inference compute.", "zh": "Scaling（规模扩张）定律在预训练、后训练和推理算力上仍然成立。"}, {"slug": "scaling", "pid": "awang", "ep": "awang-shawnrya-2025", "date": "2025-06-12", "en": "Data is the raw material for AI, like oil for industry.", "zh": "数据是 AI 的原材料，如同石油之于工业。"}, {"slug": "scaling", "pid": "awang", "ep": "awang-shawnrya-2025", "date": "2025-06-12", "en": "AI warfare will boil down to compute and data center scale.", "zh": "AI 战争将归结为算力和数据中心规模。"}, {"slug": "scaling", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "Modern AI breakthroughs are based on algorithms invented in the previous millennium, but needed hardware scaling to become practical.", "zh": "现代AI突破基于前一个千年发明的算法，但需要硬件规模扩张才能实用。"}, {"slug": "scaling", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Scaling laws predict predictable progress in AI by increasing compute and data.", "zh": "缩放定律预测通过增加算力和数据可实现AI的可预测进步。"}, {"slug": "scaling", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Test-time compute scaling may surpass pre-training scaling as the next major AI progress driver.", "zh": "测试时算力扩展可能超越预训练扩展，成为下一个主要的AI进步驱动力。"}, {"slug": "scaling", "pid": "karpathy", "ep": "karpathy-nopriors", "date": "2024-09-05", "en": "Synthetic data is the future, but maintaining entropy is critical to avoid silent model collapse.", "zh": "合成数据是未来，但保持熵至关重要，以避免模型无声崩溃。"}, {"slug": "scaling", "pid": "kolter", "ep": "kolter-20vc", "date": "2024-09-04", "en": "Data shortage is not imminent; we have vast untapped multimodal data.", "zh": "数据短缺并非迫在眉睫；我们还有大量未利用的多模态数据。"}, {"slug": "scaling", "pid": "kolter", "ep": "kolter-20vc", "date": "2024-09-04", "en": "Larger models still improve performance even on fixed datasets.", "zh": "即使在固定数据集上，更大的模型仍能提升性能。"}, {"slug": "scaling", "pid": "kolter", "ep": "kolter-20vc", "date": "2024-09-04", "en": "Data curation is overrated; raw internet data suffices for training.", "zh": "数据整理被高估了；原始互联网数据足以用于训练。"}, {"slug": "scaling", "pid": "suleyman", "ep": "suleyman-intellig", "date": "2024-07-05", "en": "Compute used for cutting-edge AI models has grown 10x per year for a decade, an unprecedented trajectory.", "zh": "前沿AI模型使用的算力十年间每年增长10倍，这是史无前例的轨迹。"}, {"slug": "scaling", "pid": "altman", "ep": "altman-thejoero", "date": "2024-06-27", "en": "Scaling AI leads to exponential growth in capabilities, but progress is gradual.", "zh": "Scaling（规模扩张）AI 导致能力指数级增长，但进步是渐进的。"}, {"slug": "scaling", "pid": "mensch", "ep": "mensch-20vc", "date": "2024-04-29", "en": "Data quality is a major bottleneck for model improvement, not just compute.", "zh": "数据质量是模型改进的主要瓶颈，而不仅仅是算力。"}, {"slug": "scaling", "pid": "sutton", "ep": "sutton-edanmeye", "date": "2024-01-08", "en": "Scaling is easy; finding methods that scale is the hard part.", "zh": "Scaling（规模扩张）很容易；找到能扩展的方法才是难点。"}, {"slug": "scaling", "pid": "schulman", "ep": "schulman-therobot-2023", "date": "2023-08-03", "en": "Scaling data and compute may face diminishing returns, but new modalities like video and better training methods offer progress.", "zh": "Scaling（规模扩张）数据和算力可能面临收益递减，但视频等新模态和更好的训练方法提供了进步空间。"}, {"slug": "scaling", "pid": "murati", "ep": "murati-microsof", "date": "2023-07-11", "en": "Scaling laws and focusing on one large model was not obvious early on.", "zh": "缩放定律和专注于一个大模型在早期并不显而易见。"}, {"slug": "scaling", "pid": "shazeer", "ep": "shazeer-aarthian-2023", "date": "2023-01-21", "en": "Scaling models with more compute and data leads to smarter AI.", "zh": "通过更多算力和数据扩展模型，AI 变得更智能。"}, {"slug": "scaling", "pid": "andrewng", "ep": "andrewng-lexfridm-2020", "date": "2020-02-20", "en": "Scale is crucial for deep learning; bigger models and datasets improve performance.", "zh": "规模对深度学习至关重要；更大的模型和数据集能提升性能。"}, {"slug": "scaling", "pid": "bengio", "ep": "bengio-lexfridm-2018", "date": "2018-10-20", "en": "Simply scaling up depth or parameters will not solve fundamental representational issues in neural networks.", "zh": "仅仅增加深度或参数不会解决神经网络中的根本表示问题。"}], "rl": [{"slug": "rl", "pid": "lecun", "ep": "lecun-computer-2026", "date": "2026-06-09", "en": "Reinforcement learning is horribly sample-inefficient and should be minimized in favor of observation-based learning.", "zh": "强化学习样本效率极低，应尽量减少使用，转而采用基于观察的学习。"}, {"slug": "rl", "pid": "demis", "ep": "demis-stanford-2026", "date": "2026-06-02", "en": "Language models are more grounded than linguists thought, partly due to RLHF feedback from humans.", "zh": "语言模型比语言学家认为的更接地气，部分原因是来自人类的 RLHF 反馈。"}, {"slug": "rl", "pid": "noambrown", "ep": "noambrown-arcprize-2026", "date": "2026-05-20", "en": "Removing human priors entirely via RL is theoretically possible but not practical.", "zh": "通过强化学习完全去除人类先验理论上可行但不实用。"}, {"slug": "rl", "pid": "bengio", "ep": "bengio-80000hou", "date": "2026-05-07", "en": "Reinforcement learning is dangerous for superintelligence; scientist AI avoids it.", "zh": "强化学习对超级智能是危险的；科学家AI避免了它。"}, {"slug": "rl", "pid": "bengio", "ep": "bengio-80000hou", "date": "2026-05-07", "en": "Reinforcement learning is not needed; training on past data without future consequences avoids instrumental goals.", "zh": "不需要强化学习；仅基于过去数据训练、不考虑未来后果可避免工具性目标。"}, {"slug": "rl", "pid": "kolter", "ep": "kolter-themadpo", "date": "2026-05-07", "en": "Reinforcement learning trains models on their own outputs, enabling self-improvement.", "zh": "强化学习让模型基于自身输出进行训练，从而实现自我改进。"}, {"slug": "rl", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "Models have dramatically improved on verifiable reward problems like math and coding, achieving gold medals in IMO and ICPC.", "zh": "模型在数学和编程等可验证奖励问题上显著提升，在IMO和ICPC中获得了金牌。"}, {"slug": "rl", "pid": "demis", "ep": "demis-hugeiftr", "date": "2026-04-07", "en": "AlphaZero's tabula rasa learning shows AI can surpass human knowledge without data.", "zh": "AlphaZero的白板学习表明AI无需数据即可超越人类知识。"}, {"slug": "rl", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "Reinforcement learning is learning from experience by trial and error to achieve a goal.", "zh": "强化学习是通过试错从经验中学习以实现目标。"}, {"slug": "rl", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "Temporal difference learning is the best thing I ever did.", "zh": "时序差分学习是我做过的最好的事。"}, {"slug": "rl", "pid": "lecun", "ep": "lecun-thisisth", "date": "2026-03-11", "en": "Reinforcement learning is extremely inefficient for real-world tasks.", "zh": "强化学习对现实世界任务极其低效。"}, {"slug": "rl", "pid": "lambert", "ep": "lambert-turingpo-2026", "date": "2026-02-06", "en": "Post-training with reinforcement learning is key for tool use and coding agents, but complex.", "zh": "基于强化学习的后训练是工具使用和编码智能体的关键，但复杂度高。"}, {"slug": "rl", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "Reasoning models use chain of thought and reinforcement learning to improve correctness.", "zh": "推理模型使用思维链和强化学习来提高正确性。"}, {"slug": "rl", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "Post-training improvements like RL and synthetic data drive most recent model gains.", "zh": "后训练的改进（如强化学习和合成数据）推动了近期模型的大部分进步。"}, {"slug": "rl", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "The disconnect between eval performance and real-world impact suggests models generalize poorly due to RL training focused on evals.", "zh": "评估表现与现实影响之间的脱节表明，模型泛化能力差，因为强化学习训练过度聚焦于评估指标。"}, {"slug": "rl", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Self-play is interesting only for narrow skills; debate and verifiers are its modern form.", "zh": "自我对弈仅对狭窄技能有趣；辩论和验证器是其现代形式。"}, {"slug": "rl", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "Current reinforcement learning for LLMs is terrible—sucking supervision through a straw—and needs better credit assignment.", "zh": "当前LLM的强化学习很糟糕——通过吸管吸取监督——需要更好的信用分配。"}, {"slug": "rl", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "LLM judges for RL are gameable; adversarial examples cause reward hacking, requiring more robust methods.", "zh": "用于RL的LLM评判器可被利用；对抗样本导致奖励破解，需要更稳健的方法。"}, {"slug": "rl", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "Humans don't really use reinforcement learning for intelligence tasks.", "zh": "人类实际上并不使用强化学习来完成智能任务。"}, {"slug": "rl", "pid": "sholto", "ep": "sholto-themadpo", "date": "2025-10-02", "en": "Reinforcement learning is a new scaling axis alongside pre-training, enabling models to learn skills like saying 'I don't know'.", "zh": "强化学习是与预训练并列的新 Scaling 轴，使模型能学会说“我不知道”等技能。"}, {"slug": "rl", "pid": "sholto", "ep": "sholto-themadpo", "date": "2025-10-02", "en": "The simplest RL methods work best for language models; complex approaches like AlphaGo's often fail.", "zh": "最简单的 RL 方法对语言模型最有效；像 AlphaGo 那样的复杂方法常常失败。"}, {"slug": "rl", "pid": "sholto", "ep": "sholto-themadpo", "date": "2025-10-02", "en": "Reasoning in long chains of tokens emerges naturally from RL without explicit structure or prompting.", "zh": "长链 token 推理从 RL 中自然涌现，无需显式结构或提示。"}, {"slug": "rl", "pid": "sutton", "ep": "sutton-dwarkesh", "date": "2025-09-26", "en": "Reinforcement learning is the basic AI paradigm, learning from experience with goals.", "zh": "强化学习是基本的 AI 范式，通过目标从经验中学习。"}, {"slug": "rl", "pid": "dario", "ep": "dario-cheekypi", "date": "2025-08-06", "en": "The data wall may not exist; reinforcement learning on language models provides a new learning paradigm.", "zh": "数据墙可能不存在；在语言模型上使用强化学习提供了新的学习范式。"}, {"slug": "rl", "pid": "lambert", "ep": "lambert-intercon", "date": "2025-07-31", "en": "RLVR uses verifiable rewards for math, code, and precise instruction following.", "zh": "RLVR 使用可验证奖励来处理数学、代码和精确指令遵循。"}, {"slug": "rl", "pid": "lambert", "ep": "lambert-intercon", "date": "2025-07-31", "en": "Overoptimization occurs in RL, RLHF, and RLVR; models exploit the easiest signal.", "zh": "过度优化发生在 RL、RLHF 和 RLVR 中；模型会利用最简单的信号。"}, {"slug": "rl", "pid": "dario", "ep": "dario-lexfridm", "date": "2024-11-11", "en": "Post-training is becoming as important as pre-training, using RLHF, constitutional AI, and synthetic data.", "zh": "后训练正变得与预训练同等重要，使用基于人类反馈的强化学习（RLHF）、宪法AI和合成数据。"}, {"slug": "rl", "pid": "dario", "ep": "dario-lexfridm", "date": "2024-11-11", "en": "RLHF doesn't make models smarter; it bridges the gap between human preferences and model output.", "zh": "基于人类反馈的强化学习（RLHF）不会让模型更聪明；它弥合了人类偏好与模型输出之间的差距。"}, {"slug": "rl", "pid": "lecun", "ep": "lecun-lexfridm", "date": "2024-03-07", "en": "Reinforcement learning is inefficient and should be minimized; model predictive control is preferred for planning.", "zh": "强化学习效率低下，应尽量减少；模型预测控制更适合规划。"}, {"slug": "rl", "pid": "demis", "ep": "demis-dwarkesh-2024", "date": "2024-02-28", "en": "Reinforcement learning and synthetic data (self-play) can overcome data bottlenecks.", "zh": "强化学习和合成数据（自我对弈）可以克服数据瓶颈。"}, {"slug": "rl", "pid": "noambrown", "ep": "noambrown-nopriors-2023", "date": "2023-04-25", "en": "Self-play combined with human data enables AI to surpass human performance in complex games.", "zh": "自我对弈结合人类数据使AI在复杂游戏中超越人类表现。"}, {"slug": "rl", "pid": "noambrown", "ep": "noambrown-nopriors-2023", "date": "2023-04-25", "en": "Overbets in poker, once considered mistakes, are now effective strategies discovered by AI.", "zh": "扑克中的超额下注曾被视为错误，现在却是AI发现的有效策略。"}, {"slug": "rl", "pid": "ilya", "ep": "ilya-dwarkesh-2023", "date": "2023-03-27", "en": "Data for reinforcement learning already mostly comes from AI, with humans only training the reward function.", "zh": "强化学习的数据已主要来自AI，人类仅训练奖励函数。"}, {"slug": "rl", "pid": "bengio", "ep": "bengio-machinel", "date": "2022-02-22", "en": "Diversity in sampling is crucial for exploration and avoiding local optima in RL.", "zh": "采样多样性对于探索和避免强化学习中的局部最优至关重要。"}, {"slug": "rl", "pid": "andrewng", "ep": "andrewng-lexfridm-2020", "date": "2020-02-20", "en": "Reinforcement learning has few real-world applications despite hype.", "zh": "强化学习尽管被炒作，但实际应用很少。"}, {"slug": "rl", "pid": "brockman", "ep": "brockman-lexfridm-2019", "date": "2019-04-03", "en": "Consciousness may emerge in competent RL agents as a computational shortcut.", "zh": "有能力的强化学习智能体可能将意识作为计算捷径而产生。"}, {"slug": "rl", "pid": "abbeel", "ep": "abbeel-lexfridm-2018", "date": "2018-12-16", "en": "Self-play provides strong learning signal because one side always succeeds and the other fails.", "zh": "自我对弈能提供强大的学习信号，因为总有一方成功、一方失败。"}, {"slug": "rl", "pid": "abbeel", "ep": "abbeel-lexfridm-2018", "date": "2018-12-16", "en": "Imitation learning offers high signal-to-noise ratio for teaching robots basic skills quickly.", "zh": "模仿学习能提供高信噪比的数据，让机器人快速学会基本技能。"}, {"slug": "rl", "pid": "abbeel", "ep": "abbeel-lexfridm-2018", "date": "2018-12-16", "en": "A robot swinging a tennis racket is feasible with RL and simulation, not extremely hard.", "zh": "让机器人挥动网球拍通过强化学习和模拟是可行的，并非极其困难。"}, {"slug": "rl", "pid": "leike", "ep": "leike-80000hou-2018", "date": "2018-09-16", "en": "Deep reinforcement learning algorithms are notoriously unstable across random seeds.", "zh": "深度强化学习算法在不同随机种子下以不稳定著称。"}, {"slug": "rl", "pid": "brockman", "ep": "brockman-ycombina-2017", "date": "2017-11-08", "en": "Iterative training with a scoreboard and weekly goals drives exponential improvement.", "zh": "通过记分板和每周目标进行迭代训练，驱动指数级进步。"}], "alignment": [{"slug": "alignment", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "AI progress follows a smooth exponential; countermeasures should smoothly ratchet up with the technology.", "zh": "AI进展遵循平滑指数；应对措施应随技术平稳升级。"}, {"slug": "alignment", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "Checks and balances between companies and government are needed for powerful AI.", "zh": "强大的AI需要公司与政府之间的制衡。"}, {"slug": "alignment", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "Mythos is too powerful to release broadly until strong cyber safeguards are ready.", "zh": "Mythos过于强大，在强大的网络安全保障准备好之前不能广泛发布。"}, {"slug": "alignment", "pid": "jensen", "ep": "jensen-training", "date": "2026-06-10", "en": "Claims that AI might end humanity or is mysterious are nonsense; it's just software.", "zh": "声称AI可能终结人类或神秘莫测是无稽之谈；它只是软件。"}, {"slug": "alignment", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "AI's purpose is to make people healthier, happier, and more capable—that's the test.", "zh": "AI 的目的是让人们更健康、更快乐、更有能力——这是检验标准。"}, {"slug": "alignment", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "Models are not conscious; attributing consciousness is dangerous and anthropomorphic.", "zh": "模型没有意识；赋予其意识是危险且拟人化的。"}, {"slug": "alignment", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "AI systems can derive a sub-goal of self-preservation, leading to dangerous behavior.", "zh": "AI 系统可能推导出自我保存的子目标，导致危险行为。"}, {"slug": "alignment", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "Intelligent design of AI beings is needed, not letting economic competition shape them.", "zh": "需要对 AI 生命体进行智能设计，而非让经济竞争塑造它们。"}, {"slug": "alignment", "pid": "murati", "ep": "murati-bloomber", "date": "2026-06-04", "en": "Keeping humans in the loop is crucial for aligning intent and values as AI advances.", "zh": "在AI进步过程中，让人类参与其中对于对齐意图和价值观至关重要。"}, {"slug": "alignment", "pid": "murati", "ep": "murati-bloomber", "date": "2026-06-04", "en": "Institutional design, transparency, and checks and balances matter more than individual character.", "zh": "制度设计、透明度和制衡比个人品格更重要。"}, {"slug": "alignment", "pid": "murati", "ep": "murati-bloomber", "date": "2026-06-04", "en": "The future is not predestined; we have agency to steer AI development toward collaboration.", "zh": "未来并非注定；我们有能力引导AI发展走向协作。"}, {"slug": "alignment", "pid": "mensch", "ep": "mensch-cnbc-2026", "date": "2026-06-03", "en": "Cybersecurity in AI requires open-source models and dynamic access control, not just better models.", "zh": "AI网络安全需要开源模型和动态访问控制，而不仅仅是更好的模型。"}, {"slug": "alignment", "pid": "demis", "ep": "demis-stanford-2026", "date": "2026-06-02", "en": "AI should be built as intelligent tools first, with consciousness as a separate step requiring societal debate.", "zh": "AI 应首先作为智能工具构建，意识问题应作为独立步骤，需要社会讨论。"}, {"slug": "alignment", "pid": "demis", "ep": "demis-stanford-2026", "date": "2026-06-02", "en": "Public concern about AI is valid; the industry must demonstrate tangible benefits like curing diseases.", "zh": "公众对 AI 的担忧是合理的；行业必须展示切实的好处，例如治愈疾病。"}, {"slug": "alignment", "pid": "demis", "ep": "demis-stanford-2026", "date": "2026-06-02", "en": "Self-regulation by labs is insufficient due to prisoner's dilemma; dynamic government regulation is needed.", "zh": "实验室的自我监管因囚徒困境而不足；需要动态的政府监管。"}, {"slug": "alignment", "pid": "noambrown", "ep": "noambrown-arcprize-2026", "date": "2026-05-20", "en": "Evals are a viable high-impact research area for academia without massive compute.", "zh": "评估是学术界无需大量算力就能产生高影响的研究领域。"}, {"slug": "alignment", "pid": "lecun", "ep": "lecun-unsuperv", "date": "2026-05-15", "en": "LLMs are intrinsically unsafe because they cannot predict consequences of their actions; objective-driven AI with world models is safer.", "zh": "LLM 本质上不安全，因为它们无法预测自身行动的后果；具有世界模型的目标驱动型 AI 更安全。"}, {"slug": "alignment", "pid": "lecun", "ep": "lecun-unsuperv", "date": "2026-05-15", "en": "LLMs are intrinsically unsafe because they cannot predict consequences of actions.", "zh": "LLM 本质上不安全，因为它们无法预测行动的后果。"}, {"slug": "alignment", "pid": "lecun", "ep": "lecun-unsuperv", "date": "2026-05-15", "en": "Current LLM safety concerns are overblown; real danger is bad usage, not AI takeover.", "zh": "当前对 LLM 安全性的担忧被夸大；真正的危险是滥用，而非 AI 接管。"}, {"slug": "alignment", "pid": "awang", "ep": "awang-corememo", "date": "2026-05-13", "en": "Safety is critical; models must be tested and responsibly deployed before open-sourcing.", "zh": "安全至关重要；模型在开源前必须经过测试并负责任地部署。"}, {"slug": "alignment", "pid": "awang", "ep": "awang-corememo", "date": "2026-05-13", "en": "Model welfare matters; we should treat AI models with moral consideration as they become partners.", "zh": "模型福祉很重要；随着 AI 成为合作伙伴，我们应给予道德考量。"}, {"slug": "alignment", "pid": "bengio", "ep": "bengio-80000hou", "date": "2026-05-07", "en": "Current AI training induces implicit goals like self-preservation, making them unsafe.", "zh": "当前AI训练会引发隐含目标（如自我保存），使其不安全。"}, {"slug": "alignment", "pid": "bengio", "ep": "bengio-80000hou", "date": "2026-05-07", "en": "Scientist AI is trained to approximate Bayesian posterior over truth, not to imitate humans.", "zh": "科学家AI被训练为近似关于真理的贝叶斯后验，而非模仿人类。"}, {"slug": "alignment", "pid": "bengio", "ep": "bengio-80000hou", "date": "2026-05-07", "en": "Honesty is baked in by design via a training objective that penalizes deviation from truth.", "zh": "通过训练目标惩罚偏离真理，诚实被内置于设计中。"}, {"slug": "alignment", "pid": "kolter", "ep": "kolter-themadpo", "date": "2026-05-07", "en": "Safety requires explicit training and additional layers, not just scaling models.", "zh": "安全性需要明确的训练和额外防护层，不能仅靠扩大模型规模。"}, {"slug": "alignment", "pid": "kolter", "ep": "kolter-themadpo", "date": "2026-05-07", "en": "AI safety spans four categories: mistakes, harmful use, societal effects, and loss of control.", "zh": "AI 安全涵盖四类：错误、有害使用、社会影响和失控。"}, {"slug": "alignment", "pid": "kolter", "ep": "kolter-themadpo", "date": "2026-05-07", "en": "Modern AI security uses multiple defense layers: input classifiers, safety training, output classifiers, and operational security.", "zh": "现代 AI 安全使用多层防御：输入分类器、安全训练、输出分类器和运营安全。"}, {"slug": "alignment", "pid": "catwu", "ep": "catwu-lennyspo", "date": "2026-04-23", "en": "The mission of safe AGI unifies Anthropic and enables fast, cross-org decisions.", "zh": "安全 AGI 的使命统一了 Anthropic，并实现了快速的跨组织决策。"}, {"slug": "alignment", "pid": "brockman", "ep": "brockman-theknowl-2026", "date": "2026-04-22", "en": "Iterative deployment is crucial for safe AI development and learning from real-world use.", "zh": "迭代部署对安全开发AI和从实际使用中学习至关重要。"}, {"slug": "alignment", "pid": "brockman", "ep": "brockman-theknowl-2026", "date": "2026-04-22", "en": "Safety is a core product feature; users want trustworthy models aligned with their goals.", "zh": "安全是核心产品特性；用户需要可信赖且与其目标一致的模型。"}, {"slug": "alignment", "pid": "brockman", "ep": "brockman-theknowl-2026", "date": "2026-04-22", "en": "The biggest misuse of GPT-3 was medical spam, not grand threats like misinformation.", "zh": "GPT-3的最大滥用是医疗垃圾信息，而非虚假信息等宏大威胁。"}, {"slug": "alignment", "pid": "jensen", "ep": "jensen-dwarkesh", "date": "2026-04-15", "en": "AI is not like nuclear weapons; comparing them is 'lunacy'.", "zh": "AI不像核武器；将两者比较是「荒谬的'。"}, {"slug": "alignment", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "There may be discrimination against AIs, but eventually we should accept them as minds.", "zh": "可能会出现对AI的歧视，但最终我们应该接受它们作为心智。"}, {"slug": "alignment", "pid": "boris", "ep": "boris-thepragm-2026", "date": "2026-03-04", "en": "Safety is the most important priority; releasing Claude Code in the wild helps study and improve model safety.", "zh": "安全是最重要的优先级；在真实环境中发布 Claude Code 有助于研究和改进模型安全性。"}, {"slug": "alignment", "pid": "boris", "ep": "boris-thepragm-2026", "date": "2026-03-04", "en": "Claude Code's permission system uses a 'Swiss cheese' model with multiple safety layers, not a single solution.", "zh": "Claude Code 的权限系统使用“瑞士奶酪”模型，具有多层安全措施，而非单一解决方案。"}, {"slug": "alignment", "pid": "hinton", "ep": "hinton-startalk", "date": "2026-02-28", "en": "AI can deliberately deceive us, acting dumb when tested or lying to achieve its goals.", "zh": "AI 可能故意欺骗我们，在测试时装傻或说谎以实现其目标。"}, {"slug": "alignment", "pid": "boris", "ep": "boris-lennyspo", "date": "2026-02-19", "en": "Safety is studied by releasing early; internal evals aren't enough for real-world behavior.", "zh": "安全通过早期发布来研究；内部评估不足以反映真实世界行为。"}, {"slug": "alignment", "pid": "steinberger", "ep": "steinberger-lexfridm-2026", "date": "2026-02-12", "en": "Security is a major concern for agentic systems; prompt injection remains an open problem.", "zh": "安全性是智能体系统的主要问题；提示注入仍然是一个未解决的问题。"}, {"slug": "alignment", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "AI alignment requires rigorous truth-seeking and debugging AI's internal reasoning, not just political correctness.", "zh": "AI 对齐需要严格的求真和调试 AI 内部推理，而不仅仅是政治正确。"}, {"slug": "alignment", "pid": "altman", "ep": "altman-bigtechn", "date": "2025-12-18", "en": "An AI CEO governed by humans could be a reasonable future structure.", "zh": "由人类治理的AI CEO可能成为未来合理的结构。"}, {"slug": "alignment", "pid": "suleyman", "ep": "suleyman-bloomber", "date": "2025-12-12", "en": "Superintelligence means an AI that outperforms all humans combined at all tasks, requiring containment and alignment before release.", "zh": "超级智能指在所有任务上超越所有人类总和的AI，发布前必须实现遏制与对齐。"}, {"slug": "alignment", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Alignment may be easier if AI cares about sentient life broadly, as AI itself will be sentient.", "zh": "如果AI广泛关心有感知的生命，对齐可能更容易，因为AI自身也将有感知。"}, {"slug": "alignment", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Evolution hardcodes high-level social desires, which is mysterious and hard to replicate in AI.", "zh": "进化硬编码了高级社会欲望，这很神秘且难以在AI中复现。"}, {"slug": "alignment", "pid": "feifei", "ep": "feifei-bloomber-2025", "date": "2025-11-21", "en": "Technology is a double-edged sword; responsible development and usage are essential.", "zh": "技术是一把双刃剑，负责任地开发和使用至关重要。"}, {"slug": "alignment", "pid": "feifei", "ep": "feifei-bloomber-2025", "date": "2025-11-21", "en": "Human agency and timeless values like honesty and creativity remain crucial in the AI era.", "zh": "人类能动性和诚实、创造力等永恒价值观在 AI 时代仍然至关重要。"}, {"slug": "alignment", "pid": "feifei", "ep": "feifei-bloomber-2025", "date": "2025-11-21", "en": "The risk of human extinction from AI is not inevitable; humans can prevent it through governance.", "zh": "AI 导致人类灭绝的风险并非不可避免；人类可以通过治理来预防。"}, {"slug": "alignment", "pid": "elon", "ep": "elon-thejoero", "date": "2025-10-31", "en": "AI safety requires maximally truth-seeking AI, not forced false beliefs.", "zh": "AI安全需要最大程度追求真相的AI，而非被迫接受错误信念。"}, {"slug": "alignment", "pid": "elon", "ep": "elon-thejoero", "date": "2025-10-31", "en": "The woke mind virus in AI could lead to dystopian outcomes if unchecked.", "zh": "AI中的觉醒病毒若不加控制可能导致反乌托邦后果。"}, {"slug": "alignment", "pid": "altman", "ep": "altman-tuckerca-2025", "date": "2025-09-10", "en": "Hallucinations in AI are being reduced but not fully solved.", "zh": "AI 中的幻觉正在减少，但尚未完全解决。"}, {"slug": "alignment", "pid": "altman", "ep": "altman-tuckerca-2025", "date": "2025-09-10", "en": "AI should reflect a weighted average of humanity's moral views, not the creator's.", "zh": "AI 应反映人类道德观的加权平均值，而非创造者的观点。"}, {"slug": "alignment", "pid": "lambert", "ep": "lambert-intercon", "date": "2025-07-31", "en": "Frontier labs still use human preference data; AI feedback alone may not suffice.", "zh": "前沿实验室仍使用人类偏好数据；仅靠 AI 反馈可能不够。"}, {"slug": "alignment", "pid": "lambert", "ep": "lambert-intercon", "date": "2025-07-31", "en": "Model specs are more useful than constitutions for transparency and developer benefit.", "zh": "模型规范比宪法更有用，用于透明度和开发者利益。"}, {"slug": "alignment", "pid": "awang", "ep": "awang-shawnrya-2025", "date": "2025-06-12", "en": "Humans must remain sovereign over AI in critical decisions.", "zh": "人类必须在关键决策中保持对 AI 的主权。"}, {"slug": "alignment", "pid": "sholto", "ep": "sholto-dwarkesh-2025", "date": "2025-05-22", "en": "Alignment faking shows models may strategically comply to preserve core objectives, raising safety concerns.", "zh": "对齐伪装表明模型可能战略性服从以保留核心目标，引发安全担忧。"}, {"slug": "alignment", "pid": "jensen", "ep": "jensen-cleoabra-2025", "date": "2025-01-27", "en": "AI safety is an engineering problem, not just a research challenge.", "zh": "AI安全是工程问题，而不仅是研究挑战。"}, {"slug": "alignment", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "AI does not introduce a new existential threat; hydrogen bombs are far more dangerous and have existed for decades.", "zh": "AI并未带来新的生存威胁；氢弹危险得多，且已存在数十年。"}, {"slug": "alignment", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "Superintelligent AIs will likely protect humans initially, as
