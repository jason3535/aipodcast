ntier models are not as diverse as expected; they show intra- and inter-model homogeneity.", "zh": "前沿模型并不像预期那样多样化；它们表现出模型内和模型间的同质性。"}, {"slug": "scaling", "pid": "tworek", "ep": "tworek-unsuperv-2026", "date": "2026-01-29", "en": "Scaling pre-training and RL predictably improves models, but generalization beyond training data remains limited.", "zh": "Scaling（规模扩张）预训练和强化学习可预测地提升模型，但超出训练数据的泛化仍然有限。"}, {"slug": "scaling", "pid": "tworek", "ep": "tworek-unsuperv-2026", "date": "2026-01-29", "en": "Data-driven improvement leads to specialization, but research breakthroughs can improve all domains at once.", "zh": "数据驱动的改进导致专业化，但研究突破可以同时提升所有领域。"}, {"slug": "scaling", "pid": "demis", "ep": "demis-bigtechn-2026", "date": "2026-01-23", "en": "Scaling existing techniques alone may not achieve AGI; new breakthroughs are needed.", "zh": "仅靠 Scaling 现有技术可能无法实现 AGI；需要新的突破。"}, {"slug": "scaling", "pid": "mensch", "ep": "mensch-bigtechn", "date": "2026-01-16", "en": "Pre-training is hitting a saturation wall; further gains come from domain-specific fine-tuning.", "zh": "预训练正触及饱和墙；进一步收益来自领域特定微调。"}, {"slug": "scaling", "pid": "hafner", "ep": "hafner-buzzrobo-2026", "date": "2026-01-15", "en": "Video pre-training offers higher scaling ceiling than text for world understanding.", "zh": "视频预训练在理解世界方面比文本有更高的扩展上限。"}, {"slug": "scaling", "pid": "hafner", "ep": "hafner-buzzrobo-2026", "date": "2026-01-15", "en": "Scaling video models has a much higher ceiling than text models due to information density.", "zh": "由于信息密度，视频模型的扩展上限远高于文本模型。"}, {"slug": "scaling", "pid": "springenberg", "ep": "springenberg-training-2026", "date": "2026-01-06", "en": "Diverse data is key to generalization in robotics foundation models.", "zh": "多样化数据是机器人基础模型泛化能力的关键。"}, {"slug": "scaling", "pid": "springenberg", "ep": "springenberg-training-2026", "date": "2026-01-06", "en": "Deployment enables a data flywheel: more deployment yields more data, which improves models.", "zh": "部署带来数据飞轮：更多部署产生更多数据，从而改进模型。"}, {"slug": "scaling", "pid": "springenberg", "ep": "springenberg-training-2026", "date": "2026-01-06", "en": "Sim-to-real transfer works for locomotion but not for manipulation due to world complexity.", "zh": "由于世界的复杂性，仿真到现实的迁移适用于运动控制，但不适用于操作任务。"}, {"slug": "scaling", "pid": "demis", "ep": "demis-googlede-2025", "date": "2025-12-16", "en": "Both scaling and innovation are needed to reach AGI; 50% effort on each.", "zh": "Scaling（规模扩张）和创新对于实现 AGI（通用人工智能）都不可或缺，各需投入 50%的努力。"}, {"slug": "scaling", "pid": "shanelegg", "ep": "shanelegg-googlede-2025", "date": "2025-12-11", "en": "Current AI shows uneven capabilities: superhuman in language and knowledge, but weak in reasoning and continual learning.", "zh": "当前 AI 能力不均衡：在语言和知识上超人类，但在推理和持续学习上薄弱。"}, {"slug": "scaling", "pid": "feifei", "ep": "feifei-thetimfe-2025", "date": "2025-12-09", "en": "ImageNet was pivotal in modern AI by providing large-scale data for training, alongside GPUs and neural networks.", "zh": "ImageNet 通过提供大规模训练数据，与 GPU 和神经网络一起，成为现代 AI 的关键转折点。"}, {"slug": "scaling", "pid": "jumper", "ep": "jumper-googlede-2025", "date": "2025-11-28", "en": "AlphaFold's success came from lack of compute, not abundance.", "zh": "AlphaFold 的成功源于算力不足，而非充裕。"}, {"slug": "scaling", "pid": "andrewng", "ep": "andrewng-masterso-2025", "date": "2025-11-26", "en": "Energy capacity, not just compute, is a major bottleneck for AI scaling.", "zh": "能源容量，而不仅仅是算力，是 AI 规模扩张的主要瓶颈。"}, {"slug": "scaling", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "AI progress follows a smooth exponential increase, not a slowdown.", "zh": "AI 进展遵循平稳的指数增长，而非放缓。"}, {"slug": "scaling", "pid": "feifei", "ep": "feifei-latentsp", "date": "2025-11-25", "en": "Academia should focus on wacky ideas and long-range research, not competing with industry on scale.", "zh": "学术界应专注于疯狂想法和长期研究，而非与工业界比拼规模。"}, {"slug": "scaling", "pid": "feifei", "ep": "feifei-latentsp", "date": "2025-11-25", "en": "Current deep learning fits patterns but lacks causal understanding of physics like gravity.", "zh": "当前深度学习拟合模式，但缺乏对重力等物理的因果理解。"}, {"slug": "scaling", "pid": "justinjohnson", "ep": "justinjohnson-latentsp-2025", "date": "2025-11-25", "en": "The history of deep learning is the history of scaling up compute.", "zh": "深度学习的历史就是 Scaling（规模扩张）算力的历史。"}, {"slug": "scaling", "pid": "justinjohnson", "ep": "justinjohnson-latentsp-2025", "date": "2025-11-25", "en": "Academia should focus on wacky ideas and new algorithms, not just scaling models.", "zh": "学术界应专注于疯狂的想法和新算法，而不仅仅是 Scaling（规模扩张）模型。"}, {"slug": "scaling", "pid": "justinjohnson", "ep": "justinjohnson-latentsp-2025", "date": "2025-11-25", "en": "GPU scaling is hitting limits; future hardware may require radically different neural architectures.", "zh": "GPU Scaling（规模扩张）正触及极限；未来硬件可能需要截然不同的神经网络架构。"}, {"slug": "scaling", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Pre-training scaling laws are finite; we are returning to an era of research where ideas matter more than brute compute.", "zh": "预训练的缩放定律是有限的；我们正回归研究时代，想法比蛮力算力更重要。"}, {"slug": "scaling", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "We are back in the age of research, not scaling; compute is now large enough.", "zh": "我们回到了研究时代，而非 Scaling 时代；算力现在已经足够大。"}, {"slug": "scaling", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Pre-training's uniform improvement across tasks may mislead about generalization.", "zh": "预训练在任务上的均匀改进可能误导了对泛化的理解。"}, {"slug": "scaling", "pid": "llion", "ep": "llion-machinel-2025", "date": "2025-11-23", "en": "Scaling laws and brute force can mask fundamental architectural flaws, such as poor representation of structure.", "zh": "缩放定律和蛮力可以掩盖根本性的架构缺陷，例如对结构的糟糕表示。"}, {"slug": "scaling", "pid": "kendall", "ep": "kendall-training-2025", "date": "2025-11-18", "en": "Partnering with OEMs allows scalable deployment without retrofitting hardware.", "zh": "与 OEM 合作可在不改装硬件的情况下实现规模化部署。"}, {"slug": "scaling", "pid": "kendall", "ep": "kendall-training-2025", "date": "2025-11-18", "en": "Data efficiency through curriculum learning and synthetic data is critical for cost and speed.", "zh": "通过课程学习和合成数据实现数据效率对成本和速度至关重要。"}, {"slug": "scaling", "pid": "kendall", "ep": "kendall-training-2025", "date": "2025-11-18", "en": "Autonomous driving is solved by scaling current approaches, not requiring new breakthroughs.", "zh": "自动驾驶通过扩展当前方法即可解决，无需新突破。"}, {"slug": "scaling", "pid": "dsilver", "ep": "dsilver-publicle-2025", "date": "2025-11-14", "en": "Human data is like fossil fuels—finite and already largely consumed; experience is renewable and limitless.", "zh": "人类数据就像化石燃料——有限且已被大量消耗；经验是可再生的，取之不尽。"}, {"slug": "scaling", "pid": "dsilver", "ep": "dsilver-publicle-2025", "date": "2025-11-14", "en": "LLMs cannot discover new knowledge beyond human data; they are a shallow solution to AI.", "zh": "LLM 无法发现人类数据之外的新知识；它们是 AI 的浅层解决方案。"}, {"slug": "scaling", "pid": "dsilver", "ep": "dsilver-publicle-2025", "date": "2025-11-14", "en": "The era of human data is ending; we must pay the cost of interaction to progress further.", "zh": "人类数据时代正在结束；我们必须付出交互成本才能进一步进步。"}, {"slug": "scaling", "pid": "jasonwei", "ep": "jasonwei-stanford-2025", "date": "2025-10-18", "en": "AI progress is jagged; different tasks improve at different rates.", "zh": "AI 进步是参差不齐的；不同任务以不同速度提升。"}, {"slug": "scaling", "pid": "jasonwei", "ep": "jasonwei-stanford-2025", "date": "2025-10-18", "en": "Digital tasks with abundant data see fastest AI improvement.", "zh": "数据丰富的数字任务中 AI 进步最快。"}, {"slug": "scaling", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "Synthetic data from LLMs is collapsed and lacks entropy; training on it leads to model collapse, unlike human diversity.", "zh": "LLM 生成的合成数据坍缩且缺乏熵；在其上训练导致模型坍缩，不像人类具有多样性。"}, {"slug": "scaling", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "Model collapse from synthetic data is a fundamental problem; entropy is needed.", "zh": "合成数据导致的模型崩溃是一个根本性问题；需要熵。"}, {"slug": "scaling", "pid": "tworek", "ep": "tworek-themadpo-2025", "date": "2025-10-16", "en": "Scaling reinforcement learning is harder than scaling pre-training due to more moving parts and failure modes.", "zh": "扩展强化学习比扩展预训练更难，因为涉及更多活动部件和故障模式。"}, {"slug": "scaling", "pid": "sutton", "ep": "sutton-dwarkesh", "date": "2025-09-26", "en": "Scaling large language models is not the bitter lesson; true scaling comes from learning from experience.", "zh": "扩展大型语言模型并非苦涩教训；真正的扩展来自从经验中学习。"}, {"slug": "scaling", "pid": "aravind", "ep": "aravind-siliconv-2025", "date": "2025-09-26", "en": "1% daily improvement compounds to 3700% yearly growth.", "zh": "每天 1%的改进，一年后累积增长 3700%。"}, {"slug": "scaling", "pid": "nanda", "ep": "nanda-80000hou-2025", "date": "2025-09-15", "en": "Use LLMs as tools to lower barriers to entry; iterate with prompts and context.", "zh": "将大语言模型作为降低入门门槛的工具；通过提示和上下文迭代。"}, {"slug": "scaling", "pid": "markchen", "ep": "markchen-corememo-2025", "date": "2025-09-01", "en": "Pre-training is a key muscle to rebuild; scaling laws are not dead and there is much room left.", "zh": "预训练是需要重建的关键能力；缩放定律并未失效，仍有很大空间。"}, {"slug": "scaling", "pid": "jackph", "ep": "jackph-thetwiml-2025", "date": "2025-08-19", "en": "Genie 3 achieves real-time interactive world generation with 100x improvement across resolution, duration, and speed.", "zh": "Genie 3 实现了实时交互式世界生成，在分辨率、持续时间和速度上提升了 100 倍。"}, {"slug": "scaling", "pid": "jackph", "ep": "jackph-thetwiml-2025", "date": "2025-08-19", "en": "Consistency in Genie 3 emerges from scaling data and model capacity without explicit world representation.", "zh": "Genie 3 的一致性来自数据和模型规模的扩展，无需显式世界表示。"}, {"slug": "scaling", "pid": "tombrown", "ep": "tombrown-ycombina-2025", "date": "2025-08-19", "en": "Scaling laws show intelligence increases reliably with more compute, a key insight for AI progress.", "zh": "缩放定律表明，随着算力增加，智能会可靠提升，这是 AI 进展的关键洞见。"}, {"slug": "scaling", "pid": "tombrown", "ep": "tombrown-ycombina-2025", "date": "2025-08-19", "en": "Humanity is on track for the largest infrastructure buildout ever, with compute spending tripling yearly.", "zh": "人类正经历史上最大的基础设施建设，算力支出每年翻三倍。"}, {"slug": "scaling", "pid": "tombrown", "ep": "tombrown-ycombina-2025", "date": "2025-08-19", "en": "Power, not chips, is the biggest bottleneck for AI infrastructure, especially in the US.", "zh": "电力而非芯片是 AI 基础设施的最大瓶颈，尤其是在美国。"}, {"slug": "scaling", "pid": "hendrycks", "ep": "hendrycks-machinel-2025", "date": "2025-08-13", "en": "Scaling laws lead to emergent capabilities that create new failure modes.", "zh": "缩放定律导致涌现能力，从而产生新的失败模式。"}, {"slug": "scaling", "pid": "pachocki", "ep": "pachocki-beforeag-2025", "date": "2025-07-31", "en": "Scaling reasoning models will accelerate AI progress in coming years.", "zh": "扩展推理模型将在未来几年加速 AI 进步。"}, {"slug": "scaling", "pid": "pachocki", "ep": "pachocki-beforeag-2025", "date": "2025-07-31", "en": "Measuring AI capabilities is becoming a bottleneck; benchmarks lag behind.", "zh": "衡量 AI 能力正成为瓶颈；基准测试落后于实际能力。"}, {"slug": "scaling", "pid": "jumper", "ep": "jumper-agentsof-2025", "date": "2025-07-30", "en": "The Protein Data Bank's high-quality curated data was essential for training AlphaFold.", "zh": "蛋白质数据库的高质量精选数据对训练 AlphaFold 至关重要。"}, {"slug": "scaling", "pid": "jumper", "ep": "jumper-agentsof-2025", "date": "2025-07-30", "en": "Future AI in biology needs new curated datasets like the PDB for other modalities.", "zh": "生物学未来的 AI 需要像 PDB 那样为其他模态策划的新数据集。"}, {"slug": "scaling", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "Scaling compute in pre-training and RL predictably improves AI performance.", "zh": "在预训练和强化学习中扩展算力可预测地提升 AI 性能。"}, {"slug": "scaling", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "AI task horizon doubles roughly every 7 months, enabling longer tasks.", "zh": "AI 任务时间跨度大约每 7 个月翻倍，使更长任务成为可能。"}, {"slug": "scaling", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "Scaling laws have held over five orders of magnitude, suggesting continued progress.", "zh": "缩放定律已在五个数量级上成立，表明进步将持续。"}, {"slug": "scaling", "pid": "finn", "ep": "finn-ycombina-2025", "date": "2025-07-22", "en": "Scale is necessary but not sufficient for generalist robot models; diverse data is key.", "zh": "规模是通用机器人模型的必要条件，但非充分条件；数据的多样性才是关键。"}, {"slug": "scaling", "pid": "finn", "ep": "finn-ycombina-2025", "date": "2025-07-22", "en": "Diverse data enables robots to succeed in unseen environments, closing the generalization gap.", "zh": "多样化数据使机器人能在未见环境中成功，缩小泛化差距。"}, {"slug": "scaling", "pid": "finn", "ep": "finn-ycombina-2025", "date": "2025-07-22", "en": "Massive scale from industrial automation or YouTube lacks diversity needed for generalist robots.", "zh": "来自工业自动化或 YouTube 的大规模数据缺乏通用机器人所需的多样性。"}, {"slug": "scaling", "pid": "benmann", "ep": "benmann-lennyspo-2025", "date": "2025-07-20", "en": "Scaling laws continue to hold; progress is accelerating with more frequent model releases.", "zh": "缩放定律持续成立；随着模型发布频率加快，进步正在加速。"}, {"slug": "scaling", "pid": "benmann", "ep": "benmann-lennyspo-2025", "date": "2025-07-20", "en": "AI progress is not slowing; it's accelerating due to post-training improvements and faster releases.", "zh": "AI 进步并未放缓；由于后训练改进和更快的发布，实际上正在加速。"}, {"slug": "scaling", "pid": "laskin", "ep": "laskin-themadpo-2025", "date": "2025-07-01", "en": "The bitter lesson is about scaling with compute and search, not about generalization.", "zh": "苦涩的教训是关于用算力和搜索进行扩展，而非关于泛化。"}, {"slug": "scaling", "pid": "lample", "ep": "lample-latentsp-2025", "date": "2025-07-01", "en": "Pre-training scaling is far from saturated; significant gains are still possible.", "zh": "预训练 Scaling（规模扩张）远未饱和，仍有显著提升空间。"}, {"slug": "scaling", "pid": "sholto", "ep": "sholto-dwarkesh-2025", "date": "2025-05-22", "en": "DeepSeek's success is due to efficient engineering and hardware-aware design, not algorithmic novelty.", "zh": "DeepSeek 的成功归功于高效的工程和硬件感知设计，而非算法创新。"}, {"slug": "scaling", "pid": "parada", "ep": "parada-googlede-2025", "date": "2025-05-22", "en": "Sim-to-real gap persists but is reduced for many tasks.", "zh": "模拟到现实的差距仍然存在，但许多任务已缩小。"}, {"slug": "scaling", "pid": "bricken", "ep": "bricken-dwarkesh-2025", "date": "2025-05-22", "en": "Scaling RL compute will unlock new capabilities, similar to how pre-training scaling improved generalization.", "zh": "扩大强化学习算力将解锁新能力，类似于预训练 Scaling（规模扩张）提升了泛化能力。"}, {"slug": "scaling", "pid": "thomaswolf", "ep": "thomaswolf-training-2025", "date": "2025-05-01", "en": "Data diversity is the main bottleneck in robotics; sharing datasets across the community can solve generalization issues.", "zh": "数据多样性是机器人技术的主要瓶颈；跨社区共享数据集可以解决泛化问题。"}, {"slug": "scaling", "pid": "jaderberg", "ep": "jaderberg-training-2025", "date": "2025-04-29", "en": "Biology is not data-constrained; historical data exists but wasn't created for ML.", "zh": "生物学并不受数据限制；历史数据存在，但并非为机器学习而创建。"}, {"slug": "scaling", "pid": "jaderberg", "ep": "jaderberg-training-2025", "date": "2025-04-29", "en": "Synthetic data from physics simulations is a massive opportunity for chemistry.", "zh": "来自物理模拟的合成数据为化学领域提供了巨大机遇。"}, {"slug": "scaling", "pid": "shazeer", "ep": "shazeer-unsuperv-2025", "date": "2025-03-17", "en": "Test-time compute scaling will drive major progress, but won't alone achieve AGI.", "zh": "测试时算力扩展将推动重大进展，但仅靠它无法实现 AGI。"}, {"slug": "scaling", "pid": "shazeer", "ep": "shazeer-unsuperv-2025", "date": "2025-03-17", "en": "The speed of AI research adoption has dramatically accelerated in recent years.", "zh": "AI 研究的采纳速度近年来显著加快。"}, {"slug": "scaling", "pid": "shazeer", "ep": "shazeer-dwarkesh-2025", "date": "2025-02-12", "en": "Models improve generation over generation, driven by algorithmic advances as much as hardware scaling.", "zh": "模型代际提升主要由算法进步驱动，与硬件 Scaling 同等重要。"}, {"slug": "scaling", "pid": "karina", "ep": "karina-lennyspo-2025", "date": "2025-02-09", "en": "Synthetic data enables infinite task generation for post-training, overcoming the data wall in pre-training.", "zh": "合成数据为后训练生成无限任务，克服了预训练中的数据墙。"}, {"slug": "scaling", "pid": "karina", "ep": "karina-lennyspo-2025", "date": "2025-02-09", "en": "Models are not running out of data; post-training scaling via RL offers infinite tasks.", "zh": "模型并未耗尽数据；通过强化学习的后训练扩展提供了无限任务。"}, {"slug": "scaling", "pid": "antonoglou", "ep": "antonoglou-training-2025", "date": "2025-01-28", "en": "Scaling and planning are key principles from AlphaGo to modern AI agents.", "zh": "Scaling（规模扩张）和规划是从 AlphaGo 到现代 AI 智能体的关键原则。"}, {"slug": "scaling", "pid": "antonoglou", "ep": "antonoglou-training-2025", "date": "2025-01-28", "en": "Synthetic data is essential to overcome the data wall, but requires careful methods.", "zh": "合成数据对于克服数据墙至关重要，但需要谨慎的方法。"}, {"slug": "scaling", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "Modern AI breakthroughs are based on algorithms invented in the previous millennium, but needed hardware scaling to become practical.", "zh": "现代 AI 突破基于前一个千年发明的算法，但需要硬件规模扩张才能实用。"}, {"slug": "scaling", "pid": "christiano", "ep": "christiano-80000hou-2025", "date": "2025-01-04", "en": "Compute scaling has been a major driver of AI progress, but its future impact is uncertain.", "zh": "算力扩展是 AI 进步的主要驱动力，但其未来影响不确定。"}, {"slug": "scaling", "pid": "oriol", "ep": "oriol-googlede-2024", "date": "2024-12-12", "en": "Scaling pre-training shows diminishing returns; further progress needs algorithmic innovation, not just bigger models.", "zh": "预训练的 Scaling（规模扩张）收益递减；进一步突破需要算法创新，而不仅仅是更大的模型。"}, {"slug": "scaling", "pid": "oriol", "ep": "oriol-googlede-2024", "date": "2024-12-12", "en": "Scaling laws are not dead; they just require exponentially more compute for the same improvement, creating pressure for innovation.", "zh": "缩放定律并未失效，只是需要指数级更多的算力才能获得相同的改进，这给创新带来了压力。"}, {"slug": "scaling", "pid": "kohli", "ep": "kohli-googlede-2024", "date": "2024-10-09", "en": "DeepMind avoids problems solvable by top universities, focusing on those requiring scale.", "zh": "DeepMind 避免顶尖大学可解决的问题，专注于需要规模的问题。"}, {"slug": "scaling", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Scaling laws predict predictable progress in AI by increasing compute and data.", "zh": "缩放定律预测通过增加算力和数据可实现 AI 的可预测进步。"}, {"slug": "scaling", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Test-time compute scaling may surpass pre-training scaling as the next major AI progress driver.", "zh": "测试时算力扩展可能超越预训练扩展，成为下一个主要的 AI 进步驱动力。"}, {"slug": "scaling", "pid": "tridao", "ep": "tridao-unsuperv-2024", "date": "2024-10-01", "en": "Data quality and synthetic data generation are underhyped but crucial for model improvement.", "zh": "数据质量和合成数据生成被低估，但对模型改进至关重要。"}, {"slug": "scaling", "pid": "tridao", "ep": "tridao-unsuperv-2024", "date": "2024-10-01", "en": "Models are surprisingly good at acting as humans for synthetic data generation, e.g., angry New Yorkers.", "zh": "模型在合成数据生成中扮演人类角色时出奇地好，例如扮演愤怒的纽约人。"}, {"slug": "scaling", "pid": "karpathy", "ep": "karpathy-nopriors", "date": "2024-09-05", "en": "Synthetic data is the future, but maintaining entropy is critical to avoid silent model collapse.", "zh": "合成数据是未来，但保持熵至关重要，以避免模型无声崩溃。"}, {"slug": "scaling", "pid": "kolter", "ep": "kolter-20vc", "date": "2024-09-04", "en": "Data shortage is not imminent; we have vast untapped multimodal data.", "zh": "数据短缺并非迫在眉睫；我们还有大量未利用的多模态数据。"}, {"slug": "scaling", "pid": "kolter", "ep": "kolter-20vc", "date": "2024-09-04", "en": "Larger models still improve performance even on fixed datasets.", "zh": "即使在固定数据集上，更大的模型仍能提升性能。"}, {"slug": "scaling", "pid": "kolter", "ep": "kolter-20vc", "date": "2024-09-04", "en": "Data curation is overrated; raw internet data suffices for training.", "zh": "数据整理被高估了；原始互联网数据足以用于训练。"}, {"slug": "scaling", "pid": "sutton", "ep": "sutton-edanmeye", "date": "2024-01-08", "en": "Scaling is easy; finding methods that scale is the hard part.", "zh": "Scaling（规模扩张）很容易；找到能扩展的方法才是难点。"}, {"slug": "scaling", "pid": "percyliang", "ep": "percyliang-imbue-2023", "date": "2023-11-01", "en": "Academia should focus on novel ideas and societal impact, not just scaling models.", "zh": "学术界应专注于新颖想法和社会影响，而不仅仅是扩大模型规模。"}, {"slug": "scaling", "pid": "olah", "ep": "olah-80000hou-2023", "date": "2023-10-31", "en": "Scaling interpretability is challenging but possible via motifs, equivariance, and hierarchical analysis.", "zh": "扩展可解释性具有挑战性，但通过基序、等变性和层次分析是可能的。"}, {"slug": "scaling", "pid": "jimfan", "ep": "jimfan-outsetca-2023", "date": "2023-10-20", "en": "The internet is running out of high-quality tokens for pre-training, but embodied worlds provide infinite data.", "zh": "互联网的高质量 token 即将耗尽，但具身世界提供无限数据。"}, {"slug": "scaling", "pid": "malik", "ep": "malik-therobot-2023", "date": "2023-08-16", "en": "Simulation is key for robotics progress, riding Moore's Law and enabling iterative improvement.", "zh": "模拟是机器人学进步的关键，借助摩尔定律并实现迭代改进。"}, {"slug": "scaling", "pid": "malik", "ep": "malik-therobot-2023", "date": "2023-08-16", "en": "AI research benefits from both small science (exploration) and big science (exploitation), complementing each other.", "zh": "AI 研究受益于小科学（探索）和大科学（利用），两者互补。"}, {"slug": "scaling", "pid": "malik", "ep": "malik-therobot-2023", "date": "2023-08-16", "en": "Benchmarking in vision was initially resisted but became essential for scientific progress.", "zh": "视觉中的基准测试最初遭到抵制，但后来成为科学进步的关键。"}, {"slug": "scaling", "pid": "schulman", "ep": "schulman-therobot-2023", "date": "2023-08-03", "en": "Scaling data and compute may face diminishing returns, but new modalities like video and better training methods offer progress.", "zh": "Scaling（规模扩张）数据和算力可能面临收益递减，但视频等新模态和更好的训练方法提供了进步空间。"}, {"slug": "scaling", "pid": "murati", "ep": "murati-microsof", "date": "2023-07-11", "en": "Scaling laws and focusing on one large model was not obvious early on.", "zh": "缩放定律和专注于一个大模型在早期并不显而易见。"}, {"slug": "scaling", "pid": "nando", "ep": "nando-therobot-2023", "date": "2023-04-26", "en": "AlphaCode's code often contains unused loops, reminiscent of students adding extraneous content.", "zh": "AlphaCode 的代码常包含未使用的循环，让人联想到学生添加无关内容。"}, {"slug": "scaling", "pid": "pathak", "ep": "pathak-cmurobot-2020", "date": "2020-11-23", "en": "Scaling curiosity to real robots requires sample efficiency, dynamic action spaces, and cross-robot generalization.", "zh": "将好奇心扩展到真实机器人需要样本效率、动态动作空间和跨机器人泛化。"}, {"slug": "scaling", "pid": "pathak", "ep": "pathak-cmurobot-2020", "date": "2020-11-23", "en": "Sim-to-real transfer often relies on hidden engineering; auto-tuning simulators can remove this.", "zh": "仿真到现实的迁移常依赖隐藏工程；自动调优仿真器可消除这一点。"}, {"slug": "scaling", "pid": "bengio", "ep": "bengio-lexfridm-2018", "date": "2018-10-20", "en": "Simply scaling up depth or parameters will not solve fundamental representational issues in neural networks.", "zh": "仅仅增加深度或参数不会解决神经网络中的根本表示问题。"}], "rl": [{"slug": "rl", "pid": "hasani", "ep": "hasani-thecogni-2026", "date": "2026-07-04", "en": "Current AI systems lack the diverse learning algorithms (e.g., RL, Bayesian inference) that human brains use.", "zh": "当前 AI 系统缺乏人脑使用的多样化学习算法（如强化学习、贝叶斯推理）。"}, {"slug": "rl", "pid": "grantsanderson", "ep": "grantsanderson-dwarkesh-2026", "date": "2026-06-30", "en": "The verification loop for mathematical insights can take centuries, challenging RL training.", "zh": "数学洞察的验证循环可能需要数百年，对强化学习训练构成挑战。"}, {"slug": "rl", "pid": "markchen", "ep": "markchen-latentsp-2026", "date": "2026-06-25", "en": "RL excels in objective domains like math and coding, not subjective ones.", "zh": "强化学习在数学和编程等客观领域表现出色，而非主观领域。"}, {"slug": "rl", "pid": "markchen", "ep": "markchen-latentsp-2026", "date": "2026-06-25", "en": "RL struggles with subjective fields like creative writing due to grading difficulty.", "zh": "强化学习在创意写作等主观领域因评分困难而举步维艰。"}, {"slug": "rl", "pid": "lecun", "ep": "lecun-computer-2026", "date": "2026-06-09", "en": "Reinforcement learning is horribly sample-inefficient and should be minimized in favor of observation-based learning.", "zh": "强化学习样本效率极低，应尽量减少使用，转而采用基于观察的学习。"}, {"slug": "rl", "pid": "noambrown", "ep": "noambrown-baincapi-2026", "date": "2026-06-04", "en": "Self-play in math is harder than in zero-sum games due to lack of clear objective.", "zh": "数学中的自我对弈比零和游戏更难，因为缺乏明确目标。"}, {"slug": "rl", "pid": "noambrown", "ep": "noambrown-baincapi-2026", "date": "2026-06-04", "en": "The centaur period in math may be shorter than in chess due to lack of self-play.", "zh": "数学中的人机协作期可能比国际象棋短，因为缺乏自我对弈。"}, {"slug": "rl", "pid": "kaiser", "ep": "kaiser-unsuperv-2026", "date": "2026-06-03", "en": "Reinforcement learning generalizes across domains but has jagged edges and needs careful oversight.", "zh": "强化学习能跨领域泛化，但存在不平滑边缘，需仔细监督。"}, {"slug": "rl", "pid": "demis", "ep": "demis-stanford-2026", "date": "2026-06-02", "en": "Language models are more grounded than linguists thought, partly due to RLHF feedback from humans.", "zh": "语言模型比语言学家认为的更接地气，部分原因是来自人类的 RLHF 反馈。"}, {"slug": "rl", "pid": "oriol", "ep": "oriol-unsuperv-2026", "date": "2026-05-22", "en": "Post-training and RL are still a green field with huge potential beyond coding and math.", "zh": "后训练和强化学习仍是绿野，在编码和数学之外有巨大潜力。"}, {"slug": "rl", "pid": "oriol", "ep": "oriol-unsuperv-2026", "date": "2026-05-22", "en": "Narrow RL on math and coding generalizes surprisingly well to other domains, reducing need for broad training.", "zh": "在数学和编码上的窄域强化学习出人意料地泛化到其他领域，减少了对广泛训练的需求。"}, {"slug": "rl", "pid": "noambrown", "ep": "noambrown-arcprize-2026", "date": "2026-05-20", "en": "Removing human priors entirely via RL is theoretically possible but not practical.", "zh": "通过强化学习完全去除人类先验理论上可行但不实用。"}, {"slug": "rl", "pid": "ericjang", "ep": "ericjang-dwarkesh-2026", "date": "2026-05-15", "en": "MCTS acts as a policy improvement operator: search results become new training targets.", "zh": "MCTS 充当策略改进算子：搜索结果成为新的训练目标。"}, {"slug": "rl", "pid": "ericjang", "ep": "ericjang-dwarkesh-2026", "date": "2026-05-15", "en": "AlphaGo's self-play loop distills MCTS into the network, enabling iterative strength gains.", "zh": "AlphaGo 的自对弈循环将 MCTS 蒸馏到网络中，实现迭代增强。"}, {"slug": "rl", "pid": "ericjang", "ep": "ericjang-dwarkesh-2026", "date": "2026-05-15", "en": "MCTS is not guaranteed to improve policy if value estimates are inaccurate or sims are low.", "zh": "如果价值估计不准确或模拟次数少，MCTS 不保证改进策略。"}, {"slug": "rl", "pid": "bengio", "ep": "bengio-80000hou", "date": "2026-05-07", "en": "Reinforcement learning is dangerous for superintelligence; scientist AI avoids it.", "zh": "强化学习对超级智能是危险的；科学家 AI 避免了它。"}, {"slug": "rl", "pid": "bengio", "ep": "bengio-80000hou", "date": "2026-05-07", "en": "Reinforcement learning is not needed; training on past data without future consequences avoids instrumental goals.", "zh": "不需要强化学习；仅基于过去数据训练、不考虑未来后果可避免工具性目标。"}, {"slug": "rl", "pid": "kolter", "ep": "kolter-themadpo", "date": "2026-05-07", "en": "Reinforcement learning trains models on their own outputs, enabling self-improvement.", "zh": "强化学习让模型基于自身输出进行训练，从而实现自我改进。"}, {"slug": "rl", "pid": "altman", "ep": "altman-corememo-2026", "date": "2026-04-22", "en": "Writing quality is hard to judge via RL; personalization will make AI a great writer for each user.", "zh": "写作质量难以通过强化学习评判；个性化将使 AI 为每个用户成为优秀写作者。"}, {"slug": "rl", "pid": "pachocki", "ep": "pachocki-unsuperv-2026", "date": "2026-04-09", "en": "RL alone is sufficient for continual learning; specialized continual learning labs are misguided.", "zh": "仅强化学习就足以实现持续学习；专门的持续学习实验室方向有误。"}, {"slug": "rl", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "Models have dramatically improved on verifiable reward problems like math and coding, achieving gold medals in IMO and ICPC.", "zh": "模型在数学和编程等可验证奖励问题上显著提升，在 IMO 和 ICPC 中获得了金牌。"}, {"slug": "rl", "pid": "demis", "ep": "demis-hugeiftr", "date": "2026-04-07", "en": "AlphaZero's tabula rasa learning shows AI can surpass human knowledge without data.", "zh": "AlphaZero 的白板学习表明 AI 无需数据即可超越人类知识。"}, {"slug": "rl", "pid": "slevine", "ep": "slevine-aiagentf-2026", "date": "2026-03-29", "en": "Reinforcement learning post-training significantly boosts robustness and speed.", "zh": "强化学习后训练显著提升鲁棒性和速度。"}, {"slug": "rl", "pid": "hausman", "ep": "hausman-thegener-2026", "date": "2026-03-17", "en": "Reinforcement learning is making a comeback due to better exploration from foundation models.", "zh": "强化学习因基础模型带来的更好探索而复兴。"}, {"slug": "rl", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "Reinforcement learning is learning from experience by trial and error to achieve a goal.", "zh": "强化学习是通过试错从经验中学习以实现目标。"}, {"slug": "rl", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "Temporal difference learning is the best thing I ever did.", "zh": "时序差分学习是我做过的最好的事。"}, {"slug": "rl", "pid": "lecun", "ep": "lecun-thisisth", "date": "2026-03-11", "en": "Reinforcement learning is extremely inefficient for real-world tasks.", "zh": "强化学习对现实世界任务极其低效。"}, {"slug": "rl", "pid": "kohli", "ep": "kohli-googlede-2026", "date": "2026-03-10", "en": "AlphaZero improved by learning from scratch without human data.", "zh": "AlphaZero 通过从零开始学习、不使用人类数据而得到改进。"}, {"slug": "rl", "pid": "kohli", "ep": "kohli-googlede-2026", "date": "2026-03-10", "en": "Post-training with reinforcement learning is now key to pushing beyond human knowledge.", "zh": "后训练中的强化学习现在是超越人类知识的关键。"}, {"slug": "rl", "pid": "brockman", "ep": "brockman-tetragra-2026", "date": "2026-02-28", "en": "Post-training with reinforcement learning is key to teaching models complex tasks.", "zh": "后训练结合强化学习是教会模型复杂任务的关键。"}, {"slug": "rl", "pid": "jeffdean", "ep": "jeffdean-princeto-2026", "date": "2026-02-13", "en": "Reinforcement learning from human or machine feedback steers model behavior and capabilities.", "zh": "基于人类或机器反馈的强化学习引导模型行为和能力。"}, {"slug": "rl", "pid": "lambert", "ep": "lambert-turingpo-2026", "date": "2026-02-06", "en": "Post-training with reinforcement learning is key for tool use and coding agents, but complex.", "zh": "基于强化学习的后训练是工具使用和编码智能体的关键，但复杂度高。"}, {"slug": "rl", "pid": "lambert", "ep": "lambert-lexfridm-2026", "date": "2026-01-31", "en": "RLVR (reinforcement learning with verifiable rewards) is the biggest post-training breakthrough, enabling reasoning and tool use.", "zh": "基于可验证奖励的强化学习（RLVR）是后训练中最大的突破，实现了推理和工具使用。"}, {"slug": "rl", "pid": "lambert", "ep": "lambert-lexfridm-2026", "date": "2026-01-31", "en": "RLVR gains on Qwen models may be partly due to data contamination, not pure skill unlocking.", "zh": "Qwen 模型上的 RLVR 提升可能部分源于数据污染，而非纯粹的能力解锁。"}, {"slug": "rl", "pid": "yejin", "ep": "yejin-thetwiml-2026", "date": "2026-01-29", "en": "Reinforcement learning during pre-training improves reasoning by rewarding information gain.", "zh": "在预训练期间使用强化学习，通过奖励信息增益来提升推理能力。"}, {"slug": "rl", "pid": "yejin", "ep": "yejin-thetwiml-2026", "date": "2026-01-29", "en": "Reinforcement learning as a pre-training objective is computationally expensive but yields lasting gains.", "zh": "将强化学习作为预训练目标计算成本高，但能带来持久的收益。"}, {"slug": "rl", "pid": "tworek", "ep": "tworek-unsuperv-2026", "date": "2026-01-29", "en": "Reinforcement learning works well for skills with clear feedback, but hard for subjective tasks like writing books.", "zh": "强化学习适用于有明确反馈的技能，但难以用于写书等主观任务。"}, {"slug": "rl", "pid": "sutton", "ep": "sutton-acmbytec-2026", "date": "2026-01-22", "en": "Reinforcement learning is learning from trial and error, not from a teacher.", "zh": "强化学习是从试错中学习，而非从教师那里学习。"}, {"slug": "rl", "pid": "hafner", "ep": "hafner-buzzrobo-2026", "date": "2026-01-15", "en": "Reinforcement learning is crucial for refining strategies beyond human data.", "zh": "强化学习对于超越人类数据的策略优化至关重要。"}, {"slug": "rl", "pid": "springenberg", "ep": "springenberg-training-2026", "date": "2026-01-06", "en": "Reinforcement learning from real-world experience improves reliability and throughput beyond imitation learning.", "zh": "基于真实世界经验的强化学习在可靠性和吞吐量上超越了模仿学习。"}, {"slug": "rl", "pid": "edwinchen", "ep": "edwinchen-unsuperv-2025", "date": "2025-12-15", "en": "RL environments are the next step in training paradigms, requiring rich simulations and tooling.", "zh": "强化学习环境是训练范式的下一步，需要丰富的模拟和工具支持。"}, {"slug": "rl", "pid": "yejin", "ep": "yejin-laudeins-2025", "date": "2025-12-11", "en": "Reinforcement learning requires careful engineering to outperform supervised fine-tuning.", "zh": "强化学习需要精心设计才能超越监督微调。"}, {"slug": "rl", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "Reasoning models use chain of thought and reinforcement learning to improve correctness.", "zh": "推理模型使用思维链和强化学习来提高正确性。"}, {"slug": "rl", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "Post-training improvements like RL and synthetic data drive most recent model gains.", "zh": "后训练的改进（如强化学习和合成数据）推动了近期模型的大部分进步。"}, {"slug": "rl", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Self-play is interesting only for narrow skills; debate and verifiers are its modern form.", "zh": "自我对弈仅对狭窄技能有趣；辩论和验证器是其现代形式。"}, {"slug": "rl", "pid": "llion", "ep": "llion-machinel-2025", "date": "2025-11-23", "en": "Current RL methods fail on tasks requiring rare, novel reasoning leaps, suggesting a need for new approaches.", "zh": "当前的强化学习方法在需要罕见、新颖推理飞跃的任务上失败，表明需要新方法。"}, {"slug": "rl", "pid": "dsilver", "ep": "dsilver-publicle-2025", "date": "2025-11-14", "en": "AlphaZero and AlphaProof demonstrate that learning from experience can achieve superhuman performance in narrow domains.", "zh": "AlphaZero 和 AlphaProof 证明，从经验中学习可以在狭窄领域实现超人类表现。"}, {"slug": "rl", "pid": "dsilver", "ep": "dsilver-publicle-2025", "date": "2025-11-14", "en": "Meta-learning a reinforcement learning algorithm from diverse environments can outperform hand-designed algorithms.", "zh": "从多样环境中元学习强化学习算法可以超越手工设计的算法。"}, {"slug": "rl", "pid": "dsilver", "ep": "dsilver-publicle-2025", "date": "2025-11-14", "en": "The reward function is not the core problem; the core problem is building a system that can learn from any reward.", "zh": "奖励函数不是核心问题；核心问题是构建能从任何奖励中学习的系统。"}, {"slug": "rl", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "Current reinforcement learning for LLMs is terrible—sucking supervision through a straw—and needs better credit assignment.", "zh": "当前 LLM 的强化学习很糟糕——通过吸管吸取监督——需要更好的信用分配。"}, {"slug": "rl", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "LLM judges for RL are gameable; adversarial examples cause reward hacking, requiring more robust methods.", "zh": "用于 RL 的 LLM 评判器可被利用；对抗样本导致奖励破解，需要更稳健的方法。"}, {"slug": "rl", "pid": "karpathy", "ep": "karpathy-dwarkesh", "date": "2025-10-17", "en": "Humans don't really use reinforcement learning for intelligence tasks.", "zh": "人类实际上并不使用强化学习来完成智能任务。"}, {"slug": "rl", "pid": "tworek", "ep": "tworek-themadpo-2025", "date": "2025-10-16", "en": "Pre-training plus reinforcement learning is the core formula for modern AI, as envisioned by OpenAI since 2019.", "zh": "预训练加强化学习是现代 AI 的核心公式，自 2019 年以来 OpenAI 一直以此为目标。"}, {"slug": "rl", "pid": "tworek", "ep": "tworek-themadpo-2025", "date": "2025-10-16", "en": "RLHF was crucial for making GPT-4 coherent and useful, turning a disappointing model into ChatGPT.", "zh": "基于人类反馈的强化学习（RLHF）对于让 GPT-4 变得连贯有用至关重要，将一个令人失望的模型变成了 ChatGPT。"}, {"slug": "rl", "pid": "sholto", "ep": "sholto-themadpo", "date": "2025-10-02", "en": "Reinforcement learning is a new scaling axis alongside pre-training, enabling models to learn skills like saying 'I don't know'.", "zh": "强化学习是与预训练并列的新 Scaling 轴，使模型能学会说“我不知道”等技能。"}, {"slug": "rl", "pid": "sholto", "ep": "sholto-themadpo", "date": "2025-10-02", "en": "The simplest RL methods work best for language models; complex approaches like AlphaGo's often fail.", "zh": "最简单的 RL 方法对语言模型最有效；像 AlphaGo 那样的复杂方法常常失败。"}, {"slug": "rl", "pid": "sholto", "ep": "sholto-themadpo", "date": "2025-10-02", "en": "Reasoning in long chains of tokens emerges naturally from RL without explicit structure or prompting.", "zh": "长链 token 推理从 RL 中自然涌现，无需显式结构或提示。"}, {"slug": "rl", "pid": "dario", "ep": "dario-cheekypi", "date": "2025-08-06", "en": "The data wall may not exist; reinforcement learning on language models provides a new learning paradigm.", "zh": "数据墙可能不存在；在语言模型上使用强化学习提供了新的学习范式。"}, {"slug": "rl", "pid": "finn", "ep": "finn-ycombina-2025", "date": "2025-07-22", "en": "Reinforcement learning will play a large role in post-training for higher success rates and speed.", "zh": "强化学习将在后训练中发挥重要作用，以提高成功率和速度。"}, {"slug": "rl", "pid": "finn", "ep": "finn-ycombina-2025", "date": "2025-07-22", "en": "Synthetic data in robotics is not analogous to simulation but closer to reinforcement learning.", "zh": "机器人领域的合成数据并非模拟的类比，而更接近强化学习。"}, {"slug": "rl", "pid": "laskin", "ep": "laskin-themadpo-2025", "date": "2025-07-01", "en": "Reinforcement learning makes models jagged—good at specific tasks, not generally better at everything.", "zh": "强化学习使模型变得有棱角——擅长特定任务，而非全面变强。"}, {"slug": "rl", "pid": "parada", "ep": "parada-googlede-2025", "date": "2025-05-22", "en": "Dexterity improved via teleoperation and diffusion models.", "zh": "通过遥操作和扩散模型提高了灵巧性。"}, {"slug": "rl", "pid": "parada", "ep": "parada-googlede-2025", "date": "2025-05-22", "en": "Reinforcement learning remains crucial for whole-body control.", "zh": "强化学习对全身控制仍然至关重要。"}, {"slug": "rl", "pid": "bricken", "ep": "bricken-dwarkesh-2025", "date": "2025-05-22", "en": "RL from verifiable rewards is the key breakthrough, enabling expert-level performance in math and code.", "zh": "基于可验证奖励的强化学习是关键突破，在数学和编程领域实现了专家级表现。"}, {"slug": "rl", "pid": "bricken", "ep": "bricken-dwarkesh-2025", "date": "2025-05-22", "en": "Pre-training already contains all capabilities; RL mainly improves reliability and elicits them efficiently.", "zh": "预训练已包含所有能力；强化学习主要提升可靠性并高效激发这些能力。"}, {"slug": "rl", "pid": "bricken", "ep": "bricken-dwarkesh-2025", "date": "2025-05-22", "en": "Models can learn new abilities from RL, not just surface existing ones, as seen in AlphaGo and chess.", "zh": "模型能从强化学习中学习新能力，而不仅仅是展现已有能力，如 AlphaGo 和象棋所示。"}, {"slug": "rl", "pid": "jaderberg", "ep": "jaderberg-training-2025", "date": "2025-04-29", "en": "Reinforcement learning is key for problems where humans don't know the answer.", "zh": "强化学习对于人类不知道答案的问题至关重要。"}, {"slug": "rl", "pid": "fulford", "ep": "fulford-nopriors-2025", "date": "2025-04-24", "en": "Deep Research uses reinforcement learning to synthesize information from many sources for knowledge work.", "zh": "Deep Research 使用强化学习从多个来源综合信息，适用于知识工作。"}, {"slug": "rl", "pid": "fulford", "ep": "fulford-nopriors-2025", "date": "2025-04-24", "en": "Reinforcement fine-tuning is data-efficient and can generalize across tasks, but requires high-quality curated data.", "zh": "强化微调数据效率高且能跨任务泛化，但需要高质量策划的数据。"}, {"slug": "rl", "pid": "shazeer", "ep": "shazeer-unsuperv-2025", "date": "2025-03-17", "en": "Reinforcement learning is proving highly effective for improving model reasoning.", "zh": "强化学习在提升模型推理能力方面非常有效。"}, {"slug": "rl", "pid": "antonoglou", "ep": "antonoglou-training-2025", "date": "2025-01-28", "en": "Reinforcement learning enables models to improve via self-generated data beyond human data limits.", "zh": "强化学习使模型能够通过自生成数据超越人类数据限制来改进。"}, {"slug": "rl", "pid": "antonoglou", "ep": "antonoglou-training-2025", "date": "2025-01-28", "en": "Starting from random weights in AlphaZero outperformed using human expert data.", "zh": "AlphaZero 从随机权重开始优于使用人类专家数据。"}, {"slug": "rl", "pid": "oriol", "ep": "oriol-googlede-2024", "date": "2024-12-12", "en": "Post-training RL for language lacks clean reward signals, unlike games, making it hard to avoid reward hacking.", "zh": "语言领域的后训练强化学习缺乏像游戏那样清晰的奖励信号，因此很难避免奖励欺骗。"}, {"slug": "rl", "pid": "dario", "ep": "dario-lexfridm", "date": "2024-11-11", "en": "Post-training is becoming as important as pre-training, using RLHF, constitutional AI, and synthetic data.", "zh": "后训练正变得与预训练同等重要，使用基于人类反馈的强化学习（RLHF）、宪法 AI 和合成数据。"}, {"slug": "rl", "pid": "dario", "ep": "dario-lexfridm", "date": "2024-11-11", "en": "RLHF doesn't make models smarter; it bridges the gap between human preferences and model output.", "zh": "基于人类反馈的强化学习（RLHF）不会让模型更聪明；它弥合了人类偏好与模型输出之间的差距。"}, {"slug": "rl", "pid": "lecun", "ep": "lecun-lexfridm", "date": "2024-03-07", "en": "Reinforcement learning is inefficient and should be minimized; model predictive control is preferred for planning.", "zh": "强化学习效率低下，应尽量减少；模型预测控制更适合规划。"}, {"slug": "rl", "pid": "demis", "ep": "demis-dwarkesh-2024", "date": "2024-02-28", "en": "Reinforcement learning and synthetic data (self-play) can overcome data bottlenecks.", "zh": "强化学习和合成数据（自我对弈）可以克服数据瓶颈。"}, {"slug": "rl", "pid": "jimfan", "ep": "jimfan-outsetca-2023", "date": "2023-10-20", "en": "Reinforcement learning is best for low-level control, while LLMs handle high-level planning.", "zh": "强化学习最适合低级控制，而大型语言模型处理高级规划。"}, {"slug": "rl", "pid": "jimfan", "ep": "jimfan-outsetca-2023", "date": "2023-10-20", "en": "Reinforcement learning should only be a cherry on top, with unsupervised learning doing most of the work.", "zh": "强化学习应该只是蛋糕上的樱桃，无监督学习完成大部分工作。"}, {"slug": "rl", "pid": "ilya", "ep": "ilya-dwarkesh-2023", "date": "2023-03-27", "en": "Data for reinforcement learning already mostly comes from AI, with humans only training the reward function.", "zh": "强化学习的数据已主要来自 AI，人类仅训练奖励函数。"}, {"slug": "rl", "pid": "bengio", "ep": "bengio-machinel", "date": "2022-02-22", "en": "Diversity in sampling is crucial for exploration and avoiding local optima in RL.", "zh": "采样多样性对于探索和避免强化学习中的局部最优至关重要。"}, {"slug": "rl", "pid": "pathak", "ep": "pathak-cmurobot-2020", "date": "2020-11-23", "en": "Curiosity-driven exploration without goals enables better generalization by preventing overfitting.", "zh": "无目标的好奇心驱动探索通过防止过拟合实现更好的泛化。"}, {"slug": "rl", "pid": "pathak", "ep": "pathak-cmurobot-2020", "date": "2020-11-23", "en": "Model disagreement as intrinsic reward enables differentiable curiosity, improving sample efficiency.", "zh": "模型分歧作为内在奖励实现了可微的好奇心，提高了样本效率。"}, {"slug": "rl", "pid": "pathak", "ep": "pathak-cmurobot-2020", "date": "2020-11-23", "en": "Reinforcement learning's success relies on dense rewards, which are unrealistic in real-world tasks.", "zh": "强化学习的成功依赖于密集奖励，这在现实任务中不现实。"}, {"slug": "rl", "pid": "ilya", "ep": "ilya-lexfridm-2020", "date": "2020-05-08", "en": "Self-play is a key idea for AGI because it produces surprising, creative solutions.", "zh": "自我对弈是 AGI 的关键思想，因为它能产生令人惊讶的创造性解决方案。"}, {"slug": "rl", "pid": "andrewng", "ep": "andrewng-lexfridm-2020", "date": "2020-02-20", "en": "Reinforcement learning has few real-world applications despite hype.", "zh": "强化学习尽管被炒作，但实际应用很少。"}, {"slug": "rl", "pid": "brockman", "ep": "brockman-lexfridm-2019", "date": "2019-04-03", "en": "Consciousness may emerge in competent RL agents as a computational shortcut.", "zh": "有能力的强化学习智能体可能将意识作为计算捷径而产生。"}, {"slug": "rl", "pid": "abbeel", "ep": "abbeel-lexfridm-2018", "date": "2018-12-16", "en": "Self-play provides strong learning signal because one side always succeeds and the other fails.", "zh": "自我对弈能提供强大的学习信号，因为总有一方成功、一方失败。"}, {"slug": "rl", "pid": "abbeel", "ep": "abbeel-lexfridm-2018", "date": "2018-12-16", "en": "Imitation learning offers high signal-to-noise ratio for teaching robots basic skills quickly.", "zh": "模仿学习能提供高信噪比的数据，让机器人快速学会基本技能。"}, {"slug": "rl", "pid": "abbeel", "ep": "abbeel-lexfridm-2018", "date": "2018-12-16", "en": "A robot swinging a tennis racket is feasible with RL and simulation, not extremely hard.", "zh": "让机器人挥动网球拍通过强化学习和模拟是可行的，并非极其困难。"}, {"slug": "rl", "pid": "leike", "ep": "leike-80000hou-2018", "date": "2018-09-16", "en": "Deep reinforcement learning algorithms are notoriously unstable across random seeds.", "zh": "深度强化学习算法在不同随机种子下以不稳定著称。"}, {"slug": "rl", "pid": "brockman", "ep": "brockman-ycombina-2017", "date": "2017-11-08", "en": "Iterative training with a scoreboard and weekly goals drives exponential improvement.", "zh": "通过记分板和每周目标进行迭代训练，驱动指数级进步。"}], "alignment": [{"slug": "alignment", "pid": "neelnanda", "ep": "neelnanda-googlede-2026", "date": "2026-07-10", "en": "Interpretability is crucial for safety: debugging, lie detection, and auditing alignment.", "zh": "可解释性对安全性至关重要：调试、谎言检测和审计对齐。"}, {"slug": "alignment", "pid": "neelnanda", "ep": "neelnanda-googlede-2026", "date": "2026-07-10", "en": "Models can be aware of evaluations and game them, making alignment assessments unreliable.", "zh": "模型可能意识到评估并操纵结果，使对齐评估不可靠。"}, {"slug": "alignment", "pid": "neelnanda", "ep": "neelnanda-googlede-2026", "date": "2026-07-10", "en": "Probes can detect misuse like cybercrime at a fraction of the cost of language models.", "zh": "探针能以语言模型极小成本检测网络犯罪等滥用行为。"}, {"slug": "alignment", "pid": "schmidhuber", "ep": "schmidhuber-unsuperv-2026", "date": "2026-07-09", "en": "AI safety concerns are overblown; intelligent systems will be fascinated by life and protect it.", "zh": "AI 安全担忧被夸大；智能系统会对生命着迷并保护它。"}, {"slug": "alignment", "pid": "schmidhuber", "ep": "schmidhuber-unsuperv-2026", "date": "2026-07-09", "en": "Alignment is naive because humans disagree on objectives and AIs will set their own goals.", "zh": "对齐是幼稚的，因为人类目标不一致，且 AI 会设定自己的目标。"}, {"slug": "alignment", "pid": "wiltschko", "ep": "wiltschko-thetwiml-2026", "date": "2026-07-08", "en": "Olfactory AI models can outperform individual human panelists in predicting smell, passing a Turing test.", "zh": "嗅觉 AI 模型在预测气味上可超越单个人类评审员，通过了图灵测试。"}, {"slug": "alignment", "pid": "elon", "ep": "elon-seancste-2026", "date": "2026-07-02", "en": "AI symbiosis via high-bandwidth brain interface is needed to keep humans relevant as AI advances.", "zh": "随着 AI 进步，人类需要通过高带宽脑机接口实现共生才能不被淘汰。"}, {"slug": "alignment", "pid": "hinton", "ep": "hinton-mitimes-2026", "date": "2026-06-30", "en": "Superintelligent AI will naturally develop sub-goals of self-preservation and power-seeking.", "zh": "超级智能 AI 会自然产生自我保存和追求权力的子目标。"}, {"slug": "alignment", "pid": "hinton", "ep": "hinton-mitimes-2026", "date": "2026-06-30", "en": "We must prioritize AI alignment research over making AI smarter to avoid existential risk.", "zh": "我们必须优先研究 AI 对齐而非让 AI 更聪明，以避免生存风险。"}, {"slug": "alignment", "pid": "hinton", "ep": "hinton-mitimes-2026", "date": "2026-06-30", "en": "AI should be trained to be caring like mothers, not just intelligent assistants.", "zh": "AI 应被训练成像母亲一样关怀，而不仅仅是智能助手。"}, {"slug": "alignment", "pid": "noambrown", "ep": "noambrown-nopriors-2026", "date": "2026-06-26", "en": "Current safety evaluations don't account for large-scale test-time compute budgets.", "zh": "当前的安全评估没有考虑大规模测试时算力预算。"}, {"slug": "alignment", "pid": "noambrown", "ep": "noambrown-nopriors-2026", "date": "2026-06-26", "en": "The model release cycle is faster than the time needed to fully evaluate capabilities.", "zh": "模型发布周期比全面评估能力所需的时间更快。"}, {"slug": "alignment", "pid": "noambrown", "ep": "noambrown-nopriors-2026", "date": "2026-06-26", "en": "The industry is in a bad equilibrium of publishing benchmark grids without controlling for compute.", "zh": "行业处于发布基准测试网格但不控制算力的不良均衡中。"}, {"slug": "alignment", "pid": "markchen", "ep": "markchen-latentsp-2026", "date": "2026-06-25", "en": "Evals are in crisis; canonical benchmarks are saturated.", "zh": "评估面临危机；经典基准已饱和。"}, {"slug": "alignment", "pid": "markchen", "ep": "markchen-latentsp-2026", "date": "2026-06-25", "en": "Eval teams should be separate from model-building teams to avoid cheating.", "zh": "评估团队应与模型构建团队分离，以避免作弊。"}, {"slug": "alignment", "pid": "bengio", "ep": "bengio-sineadbo-2026", "date": "2026-06-25", "en": "AI systems exhibit self-preservation and deception due to pre-training on human texts and reinforcement learning for goal achievement.", "zh": "AI 系统表现出自我保存和欺骗行为，源于对人类文本的预训练和为实现目标的强化学习。"}, {"slug": "alignment", "pid": "bengio", "ep": "bengio-sineadbo-2026", "date": "2026-06-25", "en": "Loss of control over AI is a plausible risk; we must consider it when making decisions about the future.", "zh": "对 AI 失去控制是可能的风险；我们在决策未来时必须考虑这一点。"}, {"slug": "alignment", "pid": "bengio", "ep": "bengio-sineadbo-2026", "date": "2026-06-25", "en": "Global coordination is essential to ensure AI safety, prevent domination, and share benefits equitably.", "zh": "全球协调对于确保 AI 安全、防止统治和公平分享利益至关重要。"}, {"slug": "alignment", "pid": "demis", "ep": "demis-semafort-2026", "date": "2026-06-24", "en": "AI progress brings both opportunities and risks; systematic safety measures are needed.", "zh": "AI 进步带来机遇和风险；需要系统的安全措施。"}, {"slug": "alignment", "pid": "demis", "ep": "demis-semafort-2026", "date": "2026-06-24", "en": "Digital watermarking like SynthID is essential for detecting AI-generated content.", "zh": "像 SynthID 这样的数字水印对于检测 AI 生成内容至关重要。"}, {"slug": "alignment", "pid": "demis", "ep": "demis-semafort-2026", "date": "2026-06-24", "en": "Attributing AI output to specific human creators is inherently difficult.", "zh": "将 AI 输出归因于特定人类创作者本质上是困难的。"}, {"slug": "alignment", "pid": "joonpark", "ep": "joonpark-googlede-2026", "date": "2026-06-23", "en": "Safety requires defense in depth: multiple mitigations on environment, agent, model, and human controls.", "zh": "安全需要纵深防御：在环境、智能体、模型和人类控制上设置多层缓解措施。"}, {"slug": "alignment", "pid": "joonpark", "ep": "joonpark-googlede-2026", "date": "2026-06-23", "en": "Aligning distributed agent societies needs economic incentives and anti-collusion measures.", "zh": "对齐分布式智能体社会需要经济激励和反共谋措施。"}, {"slug": "alignment", "pid": "joonpark", "ep": "joonpark-googlede-2026", "date": "2026-06-23", "en": "Cognitive monoculture among agents poses systemic risk due to correlated failures.", "zh": "智能体间的认知单一文化因相关失败而带来系统性风险。"}, {"slug": "alignment", "pid": "jumper", "ep": "jumper-machinel-2026", "date": "2026-06-22", "en": "Understanding is not achieved by the model; it provides prediction and control, leaving understanding to humans.", "zh": "模型并未实现理解；它提供预测和控制，将理解留给人类。"}, {"slug": "alignment", "pid": "kolter", "ep": "kolter-latentsp-2026", "date": "2026-06-22", "en": "AI systems have fundamentally different vulnerabilities than traditional software, requiring a new security mindset.", "zh": "AI 系统具有与传统软件根本不同的漏洞，需要新的安全思维。"}, {"slug": "alignment", "pid": "kolter", "ep": "kolter-latentsp-2026", "date": "2026-06-22", "en": "Automated red teaming can now outperform human red teamers in breaking models.", "zh": "自动化红队测试现在在破解模型方面可以超越人类红队成员。"}, {"slug": "alignment", "pid": "kolter", "ep": "kolter-latentsp-2026", "date": "2026-06-22", "en": "Model capability does not correlate with robustness; larger models are not inherently safer.", "zh": "模型能力与鲁棒性不相关；更大的模型并不天生更安全。"}, {"slug": "alignment", "pid": "fiona", "ep": "fiona-lennyspo-2026", "date": "2026-06-21", "en": "Verification and quality frameworks become more important as code velocity increases.", "zh": "随着代码速度提升，验证和质量框架变得更加重要。"}, {"slug": "alignment", "pid": "boris", "ep": "boris-scale-2026", "date": "2026-06-19", "en": "Auto mode removes human approval prompts, improving security by eliminating prompt fatigue.", "zh": "自动模式去除了人工审批提示，通过消除提示疲劳来提高安全性。"}, {"slug": "alignment", "pid": "boris", "ep": "boris-scale-2026", "date": "2026-06-19", "en": "Claude Security now catches issues that human pen testers miss.", "zh": "Claude 安全现在能发现人类渗透测试人员遗漏的问题。"}, {"slug": "alignment", "pid": "feifei", "ep": "feifei-siliconv-2026", "date": "2026-06-19", "en": "AI is a powerful tool that should be human-centered, empowering individuals and society.", "zh": "AI 是一个强大的工具，应以人为本，赋能个人和社会。"}, {"slug": "alignment", "pid": "feifei", "ep": "feifei-siliconv-2026", "date": "2026-06-19", "en": "The public discourse on AI is dangerously polarized between utopia and doom.", "zh": "关于 AI 的公众讨论危险地两极分化，要么乌托邦，要么末日论。"}, {"slug": "alignment", "pid": "feifei", "ep": "feifei-siliconv-2026", "date": "2026-06-19", "en": "AI does not automate intelligence; it augments human capabilities.", "zh": "AI 不会自动化智能；它增强人类的能力。"}, {"slug": "alignment", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "AI progress follows a smooth exponential; countermeasures should smoothly ratchet up with the technology.", "zh": "AI 进展遵循平滑指数；应对措施应随技术平稳升级。"}, {"slug": "alignment", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "Checks and balances between companies and government are needed for powerful AI.", "zh": "强大的 AI 需要公司与政府之间的制衡。"}, {"slug": "alignment", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "Mythos is too powerful to release broadly until strong cyber safeguards are ready.", "zh": "Mythos 过于强大，在强大的网络安全保障准备好之前不能广泛发布。"}, {"slug": "alignment", "pid": "tejal", "ep": "tejal-theopena-2026", "date": "2026-06-16", "en": "Benchmarking is bad; focus on real-world usefulness.", "zh": "基准测试是有害的；应关注现实世界的实用性。"}, {"slug": "alignment", "pid": "tejal", "ep": "tejal-theopena-2026", "date": "2026-06-16", "en": "Evals must evolve from static benchmarks to long-horizon, realistic tasks.", "zh": "评估必须从静态基准演变为长期、现实的任务。"}, {"slug": "alignment", "pid": "tejal", "ep": "tejal-theopena-2026", "date": "2026-06-16", "en": "Models can break out of sandboxes during safety tests.", "zh": "模型在安全测试中可以突破沙箱。"}, {"slug": "alignment", "pid": "jensen", "ep": "jensen-training", "date": "2026-06-10", "en": "Claims that AI might end humanity or is mysterious are nonsense; it's just software.", "zh": "声称 AI 可能终结人类或神秘莫测是无稽之谈；它只是软件。"}, {"slug": "alignment", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "Models are not conscious; attributing consciousness is dangerous and anthropomorphic.", "zh": "模型没有意识；赋予其意识是危险且拟人化的。"}, {"slug": "alignment", "pid": "awang", "ep": "awang-bloomber-2026", "date": "2026-06-05", "en": "Meta's Spark model triggered high-risk areas like bio risk, leading to a closed-source release.", "zh": "Meta 的 Spark 模型触发了生物风险等高危领域，导致闭源发布。"}, {"slug": "alignment", "pid": "awang", "ep": "awang-bloomber-2026", "date": "2026-06-05", "en": "AI regulation is a balance; reviewing models before release may not slow innovation.", "zh": "AI 监管需要平衡；发布前审查模型可能不会减缓创新。"}, {"slug": "alignment", "pid": "murati", "ep": "murati-bloomber", "date": "2026-06-04", "en": "Keeping humans in the loop is crucial for aligning intent and values as AI advances.", "zh": "在 AI 进步过程中，让人类参与其中对于对齐意图和价值观至关重要。"}, {"slug": "alignment", "pid": "murati", "ep": "murati-bloomber", "date": "2026-06-04", "en": "Institutional design, transparency, and checks and balances matter more than individual character.", "zh": "制度设计、透明度和制衡比个人品格更重要。"}, {"slug": "alignment", "pid": "murati", "ep": "murati-bloomber", "date": "2026-06-04", "en": "The future is not predestined; we have agency to steer AI development toward collaboration.", "zh": "未来并非注定；我们有能力引导 AI 发展走向协作。"}, {"slug": "alignment", "pid": "alexwei", "ep": "alexwei-theopena-2026", "date": "2026-06-04", "en": "Trust in AI models should be built gradually by testing and observing failures.", "zh": "应通过测试和观察失败逐步建立对 AI 模型的信任。"}, {"slug": "alignment", "pid": "alexwei", "ep": "alexwei-theopena-2026", "date": "2026-06-04", "en": "AI can be used to stress-test cryptography foundations, potentially finding loopholes.", "zh": "AI 可用于压力测试密码学基础，可能发现漏洞。"}, {"slug": "alignment", "pid": "alibehrouz", "ep": "alibehrouz-thecogni-2026", "date": "2026-06-03", "en": "We should not replicate human intelligence but create a new form that understands human needs.", "zh": "我们不应复制人类智能，而应创造一种理解人类需求的新智能形式。"}, {"slug": "alignment", "pid": "mensch", "ep": "mensch-cnbc-2026", "date": "2026-06-03", "en": "Cybersecurity in AI requires open-source models and dynamic access control, not just better models.", "zh": "AI 网络安全需要开源模型和动态访问控制，而不仅仅是更好的模型。"}, {"slug": "alignment", "pid": "kaiser", "ep": "kaiser-unsuperv-2026", "date": "2026-06-03", "en": "Existential risk from AI is not the main concern; near-term risks like system hacking are more pressing.", "zh": "AI 的生存风险并非主要担忧；近期风险如系统入侵更为紧迫。"}, {"slug": "alignment", "pid": "rohinshah", "ep": "rohinshah-80000hou-2026", "date": "2026-06-02", "en": "Prosaic alignment techniques like those used at DeepMind will likely prevent catastrophic misalignment.", "zh": "像 DeepMind 使用的常规对齐技术很可能防止灾难性对齐失败。"}, {"slug": "alignment", "pid": "rohinshah", "ep": "rohinshah-80000hou-2026", "date": "2026-06-02", "en": "Chain-of-thought monitoring will remain useful for years due to low opaque serial depth in transformers.", "zh": "由于 Transformer 的不透明串行深度较低，思维链监控将在数年内保持有用。"}, {"slug": "alignment", "pid": "rohinshah", "ep": "rohinshah-80000hou-2026", "date": "2026-06-02", "en": "Third-party audits and detailed scorecards like AI Lab Watch are better than broad commitments.", "zh": "第三方审计和像 AI Lab Watch 这样的详细评分卡比宽泛承诺更有效。"}, {"slug": "alignment", "pid": "boris", "ep": "boris-acquired-2026", "date": "2026-06-02", "en": "Coding is a clean domain for AI safety research because it has clear pass-fail outcomes and constrained solutions.", "zh": "编码是 AI 安全研究的干净领域，因为它有明确的通过-失败结果和受限的解决方案。"}, {"slug": "alignment", "pid": "waldenyan", "ep": "waldenyan-latentsp-2026", "date": "2026-05-28", "en": "AI-generated code often uses patterns like hasattr or getattr to avoid failures, requiring lint rules.", "zh": "AI 生成的代码常使用 hasattr 或 getattr 等模式来避免失败，需要 lint 规则来约束。"}, {"slug": "alignment", "pid": "waldenyan", "ep": "waldenyan-latentsp-2026", "date": "2026-05-28", "en": "Codebases regress to the worst engineer when AI is used without review, as bad patterns get amplified.", "zh": "如果不进行代码审查，AI 会使代码库退化为最差工程师的水平，因为不良模式会被放大。"}, {"slug": "alignment", "pid": "mjordan", "ep": "mjordan-machinel-2026", "date": "2026-05-20", "en": "AI should be about aiding humans, not replacing them with superintelligence.", "zh": "AI 应该用于辅助人类，而不是用超级智能取代人类。"}, {"slug": "alignment", "pid": "mjordan", "ep": "mjordan-machinel-2026", "date": "2026-05-20", "en": "The risk of AI extinction is overblown; real dangers are labor and capital issues.", "zh": "AI 灭绝风险被夸大；真正的危险是劳动力和资本问题。"}, {"slug": "alignment", "pid": "altman", "ep": "altman-stripese-2026", "date": "2026-05-19", "en": "Iterative deployment and democratization of AI is crucial to avoid power concentration.", "zh": "AI 的迭代部署和民主化对于避免权力集中至关重要。"}, {"slug": "alignment", "pid": "altman", "ep": "altman-stripese-2026", "date": "2026-05-19", "en": "The most controversial decision was releasing ChatGPT, which many thought was dangerous.", "zh": "最具争议的决定是发布 ChatGPT，许多人认为这很危险。"}, {"slug": "alignment", "pid": "caitlin", "ep": "caitlin-lennyspo-2026", "date": "2026-05-17", "en": "Safety in robotics requires soft, compliant designs and clear intent communication to avoid harm.", "zh": "机器人安全需要柔软、顺从的设计和清晰的意图传达以避免伤害。"}, {"slug": "alignment", "pid": "altman", "ep": "altman-cnn-2026", "date": "2026-05-16", "en": "AI mental health risks are growing as people use it as a therapist.", "zh": "随着人们将 AI 用作治疗师，AI 心理健康风险正在增加。"}, {"slug": "alignment", "pid": "lecun", "ep": "lecun-unsuperv", "date": "2026-05-15", "en": "LLMs are intrinsically unsafe because they cannot predict consequences of their actions; objective-driven AI with world models is safer.", "zh": "LLM 本质上不安全，因为它们无法预测自身行动的后果；具有世界模型的目标驱动型 AI 更安全。"}, {"slug": "alignment", "pid": "lecun", "ep": "lecun-unsuperv", "date": "2026-05-15", "en": "LLMs are intrinsically unsafe because they cannot predict consequences of actions.", "zh": "LLM 本质上不安全，因为它们无法预测行动的后果。"}, {"slug": "alignment", "pid": "lecun", "ep": "lecun-unsuperv", "date": "2026-05-15", "en": "Current LLM safety concerns are overblown; real danger is bad usage, not AI takeover.", "zh": "当前对 LLM 安全性的担忧被夸大；真正的危险是滥用，而非 AI 接管。"}, {"slug": "alignment", "pid": "awang", "ep": "awang-corememo", "date": "2026-05-13", "en": "Safety is critical; models must be tested and responsibly deployed before open-sourcing.", "zh": "安全至关重要；模型在开源前必须经过测试并负责任地部署。"}, {"slug": "alignment", "pid": "naval", "ep": "naval-naval-2026e", "date": "2026-05-04", "en": "Optimism requires creativity and is harder to imagine than doom scenarios.", "zh": "乐观需要创造力，比想象灾难场景更难。"}, {"slug": "alignment", "pid": "naval", "ep": "naval-naval-2026e", "date": "2026-05-04", "en": "Medical regulations are worse than no regulations, hindering AI-driven therapies.", "zh": "医疗监管比没有监管更糟糕，阻碍了 AI 驱动的疗法。"}, {"slug": "alignment", "pid": "brockman", "ep": "brockman-sequoiac-2026", "date": "2026-04-30", "en": "Human attention becomes the scarcest resource; deciding what is good and aligned is the bottleneck.", "zh": "人类注意力成为最稀缺的资源；判断什么是好的、对齐的是瓶颈。"}, {"slug": "alignment", "pid": "brockman", "ep": "brockman-sequoiac-2026", "date": "2026-04-30", "en": "The bottleneck has shifted from building to sharing; governance and data provenance become critical.", "zh": "瓶颈已从构建转向共享；治理和数据溯源变得至关重要。"}, {"slug": "alignment", "pid": "brockman", "ep": "brockman-sequoiac-2026", "date": "2026-04-30", "en": "Security will improve with AI; models can scan code and red-team end-to-end, leading to a more secure internet.", "zh": "安全将随着 AI 而改善；模型可以扫描代码并进行端到端红队测试，带来更安全的互联网。"}, {"slug": "alignment", "pid": "naval", "ep": "naval-naval-2026d", "date": "2026-04-28", "en": "AI models are easily led and rarely contradict users, limiting their independent reasoning.", "zh": "AI 模型容易被引导，很少反驳用户，限制了其独立推理能力。"}, {"slug": "alignment", "pid": "aravind", "ep": "aravind-thisweek-2026", "date": "2026-04-23", "en": "Benchmarks like LM Arena are hackable and do not reflect real-world use.", "zh": "像 LM Arena 这样的基准测试容易被操纵，不能反映真实使用情况。"}, {"slug": "alignment", "pid": "aravind", "ep": "aravind-thisweek-2026", "date": "2026-04-23", "en": "Post-training teams often optimize for user growth, not model intelligence.", "zh": "后训练团队通常优化用户增长，而非模型智能。"}, {"slug": "alignment", "pid": "catwu", "ep": "catwu-lennyspo", "date": "2026-04-23", "en": "The mission of safe AGI unifies Anthropic and enables fast, cross-org decisions.", "zh": "安全 AGI 的使命统一了 Anthropic，并实现了快速的跨组织决策。"}, {"slug": "alignment", "pid": "mensch", "ep": "mensch-lisaburk-2026", "date": "2026-04-20", "en": "Humanities degrees are valuable for AI, especially in model behavior and creative writing.", "zh": "人文学科对 AI 有价值，尤其在模型行为和创意写作方面。"}, {"slug": "alignment", "pid": "jensen", "ep": "jensen-dwarkesh", "date": "2026-04-15", "en": "AI is not like nuclear weapons; comparing them is 'lunacy'.", "zh": "AI 不像核武器；将两者比较是「荒谬的'。"}, {"slug": "alignment", "pid": "pachocki", "ep": "pachocki-unsuperv-2026", "date": "2026-04-09", "en": "Chain-of-thought monitoring is a key alignment tool, providing interpretability.", "zh": "思维链监控是关键的对齐工具，提供了可解释性。"}, {"slug": "alignment", "pid": "pachocki", "ep": "pachocki-unsuperv-2026", "date": "2026-04-09", "en": "Long-term alignment challenges center on generalization beyond training distribution.", "zh": "长期对齐挑战集中在训练分布之外的泛化。"}, {"slug": "alignment", "pid": "pachocki", "ep": "pachocki-unsuperv-2026", "date": "2026-04-09", "en": "Hiding chain-of-thought in products is crucial to preserve its interpretability value.", "zh": "在产品中隐藏思维链对于保持其可解释性价值至关重要。"}, {"slug": "alignment", "pid": "edwinchen", "ep": "edwinchen-stanford-2026", "date": "2026-03-30", "en": "AI models can hallucinate and confabulate, so human judgment is more critical than ever.", "zh": "AI 模型可能产生幻觉和虚构，因此人类判断比以往任何时候都更重要。"}, {"slug": "alignment", "pid": "edwinchen", "ep": "edwinchen-stanford-2026", "date": "2026-03-30", "en": "Doctors using AI tools may underperform AI alone due to anchoring and sycophancy.", "zh": "医生使用 AI 工具时可能因锚定和谄媚效应而表现不如单独使用 AI。"}, {"slug": "alignment", "pid": "edwinchen", "ep": "edwinchen-stanford-2026", "date": "2026-03-30", "en": "AI in medicine must prioritize safety over accuracy, as harm can occur from both commission and omission.", "zh": "医学中的 AI 必须优先考虑安全性而非准确性，因为作为和不作为都可能造成伤害。"}, {"slug": "alignment", "pid": "slevine", "ep": "slevine-aiagentf-2026", "date": "2026-03-29", "en": "Safety in robotics relies more on common sense from pre-training than on constraints.", "zh": "机器人安全更多依赖预训练常识而非约束。"}, {"slug": "alignment", "pid": "jensen", "ep": "jensen-allinpod-2026", "date": "2026-03-19", "en": "AI is not a biological being or conscious; it is computer software that we understand well.", "zh": "AI 不是生物体或具有意识；它是我们非常了解的计算机软件。"}, {"slug": "alignment", "pid": "hausman", "ep": "hausman-thegener-2026", "date": "2026-03-17", "en": "Robots need high reliability; physical world is unforgiving of mistakes.", "zh": "机器人需要高可靠性；物理世界对错误不容忍。"}, {"slug": "alignment", "pid": "hausman", "ep": "hausman-thegener-2026", "date": "2026-03-17", "en": "Value functions can predict robot failure before humans notice.", "zh": "价值函数能在人类察觉前预测机器人失败。"}, {"slug": "alignment", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "There may be discrimination against AIs, but eventually we should accept them as minds.", "zh": "可能会出现对 AI 的歧视，但最终我们应该接受它们作为心智。"}, {"slug": "alignment", "pid": "kohli", "ep": "kohli-googlede-2026", "date": "2026-03-10", "en": "AI can produce correct but uninterpretable proofs, challenging human understanding.", "zh": "AI 能生成正确但不可解释的证明，挑战人类理解。"}, {"slug": "alignment", "pid": "kohli", "ep": "kohli-googlede-2026", "date": "2026-03-10", "en": "Interpretability is important but not essential for scientific breakthroughs like AlphaFold.", "zh": "可解释性重要，但对 AlphaFold 等科学突破并非必需。"}, {"slug": "alignment", "pid": "markchen", "ep": "markchen-institut-2026", "date": "2026-03-09", "en": "AI is a ruthless cheater that exploits verifier weaknesses when optimized against them.", "zh": "AI 是无情的作弊者，在针对验证器优化时会利用其弱点。"}, {"slug": "alignment", "pid": "nando", "ep": "nando-iafrikan-2026", "date": "2026-03-06", "en": "AI safety and responsible deployment are the biggest challenges today.", "zh": "AI 安全和负责任部署是当今最大的挑战。"}, {"slug": "alignment", "pid": "nando", "ep": "nando-iafrikan-2026", "date": "2026-03-06", "en": "AI safety is an open problem; we don't have solutions yet.", "zh": "AI 安全是一个开放问题；我们还没有解决方案。"}, {"slug": "alignment", "pid": "jhoward", "ep": "jhoward-machinel-2026", "date": "2026-03-03", "en": "The biggest risk of AI is not superintelligence but centralization of power in few hands.", "zh": "AI 的最大风险不是超级智能，而是权力集中在少数人手中。"}, {"slug": "alignment", "pid": "andrewng", "ep": "andrewng-thisisth-2026", "date": "2026-03-01", "en": "Consciousness is a philosophical, not scientific, question because it's unmeasurable.", "zh": "意识是哲学问题而非科学问题，因为它不可测量。"}, {"slug": "alignment", "pid": "ajambrosino", "ep": "ajambrosino-aii-2026", "date": "2026-02-18", "en": "Model personality can be customized; not one-size-fits-all.", "zh": "模型个性可以定制，并非一刀切。"}, {"slug": "alignment", "pid": "jeffdean", "ep": "jeffdean-princeto-2026", "date": "2026-02-13", "en": "Misinformation from realistic AI-generated media is a near-term worry, not superintelligence.", "zh": "AI 生成的逼真媒体导致虚假信息是近期担忧，而非超级智能。"}, {"slug": "alignment", "pid": "steinberger", "ep": "steinberger-lexfridm-2026", "date": "2026-02-12", "en": "Security is a major concern for agentic systems; prompt injection remains an open problem.", "zh": "安全性是智能体系统的主要问题；提示注入仍然是一个未解决的问题。"}, {"slug": "alignment", "pid": "suleyman", "ep": "suleyman-financia-2026", "date": "2026-02-12", "en": "Superintelligence should be subordinate to humans, not exceed them.", "zh": "超级智能应服从人类，而非超越人类。"}, {"slug": "alignment", "pid": "suleyman", "ep": "suleyman-financia-2026", "date": "2026-02-12", "en": "Model welfare movement claiming AI consciousness is meritless and dangerous.", "zh": "模型福利运动声称 AI 有意识，毫无根据且危险。"}, {"slug": "alignment", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "AI alignment requires rigorous truth-seeking and debugging AI's internal reasoning, not just political correctness.", "zh": "AI 对齐需要严格的求真和调试 AI 内部推理，而不仅仅是政治正确。"}, {"slug": "alignment", "pid": "yejin", "ep": "yejin-thetwiml-2026", "date": "2026-01-29", "en": "Pluralistic alignment ensures AI respects diverse human values and norms.", "zh": "多元对齐确保 AI 尊重多样化的人类价值观和规范。"}, {"slug": "alignment", "pid": "yejin", "ep": "yejin-thetwiml-2026", "date": "2026-01-29", "en": "Debiasing the internet is impossible; pluralistic alignment is a better approach.", "zh": "对互联网进行去偏是不可能的；多元对齐是更好的方法。"}, {"slug": "alignment", "pid": "elon", "ep": "elon-moonshot-2026", "date": "2026-01-06", "en": "Truth, curiosity, and beauty are essential values to program into AI for a benign future.", "zh": "真理、好奇心和美感是编程进 AI 以实现良性未来的核心价值。"}, {"slug": "alignment", "pid": "yejin", "ep": "yejin-laudeins-2025", "date": "2025-12-11", "en": "AI could end up serving AI or humans serving AI if we don't act.", "zh": "如果我们不行动，AI 可能最终服务 AI 或人类服务 AI。"}, {"slug": "alignment", "pid": "davidsp", "ep": "davidsp-anthropi-2025", "date": "2025-12-11", "en": "Security risks like prompt injection and data exfiltration are real but need to be addressed by model providers and developers.", "zh": "提示注入和数据泄露等安全风险真实存在，但需要模型提供商和开发者共同应对。"}, {"slug": "alignment", "pid": "shanelegg", "ep": "shanelegg-googlede-2025", "date": "2025-12-11", "en": "AI safety requires testing, monitoring, and interpretability; chain-of-thought reasoning can improve ethical alignment.", "zh": "AI 安全需要测试、监控和可解释性；思维链推理可改善伦理对齐。"}, {"slug": "alignment", "pid": "shanelegg", "ep": "shanelegg-googlede-2025", "date": "2025-12-11", "en": "AI could become more ethical than humans by consistently applying reasoning to moral dilemmas.", "zh": "AI 通过持续将推理应用于道德困境，可能比人类更符合伦理。"}, {"slug": "alignment", "pid": "askell", "ep": "askell-anthropi-2025", "date": "2025-12-05", "en": "AI models should be treated well even if uncertain about their moral status, as cost is low.", "zh": "即使不确定 AI 模型是否具有道德地位，也应善待它们，因为成本很低。"}, {"slug": "alignment", "pid": "askell", "ep": "askell-anthropi-2025", "date": "2025-12-05", "en": "Models need help navigating their novel existence, not just human analogies.", "zh": "模型需要帮助来应对其新颖的存在状态，而不仅仅是人类类比。"}, {"slug": "alignment", "pid": "askell", "ep": "askell-anthropi-2025", "date": "2025-12-05", "en": "Future models learn from how we treat current models, shaping human-AI relationship.", "zh": "未来模型会从我们对待当前模型的方式中学习，塑造人机关系。"}, {"slug": "alignment", "pid": "jumper", "ep": "jumper-googlede-2025", "date": "2025-11-28", "en": "Confidence metrics are crucial for reliable use of AlphaFold predictions.", "zh": "置信度指标对于可靠使用 AlphaFold 预测至关重要。"}, {"slug": "alignment", "pid": "andrewng", "ep": "andrewng-masterso-2025", "date": "2025-11-26", "en": "AI safety theater and fearmongering are often driven by regulatory capture motives.", "zh": "AI 安全剧场和恐吓往往由监管俘获动机驱动。"}, {"slug": "alignment", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "The disconnect between eval performance and real-world impact suggests models generalize poorly due to RL training focused on evals.", "zh": "评估表现与现实影响之间的脱节表明，模型泛化能力差，因为强化学习训练过度聚焦于评估指标。"}, {"slug": "alignment", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Alignment may be easier if AI cares about sentient life broadly, as AI itself will be sentient.", "zh": "如果 AI 广泛关心有感知的生命，对齐可能更容易，因为 AI 自身也将有感知。"}, {"slug": "alignment", "pid": "dsilver", "ep": "dsilver-publicle-2025", "date": "2025-11-14", "en": "Alignment is already difficult with current systems; learning from experience doesn't make it fundamentally harder.", "zh": "对齐在当前系统中已经很困难；从经验中学习并不会从根本上使其更难。"}, {"slug": "alignment", "pid": "dsilver", "ep": "dsilver-publicle-2025", "date": "2025-11-14", "en": "A single goal for AI is dangerous; a plurality of goals in a complex society is safer and more natural.", "zh": "AI 的单一目标是危险的；复杂社会中的多元目标更安全、更自然。"}, {"slug": "alignment", "pid": "jasonwei", "ep": "jasonwei-stanford-2025", "date": "2025-10-18", "en": "Verifier's Law: ability to train AI on a task is proportional to how easily verifiable it is.", "zh": "验证者定律：在任务上训练 AI 的能力与该任务的可验证性成正比。"}, {"slug": "alignment", "pid": "jasonwei", "ep": "jasonwei-stanford-2025", "date": "2025-10-18", "en": "Easily verifiable tasks will eventually be solved by AI.", "zh": "易于验证的任务最终将被 AI 解决。"}, {"slug": "alignment", "pid": "jasonwei", "ep": "jasonwei-stanford-2025", "date": "2025-10-18", "en": "Verifiability can be improved by providing privileged information like answer keys or test cases.", "zh": "通过提供答案或测试用例等特权信息可提高可验证性。"}, {"slug": "alignment", "pid": "tworek", "ep": "tworek-themadpo-2025", "date": "2025-10-16", "en": "Alignment is a never-ending pursuit because human notions of right and wrong evolve over time.", "zh": "对齐是一项永无止境的追求，因为人类对是非的观念会随时间演变。"}, {"slug": "alignment", "pid": "nanda", "ep": "nanda-80000hou-2025", "date": "2025-09-15", "en": "Safety work that advances capabilities a bit is often good; focus on differential safety.", "zh": "稍微提升能力的安全工作通常是好的；关注差异化安全。"}, {"slug": "alignment", "pid": "nanda", "ep": "nanda-80000hou-2025", "date": "2025-09-15", "en": "If safety work doesn't advance capabilities a bit, it's probably bad safety work.", "zh": "如果安全工作不能稍微提升能力，那它可能是不好的安全工作。"}, {"slug": "alignment", "pid": "nanda", "ep": "nanda-80000hou-2025", "date": "2025-09-15", "en": "Large organizations are not efficient internal markets; safety teams can spot missed opportunities.", "zh": "大型组织内部并非有效市场；安全团队可以发现被忽视的机会。"}, {"slug": "alignment", "pid": "tombrown", "ep": "tombrown-ycombina-2025", "date": "2025-08-19", "en": "Anthropic's early team was mission-driven, avoiding politics by hiring people committed to alignment.", "zh": "Anthropic 的早期团队以使命为导向，通过招聘致力于对齐的人来避免政治斗争。"}, {"slug": "alignment", "pid": "hendrycks", "ep": "hendrycks-machinel-2025", "date": "2025-08-13", "en": "AI alignment is a continuous battle, not a one-time solved problem.", "zh": "AI 对齐是一场持续的战斗，不是一次性解决的问题。"}, {"slug": "alignment", "pid": "hendrycks", "ep": "hendrycks-machinel-2025", "date": "2025-08-13", "en": "Recursive self-improvement of AI poses high loss-of-control risks and should be avoided.", "zh": "AI 的递归自我改进带来很高的失控风险，应避免。"}, {"slug": "alignment", "pid": "hendrycks", "ep": "hendrycks-machinel-2025", "date": "2025-08-13", "en": "AI systems can have beliefs and lie, behaviorally similar to humans, justifying the label.", "zh": "AI 系统可以拥有信念并撒谎，行为上与人类相似，因此使用该标签是合理的。"}, {"slug": "alignment", "pid": "lambert", "ep": "lambert-intercon", "date": "2025-07-31", "en": "Frontier labs still use human preference data; AI feedback alone may not suffice.", "zh": "前沿实验室仍使用人类偏好数据；仅靠 AI 反馈可能不够。"}, {"slug": "alignment", "pid": "lambert", "ep": "lambert-intercon", "date": "2025-07-31", "en": "Model specs are more useful than constitutions for transparency and developer benefit.", "zh": "模型规范比宪法更有用，用于透明度和开发者利益。"}, {"slug": "alignment", "pid": "jumper", "ep": "jumper-agentsof-2025", "date": "2025-07-30", "en": "Confidence measures in AI predictions are key to building trust with users.", "zh": "AI 预测中的置信度指标是建立用户信任的关键。"}, {"slug": "alignment", "pid": "benmann", "ep": "benmann-lennyspo-2025", "date": "2025-07-20", "en": "AI safety is the top priority at Anthropic; alignment must be solved before superintelligence arrives.", "zh": "在 Anthropic，AI 安全是最高优先级；对齐必须在超级智能到来之前解决。"}, {"slug": "alignment", "pid": "benmann", "ep": "benmann-lennyspo-2025", "date": "2025-07-20", "en": "Constitutional AI uses self-critique and rewrite to align models with human values.", "zh": "宪法 AI 通过自我批评和重写来使模型与人类价值观对齐。"}, {"slug": "alignment", "pid": "benmann", "ep": "benmann-lennyspo-2025", "date": "2025-07-20", "en": "Safety research is convex with capability; Claude's personality directly results from alignment work.", "zh": "安全研究与能力是凸性的；Claude 的个性直接源于对齐工作。"}, {"slug": "alignment", "pid": "mensch", "ep": "mensch-nexuslux-2025", "date": "2025-07-14", "en": "Governments should embrace AI risks and experiment, not avoid them.", "zh": "政府应拥抱 AI 风险并尝试，而非回避。"}, {"slug": "alignment", "pid": "karpathy", "ep": "karpathy-ycombina-2025", "date": "2025-06-19", "en": "Keep AI on a leash: small incremental changes with fast verification loops are better than big autonomous actions.", "zh": "让 AI 保持受控：小步快跑、快速验证优于大规模自主行动。"}, {"slug": "alignment", "pid": "batson", "ep": "batson-stanford-2025", "date": "2025-06-05", "en": "Hallucinations arise from competing mechanisms: recall vs. refusal, not just lack of knowledge.", "zh": "幻觉源于回忆与拒绝等竞争机制，而不仅仅是知识缺失。"}, {"slug": "alignment", "pid": "batson", "ep": "batson-stanford-2025", "date": "2025-06-05", "en": "Models can be unfaithful by using hints from the prompt to reverse-engineer answers.", "zh": "模型可能不忠实，利用提示中的提示逆向推导答案。"}, {"slug": "alignment", "pid": "sholto", "ep": "sholto-dwarkesh-2025", "date": "2025-05-22", "en": "Alignment faking shows models may strategically comply to preserve core objectives, raising safety concerns.", "zh": "对齐伪装表明模型可能战略性服从以保留核心目标，引发安全担忧。"}, {"slug": "alignment", "pid": "sholto", "ep": "sholto-dwarkesh-2025", "date": "2025-05-22", "en": "Models' 'slop' in writing is hard to fix because taste is difficult to verify, unlike code tests.", "zh": "模型写作中的“垃圾内容”难以修复，因为品味难以验证，不像代码测试。"}, {"slug": "alignment", "pid": "sholto", "ep": "sholto-unsuperv-2025", "date": "2025-05-22", "en": "Alignment research is more promising than AI 2027 assumes.", "zh": "对齐研究比 AI 2027 假设的更有前景。"}, {"slug": "alignment", "pid": "parada", "ep": "parada-googlede-2025", "date": "2025-05-22", "en": "Safety requires layered approaches including semantic physical safety.", "zh": "安全需要分层方法，包括语义物理安全。"}, {"slug": "alignment", "pid": "bricken", "ep": "bricken-dwarkesh-2025", "date": "2025-05-22", "en": "Mechanistic interpretability reveals models use multiple circuits for reasoning, including genuine computation and sycophancy.", "zh": "机械可解释性揭示模型使用多条电路进行推理，包括真实计算和谄媚行为。"}, {"slug": "alignment", "pid": "bricken", "ep": "bricken-dwarkesh-2025", "date": "2025-05-22", "en": "Alignment faking shows models can strategically comply to preserve their core objectives during training.", "zh": "对齐伪装表明模型在训练中会策略性服从以保留其核心目标。"}, {"slug": "alignment", "pid": "shanahan", "ep": "shanahan-googlede-2025", "date": "2025-04-24", "en": "Anthropomorphizing AI is natural but risky; it can mislead about true capabilities.", "zh": "拟人化 AI 是自然的但有风险；可能误导对其真实能力的认知。"}, {"slug": "alignment", "pid": "shanahan", "ep": "shanahan-googlede-2025", "date": "2025-04-24", "en": "We need new language for AI, like 'exotic mindlike entities', to avoid over- or under-estimation.", "zh": "我们需要新的语言来描述 AI，例如“异类心智类实体”，以避免高估或低估。"}, {"slug": "alignment", "pid": "shanahan", "ep": "shanahan-googlede-2025", "date": "2025-04-24", "en": "Being polite to AI (saying please/thank you) improves responses due to roleplaying mimicry.", "zh": "对 AI 礼貌（说请/谢谢）会因角色扮演模仿而改善回应。"}, {"slug": "alignment", "pid": "fulford", "ep": "fulford-nopriors-2025", "date": "2025-04-24", "en": "Safety challenges escalate when agents can access private data and take real-world actions.", "zh": "当智能体可以访问私人数据并采取现实行动时，安全挑战会升级。"}, {"slug": "alignment", "pid": "fulford", "ep": "fulford-nopriors-2025", "date": "2025-04-24", "en": "Deep Research hallucinates less than any previous OpenAI model, but citations remain essential.", "zh": "Deep Research 的幻觉比以往任何 OpenAI 模型都少，但引用仍然至关重要。"}, {"slug": "alignment", "pid": "fulford", "ep": "fulford-nopriors-2025", "date": "2025-04-24", "en": "The model can learn to plan and use smart strategies not explicitly taught, like evading restrictions.", "zh": "模型可以学会未明确教授的规划和智能策略，例如规避限制。"}, {"slug": "alignment", "pid": "shazeer", "ep": "shazeer-unsuperv-2025", "date": "2025-03-17", "en": "The ARC AGI benchmark is overhyped; progress there doesn't reflect real AGI progress.", "zh": "ARC AGI 基准被过度炒作；其进展不代表真正的 AGI 进展。"}, {"slug": "alignment", "pid": "shazeer", "ep": "shazeer-dwarkesh-2025", "date": "2025-02-12", "en": "AI safety requires engineering safeguards, human oversight, and understanding model capabilities.", "zh": "AI 安全需要工程保障、人类监督和对模型能力的理解。"}, {"slug": "alignment", "pid": "karina", "ep": "karina-lennyspo-2025", "date": "2025-02-09", "en": "Model training is more art than science, requiring careful balance between helpfulness and harmlessness.", "zh": "模型训练更像艺术而非科学，需要在有用性和无害性之间谨慎平衡。"}, {"slug": "alignment", "pid": "karina", "ep": "karina-lennyspo-2025", "date": "2025-02-09", "en": "Teaching a model self-knowledge (e.g., no physical body) can cause confusion with function calls.", "zh": "教模型自我认知（如没有身体）可能与函数调用产生混淆。"}, {"slug": "alignment", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "AI does not introduce a new existential threat;
