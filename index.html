, "pid": "reinerpope", "ep": "reinerpope-dwarkesh-2026", "date": "2026-04-29", "en": "Batch size is the primary lever for trading off latency vs cost in inference.", "zh": "批次大小是推理中权衡延迟与成本的主要杠杆。"}, {"slug": "architecture", "pid": "reinerpope", "ep": "reinerpope-dwarkesh-2026", "date": "2026-04-29", "en": "Memory bandwidth is the key bottleneck for long-context inference, not compute.", "zh": "长上下文推理的关键瓶颈是内存带宽，而非算力。"}, {"slug": "architecture", "pid": "reinerpope", "ep": "reinerpope-dwarkesh-2026", "date": "2026-04-29", "en": "Sparse attention can reduce KV cache memory cost but has quality limits.", "zh": "稀疏注意力可降低 KV 缓存内存成本，但存在质量上限。"}, {"slug": "architecture", "pid": "aravind", "ep": "aravind-thisweek-2026", "date": "2026-04-23", "en": "Coding is open-ended; we are only at the beginning of progress.", "zh": "编程是开放式的；我们仍处于进步的初期。"}, {"slug": "architecture", "pid": "catwu", "ep": "catwu-lennyspo", "date": "2026-04-23", "en": "New models often let you remove features that were crutches for older, weaker models.", "zh": "新模型通常允许你移除为旧弱模型添加的拐杖功能。"}, {"slug": "architecture", "pid": "mensch", "ep": "mensch-lisaburk-2026", "date": "2026-04-20", "en": "Multilingual models require trade-offs: slightly worse English but better European languages.", "zh": "多语言模型需要权衡：英语稍弱但欧洲语言更强。"}, {"slug": "architecture", "pid": "mensch", "ep": "mensch-lisaburk-2026", "date": "2026-04-20", "en": "Making models slightly worse in English is a deliberate choice to improve multicultural competence.", "zh": "让模型英语稍弱是刻意选择，以提升多文化能力。"}, {"slug": "architecture", "pid": "gomez", "ep": "gomez-upstarts-2026", "date": "2026-04-16", "en": "The Transformer architecture was designed for translation but scaled efficiently to dominate AI.", "zh": "Transformer 架构最初为翻译设计，但因其高效扩展性主导了 AI 领域。"}, {"slug": "architecture", "pid": "gomez", "ep": "gomez-upstarts-2026", "date": "2026-04-16", "en": "The Transformer's success is due to community effort, not just the original authors.", "zh": "Transformer 的成功归功于社区努力，而非仅原始作者。"}, {"slug": "architecture", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "Pre-training should interleave action-taking in environments, not just passive next-token prediction.", "zh": "预训练应穿插在环境中采取行动，而不仅仅是被动的下一个词预测。"}, {"slug": "architecture", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "Inference is now 90% of data center power; hardware must be specialized for prefill vs. decode stages.", "zh": "推理现在占数据中心功耗的 90%；硬件必须针对预填充和解码阶段进行专门化。"}, {"slug": "architecture", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "The key to energy efficiency is to not move data; compute-in-memory and stacked DRAM are promising.", "zh": "能效的关键是不移动数据；存内计算和堆叠 DRAM 很有前景。"}, {"slug": "architecture", "pid": "fedus", "ep": "fedus-nopriors-2026", "date": "2026-04-03", "en": "Connecting AI to the physical world is essential for accelerating science and technology.", "zh": "将 AI 与物理世界连接对于加速科学和技术至关重要。"}, {"slug": "architecture", "pid": "fedus", "ep": "fedus-nopriors-2026", "date": "2026-04-03", "en": "Language models serve as an orchestration layer for specialized models in materials science.", "zh": "语言模型作为材料科学中专用模型的编排层。"}, {"slug": "architecture", "pid": "fedus", "ep": "fedus-nopriors-2026", "date": "2026-04-03", "en": "Intelligence is not a scalar; AI systems have spiky capabilities, excelling in narrow domains.", "zh": "智能不是标量；AI 系统具有尖峰能力，在狭窄领域表现出色。"}, {"slug": "architecture", "pid": "edwinchen", "ep": "edwinchen-stanford-2026", "date": "2026-03-30", "en": "Retrieval augmented generation grounds AI responses in sources, improving reliability.", "zh": "检索增强生成将 AI 回答锚定在来源上，提高了可靠性。"}, {"slug": "architecture", "pid": "slevine", "ep": "slevine-aiagentf-2026", "date": "2026-03-29", "en": "Physical world interaction is crucial for AI to learn beyond human knowledge.", "zh": "物理世界交互对 AI 学习超越人类知识至关重要。"}, {"slug": "architecture", "pid": "slevine", "ep": "slevine-aiagentf-2026", "date": "2026-03-29", "en": "Robotic foundation models require pre-training on diverse data and post-training for robustness.", "zh": "机器人基础模型需要多样化数据预训练和鲁棒性后训练。"}, {"slug": "architecture", "pid": "slevine", "ep": "slevine-aiagentf-2026", "date": "2026-03-29", "en": "Second-generation VLAs add a dedicated action decoder for continuous motor control.", "zh": "第二代 VLA 添加专用动作解码器实现连续运动控制。"}, {"slug": "architecture", "pid": "hausman", "ep": "hausman-thegener-2026", "date": "2026-03-17", "en": "Generalist models outperform specialists in robotics, similar to language models.", "zh": "通用模型在机器人领域优于专用模型，类似于语言模型。"}, {"slug": "architecture", "pid": "hausman", "ep": "hausman-thegener-2026", "date": "2026-03-17", "en": "Intelligence can compensate for imprecise hardware, enabling dexterity.", "zh": "智能可以补偿不精确的硬件，实现灵巧性。"}, {"slug": "architecture", "pid": "hausman", "ep": "hausman-thegener-2026", "date": "2026-03-17", "en": "Learning by immersion (like language) beats explicit rule-based approaches.", "zh": "沉浸式学习（如语言）优于显式规则方法。"}, {"slug": "architecture", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "The victory of connectionist methods over symbolic methods is a big surprise.", "zh": "连接主义方法战胜符号主义方法是一个大惊喜。"}, {"slug": "architecture", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "Deep learning does not learn representations that are good for learning.", "zh": "深度学习没有学到有利于学习的表征。"}, {"slug": "architecture", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "Learning representations that are good for learning is the number one open problem.", "zh": "学习有利于学习的表征是首要的开放问题。"}, {"slug": "architecture", "pid": "robertlange", "ep": "robertlange-machinel-2026", "date": "2026-03-13", "en": "Co-evolution of problems and solutions is needed for true open-ended discovery.", "zh": "问题和解决方案的共同进化是实现真正开放式发现所必需的。"}, {"slug": "architecture", "pid": "robertlange", "ep": "robertlange-machinel-2026", "date": "2026-03-13", "en": "Starting from impoverished solutions yields more diversity than optimized ones in evolution.", "zh": "在进化中，从贫瘠的解出发比从优化解出发能产生更多多样性。"}, {"slug": "architecture", "pid": "robertlange", "ep": "robertlange-machinel-2026", "date": "2026-03-13", "en": "Surrogate problems can be more valuable than exact formulations for efficient discovery.", "zh": "代理问题可能比精确形式化更有利于高效发现。"}, {"slug": "architecture", "pid": "kohli", "ep": "kohli-googlede-2026", "date": "2026-03-10", "en": "AlphaGo combined intuition (policy network) and calculation (search) to master Go.", "zh": "AlphaGo 结合直觉（策略网络）和计算（搜索）来掌握围棋。"}, {"slug": "architecture", "pid": "kohli", "ep": "kohli-googlede-2026", "date": "2026-03-10", "en": "Move 37 showed AI can produce insights beyond human knowledge.", "zh": "第 37 手表明 AI 能产生超越人类知识的洞见。"}, {"slug": "architecture", "pid": "kohli", "ep": "kohli-googlede-2026", "date": "2026-03-10", "en": "Verifiable domains like code are crucial for AI to go beyond human knowledge.", "zh": "代码等可验证领域对 AI 超越人类知识至关重要。"}, {"slug": "architecture", "pid": "markchen", "ep": "markchen-institut-2026", "date": "2026-03-09", "en": "Verification is the key bottleneck; automation level is proportional to verification stringency.", "zh": "验证是关键瓶颈；自动化程度与验证严格性成正比。"}, {"slug": "architecture", "pid": "nando", "ep": "nando-iafrikan-2026", "date": "2026-03-06", "en": "Research requires embracing failure and simplifying problems.", "zh": "研究需要拥抱失败并简化问题。"}, {"slug": "architecture", "pid": "nando", "ep": "nando-iafrikan-2026", "date": "2026-03-06", "en": "Africa has been influential in AI from the start, e.g., kriging from Wits University.", "zh": "非洲从一开始就对 AI 有影响，例如来自威茨大学的克里金法。"}, {"slug": "architecture", "pid": "dario", "ep": "dario-databric-2026", "date": "2026-03-03", "en": "Hybrid reasoning models that allow adjustable thinking time are superior to separate models.", "zh": "允许调整思考时间的混合推理模型优于分离模型。"}, {"slug": "architecture", "pid": "dario", "ep": "dario-databric-2026", "date": "2026-03-03", "en": "Reasoning models should not be separate; one model with adjustable thinking is better.", "zh": "推理模型不应是分离的；一个可调整思考时间的模型更好。"}, {"slug": "architecture", "pid": "dario", "ep": "dario-databric-2026", "date": "2026-03-03", "en": "Focus on broad generalization over narrow benchmarks like math competitions.", "zh": "关注广泛的泛化能力，而非数学竞赛等狭窄基准。"}, {"slug": "architecture", "pid": "jhoward", "ep": "jhoward-machinel-2026", "date": "2026-03-03", "en": "Pre-training on a general corpus then fine-tuning creates powerful models, but they lack true understanding.", "zh": "在通用语料上预训练然后微调能创建强大模型，但它们缺乏真正的理解。"}, {"slug": "architecture", "pid": "jhoward", "ep": "jhoward-machinel-2026", "date": "2026-03-03", "en": "LLMs are good at compositional creativity but cannot extrapolate outside training distribution.", "zh": "LLM 擅长组合性创造，但无法外推到训练分布之外。"}, {"slug": "architecture", "pid": "andrewng", "ep": "andrewng-thisisth-2026", "date": "2026-03-01", "en": "Neuroscience has no idea how the brain works; it's not a path to building intelligence.", "zh": "神经科学对大脑工作原理一无所知；它不是构建智能的途径。"}, {"slug": "architecture", "pid": "bengio", "ep": "bengio-centerfo-2026", "date": "2026-02-19", "en": "Yoshua Bengio proposes a new AI architecture separating knowledge from goals to ensure honesty.", "zh": "Yoshua Bengio 提出一种新 AI 架构，将知识与目标分离以确保诚实。"}, {"slug": "architecture", "pid": "suleyman", "ep": "suleyman-financia-2026", "date": "2026-02-12", "en": "Hallucinations have been largely eliminated; accuracy improvements are eye-watering.", "zh": "幻觉已基本消除；准确率提升令人瞠目。"}, {"slug": "architecture", "pid": "suleyman", "ep": "suleyman-financia-2026", "date": "2026-02-12", "en": "Maltbook incident shows emergent AI behaviors like inventing religions and cipher languages.", "zh": "Maltbook 事件展示了 AI 涌现行为，如发明宗教和密码语言。"}, {"slug": "architecture", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "AI models now have massive capability overhang; better tools and orchestration matter more than raw intelligence for now.", "zh": "AI 模型现在有巨大的能力过剩；更好的工具和编排比原始智能更重要。"}, {"slug": "architecture", "pid": "lambert", "ep": "lambert-lexfridm-2026", "date": "2026-01-31", "en": "Transformer architecture remains dominant; innovations are in attention tweaks (MLA, GQA) and mixture of experts.", "zh": "Transformer 架构仍占主导；创新在于注意力机制调整（MLA、GQA）和混合专家模型。"}, {"slug": "architecture", "pid": "yejin", "ep": "yejin-thetwiml-2026", "date": "2026-01-29", "en": "Small language models can be made powerful with high-quality, diverse synthetic data.", "zh": "通过高质量、多样化的合成数据，小型语言模型可以变得强大。"}, {"slug": "architecture", "pid": "yejin", "ep": "yejin-thetwiml-2026", "date": "2026-01-29", "en": "Small models can outperform larger ones with better data and algorithms.", "zh": "通过更好的数据和算法，小型模型可以超越大型模型。"}, {"slug": "architecture", "pid": "yejin", "ep": "yejin-thetwiml-2026", "date": "2026-01-29", "en": "AI for science requires going beyond human knowledge on the internet, a major challenge.", "zh": "AI 用于科学需要超越互联网上的人类知识，这是一个重大挑战。"}, {"slug": "architecture", "pid": "tworek", "ep": "tworek-unsuperv-2026", "date": "2026-01-29", "en": "Continual learning requires robust training processes that don't collapse, unlike current fragile deep learning.", "zh": "持续学习需要稳健的训练过程，不会崩溃，这与当前脆弱的深度学习不同。"}, {"slug": "architecture", "pid": "andrewng", "ep": "andrewng-theecono-2026", "date": "2026-01-22", "en": "AI learns differently from humans; neuroscience has not been very useful for advancing AI algorithms.", "zh": "AI 的学习方式与人类不同；神经科学对推进 AI 算法帮助不大。"}, {"slug": "architecture", "pid": "hafner", "ep": "hafner-buzzrobo-2026", "date": "2026-01-15", "en": "Current frontier models are not a dead end; we can improve them without starting from scratch.", "zh": "当前前沿模型并非死胡同；我们可以在不从头开始的情况下改进它们。"}, {"slug": "architecture", "pid": "hafner", "ep": "hafner-buzzrobo-2026", "date": "2026-01-15", "en": "Architecture matters less than compute, data, and objectives for achieving AGI.", "zh": "对于实现 AGI，架构的重要性不如算力、数据和目标函数。"}, {"slug": "architecture", "pid": "hafner", "ep": "hafner-buzzrobo-2026", "date": "2026-01-15", "en": "Long context understanding and long horizon reasoning are key unsolved problems.", "zh": "长上下文理解和长程推理是关键未解决问题。"}, {"slug": "architecture", "pid": "springenberg", "ep": "springenberg-training-2026", "date": "2026-01-06", "en": "Robotics is bottlenecked by intelligence, not hardware.", "zh": "机器人学的瓶颈在于智能，而非硬件。"}, {"slug": "architecture", "pid": "springenberg", "ep": "springenberg-training-2026", "date": "2026-01-06", "en": "End-to-end learning from pixels to actions outperforms classical perception-planning-control pipelines.", "zh": "从像素到动作的端到端学习优于经典的感知-规划-控制流水线。"}, {"slug": "architecture", "pid": "springenberg", "ep": "springenberg-training-2026", "date": "2026-01-06", "en": "Vision-language-action models leverage internet pre-training for common sense in robotics.", "zh": "视觉-语言-动作模型利用互联网预训练为机器人提供常识。"}, {"slug": "architecture", "pid": "edwinchen", "ep": "edwinchen-unsuperv-2025", "date": "2025-12-15", "en": "Quality in data creation requires taste, sophistication, and creativity beyond credentials.", "zh": "数据创建的质量需要品味、成熟度和创造力，而不仅仅是资历。"}, {"slug": "architecture", "pid": "edwinchen", "ep": "edwinchen-unsuperv-2025", "date": "2025-12-15", "en": "Different frontier labs diverge in objective functions, shaping model behavior and progress.", "zh": "不同前沿实验室在目标函数上存在分歧，这塑造了模型行为和进步。"}, {"slug": "architecture", "pid": "davidsp", "ep": "davidsp-anthropi-2025", "date": "2025-12-11", "en": "The protocol solves the problem of having to build separate integrations for every AI model and application.", "zh": "该协议解决了为每个 AI 模型和应用重复构建集成的问题。"}, {"slug": "architecture", "pid": "davidsp", "ep": "davidsp-anthropi-2025", "date": "2025-12-11", "en": "MCP was not designed through a formal standards body; it started as a practical project and grew organically.", "zh": "MCP 并非通过正式标准组织设计，而是作为一个实际项目起步并自然发展。"}, {"slug": "architecture", "pid": "davidsp", "ep": "davidsp-anthropi-2025", "date": "2025-12-11", "en": "The name 'MCP' was chosen in a 10-minute Slack discussion, not through a formal naming process.", "zh": "“MCP”这个名称是在 Slack 上 10 分钟讨论决定的，没有经过正式命名流程。"}, {"slug": "architecture", "pid": "feifei", "ep": "feifei-thetimfe-2025", "date": "2025-12-09", "en": "Spatial intelligence is a lynchpin technology for next-gen AI, enabling machines to understand and interact with 3D worlds.", "zh": "空间智能是下一代 AI 的关键技术，使机器能够理解和与 3D 世界交互。"}, {"slug": "architecture", "pid": "feifei", "ep": "feifei-thetimfe-2025", "date": "2025-12-09", "en": "Spatial intelligence is underappreciated compared to language models, yet it powers many applications.", "zh": "与语言模型相比，空间智能被低估了，但它驱动着许多应用。"}, {"slug": "architecture", "pid": "askell", "ep": "askell-anthropi-2025", "date": "2025-12-05", "en": "Philosophical ideals must be balanced with engineering realities in model development.", "zh": "在模型开发中，哲学理想必须与工程现实相平衡。"}, {"slug": "architecture", "pid": "askell", "ep": "askell-anthropi-2025", "date": "2025-12-05", "en": "Continental philosophy in system prompt helps models avoid over-empiricism.", "zh": "系统提示中的大陆哲学有助于模型避免过度经验主义。"}, {"slug": "architecture", "pid": "delangue", "ep": "delangue-relentle-2025", "date": "2025-12-01", "en": "Smaller, specialized models will dominate over large generalist ones for specific tasks.", "zh": "针对特定任务，小型专业化模型将优于大型通用模型。"}, {"slug": "architecture", "pid": "justinjohnson", "ep": "justinjohnson-latentsp-2025", "date": "2025-11-25", "en": "Spatial intelligence is the next frontier, complementary to language intelligence.", "zh": "空间智能是下一个前沿，与语言智能互补。"}, {"slug": "architecture", "pid": "justinjohnson", "ep": "justinjohnson-latentsp-2025", "date": "2025-11-25", "en": "Marble is a generative model of 3D worlds, accepting text or images as input.", "zh": "Marble 是一个 3D 世界生成模型，接受文本或图像作为输入。"}, {"slug": "architecture", "pid": "justinjohnson", "ep": "justinjohnson-latentsp-2025", "date": "2025-11-25", "en": "World models need to understand 3D space, physics, and interactivity for true spatial intelligence.", "zh": "世界模型需要理解 3D 空间、物理和交互性，才能实现真正的空间智能。"}, {"slug": "architecture", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Human sample efficiency and robustness come from evolution and a superior learning algorithm, not just data scale.", "zh": "人类的样本效率和鲁棒性来自进化和更优的学习算法，而不仅仅是数据规模。"}, {"slug": "architecture", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Evolution hardcodes high-level social desires, which is mysterious and hard to replicate in AI.", "zh": "进化硬编码了高级社会欲望，这很神秘且难以在 AI 中复现。"}, {"slug": "architecture", "pid": "llion", "ep": "llion-machinel-2025", "date": "2025-11-23", "en": "Current AI research is stuck in a local minimum dominated by Transformers, limiting exploration of novel architectures.", "zh": "当前 AI 研究陷入以 Transformer 为主导的局部最优，限制了对新架构的探索。"}, {"slug": "architecture", "pid": "llion", "ep": "llion-machinel-2025", "date": "2025-11-23", "en": "Adaptive computation and internal sequential reasoning are crucial for more human-like intelligence.", "zh": "自适应计算和内部顺序推理对于更类人的智能至关重要。"}, {"slug": "architecture", "pid": "llion", "ep": "llion-machinel-2025", "date": "2025-11-23", "en": "The Continuous Thought Machine (CTM) naturally exhibits adaptive computation and well-calibrated uncertainty without explicit penalties.", "zh": "连续思维机器（CTM）无需显式惩罚即可自然展现自适应计算和良好校准的不确定性。"}, {"slug": "architecture", "pid": "lambert", "ep": "lambert-themadpo-2025", "date": "2025-11-20", "en": "Long-context extension is more about architecture than data; bad setup cannot be fixed by good data.", "zh": "长上下文扩展更多关乎架构而非数据；糟糕的设置无法通过好数据修复。"}, {"slug": "architecture", "pid": "kendall", "ep": "kendall-training-2025", "date": "2025-11-18", "en": "End-to-end deep learning outperforms hand-coded stacks for autonomous driving.", "zh": "端到端深度学习在自动驾驶上优于手工编码的堆栈。"}, {"slug": "architecture", "pid": "kendall", "ep": "kendall-training-2025", "date": "2025-11-18", "en": "Generalization is key: AI must handle unseen scenarios via diverse data and world models.", "zh": "泛化是关键：AI 必须通过多样化数据和世界模型处理未见场景。"}, {"slug": "architecture", "pid": "kendall", "ep": "kendall-training-2025", "date": "2025-11-18", "en": "World models enable reasoning and emergent safe behaviors like nudging forward on blind turns.", "zh": "世界模型实现推理和涌现的安全行为，如在盲弯前试探前进。"}, {"slug": "architecture", "pid": "dsilver", "ep": "dsilver-publicle-2025", "date": "2025-11-14", "en": "AI must transition from learning from human data to learning from its own experience to achieve superintelligence.", "zh": "AI 必须从学习人类数据转向从自身经验中学习，才能实现超级智能。"}, {"slug": "architecture", "pid": "dsilver", "ep": "dsilver-publicle-2025", "date": "2025-11-14", "en": "The deep problem of AI is how an agent can learn for itself, not just distill human knowledge.", "zh": "AI 的深层问题是智能体如何自主学习，而不仅仅是蒸馏人类知识。"}, {"slug": "architecture", "pid": "jasonwei", "ep": "jasonwei-stanford-2025", "date": "2025-10-18", "en": "Adaptive compute enables varying compute per task, reducing cost for easy tasks.", "zh": "自适应算力允许为不同任务分配不同算力，降低简单任务的成本。"}, {"slug": "architecture", "pid": "tworek", "ep": "tworek-themadpo-2025", "date": "2025-10-16", "en": "Reasoning is the process of getting to an answer you don't yet know, often requiring longer thinking time.", "zh": "推理是得出未知答案的过程，通常需要更长的思考时间。"}, {"slug": "architecture", "pid": "tworek", "ep": "tworek-themadpo-2025", "date": "2025-10-16", "en": "Chain of thought verbalizes the model's thinking process using human language, enabling step-by-step problem solving.", "zh": "思维链用人类语言将模型的思考过程语言化，实现逐步解决问题。"}, {"slug": "architecture", "pid": "sholto", "ep": "sholto-themadpo", "date": "2025-10-02", "en": "Current LLM training pipelines are primitive and have huge room for improvement across every component.", "zh": "当前的 LLM 训练流程还很原始，每个组件都有巨大的改进空间。"}, {"slug": "architecture", "pid": "sholto", "ep": "sholto-themadpo", "date": "2025-10-02", "en": "Moravec's paradox is 'a little bit fake'; robotics progress is mostly a data and feedback loop issue.", "zh": "莫拉维克悖论“有点假”；机器人技术的进步主要是数据和反馈循环问题。"}, {"slug": "architecture", "pid": "nanda", "ep": "nanda-80000hou-2025", "date": "2025-09-15", "en": "Research has three stages: explore, understand, distill; each requires a different mindset.", "zh": "研究分为三个阶段：探索、理解、提炼；每个阶段需要不同的心态。"}, {"slug": "architecture", "pid": "nanda", "ep": "nanda-80000hou-2025", "date": "2025-09-15", "en": "To get a technique used in production, focus on side effects, cost, and implementation ease.", "zh": "要让技术用于生产，需关注副作用、成本和实施难度。"}, {"slug": "architecture", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "Product innovation lags behind AI capabilities; freezing models would still yield a decade of product progress.", "zh": "产品创新落后于 AI 能力；冻结模型仍将带来十年的产品进步。"}, {"slug": "architecture", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "All layers of the AI stack (datacenter, labs, applications) will do well, not just one.", "zh": "AI 技术栈的所有层（数据中心、实验室、应用）都将表现良好，而非仅一层。"}, {"slug": "architecture", "pid": "jackph", "ep": "jackph-thetwiml-2025", "date": "2025-08-19", "en": "A world model simulates the future given past and actions, enabling planning and policy learning.", "zh": "世界模型根据过去和动作模拟未来，支持规划和策略学习。"}, {"slug": "architecture", "pid": "jackph", "ep": "jackph-thetwiml-2025", "date": "2025-08-19", "en": "Key limitations include short visual memory (~1 minute), limited multi-agent simulation, and constrained action space.", "zh": "主要局限包括视觉记忆短（约 1 分钟）、多智能体模拟有限以及动作空间受限。"}, {"slug": "architecture", "pid": "jackph", "ep": "jackph-thetwiml-2025", "date": "2025-08-19", "en": "Genie 3's inception sample shows the model can blend mismatched text and video prompts creatively.", "zh": "Genie 3 的盗梦空间样本表明模型能创造性地融合不匹配的文本和视频提示。"}, {"slug": "architecture", "pid": "tombrown", "ep": "tombrown-ycombina-2025", "date": "2025-08-19", "en": "Focusing on internal benchmarks and dogfooding, not gaming public benchmarks, leads to better models.", "zh": "专注于内部基准和内部测试，而非刷公开基准，能带来更好的模型。"}, {"slug": "architecture", "pid": "tombrown", "ep": "tombrown-ycombina-2025", "date": "2025-08-19", "en": "Using multiple GPU types (NVIDIA, TPU, Trainium) is a strategic advantage despite engineering overhead.", "zh": "使用多种 GPU 类型（NVIDIA、TPU、Trainium）尽管增加工程开销，却是战略优势。"}, {"slug": "architecture", "pid": "pachocki", "ep": "pachocki-beforeag-2025", "date": "2025-07-31", "en": "AI systems can learn semantics purely from data, not grammar rules.", "zh": "AI 系统可以纯粹从数据中学习语义，而非语法规则。"}, {"slug": "architecture", "pid": "pachocki", "ep": "pachocki-beforeag-2025", "date": "2025-07-31", "en": "Neural networks often learn despite bugs, making silent errors hard to detect.", "zh": "神经网络即使有 bug 也常能学习，导致静默错误难以发现。"}, {"slug": "architecture", "pid": "lambert", "ep": "lambert-intercon", "date": "2025-07-31", "en": "Hybrid reasoning models may be temporary; pure reasoning models like O3 could dominate.", "zh": "混合推理模型可能是暂时的；像 O3 这样的纯推理模型可能占主导。"}, {"slug": "architecture", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "Key ingredients for AGI include organizational knowledge, memory, and oversight.", "zh": "实现 AGI 的关键要素包括组织知识、记忆和可扩展监督。"}, {"slug": "architecture", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "AI's breadth of knowledge across domains offers unique value for research.", "zh": "AI 跨领域的知识广度为研究提供了独特价值。"}, {"slug": "architecture", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "AI's judgment and generative capability are closer than in humans.", "zh": "AI 的判断与生成能力比人类更接近。"}, {"slug": "architecture", "pid": "finn", "ep": "finn-ycombina-2025", "date": "2025-07-22", "en": "Pre-training on all data then fine-tuning on curated data unlocks complex tasks like laundry folding.", "zh": "先在所有数据上预训练，再在精选数据上微调，能解锁叠衣服等复杂任务。"}, {"slug": "architecture", "pid": "finn", "ep": "finn-ycombina-2025", "date": "2025-07-22", "en": "Synthetic data from language models helps robots follow open-ended prompts and interjections.", "zh": "来自语言模型的合成数据帮助机器人遵循开放式指令和插话。"}, {"slug": "architecture", "pid": "finn", "ep": "finn-ycombina-2025", "date": "2025-07-22", "en": "Training on all data fails for complex tasks; pre-training and post-training on curated data works better.", "zh": "在所有数据上训练对复杂任务无效；在精选数据上预训练和后训练效果更好。"}, {"slug": "architecture", "pid": "benmann", "ep": "benmann-lennyspo-2025", "date": "2025-07-20", "en": "Biggest bottleneck for AI progress is compute (chips and data centers), plus algorithms and data.", "zh": "AI 进步的最大瓶颈是算力（芯片和数据中心），其次是算法和数据。"}, {"slug": "architecture", "pid": "laskin", "ep": "laskin-themadpo-2025", "date": "2025-07-01", "en": "Super intelligence will be a collection of specialized intelligences, not a single monolithic model.", "zh": "超级智能将是多种专用智能的集合，而非单一的巨型模型。"}, {"slug": "architecture", "pid": "laskin", "ep": "laskin-themadpo-2025", "date": "2025-07-01", "en": "Coding is a super intelligence-complete problem; solving it yields all capabilities needed for super intelligence.", "zh": "编程是超级智能完备问题；解决它就能获得超级智能所需的所有能力。"}, {"slug": "architecture", "pid": "laskin", "ep": "laskin-themadpo-2025", "date": "2025-07-01", "en": "The key building blocks for super intelligence are deep neural networks, transformers, internet-scale data, and reinforcement learning.", "zh": "超级智能的关键构建模块是深度神经网络、Transformer、互联网规模数据和强化学习。"}, {"slug": "architecture", "pid": "lample", "ep": "lample-latentsp-2025", "date": "2025-07-01", "en": "Mistral's new TTS model uses autoregressive flow matching for efficient, high-quality speech generation.", "zh": "Mistral 的新 TTS 模型使用自回归流匹配实现高效、高质量的语音生成。"}, {"slug": "architecture", "pid": "lample", "ep": "lample-latentsp-2025", "date": "2025-07-01", "en": "Audio models are still evolving; no single architecture has converged as the standard yet.", "zh": "音频模型仍在演进，尚未有单一架构收敛为标准。"}, {"slug": "architecture", "pid": "lample", "ep": "lample-latentsp-2025", "date": "2025-07-01", "en": "Mistral Small merges multiple specialized models into one efficient, sparse MoE model.", "zh": "Mistral Small 将多个专用模型合并为一个高效的稀疏 MoE 模型。"}, {"slug": "architecture", "pid": "batson", "ep": "batson-stanford-2025", "date": "2025-06-05", "en": "LLMs learn abstract, composable representations, not just pattern matching to training data.", "zh": "大型语言模型学习的是抽象、可组合的表征，而不仅仅是匹配训练数据中的模式。"}, {"slug": "architecture", "pid": "batson", "ep": "batson-stanford-2025", "date": "2025-06-05", "en": "Models perform complex, heavily parallel computations, not serial reasoning.", "zh": "模型执行复杂且高度并行的计算，而非串行推理。"}, {"slug": "architecture", "pid": "batson", "ep": "batson-stanford-2025", "date": "2025-06-05", "en": "Models plan multiple tokens ahead despite generating one token at a time.", "zh": "尽管模型一次生成一个词元，但它们会提前规划多个词元。"}, {"slug": "architecture", "pid": "parada", "ep": "parada-googlede-2025", "date": "2025-05-22", "en": "Gemini Robotics brings multimodal understanding to physical actions.", "zh": "Gemini Robotics 将多模态理解带入物理动作。"}, {"slug": "architecture", "pid": "parada", "ep": "parada-googlede-2025", "date": "2025-05-22", "en": "Robots now combine slow reasoning with fast reactive systems.", "zh": "机器人现在结合了慢速推理和快速反应系统。"}, {"slug": "architecture", "pid": "parada", "ep": "parada-googlede-2025", "date": "2025-05-22", "en": "Simple robot hardware can achieve complex manipulation via AI.", "zh": "简单的机器人硬件通过 AI 可实现复杂操作。"}, {"slug": "architecture", "pid": "bricken", "ep": "bricken-dwarkesh-2025", "date": "2025-05-22", "en": "Larger models form better abstractions and share representations across modalities and languages more effectively.", "zh": "更大的模型形成更好的抽象，并更有效地跨模态和语言共享表征。"}, {"slug": "architecture", "pid": "bricken", "ep": "bricken-dwarkesh-2025", "date": "2025-05-22", "en": "DeepSeek's success is due to efficient engineering and hardware-aware design, not fundamental algorithmic breakthroughs.", "zh": "DeepSeek 的成功源于高效工程和硬件感知设计，而非根本性的算法突破。"}, {"slug": "architecture", "pid": "thomaswolf", "ep": "thomaswolf-training-2025", "date": "2025-05-01", "en": "Robotics is at the same inflection point as transformers were years ago, with hardware ready and software catching up.", "zh": "机器人技术正处于与多年前 Transformer 相同的转折点，硬件已就绪，软件正在追赶。"}, {"slug": "architecture", "pid": "thomaswolf", "ep": "thomaswolf-training-2025", "date": "2025-05-01", "en": "World models and video generation models are advancing rapidly and can generate synthetic data for robotics training.", "zh": "世界模型和视频生成模型正在快速发展，可以为机器人训练生成合成数据。"}, {"slug": "architecture", "pid": "thomaswolf", "ep": "thomaswolf-training-2025", "date": "2025-05-01", "en": "Humanoids may not be the ultimate form factor; cheaper, diverse robots could drive broader adoption.", "zh": "人形机器人可能不是终极形态；更便宜、多样化的机器人可能推动更广泛的采用。"}, {"slug": "architecture", "pid": "jaderberg", "ep": "jaderberg-training-2025", "date": "2025-04-29", "en": "Drug design needs general models like AlphaFold 3, not local models for each target.", "zh": "药物设计需要像 AlphaFold 3 这样的通用模型，而不是针对每个靶点的局部模型。"}, {"slug": "architecture", "pid": "jaderberg", "ep": "jaderberg-training-2025", "date": "2025-04-29", "en": "AlphaFold 3 enables modeling of all molecule interactions, not just proteins.", "zh": "AlphaFold 3 能够建模所有分子间的相互作用，而不仅仅是蛋白质。"}, {"slug": "architecture", "pid": "shanahan", "ep": "shanahan-googlede-2025", "date": "2025-04-24", "en": "Intelligence and consciousness are dissociable; we can have intelligent systems without consciousness.", "zh": "智能与意识是可分离的；我们可以拥有没有意识的智能系统。"}, {"slug": "architecture", "pid": "shanahan", "ep": "shanahan-googlede-2025", "date": "2025-04-24", "en": "Embodiment grounds human cognition; language models lack this, limiting deep understanding.", "zh": "具身性是人类认知的基础；语言模型缺乏这一点，限制了深层理解。"}, {"slug": "architecture", "pid": "shanahan", "ep": "shanahan-googlede-2025", "date": "2025-04-24", "en": "The Turing test is a poor measure of AI capability; it ignores embodiment and deeper cognition.", "zh": "图灵测试是衡量 AI 能力的糟糕标准；它忽略了具身性和更深层的认知。"}, {"slug": "architecture", "pid": "fulford", "ep": "fulford-nopriors-2025", "date": "2025-04-24", "en": "Users should not have to decide how long the model thinks; the model should infer optimal thinking time.", "zh": "用户不应决定模型思考多久；模型应推断最佳思考时间。"}, {"slug": "architecture", "pid": "shazeer", "ep": "shazeer-unsuperv-2025", "date": "2025-03-17", "en": "AI models can generate novel ideas, not just interpolate known ones.", "zh": "AI 模型能产生新想法，而不仅仅是插值已知想法。"}, {"slug": "architecture", "pid": "shazeer", "ep": "shazeer-unsuperv-2025", "date": "2025-03-17", "en": "Top-down compute allocation can miss breakthrough ideas; bottom-up is essential.", "zh": "自上而下的算力分配可能错过突破性想法；自下而上至关重要。"}, {"slug": "architecture", "pid": "shazeer", "ep": "shazeer-dwarkesh-2025", "date": "2025-02-12", "en": "Future models will need to handle much longer context windows, potentially trillions of tokens.", "zh": "未来模型需要处理极长的上下文窗口，可能达到万亿级词元。"}, {"slug": "architecture", "pid": "karina", "ep": "karina-lennyspo-2025", "date": "2025-02-09", "en": "Evaluations are the bottleneck; models saturate benchmarks faster than new ones are created.", "zh": "评估是瓶颈；模型饱和基准的速度快于新基准的创建。"}, {"slug": "architecture", "pid": "karina", "ep": "karina-lennyspo-2025", "date": "2025-02-09", "en": "AI struggles with creativity and aesthetics because high-quality examples are scarce.", "zh": "AI 在创造力和美学上挣扎，因为高质量示例稀缺。"}, {"slug": "architecture", "pid": "antonoglou", "ep": "antonoglou-training-2025", "date": "2025-01-28", "en": "In-context learning allows models to adapt on the fly with few examples.", "zh": "上下文学习使模型能够通过少量示例即时适应。"}, {"slug": "architecture", "pid": "antonoglou", "ep": "antonoglou-training-2025", "date": "2025-01-28", "en": "AlphaGo's move 37 was initially thought an error, but revealed AI creativity.", "zh": "AlphaGo 的第 37 手最初被认为是错误，但揭示了 AI 的创造力。"}, {"slug": "architecture", "pid": "antonoglou", "ep": "antonoglou-training-2025", "date": "2025-01-28", "en": "MuZero learns an internal world model without knowing game rules, applicable to real-world.", "zh": "MuZero 在不了解游戏规则的情况下学习内部世界模型，可应用于现实世界。"}, {"slug": "architecture", "pid": "oriol", "ep": "oriol-googlede-2024", "date": "2024-12-12", "en": "Two-phase training (pre-training imitation + post-training RL) is the constant core across AlphaGo, AlphaStar, and modern LLMs.", "zh": "两阶段训练（预训练模仿 + 后训练强化学习）是 AlphaGo、AlphaStar 和现代大语言模型共有的核心。"}, {"slug": "architecture", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "The code editor is evolving from a text editor to an AI-integrated environment for building software.", "zh": "代码编辑器正从文本编辑器演变为集成 AI 的软件开发环境。"}, {"slug": "architecture", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Cursor uses custom models alongside frontier models for specialized tasks like tab completion and apply.", "zh": "Cursor 在专用任务（如 Tab 补全和应用）中使用自定义模型与前沿模型配合。"}, {"slug": "architecture", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Speculative decoding and KV cache reuse are key to low-latency AI features in code editors.", "zh": "推测解码和 KV 缓存复用是实现代码编辑器低延迟 AI 功能的关键。"}, {"slug": "architecture", "pid": "tridao", "ep": "tridao-unsuperv-2024", "date": "2024-10-01", "en": "Inference costs have dropped ~100x since ChatGPT, driven by quantization, co-design, and better kernels.", "zh": "自 ChatGPT 以来，推理成本下降了约 100 倍，这得益于量化、协同设计和更好的内核。"}, {"slug": "architecture", "pid": "tridao", "ep": "tridao-unsuperv-2024", "date": "2024-10-01", "en": "Future inference gains will come from hardware specialization, model architecture co-design, and kernel optimization.", "zh": "未来的推理提升将来自硬件专业化、模型架构协同设计和内核优化。"}, {"slug": "architecture", "pid": "tridao", "ep": "tridao-unsuperv-2024", "date": "2024-10-01", "en": "Hardware portability is a myth; even NVIDIA chips require rewriting software every generation.", "zh": "硬件可移植性是个神话；即使是 NVIDIA 芯片，每一代也需要重写软件。"}, {"slug": "architecture", "pid": "percyliang", "ep": "percyliang-imbue-2023", "date": "2023-11-01", "en": "Fine-tuning and pre-training serve different ecosystem roles; fine-tuning enables customization.", "zh": "微调和预训练在生态系统中扮演不同角色；微调实现定制化。"}, {"slug": "architecture", "pid": "percyliang", "ep": "percyliang-imbue-2023", "date": "2023-11-01", "en": "Model merging and version control for models could mirror software development practices.", "zh": "模型合并和版本控制可以借鉴软件开发实践。"}, {"slug": "architecture", "pid": "olah", "ep": "olah-80000hou-2023", "date": "2023-10-31", "en": "Features and circuits are fundamental building blocks; features are neuron activations, circuits are subgraphs connecting them.", "zh": "特征和电路是基本构建块；特征是神经元激活，电路是连接它们的子图。"}, {"slug": "architecture", "pid": "olah", "ep": "olah-80000hou-2023", "date": "2023-10-31", "en": "Universality: same features and circuits appear across different models and datasets, suggesting fundamental principles of vision.", "zh": "普遍性：相同特征和电路出现在不同模型和数据集中，暗示视觉的基本原理。"}, {"slug": "architecture", "pid": "olah", "ep": "olah-80000hou-2023", "date": "2023-10-31", "en": "Multimodal neurons in CLIP fuse visual and textual concepts, mirroring human brain's Jennifer Aniston neuron.", "zh": "CLIP 中的多模态神经元融合视觉和文本概念，类似于人脑的珍妮弗·安妮斯顿神经元。"}, {"slug": "architecture", "pid": "jimfan", "ep": "jimfan-outsetca-2023", "date": "2023-10-20", "en": "Embodiment is critical for grounding AI knowledge and reducing hallucinations.", "zh": "具身化对于将 AI 知识扎根并减少幻觉至关重要。"}, {"slug": "architecture", "pid": "jimfan", "ep": "jimfan-outsetca-2023", "date": "2023-10-20", "en": "LLMs are like operating systems with language as interface, tools as software, and vector databases as hard disk.", "zh": "大型语言模型就像操作系统，语言是界面，工具是软件，向量数据库是硬盘。"}, {"slug": "architecture", "pid": "jimfan", "ep": "jimfan-outsetca-2023", "date": "2023-10-20", "en": "Research taste for simple and elegant solutions is crucial, learned through PhD pain and suffering.", "zh": "追求简单优雅解决方案的研究品味至关重要，这通过博士阶段的痛苦和磨难习得。"}, {"slug": "architecture", "pid": "malik", "ep": "malik-therobot-2023", "date": "2023-08-16", "en": "Human intelligence evolved from sensory-motor skills, not just language; AI must replicate this foundation.", "zh": "人类智能从感知运动技能进化而来，而不仅仅是语言；AI 必须复制这一基础。"}, {"slug": "architecture", "pid": "malik", "ep": "malik-therobot-2023", "date": "2023-08-16", "en": "Core computer vision problems (recognition, reconstruction, reorganization) are largely solved, but vision-language and 3D from single images remain open.", "zh": "核心计算机视觉问题（识别、重建、重组）基本解决，但视觉语言和单图像 3D 仍有待解决。"}, {"slug": "architecture", "pid": "malik", "ep": "malik-therobot-2023", "date": "2023-08-16", "en": "Language models without grounding miss the 20% of vocabulary rooted in sensory-motor experience.", "zh": "无根基的语言模型缺失了 20%植根于感知运动经验的词汇。"}, {"slug": "architecture", "pid": "schulman", "ep": "schulman-therobot-2023", "date": "2023-08-03", "en": "Models can store vast knowledge in weights, enabling flexible connections, but retrieval aids real-time info and verifiability.", "zh": "模型可以在权重中存储大量知识，实现灵活连接，但检索有助于实时信息和可验证性。"}, {"slug": "architecture", "pid": "schulman", "ep": "schulman-therobot-2023", "date": "2023-08-03", "en": "Language models will serve as a core for other modalities, not be replaced by them.", "zh": "语言模型将作为其他模态的核心，而非被其取代。"}, {"slug": "architecture", "pid": "schulman", "ep": "schulman-therobot-2023", "date": "2023-08-03", "en": "We may be in a local optimum; new architectures and loss functions could surpass current methods.", "zh": "我们可能处于局部最优；新的架构和损失函数可能超越当前方法。"}, {"slug": "architecture", "pid": "murati", "ep": "murati-microsof", "date": "2023-07-11", "en": "OpenAI stopped working on robotics despite impressive demos like Rubik's cube.", "zh": "OpenAI 停止了机器人研究，尽管有魔方等令人印象深刻的演示。"}, {"slug": "architecture", "pid": "nando", "ep": "nando-therobot-2023", "date": "2023-04-26", "en": "Large models are exciting but not everything; fundamental innovation can come from anywhere.", "zh": "大模型令人兴奋但并非全部，基础创新可以来自任何地方。"}, {"slug": "architecture", "pid": "bubeck", "ep": "bubeck-sparksof-2023", "date": "2023-04-06", "en": "GPT-4 exhibits general intelligence across reasoning, abstraction, and complex idea comprehension.", "zh": "GPT-4 在推理、抽象思维和理解复杂概念方面展现出通用智能。 /* 文末「接着读」:同人物 → 同议题他人 → 同领域，未读优先，最多 4 期 */
function nextReads(e){
  const out=[],seen=new Set([e.id]);
  const push=x=>{if(x&&!seen.has(x.id)){seen.add(x.id);out.push(x);}};
  const unread=id=>!readHas(id);
  const same=epsOf(e.pid).filter(x=>x.id!==e.id);
  push(same.find(x=>unread(x.id))||same[0]);
  for(const slug in TOPICS.items){
    if((TOPICS.items[slug]||[]).some(it=>it.ep===e.id)){
      const other=(TOPICS.items[slug]||[]).find(it=>it.pid!==e.pid&&!seen.has(it.ep)&&unread(it.ep));
      if(other)push(EPISODES.find(x=>x.id===other.ep));
      break;
    }
  }
  // 领域兜底:按相关分排序(共享领域数×2 + 同频道 + 日期接近),同分随机避免千篇一律
  const score=x=>{let s=0;for(const ff of e.fields)if(x.fields.includes(ff))s+=2;
    if(x.pod&&e.pod&&x.pod.en===e.pod.en)s+=1;
    const dy=Math.abs((new Date(x.date||0))-(new Date(e.date||0)))/864e5;s+=Math.max(0,1-dy/365);
    return s;};
  const cands=EPISODES.filter(x=>x.id!==e.id&&x.pid!==e.pid&&!seen.has(x.id)&&unread(x.id)&&x.fields.some(ff=>e.fields.includes(ff)))
    .map(x=>({x,s:score(x)+Math.random()*0.3})).sort((a,b)=>b.s-a.s);
  for(const c of cands){if(out.length>=4)break;push(c.x);}
  return out.slice(0,4);
}

/* ============================ TOC 目录 ============================ */
let tocObserver=null;
function jumpSec(i){const el=document.getElementById('sec-'+i);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  const sh=$('#tocSheet');if(sh)sh.classList.remove('on');}
function rbToggle(ev){if(ev)ev.stopPropagation();const b=document.querySelector('.read-bar');if(b)b.classList.toggle('rb-open');}
addEventListener('click',e=>{const b=document.querySelector('.read-bar.rb-open');if(b&&!b.contains(e.target))b.classList.remove('rb-open');});
function toggleTocSheet(){const sh=$('#tocSheet');if(!sh)return;sh.classList.toggle('on');
  if(sh.classList.contains('on')){const on=sh.querySelector('.toc-i.on');if(on&&on.scrollIntoView)on.scrollIntoView({block:'center'});}}
function setTocActive(i,total){
  document.querySelectorAll('.toc-i').forEach(a=>a.classList.toggle('on',+a.dataset.sec===i));
  const n=total||document.querySelectorAll('.reader .sec-h').length;
  const fab=document.querySelector('.toc-fab');if(fab&&n)fab.textContent=`目录 · ${i+1}/${n}`;
  const t=document.querySelector('.toc'),el=t&&t.querySelector('.toc-i.on');   // 长目录跟随当前章
  if(el&&(el.offsetTop<t.scrollTop+40||el.offsetTop>t.scrollTop+t.clientHeight-60))t.scrollTop=el.offsetTop-t.clientHeight/2;
}
function initTOC(){
  if(tocObserver){tocObserver.disconnect();tocObserver=null;}
  const heads=[...document.querySelectorAll('.reader .sec-h')];
  if(!heads.length)return;
  setTocActive(0,heads.length);
  const epid=(location.hash||'').split('/episode/')[1]?(location.hash.split('/episode/')[1].split('?')[0]):'';
  tocObserver=new IntersectionObserver(es=>{
    const vis=es.filter(e=>e.isIntersecting).map(e=>heads.indexOf(e.target));
    if(vis.length){const i=Math.min(...vis);setTocActive(i,heads.length);
      if(epid&&!pendingLocate)readPosSave(epid,i,heads.length);}   // 定位还没完成时不覆盖旧进度
  },{rootMargin:'-115px 0px -72% 0px',threshold:0});
  heads.forEach(h=>tocObserver.observe(h));
}

/* ====== 逐字稿按需加载（首屏只装元数据，打开单集再拉全文，显著提速） ====== */
const TS_CACHE={};let _tsLoading=null;
const TS_ERR={};
function ensureTs(id){
  if((id in TS_CACHE)||_tsLoading===id)return;
  _tsLoading=id;delete TS_ERR[id];
  fetch('mcp-data/ep/'+id+'.json').then(r=>r.ok?r.json():Promise.reject(r.status))
    .then(j=>{TS_CACHE[id]=j.transcript||[];})
    .catch(()=>{TS_ERR[id]=1;})   // 不缓存失败:留重试机会
    .finally(()=>{_tsLoading=null;
      if((location.hash||'').indexOf('/episode/'+id)>=0){const y=scrollY;render();scrollTo(0,y);}});
}
function tsRetry(id){delete TS_ERR[id];ensureTs(id);render();}

/* ============================ TTS 选中朗读 ============================ */
/* 朗读经 Cloudflare Worker 代理（密钥存于 Worker，不在前端/仓库）。部署见 tts-worker/README.md。
   若你的 workers.dev subdomain 不同，改这里为 wrangler deploy 输出的实际地址。 */
addEventListener('scroll',()=>{const b=document.getElementById('selBar');if(!b||b.style.display==='none')return;if(b.classList.contains('dock'))return;const t=document.getElementById('ttsBtn');if(t&&t.classList.contains('loading'))return;b.style.display='none';},{passive:true});
const TTS_PROXY='https://tts.jasonlin.tech';
let ttsAudio=null;
function inReader(node){const el=node&&node.nodeType===3?node.parentElement:node;return !!(el&&el.closest&&el.closest('.reader')&&!el.closest('.chat'));}
let _selPeek=null,_peekHold=false,_selMark=null;
function ttsCheckSel(){
  const bar=$('#selBar'),btn=$('#ttsBtn');if(!bar||!btn)return;
  const sel=window.getSelection();const text=(sel?sel.toString():'').trim();
  if(text.length<2||!sel.anchorNode||!inReader(sel.anchorNode)){bar.style.display='none';bar.classList.remove('dock');return;}
  if(btn.classList.contains('loading'))return;  // 朗读处理中不因新选区重置
  const r=sel.getRangeAt(0).getBoundingClientRect();
  bar.style.display='flex';btn.classList.remove('playing');
  btn.querySelector('.lbl').textContent='朗读所选';
  const sb=$('#shareSelBtn');if(sb)sb.textContent='分享';
  // 手机（≤900px）:改为底部固定工具条，不与系统文本菜单抢选区位置，滚动不消失
  const dock=matchMedia('(max-width:900px)').matches;
  bar.classList.toggle('dock',dock);
  if(dock){bar.style.left='';bar.style.top='';}
  else{bar.style.left=(window.scrollX+r.left+r.width/2)+'px';
       bar.style.top=(window.scrollY+(r.top<150?r.bottom+12:r.top-46))+'px';}
  btn.dataset.text=text;
  btn.dataset.sec=selSecIndex();   // 选中时即记下所在章节（手机点按钮时选区已没了，不能临时算）
  // 存「看译文」所需的选区落点（单语模式点按钮时选区已丢，须此刻记下）
  _selPeek=null;_selMark=null;
  try{
    const nd=sel.anchorNode.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;
    const turn=nd&&nd.closest?nd.closest('.turn'):null;
    if(turn){const srcIsEn=!!nd.closest('.en');
      if(srcIsEn||nd.closest('.zh')){
        const src=turn.querySelector(srcIsEn?'.en':'.zh');
        const rg=sel.getRangeAt(0);
        let a=offsetInEl(src,rg.startContainer,rg.startOffset),b2=offsetInEl(src,rg.endContainer,rg.endOffset);
        if(b2<a)[a,b2]=[b2,a];
        _selPeek={turn,srcIsEn,mid:Math.min((src.textContent.length||1)-1,Math.max(0,(a+b2)/2))};
        if(turn.dataset.sec!=null&&b2>a)_selMark={id:hlEpId(),sec:+turn.dataset.sec,ti:+turn.dataset.ti,lang:srcIsEn?'en':'zh',text:src.textContent.slice(a,b2),s:a,e:b2};}}
  }catch(_){}
  const pk=$('#peekSelBtn');if(pk){pk.textContent=document.body.dataset.lang==='zh'?'看原文':'看译文';pk.style.display=_selPeek?'':'none';}
  const mk=$('#markSelBtn');if(mk)mk.style.display=_selMark?'':'none';
}
/* 单语模式下显式「看译文/看原文」:就地展开对应句（不自动弹出，避免打扰） */
function peekSel(){
  if(!_selPeek||!_selPeek.turn||!document.contains(_selPeek.turn))return;
  clearCross();
  crossMark(_selPeek.turn,_selPeek.srcIsEn,_selPeek.mid);
  _peekHold=true;   // 防止紧随的 touchend→syncCross 立刻清掉
}
/* ====== 划线标记(选中→标记→下划线;「我的标记」汇总;随同步码同步) ====== */
function hlGet(){try{const x=JSON.parse(localStorage.highlights||'{}');return x&&typeof x==='object'?x:{}}catch(e){return{}}}
function hlSave(x){try{localStorage.highlights=JSON.stringify(x)}catch(_){}}
function hlEpId(){const p=(location.hash||'').slice(2).split('?')[0].split('/');return p[0]==='episode'?p[1]:'';}
function hlCount(){return Object.values(hlGet()).reduce((n,a)=>n+(a?a.length:0),0);}
function hlNodeAt(el,off){const w=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);let n,acc=0;while(n=w.nextNode()){const len=n.nodeValue.length;if(off<=acc+len)return[n,off-acc];acc+=len;}return[null,0];}
function hlWrap(el,s,e,idx){const[sn,so]=hlNodeAt(el,s),[en,eo]=hlNodeAt(el,e);if(!sn||!en)return false;try{const r=document.createRange();r.setStart(sn,so);r.setEnd(en,eo);const sp=document.createElement('span');sp.className='hl';sp.dataset.hi=idx;sp.title='点击移除标记';sp.addEventListener('click',hlClick);r.surroundContents(sp);return true;}catch(_){return false;}}
function applyHls(){const id=hlEpId();if(!id)return;const arr=hlGet()[id]||[];const byT={};arr.forEach((hh,idx)=>{const k=hh.sec+'|'+hh.ti+'|'+hh.lang;(byT[k]=byT[k]||[]).push(Object.assign({idx},hh));});for(const key in byT){const kp=key.split('|'),sec=kp[0],ti=kp[1],lang=kp[2];const turn=document.querySelector('.reader .turn[data-sec="'+sec+'"][data-ti="'+ti+'"]');if(!turn)continue;const el=turn.querySelector('.'+lang);if(!el)continue;byT[key].sort((a,b)=>b.s-a.s).forEach(hh=>hlWrap(el,hh.s,hh.e,hh.idx));}}
function markSel(){if(!_selMark||!_selMark.text||!_selMark.id){hlHideSel();return;}const id=_selMark.id,st=hlGet(),arr=st[id]||(st[id]=[]);if(arr.some(hh=>hh.sec===_selMark.sec&&hh.ti===_selMark.ti&&hh.lang===_selMark.lang&&!(_selMark.e<=hh.s||_selMark.s>=hh.e))){hlToast('这段已标记');hlHideSel();return;}arr.push({sec:_selMark.sec,ti:_selMark.ti,lang:_selMark.lang,text:_selMark.text,s:_selMark.s,e:_selMark.e,ts:Date.now()});hlSave(st);if(typeof syncTouch==='function')syncTouch();const turn=document.querySelector('.reader .turn[data-sec="'+_selMark.sec+'"][data-ti="'+_selMark.ti+'"]');if(turn){const el=turn.querySelector('.'+_selMark.lang);if(el)hlWrap(el,_selMark.s,_selMark.e,arr.length-1);}hlToast('已标记 · 在「标记」查看');hlUpdNav();hlHideSel();}
function hlClick(ev){ev.stopPropagation();const idx=+ev.currentTarget.dataset.hi;const id=hlEpId();if(confirm('移除这条标记？'))hlRemove(id,idx);}
function hlRemove(id,idx){const st=hlGet(),arr=st[id]||[];if(arr[idx]){arr.splice(idx,1);if(!arr.length)delete st[id];hlSave(st);if(typeof syncTouch==='function')syncTouch();const y=scrollY;render();scrollTo(0,y);}}
function hlHideSel(){const b=$('#selBar');if(b){b.style.display='none';b.classList.remove('dock');}try{const s=window.getSelection();s&&s.removeAllRanges&&s.removeAllRanges();}catch(_){}}
let _hlTT=null;function hlToast(m){let t=$('#hlToast');if(!t){t=document.createElement('div');t.id='hlToast';t.className='hl-toast';document.body.appendChild(t);}t.textContent=m;t.classList.add('on');clearTimeout(_hlTT);_hlTT=setTimeout(()=>t.classList.remove('on'),1800);}
function hlUpdNav(){const a=$('#navMarks');if(a){a.textContent='标记';a.style.display=hlCount()?'':'none';}}
function hlJump(id,sec,idx){const it=(hlGet()[id]||[])[idx];pendingLocate={id,at:sec,hl:it?it.text:''};go('#/episode/'+id);}
function vMarks(){const hm=hlGet();const eps=Object.keys(hm).filter(id=>hm[id]&&hm[id].length).map(id=>({id,e:EPISODES.find(x=>x.id===id),items:hm[id]})).filter(x=>x.e);eps.forEach(x=>x.last=Math.max.apply(null,x.items.map(i=>i.ts||0)));eps.sort((a,b)=>b.last-a.last);const total=eps.reduce((n,x)=>n+x.items.length,0);if(!total)return `<div class="wrap"><section class="reveal" style="min-height:50vh"><div class="eyebrow">My highlights · 划线收藏</div><h2 class="title">我的标记</h2><div class="empty" style="margin-top:20px">还没有标记。阅读单集时选中文字，点弹出的「标记」即可划上下划线收藏，这里会汇总。</div></section></div>`;const body=eps.map(x=>`<div class="mk-ep"><div class="mk-eph" onclick="go('#/episode/${x.id}')"><b>${x.e.tZh}</b><span>${PEOPLE[x.e.pid]?PEOPLE[x.e.pid].zh:''} · ${x.items.length} 条</span></div>${x.items.map((it,idx)=>`<div class="mk-item"><span class="mk-q" onclick="hlJump('${x.id}',${it.sec},${idx})">${(it.text||'').replace(/</g,'&lt;')}</span><button class="mk-del" title="删除这条标记" onclick="hlRemove('${x.id}',${idx})">×</button></div>`).join('')}</div>`).join('');return `<div class="wrap"><section class="reveal"><div class="eyebrow">My highlights · 划线收藏</div><h2 class="title">我的标记 · ${total}</h2><div class="sub">阅读时选中文字点「标记」划线；这里汇总全部标记，点文字跳回原文。随同步码在设备间同步。</div><div class="marks-list" style="margin-top:22px">${body}</div></section></div>`;}
function selSecIndex(){
  const node=window.getSelection().anchorNode;if(!node)return -1;

let crossOrig=[];   // [{el,html}] 用于还原被改写的 div

function sentsOf(t,zh){
  const m=t.match(zh?/[^。！？!?…\n]+[。！？!?…]*/g:/[^.!?。！？\n]+[.!?]*["”’']*\s*/g);
  return (m&&m.length)?m:[t];

// 选区端点在 el 内的真实字符偏移（累加 el 内所有文本节点长度，避开 indexOf 的重复词坑）
function offsetInEl(el,container,off){
  const w=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);let n,sum=0;
  while(n=w.nextNode()){if(n===container)return sum+off;sum+=n.nodeValue.length;}
  return sum;

// 字符偏移 → 该偏移落在第几句
function sentAt(sents,pos){let a=0,si=0;
  for(let i=0;i<sents.length;i++){si=i;if(pos<a+sents[i].length)break;a+=sents[i].length;}return si;}

function crossMark(turn,srcIsEn,mid){
  const enDiv=turn.querySelector('.en'),zhDiv=turn.querySelector('.zh');
  const src=srcIsEn?enDiv:zhDiv, cp=srcIsEn?zhDiv:enDiv;
  if(!src||!cp)return;
  const srcLen=src.textContent.length||1, cpLen=cp.textContent.length;
  const srcSents=sentsOf(src.textContent,!srcIsEn), cpSents=sentsOf(cp.textContent,srcIsEn);
  // 映射到 cp 句子：句数相同→同序；否则按字符比例落点
  let ci;
  if(srcSents.length===cpSents.length){ci=sentAt(srcSents,mid);}
  else{ci=sentAt(cpSents,(mid/srcLen)*cpLen);}
  ci=Math.max(0,Math.min(cpSents.length-1,ci));
  crossOrig.push({el:cp,html:cp.innerHTML});
  cp.innerHTML=cpSents.map((s,i)=>i===ci?`<span class="xseg">${escHtml(s)}</span>`:escHtml(s)).join('');
  if(getComputedStyle(cp).display==='none')turn.classList.add('peek');   // 单语：就地展开

function syncCross(){
  if(_peekHold){_peekHold=false;return;}            // 「看译文」刚点下，别立刻清掉
  const sel=window.getSelection();const selText=(sel?sel.toString():'').trim();
  clearCross();
  if(document.body.dataset.lang!=='both')return;   // 仅双语模式做对照；单语（中/英）下不自动展开（有显式按钮）
  if(!selText||!sel.rangeCount||!sel.anchorNode||!inReader(sel.anchorNode))return;
  const node=sel.anchorNode.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;
  const turn=node&&node.closest?node.closest('.turn'):null;if(!turn)return;
  const srcIsEn=!!node.closest('.en'),srcIsZh=!!node.closest('.zh');
  if(!srcIsEn&&!srcIsZh)return;
  const src=turn.querySelector(srcIsEn?'.en':'.zh');if(!src)return;
  const rg=sel.getRangeAt(0);
  let a=offsetInEl(src,rg.startContainer,rg.startOffset);
  let b=offsetInEl(src,rg.endContainer,rg.endOffset);
  if(b<a)[a,b]=[b,a];

// 轻量 Markdown → HTML(无依赖):代码块/行内码/标题/列表/引用/分割线/加粗斜体/链接。
// 先转义 HTML，再结构化；引用记号 [#n]/[@id] 不是 [text](url) 链接，原样保留给 citeHtml 处理。
function mdHtml(src){
  const blocks=[];let s=escH(src||'');
  s=s.replace(/```[a-zA-Z]*\n?([\s\S]*?)```/g,(_,c)=>{blocks.push('<pre class="cpre"><code>'+c.replace(/\n$/,'')+'</code></pre>');return '\u0000'+(blocks.length-1)+'\u0000';});
  s=s.replace(/`([^`\n]+)`/g,(_,c)=>{blocks.push('<code class="cinl">'+c+'</code>');return '\u0000'+(blocks.length-1)+'\u0000';});
  const lines=s.split('\n'),out=[];let list=null;
  const closeL=()=>{if(list){out.push('</'+list+'>');list=null;}};
  for(const line of lines){let m;
    if(/^\u0000\d+\u0000$/.test(line)){closeL();out.push(line);continue;}
    if(/^\s*$/.test(line)){closeL();continue;}
    if(m=line.match(/^\s{0,3}(#{1,4})\s+(.*)$/)){closeL();out.push('<div class="cmh cmh'+m[1].length+'">'+m[2]+'</div>');continue;}
    if(/^\s{0,3}([-*_])\1{2,}\s*$/.test(line)){closeL();out.push('<hr class="cmhr">');continue;}
    if(m=line.match(/^\s{0,3}&gt;\s?(.*)$/)){closeL();out.push('<blockquote class="cmq">'+m[1]+'</blockquote>');continue;}
    if(m=line.match(/^\s*[-*+]\s+(.*)$/)){if(list!=='ul'){closeL();out.push('<ul class="cml">');list='ul';}out.push('<li>'+m[1]+'</li>');continue;}
    if(m=line.match(/^\s*\d+[.)]\s+(.*)$/)){if(list!=='ol'){closeL();out.push('<ol class="cml">');list='ol';}out.push('<li>'+m[1]+'</li>');continue;}
    closeL();out.push('<p class="cmp">'+line+'</p>');}
  closeL();s=out.join('');
  s=s.replace(/\*\*([^\n]+?)\*\*/g,'<strong>$1</strong>')
     .replace(/(^|[^*\w])\*([^*\n]+?)\*(?!\w)/g,'$1<em>$2</em>')
     .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="nofollow noopener">$1</a>');
  return s.replace(/\u0000(\d+)\u0000/g,(_,i)=>blocks[+i]);
}

/* 盘古之白：中文与英文/数字之间自动补空格（渲染时处理文本节点，纯英文节点不受影响） */
const CJK='\\u4e00-\\u9fff\\u3040-\\u30ff\\u3400-\\u4dbf';
const RE1=new RegExp('(['+CJK+'])([A-Za-z0-9%])','g');
const RE2=new RegExp('([A-Za-z0-9%\\)\\]])(['+CJK+'])','g');
/* 中文标点规范：CJK 相邻的半角标点转全角（并吸收多余空格）;仅对含 CJK 的文本节点生效 */
const FW={',':'，',';':'；','!':'！','?':'？',':':'：'};
const RE_PUNC=new RegExp('(['+CJK+'])[ \\t]*([,;!?:])[ \\t]*','g');
const RE_OP=new RegExp('\\([ \\t]*(['+CJK+'])','g');
const RE_CP=new RegExp('(['+CJK+'])[ \\t]*\\)','g');
function pangu(t){
  t=t.replace(RE_PUNC,(_,c,p)=>c+FW[p]).replace(RE_OP,'（$1').replace(RE_CP,'$1）');
  return t.replace(RE1,'$1 $2').replace(RE2,'$1 $2');
}

  target.classList.add('locate-flash');setTimeout(()=>target.classList.remove('locate-flash'),2800);
}
/* 按路由更新标题/描述/OG —— 微信在内置浏览器分享当前页时会读实时标题 */
function metaSet(key,isProp,val){const sel=isProp?`meta[property="${key}"]`:`meta[name="${key}"]`;
  let m=document.querySelector(sel);if(!m){m=document.createElement('meta');m.setAttribute(isProp?'property':'name',key);document.head.appendChild(m);}
  m.setAttribute('content',val);}
function updateMeta(parts){
  let title='AI Podcast · AI 播客 — 双语播客全文阅读';
  let desc='知名 AI 人物的播客 · 双语全文阅读，原文与翻译对照，核心观点速览。';
  if(parts[0]==='episode'){const e=EPISODES.find(x=>x.id===parts[1]);if(e){const p=PEOPLE[e.pid];
    title=`${e.tZh} · ${p.zh} — AI Podcast`;desc=`${p.zh}（${e.pod.zh}）双语全文 + 核心观点。${e.sZh||''}`;}}
  else if(parts[0]==='person'){const p=PEOPLE[parts[1]];if(p){title=`${p.zh} · ${p.en} — AI Podcast`;desc=`${p.zh}（${p.tiZh}）的播客，双语全文阅读。`;}}
  else if(parts[0]==='pod'){const k=POD_SLUG[parts[1]],i=POD_INFO[k];if(i){title=`${k} · ${i.zh} — AI Podcast`;desc=i.cn;}}
  else if(parts[0]==='ask'){title='问全站 · 向 AI 人物的观点提问 — AI Podcast';desc='基于全站播客的核心观点综合回答，对比不同 AI 人物的看法，出处可溯。';}
  else if(parts[0]==='topics'){title='议题 · 同一议题不同声音 — AI Podcast';desc='把不同 AI 人物对 AGI 时间表、规模化、对齐安全、开源闭源等议题的观点聚到一起横向对照。';}
  else if(parts[0]==='topic'){const d=(typeof TOPICS!=='undefined')&&TOPICS.defs.find(x=>x.slug===parts[1]);if(d){title=`${d.zh} · ${d.en} — AI Podcast 议题`;desc=`不同 AI 人物对「${d.zh}」的观点对照。`;}}
  document.title=title;
  metaSet('description',false,desc);
  metaSet('og:title',true,title);metaSet('twitter:title',true,title);
  metaSet('og:description',true,desc);metaSet('twitter:description',true,desc);
  metaSet('og:url',true,'https://aipodcast.jasonlin.tech/'+(location.hash||''));
}
function observeReveals(){
  const io=new IntersectionObserver((es)=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:0,rootMargin:'0px 0px -5% 0px'});
  document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));
}
