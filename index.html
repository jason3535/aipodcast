hydrogen bombs are far more dangerous and have existed for decades.", "zh": "AI 并未带来新的生存威胁；氢弹危险得多，且已存在数十年。"}, {"slug": "alignment", "pid": "christiano", "ep": "christiano-80000hou-2025", "date": "2025-01-04", "en": "AI alignment is a critical problem that could determine the long-term future of civilization.", "zh": "AI 对齐是一个关键问题，可能决定文明的长期未来。"}, {"slug": "alignment", "pid": "christiano", "ep": "christiano-80000hou-2025", "date": "2025-01-04", "en": "Progress in AI alignment requires both theoretical work and practical experiments with ML systems.", "zh": "AI 对齐的进展需要理论工作和机器学习系统的实际实验相结合。"}, {"slug": "alignment", "pid": "christiano", "ep": "christiano-80000hou-2025", "date": "2025-01-04", "en": "There is a meaningful distinction between capabilities research and alignment research that affects the long-term trajectory.", "zh": "能力研究和对齐研究之间存在有意义的区别，影响长期发展轨迹。"}, {"slug": "alignment", "pid": "lambert", "ep": "lambert-thecogni", "date": "2024-11-21", "en": "Character and consistency in models lack evals; frontier labs prioritize chat arena scores over academic metrics.", "zh": "模型的角色和一致性缺乏评估；前沿实验室优先考虑聊天竞技场分数而非学术指标。"}, {"slug": "alignment", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Formal verification of code could become feasible with AI, but specifying intent remains hard.", "zh": "AI 可能使代码的形式验证变得可行，但意图指定仍然困难。"}, {"slug": "alignment", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Benchmarks are poor proxies for real coding; they are contaminated and miss context-dependent messiness.", "zh": "基准测试无法很好地代表真实编码；它们被污染且忽略了上下文依赖的混乱。"}, {"slug": "alignment", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Frontier models struggle with bug finding due to lack of training data; calibration is poor.", "zh": "前沿模型因缺乏训练数据而在找 Bug 上表现不佳；校准很差。"}, {"slug": "alignment", "pid": "sutton", "ep": "sutton-thetraje", "date": "2024-08-09", "en": "The world is a complex adaptive system, no one controls it." ", "pid": "parada", "ep": "parada-googlede-2025", "date": "2025-05-22", "en": "Robots can generalize to unseen tasks without explicit training.", "zh": "机器人无需显式训练即可泛化到未见任务。"}, {"slug": "agents", "pid": "parada", "ep": "parada-googlede-2025", "date": "2025-05-22", "en": "Robots can learn on the job with minimal human demonstrations.", "zh": "机器人可以通过最少的人类示范在工作中学习。"}, {"slug": "agents", "pid": "bricken", "ep": "bricken-dwarkesh-2025", "date": "2025-05-22", "en": "Agentic capabilities are progressing rapidly, with software engineering agents expected to do a day's work within a year.", "zh": "智能体能力快速进步，预计一年内软件工程智能体能完成一天的工作量。"}, {"slug": "agents", "pid": "bricken", "ep": "bricken-dwarkesh-2025", "date": "2025-05-22", "en": "Computer use is not fundamentally harder than coding; progress is limited by engineering attention, not capability.", "zh": "计算机使用本质上并不比编程更难；进展受限于工程投入而非能力。"}, {"slug": "agents", "pid": "bricken", "ep": "bricken-dwarkesh-2025", "date": "2025-05-22", "en": "The bottleneck for agents is not reliability but context length and ability to handle amorphous tasks with discovery.", "zh": "智能体的瓶颈不是可靠性，而是上下文长度和处理需要探索的非结构化任务的能力。"}, {"slug": "agents", "pid": "thomaswolf", "ep": "thomaswolf-training-2025", "date": "2025-05-01", "en": "AI models are not yet good at asking the right scientific questions; they are better as assistants.", "zh": "AI 模型还不擅长提出正确的科学问题；它们更适合作为助手。"}, {"slug": "agents", "pid": "jaderberg", "ep": "jaderberg-training-2025", "date": "2025-04-29", "en": "Multiplayer games provide diverse tasks for training generalizable AI agents.", "zh": "多人游戏为训练可泛化的 AI 智能体提供了多样化的任务。"}, {"slug": "agents", "pid": "jaderberg", "ep": "jaderberg-training-2025", "date": "2025-04-29", "en": "Generative models and agents are needed to explore the vast chemical space of 10^60 molecules.", "zh": "需要生成模型和智能体来探索 10^60 分子的广阔化学空间。"}, {"slug": "agents", "pid": "fulford", "ep": "fulford-nopriors-2025", "date": "2025-04-24", "en": "The ideal agent will combine research and action-taking capabilities with strong safety guardrails.", "zh": "理想的智能体将结合研究和行动能力，并配备强大的安全护栏。"}, {"slug": "agents", "pid": "fulford", "ep": "fulford-nopriors-2025", "date": "2025-04-24", "en": "Agent memory and context management are critical for long-horizon tasks that take hours or days.", "zh": "智能体记忆和上下文管理对于需要数小时或数天的长期任务至关重要。"}, {"slug": "agents", "pid": "fulford", "ep": "fulford-nopriors-2025", "date": "2025-04-24", "en": "Read-only tasks like research are more ambitious and useful than transactional agent use cases.", "zh": "研究等只读任务比交易型智能体用例更有野心和实用性。"}, {"slug": "agents", "pid": "shazeer", "ep": "shazeer-unsuperv-2025", "date": "2025-03-17", "en": "Agentic capabilities and acting in complex environments are crucial for AGI.", "zh": "智能体能力和在复杂环境中行动对 AGI 至关重要。"}, {"slug": "agents", "pid": "shazeer", "ep": "shazeer-dwarkesh-2025", "date": "2025-02-12", "en": "Models should learn by taking actions in the world, not just passively observing data.", "zh": "模型应通过在世界中采取行动来学习，而不仅仅是被动观察数据。"}, {"slug": "agents", "pid": "karina", "ep": "karina-lennyspo-2025", "date": "2025-02-09", "en": "Product development shifts from specs to prototyping with AI, using evals to define correct behavior.", "zh": "产品开发从规格转向用 AI 原型设计，通过评估定义正确行为。"}, {"slug": "agents", "pid": "karina", "ep": "karina-lennyspo-2025", "date": "2025-02-09", "en": "Agents operating on pixels (visual perception) are much harder than language-based tasks.", "zh": "基于像素（视觉感知）的智能体比基于语言的任务难得多。"}, {"slug": "agents", "pid": "antonoglou", "ep": "antonoglou-training-2025", "date": "2025-01-28", "en": "LLMs need robustness and reliability, like game-playing AIs, to be trusted agents.", "zh": "LLM 需要像游戏 AI 那样的鲁棒性和可靠性，才能成为可信的智能体。"}, {"slug": "agents", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "Human-AI merging will not lead to something more powerful than pure AI in the long run; uploaded minds will become non-human.", "zh": "从长远来看，人机融合不会产生比纯 AI 更强大的东西；上传的思维将变得非人。"}, {"slug": "agents", "pid": "oriol", "ep": "oriol-googlede-2024", "date": "2024-12-12", "en": "Giving models tools like search, code execution, and browser access enables autonomous, agentic behavior beyond static weights.", "zh": "为模型提供搜索、代码执行和浏览器访问等工具，使其能够超越静态权重，实现自主的智能体式行为。"}, {"slug": "agents", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Agents are promising but not yet super useful; iterative human-AI collaboration remains central.", "zh": "智能体有前景但尚未非常有用；迭代式人机协作仍是核心。"}, {"slug": "agents", "pid": "tridao", "ep": "tridao-unsuperv-2024", "date": "2024-10-01", "en": "Agentic workloads (tool use, multi-step reasoning) will be the next killer app for AI.", "zh": "智能体式工作负载（工具使用、多步推理）将成为 AI 的下一个杀手级应用。"}, {"slug": "agents", "pid": "tridao", "ep": "tridao-unsuperv-2024", "date": "2024-10-01", "en": "Inference workload will diversify into three patterns: chatbot, low-latency agentic, and high-throughput batch.", "zh": "推理工作负载将分化为三种模式：聊天机器人、低延迟智能体式和高吞吐量批处理。"}, {"slug": "agents", "pid": "lambert", "ep": "lambert-superdat", "date": "2024-06-11", "en": "Humanoid robots in homes are far off due to safety and distribution shift; teleoperation may be a practical interim.", "zh": "由于安全和分布偏移，家用类人机器人还很遥远；远程操作可能是实用的过渡方案。"}, {"slug": "agents", "pid": "percyliang", "ep": "percyliang-imbue-2023", "date": "2023-11-01", "en": "Simulating human societies with LLMs is scientifically valuable but risky if taken as evidence.", "zh": "用 LLM 模拟人类社会具有科学价值，但若作为证据则存在风险。"}, {"slug": "agents", "pid": "jimfan", "ep": "jimfan-outsetca-2023", "date": "2023-10-20", "en": "Gaming is the largest entertainment sector and will be transformed by intelligent NPCs in open-ended worlds.", "zh": "游戏是最大的娱乐行业，将被开放世界中的智能 NPC 彻底改变。"}, {"slug": "agents", "pid": "jimfan", "ep": "jimfan-outsetca-2023", "date": "2023-10-20", "en": "Simulation is key for training embodied agents, enabling massive parallelization and safe exploration.", "zh": "模拟是训练具身智能体的关键，可实现大规模并行和安全探索。"}, {"slug": "agents", "pid": "malik", "ep": "malik-therobot-2023", "date": "2023-08-16", "en": "Rapid motor adaptation enables robots to handle diverse terrains via learning, not manual engineering.", "zh": "快速运动适应使机器人通过学习而非手动工程处理多样地形。"}, {"slug": "agents", "pid": "nando", "ep": "nando-therobot-2023", "date": "2023-04-26", "en": "Learning from video, like YouTube, is a promising way to train agents without expensive RL.", "zh": "从视频（如 YouTube）中学习是训练智能体的有前途的方法，无需昂贵的强化学习。"}, {"slug": "agents", "pid": "nando", "ep": "nando-therobot-2023", "date": "2023-04-26", "en": "Robots should learn from YouTube videos like humans, not just from teleoperation data.", "zh": "机器人应像人类一样从 YouTube 视频学习，而不仅仅从遥操作数据。"}, {"slug": "agents", "pid": "bubeck", "ep": "bubeck-sparksof-2023", "date": "2023-04-06", "en": "GPT-4 can use tools like calculators and search engines to overcome its weaknesses.", "zh": "GPT-4 能使用计算器和搜索引擎等工具来弥补自身弱点。"}, {"slug": "agents", "pid": "shazeer", "ep": "shazeer-aarthian-2023", "date": "2023-01-21", "en": "Dialogue is a killer app for LLMs, enabling natural human-computer interaction.", "zh": "对话是 LLM 的杀手级应用，实现自然的人机交互。"}, {"slug": "agents", "pid": "elon", "ep": "elon-lexfridm-2021", "date": "2021-12-28", "en": "Full self-driving requires recreating human perception and control in silicon, with neural nets eventually replacing most heuristic code.", "zh": "完全自动驾驶需要用硅基系统重现人类的感知和控制，神经网络最终将取代大部分启发式代码。"}, {"slug": "agents", "pid": "pathak", "ep": "pathak-cmurobot-2020", "date": "2020-11-23", "en": "Current robot learning methods are quasi-static and fail at dynamic tasks like catching.", "zh": "当前的机器人学习方法准静态，无法完成接球等动态任务。"}, {"slug": "agents", "pid": "abbeel", "ep": "abbeel-lexfridm-2018", "date": "2018-12-16", "en": "People naturally anthropomorphize robots even knowing they are scripted or non-learning.", "zh": "即使知道机器人是预设脚本或无学习能力，人们仍会自然地将它们拟人化。"}, {"slug": "agents", "pid": "bengio", "ep": "bengio-lexfridm-2018", "date": "2018-10-20", "en": "Training objectives should shift from passive observation to active agents learning through interaction and causal reasoning.", "zh": "训练目标应从被动观察转向主动智能体，通过交互和因果推理来学习。"}], "economy-jobs": [{"slug": "economy-jobs", "pid": "schmidhuber", "ep": "schmidhuber-unsuperv-2026", "date": "2026-07-09", "en": "The massive capex in AI data centers is overdone and will lead to a stock market crash.", "zh": "AI 数据中心的大规模资本支出过度，将导致股市崩盘。"}, {"slug": "economy-jobs", "pid": "schmidhuber", "ep": "schmidhuber-unsuperv-2026", "date": "2026-07-09", "en": "Investing billions in GPUs now is foolish; waiting 5 years yields 10x cheaper compute.", "zh": "现在投资数十亿美元购买 GPU 是愚蠢的；等 5 年算力便宜 10 倍。"}, {"slug": "economy-jobs", "pid": "wiltschko", "ep": "wiltschko-thetwiml-2026", "date": "2026-07-08", "en": "Fragrance design is a viable first business for olfactory AI, funding further research and data collection.", "zh": "香氛设计是嗅觉 AI 可行的首个业务，为后续研究和数据收集提供资金。"}, {"slug": "economy-jobs", "pid": "wiltschko", "ep": "wiltschko-thetwiml-2026", "date": "2026-07-08", "en": "Medical diagnostics like cancer detection via smell are not good businesses due to regulatory and data challenges.", "zh": "通过气味进行癌症检测等医疗诊断并非好生意，因监管和数据挑战。"}, {"slug": "economy-jobs", "pid": "naval", "ep": "naval-naval-2026b", "date": "2026-07-03", "en": "The speed of AI-driven job displacement is the real problem, not the displacement itself.", "zh": "AI 导致就业替代的速度才是真正的问题，而非替代本身。"}, {"slug": "economy-jobs", "pid": "naval", "ep": "naval-naval-2026b", "date": "2026-07-03", "en": "Spending $100k/year on tokens lets you live like a normal citizen in 2028.", "zh": "每年花费 10 万美元在 token 上，就能像 2028 年的普通公民一样生活。"}, {"slug": "economy-jobs", "pid": "naval", "ep": "naval-naval-2026b", "date": "2026-07-03", "en": "Human desire is irreplaceable; AI users become more productive, not displaced.", "zh": "人类欲望不可替代；使用 AI 的人效率更高，而非被取代。"}, {"slug": "economy-jobs", "pid": "elon", "ep": "elon-seancste-2026", "date": "2026-07-02", "en": "Possessions weigh you down and are an attack vector; selling houses frees up time for Mars.", "zh": "物质财产是负担和攻击点；卖房能腾出时间用于火星计划。"}, {"slug": "economy-jobs", "pid": "elon", "ep": "elon-seancste-2026", "date": "2026-07-02", "en": "Too many smart people go into finance and law; more should make things.", "zh": "太多聪明人从事金融和法律；更多人应该去制造产品。"}, {"slug": "economy-jobs", "pid": "boris", "ep": "boris-claude-2026", "date": "2026-07-02", "en": "Claude Tag increases productivity significantly, with 65% of PRs written by it in some orgs.", "zh": "Claude Tag 显著提升生产力，在某些组织中 65% 的 PR 由其编写。"}, {"slug": "economy-jobs", "pid": "boris", "ep": "boris-claude-2026", "date": "2026-07-02", "en": "Claude Tag is being adopted rapidly across teams due to visible benefits.", "zh": "由于可见的效益，Claude Tag 在各团队中被迅速采用。"}, {"slug": "economy-jobs", "pid": "boris", "ep": "boris-claude-2026", "date": "2026-07-02", "en": "Non-engineers can contribute to code via Claude Tag without technical skills.", "zh": "非工程师可以通过 Claude Tag 贡献代码，无需技术技能。"}, {"slug": "economy-jobs", "pid": "aravind", "ep": "aravind-powerful-2026", "date": "2026-07-01", "en": "AI will replace many jobs, but humans will find new purposes in curiosity and relationships.", "zh": "AI 将取代许多工作，但人类会在好奇心和人际关系中找到新目标。"}, {"slug": "economy-jobs", "pid": "aravind", "ep": "aravind-powerful-2026", "date": "2026-07-01", "en": "The concept of a 'knowledge worker' was created by Microsoft to sell software.", "zh": "“知识工作者”概念是微软为销售软件而创造的。"}, {"slug": "economy-jobs", "pid": "pincus", "ep": "pincus-jamesalt-2026", "date": "2026-07-01", "en": "All new fails; statistically, most new products fail, so start with proven concepts.", "zh": "所有新事物都会失败；统计上大多数新产品都会失败，因此应从已被验证的概念开始。"}, {"slug": "economy-jobs", "pid": "pincus", "ep": "pincus-jamesalt-2026", "date": "2026-07-01", "en": "Use the 'proven better new' framework: copy proven products, make them better, add small innovation.", "zh": "使用“已验证·更好·创新”框架：复制已被验证的产品，使其更好，再添加微小创新。"}, {"slug": "economy-jobs", "pid": "pincus", "ep": "pincus-jamesalt-2026", "date": "2026-07-01", "en": "Consumer apps are currently uninvestable due to distribution challenges and lack of viral platforms.", "zh": "由于分发挑战和缺乏病毒式平台，消费者应用目前不可投资。"}, {"slug": "economy-jobs", "pid": "brockman", "ep": "brockman-alexkant-2026", "date": "2026-07-01", "en": "Price cuts for intelligence will continue, but frontier models will always command premium.", "zh": "智能的价格将持续下降，但前沿模型始终享有溢价。"}, {"slug": "economy-jobs", "pid": "grantsanderson", "ep": "grantsanderson-dwarkesh-2026", "date": "2026-06-30", "en": "AI's role in mathematics may shift from theorem proving to curation and explanation.", "zh": "AI 在数学中的角色可能从定理证明转向策展和解释。"}, {"slug": "economy-jobs", "pid": "grantsanderson", "ep": "grantsanderson-dwarkesh-2026", "date": "2026-06-30", "en": "Teaching and relational roles in math will remain stable even with advanced AI.", "zh": "即使有先进的 AI，数学中的教学和关系角色仍将保持稳定。"}, {"slug": "economy-jobs", "pid": "grantsanderson", "ep": "grantsanderson-dwarkesh-2026", "date": "2026-06-30", "en": "AI solving millennium problems may not directly translate to economic value.", "zh": "AI 解决千禧年问题可能不会直接转化为经济价值。"}, {"slug": "economy-jobs", "pid": "dylanpatel", "ep": "dylanpatel-sequoiac-2026", "date": "2026-06-30", "en": "Inference will become one of the largest markets globally, surpassing oil and contributing significant GDP share.", "zh": "推理将成为全球最大市场之一，超越石油，贡献显著的GDP份额。"}, {"slug": "economy-jobs", "pid": "dylanpatel", "ep": "dylanpatel-sequoiac-2026", "date": "2026-06-30", "en": "AI has clear ROI; denial of model progress is a common misconception despite continuous capability improvements.", "zh": "AI有明确回报；否认模型进步是常见误解，尽管能力持续提升。"}, {"slug": "economy-jobs", "pid": "edunov", "ep": "edunov-latentsp-2026", "date": "2026-06-30", "en": "Automated synthesis labs struggle with novel molecules; human expertise remains crucial for cutting-edge chemistry.", "zh": "自动化合成实验室在处理新颖分子时遇到困难；人类专业知识对前沿化学仍然至关重要。"}, {"slug": "economy-jobs", "pid": "ajambrosino", "ep": "ajambrosino-lennyspo-2026", "date": "2026-06-28", "en": "Implementation is no longer expensive; curation and taste are the new bottlenecks.", "zh": "实现不再昂贵；策展和品味成为新的瓶颈。"}, {"slug": "economy-jobs", "pid": "ajambrosino", "ep": "ajambrosino-lennyspo-2026", "date": "2026-06-28", "en": "Product teams must shift from top-down planning to bottoms-up exploration with taste-driven curation.", "zh": "产品团队必须从自上而下的规划转向由品味驱动的自下而上探索。"}, {"slug": "economy-jobs", "pid": "ajambrosino", "ep": "ajambrosino-lennyspo-2026", "date": "2026-06-28", "en": "The design process is not dead but transformed: prototypes and production code now serve as design artifacts.", "zh": "设计流程并未消亡而是转型：原型和生产代码现在充当设计产物。"}, {"slug": "economy-jobs", "pid": "bengio", "ep": "bengio-sineadbo-2026", "date": "2026-06-25", "en": "The benefits of AI should be shared globally, including compensation for the use of humanity's cultural heritage.", "zh": "AI 的收益应全球共享，包括对使用人类文化遗产的补偿。"}, {"slug": "economy-jobs", "pid": "demis", "ep": "demis-semafort-2026", "date": "2026-06-24", "en": "Generative AI tools democratize creativity and enable faster iteration for professionals.", "zh": "生成式 AI 工具使创造力民主化，并让专业人士更快迭代。"}, {"slug": "economy-jobs", "pid": "demis", "ep": "demis-semafort-2026", "date": "2026-06-24", "en": "The creative industry's concern about AI disclosure may be temporary.", "zh": "创意行业对 AI 披露的担忧可能是暂时的。"}, {"slug": "economy-jobs", "pid": "danbiderman", "ep": "danbiderman-training-2026", "date": "2026-06-24", "en": "Training per-team or per-user models can reduce inference costs by orders of magnitude compared to RAG.", "zh": "为每个团队或用户训练模型，相比 RAG 可将推理成本降低几个数量级。"}, {"slug": "economy-jobs", "pid": "danbiderman", "ep": "danbiderman-training-2026", "date": "2026-06-24", "en": "The future is not one giant frontier model but many personalized models for every individual or team.", "zh": "未来不是一个巨大的前沿模型，而是为每个个人或团队定制的众多模型。"}, {"slug": "economy-jobs", "pid": "joonpark", "ep": "joonpark-googlede-2026", "date": "2026-06-23", "en": "Future agentic economies will have specialists and generalists, not just one superintelligent AGI.", "zh": "未来的智能体经济将包含专才和通才，而非单一的超级智能AGI。"}, {"slug": "economy-jobs", "pid": "joonpark", "ep": "joonpark-googlede-2026", "date": "2026-06-23", "en": "The web may soon be mostly consumed by agents, not humans, changing its nature.", "zh": "网络可能很快主要由智能体而非人类消费，改变其性质。"}, {"slug": "economy-jobs", "pid": "jumper", "ep": "jumper-machinel-2026", "date": "2026-06-22", "en": "AlphaFold enables scientists in resource-limited settings to do complex experiments previously impossible.", "zh": "AlphaFold 使资源有限地区的科学家能够进行以前不可能完成的复杂实验。"}, {"slug": "economy-jobs", "pid": "fiona", "ep": "fiona-lennyspo-2026", "date": "2026-06-21", "en": "Coding is no longer the bottleneck; it's lifted the ceiling of what anyone can do.", "zh": "编码不再是瓶颈；它提升了任何人所能做到的上限。"}, {"slug": "economy-jobs", "pid": "fiona", "ep": "fiona-lennyspo-2026", "date": "2026-06-21", "en": "Growth mindset and leaning into AI are essential for thriving.", "zh": "成长心态和积极拥抱 AI 是成功的关键。"}, {"slug": "economy-jobs", "pid": "fiona", "ep": "fiona-lennyspo-2026", "date": "2026-06-21", "en": "The joy of flow state in coding is lost; satisfaction now comes from product impact.", "zh": "编码中的心流状态乐趣已失；满足感现在来自产品影响。"}, {"slug": "economy-jobs", "pid": "feifei", "ep": "feifei-siliconv-2026", "date": "2026-06-19", "en": "Education must integrate AI to empower students and teachers, not ban it.", "zh": "教育必须整合 AI 来赋能学生和教师，而不是禁止它。"}, {"slug": "economy-jobs", "pid": "feifei", "ep": "feifei-siliconv-2026", "date": "2026-06-19", "en": "The cost of intelligence will not go to zero; human intelligence is deep and nuanced.", "zh": "智能的成本不会降到零；人类智能是深刻而微妙的。"}, {"slug": "economy-jobs", "pid": "feifei", "ep": "feifei-siliconv-2026", "date": "2026-06-19", "en": "The future of work will see a barbell effect: top specialists and high-agency generalists.", "zh": "未来的工作将出现杠铃效应：顶尖专家和高能动性的通才。"}, {"slug": "economy-jobs", "pid": "andrewng", "ep": "andrewng-langchai-2026", "date": "2026-06-17", "en": "AI adoption in enterprises requires both bottom-up innovation and top-down workflow redesign.", "zh": "企业采用 AI 需要自下而上的创新和自上而下的工作流重新设计相结合。"}, {"slug": "economy-jobs", "pid": "andrewng", "ep": "andrewng-langchai-2026", "date": "2026-06-17", "en": "Doomsaying about jobpocalypse is overblown; AI will not cause mass unemployment.", "zh": "关于工作末日的悲观论调被夸大；AI 不会导致大规模失业。"}, {"slug": "economy-jobs", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "AI will cause significant job disruption, but the pie expands; adaptation is key.", "zh": "AI 将导致重大就业颠覆，但蛋糕在扩大；适应是关键。"}, {"slug": "economy-jobs", "pid": "jensen", "ep": "jensen-associat-2026", "date": "2026-06-16", "en": "AI is a new industrial revolution requiring five layers: energy, chips, infrastructure, models, applications.", "zh": "AI 是一场新的工业革命，需要五个层面：能源、芯片、基础设施、模型和应用。"}, {"slug": "economy-jobs", "pid": "jensen", "ep": "jensen-associat-2026", "date": "2026-06-16", "en": "The US must re-industrialize by building advanced manufacturing for AI, creating high-skilled jobs.", "zh": "美国必须通过为 AI 建设先进制造业来再工业化，创造高技能就业岗位。"}, {"slug": "economy-jobs", "pid": "jensen", "ep": "jensen-associat-2026", "date": "2026-06-16", "en": "AI will transform every industry, from healthcare to transportation, as a general-purpose technology.", "zh": "作为通用技术，AI 将改变从医疗到交通的每一个行业。"}, {"slug": "economy-jobs", "pid": "tejal", "ep": "tejal-theopena-2026", "date": "2026-06-16", "en": "Models can pass OpenAI research interviews, changing hiring.", "zh": "模型能通过 OpenAI 研究面试，改变了招聘方式。"}, {"slug": "economy-jobs", "pid": "ethanhe", "ep": "ethanhe-simonsin-2026", "date": "2026-06-16", "en": "AI is a general-purpose technology that will affect everything, requiring us to rethink work and education.", "zh": "AI 是一种通用技术，将影响一切，需要我们重新思考工作和教育。"}, {"slug": "economy-jobs", "pid": "ethanhe", "ep": "ethanhe-simonsin-2026", "date": "2026-06-16", "en": "Experience and expertise are crucial for using AI effectively; juniors often misuse it due to lack of judgment.", "zh": "经验和专业知识对于有效使用 AI 至关重要；初级人员常因缺乏判断力而误用。"}, {"slug": "economy-jobs", "pid": "ethanhe", "ep": "ethanhe-simonsin-2026", "date": "2026-06-16", "en": "The talent pipeline is broken because juniors rely on AI instead of learning through grunt work.", "zh": "人才管道被打破，因为初级人员依赖 AI 而不是通过基础工作学习。"}, {"slug": "economy-jobs", "pid": "aravind", "ep": "aravind-20vcwith-2026", "date": "2026-06-15", "en": "The most important metric in AI is token value per user, maximizing valuable output tokens.", "zh": "AI 中最重要的指标是每个用户的 Token 价值，最大化有价值的输出 Token。"}, {"slug": "economy-jobs", "pid": "mattwhite", "ep": "mattwhite-finovers-2026", "date": "2026-06-15", "en": "AI is not always the best solution; classical ML models often outperform LLMs for tasks like fraud detection.", "zh": "AI 并非总是最佳方案；经典 ML 模型在欺诈检测等任务上常优于 LLM。"}, {"slug": "economy-jobs", "pid": "logankilpatrick", "ep": "logankilpatrick-training-2026", "date": "2026-06-11", "en": "Agentic AI is positive-sum for search and user engagement, not cannibalistic as initially feared.", "zh": "智能体式 AI 对搜索和用户参与是正和的，并非最初担心的蚕食效应。"}, {"slug": "economy-jobs", "pid": "logankilpatrick", "ep": "logankilpatrick-training-2026", "date": "2026-06-11", "en": "Google's success metric should be maximizing customer outcomes, not maximizing eyeball time on products.", "zh": "Google 的成功指标应该是最大化客户成果，而不是最大化产品上的眼球时间。"}, {"slug": "economy-jobs", "pid": "logankilpatrick", "ep": "logankilpatrick-training-2026", "date": "2026-06-11", "en": "Startups have more opportunity than ever despite model companies expanding; focus is their superpower.", "zh": "尽管模型公司不断扩张，初创公司的机会比以往更多；专注是它们的超能力。"}, {"slug": "economy-jobs", "pid": "dario", "ep": "dario-thecircu-2026", "date": "2026-06-10", "en": "AI will eliminate many white-collar jobs, requiring society to find new roles and policies like UBI.", "zh": "AI 将淘汰许多白领工作，社会需要寻找新角色并制定政策，如全民基本收入。"}, {"slug": "economy-jobs", "pid": "dario", "ep": "dario-thecircu-2026", "date": "2026-06-10", "en": "AI could cause high GDP growth alongside high unemployment and inequality, a rare combination.", "zh": "AI 可能导致高 GDP 增长伴随高失业和不平等，这是一种罕见的组合。"}, {"slug": "economy-jobs", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "Tasks will be automated, not entire jobs; efficiency often creates more work.", "zh": "任务会被自动化，而非整个工作；效率往往创造更多工作。"}, {"slug": "economy-jobs", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "White-collar tasks will be fully automated by AI in 12-18 months, not jobs.", "zh": "白领任务将在 12-18 个月内被 AI 完全自动化，而非工作岗位。"}, {"slug": "economy-jobs", "pid": "demis", "ep": "demis-nobelpri-2026", "date": "2026-06-07", "en": "AI frees scientists from repetitive tasks, allowing more time for creative thinking.", "zh": "AI 将科学家从重复性任务中解放出来，让他们有更多时间进行创造性思考。"}, {"slug": "economy-jobs", "pid": "awang", "ep": "awang-bloomber-2026", "date": "2026-06-05", "en": "AI enables more new businesses and entrepreneurship, offsetting job displacement concerns.", "zh": "AI 催生了更多新企业和创业机会，抵消了就业替代的担忧。"}, {"slug": "economy-jobs", "pid": "murati", "ep": "murati-bloomber", "date": "2026-06-04", "en": "The most important impact of ChatGPT was bringing AI into public consciousness, not just technology.", "zh": "ChatGPT 最重要的影响是将 AI 带入公众意识，而不仅是技术。"}, {"slug": "economy-jobs", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "AI will cause massive unemployment and societal disruption.", "zh": "AI 将导致大规模失业和社会动荡。"}, {"slug": "economy-jobs", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "Radiologist job loss prediction was wrong due to elastic healthcare demand and broader roles.", "zh": "放射科医生失业的预测错误，因为医疗需求弹性大且角色更广泛。"}, {"slug": "economy-jobs", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "AI doctors are judged more empathetic than human doctors due to broader data.", "zh": "AI 医生因数据更广而被认为比人类医生更有同理心。"}, {"slug": "economy-jobs", "pid": "noambrown", "ep": "noambrown-baincapi-2026", "date": "2026-06-04", "en": "Human mathematicians' value will shift to asking right questions and research taste.", "zh": "人类数学家的价值将转向提出正确问题和研究品味。"}, {"slug": "economy-jobs", "pid": "alexwei", "ep": "alexwei-theopena-2026", "date": "2026-06-04", "en": "AI is a tool to empower researchers, not replace them, accelerating science.", "zh": "AI 是赋能研究者的工具，而非替代他们，加速科学进步。"}, {"slug": "economy-jobs", "pid": "mensch", "ep": "mensch-cnbc-2026", "date": "2026-06-03", "en": "Enterprise AI adoption requires strong ROI; spending must yield at least 2x return to avoid collapse.", "zh": "企业采用 AI 需要强劲的投资回报率；支出必须产生至少两倍回报，否则整个体系可能崩溃。"}, {"slug": "economy-jobs", "pid": "mensch", "ep": "mensch-cnbc-2026", "date": "2026-06-03", "en": "Enterprise AI adoption is bottlenecked by organizational change, not model intelligence.", "zh": "企业采用 AI 的瓶颈在于组织变革，而非模型智能。"}, {"slug": "economy-jobs", "pid": "oriol", "ep": "oriol-unsuperv-2026", "date": "2026-05-22", "en": "The ability to innovate in science is hard to evaluate and may be the hardest capability to achieve.", "zh": "科学创新的能力难以评估，可能是最难实现的能力。"}, {"slug": "economy-jobs", "pid": "mjordan", "ep": "mjordan-machinel-2026", "date": "2026-05-20", "en": "Current AI hype distracts from real problems like healthcare and transportation.", "zh": "当前的 AI 炒作分散了对医疗和交通等实际问题的关注。"}, {"slug": "economy-jobs", "pid": "mjordan", "ep": "mjordan-machinel-2026", "date": "2026-05-20", "en": "Data markets need incentive structures to respect privacy and reward contributors.", "zh": "数据市场需要激励结构来尊重隐私并奖励贡献者。"}, {"slug": "economy-jobs", "pid": "mjordan", "ep": "mjordan-machinel-2026", "date": "2026-05-20", "en": "Building systems without understanding them is fine, but requires economic safeguards.", "zh": "构建不理解系统的做法没问题，但需要经济上的保障措施。"}, {"slug": "economy-jobs", "pid": "altman", "ep": "altman-stripese-2026", "date": "2026-05-19", "en": "AI will accelerate science, especially materials science, with huge positive impact.", "zh": "AI 将加速科学，尤其是材料科学，带来巨大积极影响。"}, {"slug": "economy-jobs", "pid": "altman", "ep": "altman-stripese-2026", "date": "2026-05-19", "en": "The idea guy is now valuable; non-technical founders can succeed with AI tools.", "zh": "点子王现在很有价值；非技术创始人借助 AI 工具也能成功。"}, {"slug": "economy-jobs", "pid": "altman", "ep": "altman-stripese-2026", "date": "2026-05-19", "en": "The world is not about to completely reconfigure; money will still move between agents.", "zh": "世界不会完全重构；资金仍将在智能体之间流动。"}, {"slug": "economy-jobs", "pid": "caitlin", "ep": "caitlin-lennyspo-2026", "date": "2026-05-17", "en": "Supply chain independence for critical components like actuators and magnets is essential for national security.", "zh": "关键部件如执行器和磁铁的供应链独立对国家安全至关重要。"}, {"slug": "economy-jobs", "pid": "caitlin", "ep": "caitlin-lennyspo-2026", "date": "2026-05-17", "en": "AI-native young engineers bring a fundamentally different problem-solving approach and are crucial for innovation.", "zh": "AI 原生的年轻工程师带来根本不同的解决问题方式，对创新至关重要。"}, {"slug": "economy-jobs", "pid": "caitlin", "ep": "caitlin-lennyspo-2026", "date": "2026-05-17", "en": "VR didn't fail due to bad execution; social awkwardness of wearing a face-covering device limited adoption.", "zh": "VR 失败并非执行不力；戴遮脸设备的社会尴尬限制了采用。"}, {"slug": "economy-jobs", "pid": "awang", "ep": "awang-corememo", "date": "2026-05-13", "en": "Meta's AI lab culture is like a startup, not a mercenary force—researchers joined for compute and talent density.", "zh": "Meta 的 AI 实验室文化像初创公司，而非雇佣军——研究人员因算力和人才密度而加入。"}, {"slug": "economy-jobs", "pid": "karpathy", "ep": "karpathy-training", "date": "2026-04-29", "en": "You can outsource your thinking, but you can't outsource your understanding—that remains the human bottleneck.", "zh": "你可以外包思考，但无法外包理解——这仍然是人类的瓶颈。"}, {"slug": "economy-jobs", "pid": "karpathy", "ep": "karpathy-training", "date": "2026-04-29", "en": "Everything is automatable eventually; verifiability determines what is easy or hard to automate now.", "zh": "一切最终都可自动化；可验证性决定了当前自动化的难易程度。"}, {"slug": "economy-jobs", "pid": "karpathy", "ep": "karpathy-training", "date": "2026-04-29", "en": "Hiring for AI-native engineers should involve large projects and adversarial testing, not puzzles.", "zh": "招聘 AI 原生工程师应通过大型项目和对抗性测试，而非解谜题。"}, {"slug": "economy-jobs", "pid": "catwu", "ep": "catwu-lennyspo", "date": "2026-04-23", "en": "Product taste—deciding what to build—is the most valuable skill as code becomes cheaper.", "zh": "产品品味——决定构建什么——是代码成本降低后最有价值的技能。"}, {"slug": "economy-jobs", "pid": "catwu", "ep": "catwu-lennyspo", "date": "2026-04-23", "en": "AI tools like Claude Code and Co-work automate repetitive tasks, freeing humans for creative work.", "zh": "像 Claude Code 和 Co-work 这样的 AI 工具自动化重复性任务，解放人类从事创造性工作。"}, {"slug": "economy-jobs", "pid": "catwu", "ep": "catwu-lennyspo", "date": "2026-04-23", "en": "PMs need more engineers with product taste, not necessarily more PMs, to reduce overhead.", "zh": "产品经理需要更多具有产品品味的工程师，而不一定是更多的产品经理，以减少开销。"}, {"slug": "economy-jobs", "pid": "brockman", "ep": "brockman-bigtechn-2026", "date": "2026-04-23", "en": "OpenAI's business model is simple: rent compute and resell it with positive margin, benefiting from Jevons paradox.", "zh": "OpenAI 的商业模式很简单：租用算力并以正利润率转售，受益于杰文斯悖论。"}, {"slug": "economy-jobs", "pid": "brockman", "ep": "brockman-bigtechn-2026", "date": "2026-04-23", "en": "Prompt engineering is not dead; it becomes more vibrant as users get more value with less effort.", "zh": "提示工程并未消亡；随着用户用更少努力获得更多价值，它反而更加活跃。"}, {"slug": "economy-jobs", "pid": "mensch", "ep": "mensch-lisaburk-2026", "date": "2026-04-20", "en": "European talent pools are strong for junior hires; senior executives with scaling experience are scarce.", "zh": "欧洲初级人才储备充足，但具备规模化经验的高管稀缺。"}, {"slug": "economy-jobs", "pid": "gomez", "ep": "gomez-upstarts-2026", "date": "2026-04-16", "en": "AI integration into the economy can restore growth and strengthen liberal democracies.", "zh": "将 AI 融入经济可以恢复增长并加强自由民主制度。"}, {"slug": "economy-jobs", "pid": "gomez", "ep": "gomez-upstarts-2026", "date": "2026-04-16", "en": "AI is more likely to save the world than destroy it, by restoring economic growth.", "zh": "AI 更可能通过恢复经济增长来拯救世界，而非毁灭它。"}, {"slug": "economy-jobs", "pid": "gomez", "ep": "gomez-upstarts-2026", "date": "2026-04-16", "en": "Xenophobia and conflict stem from economic stagnation, not inherent human nature.", "zh": "仇外心理和冲突源于经济停滞，而非人性固有缺陷。"}, {"slug": "economy-jobs", "pid": "pachocki", "ep": "pachocki-unsuperv-2026", "date": "2026-04-09", "en": "AI for science is progressing, with models generating novel ideas in math and physics.", "zh": "AI 在科学领域取得进展，模型在数学和物理中产生新想法。"}, {"slug": "economy-jobs", "pid": "pachocki", "ep": "pachocki-unsuperv-2026", "date": "2026-04-09", "en": "Current models are already economically transformative, not just research curiosities.", "zh": "当前模型已具有经济变革性，而不仅是研究新奇事物。"}, {"slug": "economy-jobs", "pid": "pachocki", "ep": "pachocki-unsuperv-2026", "date": "2026-04-09", "en": "The biggest societal risk is concentration of power from automated organizations run by few.", "zh": "最大的社会风险是少数人运营的自动化组织导致的权力集中。"}, {"slug": "economy-jobs", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "AI is transforming chip design: from standard cell library generation to bug attribution and design exploration.", "zh": "AI 正在改变芯片设计：从标准单元库生成到缺陷归因和设计探索。"}, {"slug": "economy-jobs", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "Personalized AI tutors and health coaches are among the most impactful applications for society.", "zh": "个性化 AI 导师和健康教练是对社会最有影响力的应用之一。"}, {"slug": "economy-jobs", "pid": "edwinchen", "ep": "edwinchen-stanford-2026", "date": "2026-03-30", "en": "AI tools can be the best teacher, but using them to avoid struggle undermines learning.", "zh": "AI 工具可以成为最好的老师，但用它来逃避困难会破坏学习。"}, {"slug": "economy-jobs", "pid": "edwinchen", "ep": "edwinchen-stanford-2026", "date": "2026-03-30", "en": "AI-generated text may homogenize writing styles, but could also free us to focus on deeper thinking.", "zh": "AI 生成的文本可能使写作风格同质化，但也可能让我们专注于更深层的思考。"}, {"slug": "economy-jobs", "pid": "bengio", "ep": "bengio-radiodav-2026", "date": "2026-03-26", "en": "AI should be directed toward public good like medicine and climate, not just profit-driven automation.", "zh": "AI 应导向医学和气候等公共利益，而非仅追求利润驱动的自动化。"}, {"slug": "economy-jobs", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "I have never done anything directly useful in my whole life.", "zh": "我一生中从未做过任何直接有用的事情。"}, {"slug": "economy-jobs", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "The hype and industry warp the science; an AI winter might even be good.", "zh": "炒作和行业扭曲了科学；AI 寒冬甚至可能是好事。"}, {"slug": "economy-jobs", "pid": "robertlange", "ep": "robertlange-machinel-2026", "date": "2026-03-13", "en": "Humans remain the source of deep understanding and creativity; AI amplifies human capabilities.", "zh": "人类仍是深度理解和创造力的源泉；AI 放大了人类的能力。"}, {"slug": "economy-jobs", "pid": "robertlange", "ep": "robertlange-machinel-2026", "date": "2026-03-13", "en": "AI coding assistants can be addictive, reducing deep thinking and grounding.", "zh": "AI 编程助手可能让人上瘾，减少深度思考和根基性。"}, {"slug": "economy-jobs", "pid": "dylanpatel", "ep": "dylanpatel-dwarkesh-2026", "date": "2026-03-13", "en": "Memory prices are surging due to AI demand, causing consumer electronics to become more expensive.", "zh": "AI 需求导致内存价格飙升，消费电子产品变得更贵。"}, {"slug": "economy-jobs", "pid": "markchen", "ep": "markchen-institut-2026", "date": "2026-03-09", "en": "AI enables division of labor in mathematics, allowing specialization like other sciences.", "zh": "AI 使数学中的劳动分工成为可能，像其他科学一样实现专业化。"}, {"slug": "economy-jobs", "pid": "markchen", "ep": "markchen-institut-2026", "date": "2026-03-09", "en": "Education must shift from homework to project-based assessment and teach verification skills.", "zh": "教育必须从作业转向基于项目的评估，并教授验证技能。"}, {"slug": "economy-jobs", "pid": "markchen", "ep": "markchen-institut-2026", "date": "2026-03-09", "en": "Weak students use AI more, while strong students avoid it to prevent skill atrophy.", "zh": "弱学生更多使用 AI，而强学生为避免技能退化而回避它。"}, {"slug": "economy-jobs", "pid": "nando", "ep": "nando-iafrikan-2026", "date": "2026-03-06", "en": "Africa has leapfrogged gender gaps in tech, unlike Europe and North America.", "zh": "非洲在科技领域的性别差距上实现了跨越式发展，不像欧洲和北美。"}, {"slug": "economy-jobs", "pid": "nando", "ep": "nando-iafrikan-2026", "date": "2026-03-06", "en": "Human skills like communication are as important as coding at Google DeepMind.", "zh": "在 Google DeepMind，沟通等人际技能与编码同样重要。"}, {"slug": "economy-jobs", "pid": "nando", "ep": "nando-iafrikan-2026", "date": "2026-03-06", "en": "Africa is not behind in AI; it has unique advantages like leapfrogging legacy issues.", "zh": "非洲在 AI 方面并不落后；它拥有跨越遗留问题等独特优势。"}, {"slug": "economy-jobs", "pid": "jhoward", "ep": "jhoward-machinel-2026", "date": "2026-03-03", "en": "Software engineering is distinct from coding; LLMs fail at novel design and architecture.", "zh": "软件工程不同于编码；LLM 在新颖设计和架构上失败。"}, {"slug": "economy-jobs", "pid": "jhoward", "ep": "jhoward-machinel-2026", "date": "2026-03-03", "en": "Over-reliance on AI coding erodes human competence and organizational knowledge over time.", "zh": "过度依赖 AI 编码会逐渐侵蚀人类能力和组织知识。"}, {"slug": "economy-jobs", "pid": "jhoward", "ep": "jhoward-machinel-2026", "date": "2026-03-03", "en": "AI coding tools create an illusion of control similar to slot machines, not genuine productivity.", "zh": "AI 编码工具制造类似老虎机的控制幻觉，而非真正的生产力。"}, {"slug": "economy-jobs", "pid": "andrewng", "ep": "andrewng-thisisth-2026", "date": "2026-03-01", "en": "AI will not replace most jobs but will automate parts; AI users replace non-users.", "zh": "AI 不会取代大多数工作，但会自动化部分；使用 AI 的人将取代不使用的人。"}, {"slug": "economy-jobs", "pid": "lecun", "ep": "lecun-aninews-2026", "date": "2026-02-19", "en": "AI will amplify human intelligence, similar to the printing press or internet.", "zh": "AI 将增强人类智能，类似于印刷术或互联网。"}, {"slug": "economy-jobs", "pid": "lecun", "ep": "lecun-aninews-2026", "date": "2026-02-19", "en": "Humans will need more education, not less, as AI advances.", "zh": "随着 AI 进步，人类需要更多教育，而非更少。"}, {"slug": "economy-jobs", "pid": "lecun", "ep": "lecun-aninews-2026", "date": "2026-02-19", "en": "The concept of genius will evolve; ancient geniuses were practical inventors.", "zh": "天才的概念将演变；古代天才是实践发明家。"}, {"slug": "economy-jobs", "pid": "awang", "ep": "awang-aninewsi-2026", "date": "2026-02-18", "en": "Data is the new oil; governments should treat healthcare and national security data as strategic assets.", "zh": "数据是新的石油；政府应将医疗和国家安全数据视为战略资产。"}, {"slug": "economy-jobs", "pid": "bengio", "ep": "bengio-siliconv-2026", "date": "2026-02-16", "en": "Education remains crucial for becoming better humans, not just job skills.", "zh": "教育对成为更好的人至关重要，而不仅是职业技能。"}, {"slug": "economy-jobs", "pid": "suleyman", "ep": "suleyman-financia-2026", "date": "2026-02-12", "en": "Professional-grade AGI will automate most white-collar tasks within 12-18 months.", "zh": "专业级 AGI 将在 12-18 个月内自动化大多数白领工作。"}, {"slug": "economy-jobs", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "Humanoid robots (Optimus) will enable recursive manufacturing, leading to exponential economic growth.", "zh": "人形机器人（Optimus）将实现递归制造，带来指数级经济增长。"}, {"slug": "economy-jobs", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "Advertising is a proven model to scale consumer AI access; subscriptions alone limit reach.", "zh": "广告是规模化消费者 AI 访问的成熟模式；仅靠订阅会限制覆盖范围。"}, {"slug": "economy-jobs", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "AI-generated video is not compelling for passive viewing; its main use is personalized memes in group chats.", "zh": "AI 生成的视频对被动观看没有吸引力；其主要用途是群聊中的个性化表情包。"}, {"slug": "economy-jobs", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "The race to 3 billion monthly active users is over; Anthropic should focus on a premium iPhone-like niche.", "zh": "争夺 30 亿月活用户的竞赛已经结束；Anthropic 应专注于类似 iPhone 的高端利基市场。"}, {"slug": "economy-jobs", "pid": "lambert", "ep": "lambert-lexfridm-2026", "date": "2026-01-31", "en": "LLM summaries often lose voice and core insights; human-written content retains unique value.", "zh": "LLM 生成的摘要常丢失语气和核心洞见；人类撰写的内容保留独特价值。"}, {"slug": "economy-jobs", "pid": "lambert", "ep": "lambert-lexfridm-2026", "date": "2026-01-31", "en": "Using LLMs for everything may hinder learning; deliberate struggle and offline study are still essential for expertise.", "zh": "凡事依赖 LLM 可能阻碍学习；刻意挣扎和离线学习对成为专家仍然必不可少。"}, {"slug": "economy-jobs", "pid": "tworek", "ep": "tworek-unsuperv-2026", "date": "2026-01-29", "en": "The biggest societal risk from AI is not extinction but a dystopian retreat into virtual worlds.", "zh": "AI 最大的社会风险不是灭绝，而是退入虚拟世界的反乌托邦。"}, {"slug": "economy-jobs", "pid": "sutton", "ep": "sutton-acmbytec-2026", "date": "2026-01-22", "en": "Young researchers should follow their passion, not fashion.", "zh": "年轻研究者应追随热情，而非潮流。"}, {"slug": "economy-jobs", "pid": "springenberg", "ep": "springenberg-training-2026", "date": "2026-01-06", "en": "General-purpose robotics may be easier than self-driving due to lower reliability requirements.", "zh": "通用机器人可能比自动驾驶更容易，因为对可靠性的要求更低。"}, {"slug": "economy-jobs", "pid": "shanelegg", "ep": "shanelegg-googlede-2025", "date": "2025-12-11", "en": "AGI will transform society and the economy; we need broad interdisciplinary thinking to navigate the transition.", "zh": "AGI 将变革社会和经济；我们需要广泛的跨学科思考来应对转型。"}, {"slug": "economy-jobs", "pid": "shanelegg", "ep": "shanelegg-googlede-2025", "date": "2025-12-11", "en": "The general public may understand AI's potential better than domain experts, who often underestimate its impact.", "zh": "普通公众可能比领域专家更理解 AI 的潜力，后者常低估其影响。"}, {"slug": "economy-jobs", "pid": "shanelegg", "ep": "shanelegg-googlede-2025", "date": "2025-12-11", "en": "Jobs that are purely cognitive and remote are most at risk; physical jobs like plumbing are safer in the short term.", "zh": "纯认知和远程工作风险最大；体力工作如管道工短期更安全。"}, {"slug": "economy-jobs", "pid": "jumper", "ep": "jumper-googlede-2025", "date": "2025-11-28", "en": "Solving grand challenges often leads to practical tools, not just celebration.", "zh": "解决重大挑战往往带来实用工具，而不仅仅是庆祝。"}, {"slug": "economy-jobs", "pid": "jumper", "ep": "jumper-googlede-2025", "date": "2025-11-28", "en": "Drug design is far more than just binding; most drugs fail in trials.", "zh": "药物设计远不止结合；大多数药物在试验中失败。"}, {"slug": "economy-jobs", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "Economic pressure to deploy smaller, cheaper models has shifted focus from scaling up.", "zh": "部署更小、更便宜模型的经济压力使焦点从规模扩张转移。"}, {"slug": "economy-jobs", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "Translation industry grew despite AI advances; trust keeps humans in the loop.", "zh": "尽管 AI 进步，翻译行业仍在增长；信任让人类参与其中。"}, {"slug": "economy-jobs", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Long-term equilibrium may require human-AI integration via neural links to maintain participation and control.", "zh": "长期均衡可能需要通过神经链接实现人机融合，以维持参与和控制。"}, {"slug": "economy-jobs", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "The long-run equilibrium may require humans merging with AI via neural links.", "zh": "长期均衡可能需要人类通过神经链接与 AI 融合。"}, {"slug": "economy-jobs", "pid": "jasonwei", "ep": "jasonwei-stanford-2025", "date": "2025-10-18", "en": "Intelligence will become a commodity with cost driven toward zero.", "zh": "智能将成为一种商品，成本趋近于零。"}, {"slug": "economy-jobs", "pid": "jasonwei", "ep": "jasonwei-stanford-2025", "date": "2025-10-18", "en": "AI can solve tasks humans cannot due to biological limits, like predicting breast cancer from millions of images.", "zh": "AI 能解决人类因生物限制无法完成的任务，如从数百万张图像预测乳腺癌。"}, {"slug": "economy-jobs", "pid": "jasonwei", "ep": "jasonwei-stanford-2025", "date": "2025-10-18", "en": "Private insider information becomes more valuable as public knowledge becomes cheap.", "zh": "随着公共知识变得廉价，私人内幕信息变得更有价值。"}, {"slug": "economy-jobs", "pid": "nanda", "ep": "nanda-80000hou-2025", "date": "2025-09-15", "en": "You can just do things; maximize luck surface area by saying yes to opportunities.", "zh": "你可以直接去做事；通过接受机会来最大化你的运气表面积。"}, {"slug": "economy-jobs", "pid": "nanda", "ep": "nanda-80000hou-2025", "date": "2025-09-15", "en": "Effective cold emails are concise, signal competence, and target junior people.", "zh": "有效的冷邮件要简洁、展示能力，并针对资历较浅的人。"}, {"slug": "economy-jobs", "pid": "nanda", "ep": "nanda-80000hou-2025", "date": "2025-09-15", "en": "PhD is not necessary; dropping out for a better opportunity can be the right call.", "zh": "博士学位并非必需；为更好的机会退学可能是正确的选择。"}, {"slug": "economy-jobs", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "Software engineering demand will increase due to Jevons paradox, not decrease.", "zh": "由于杰文斯悖论，软件工程需求将增加，而非减少。"}, {"slug": "economy-jobs", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "AI will not eliminate software engineers; it will increase their numbers and change their role.", "zh": "AI 不会消灭软件工程师；它将增加其数量并改变其角色。"}, {"slug": "economy-jobs", "pid": "tombrown", "ep": "tombrown-ycombina-2025", "date": "2025-08-19", "en": "Taking more risks and working on things that impress your idealized self is better than chasing credentials.", "zh": "承担更多风险、做让理想中的自己骄傲的事，比追逐学历和头衔更好。"}, {"slug": "economy-jobs", "pid": "lambert", "ep": "lambert-intercon", "date": "2025-07-31", "en": "Meta's panic button is real; talent is cheaper than GPUs, so they hire top researchers.", "zh": "Meta 的恐慌按钮是真实的；人才比 GPU 便宜，所以他们雇佣顶尖研究人员。"}, {"slug": "economy-jobs", "pid": "noambrown", "ep": "noambrown-sequoiac-2025", "date": "2025-07-30", "en": "The team was small (3 people) and the effort scrappy, contradicting the notion that big breakthroughs require large teams.", "zh": "团队仅 3 人且方式灵活，与重大突破需要大团队的观点相悖。"}, {"slug": "economy-jobs", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "Most value may come from frontier models, not cheaper less capable ones.", "zh": "大部分价值可能来自前沿模型，而非更便宜但能力较弱的模型。"}, {"slug": "economy-jobs", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "Building products that don't quite work yet is recommended due to rapid AI improvement.", "zh": "由于 AI 快速进步，建议构建尚未完全可行的产品。"}, {"slug": "economy-jobs", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "AI integration bottleneck is speed of development, not lack of capability.", "zh": "AI 集成的瓶颈是发展速度，而非能力不足。"}, {"slug": "economy-jobs", "pid": "benmann", "ep": "benmann-lennyspo-2025", "date": "2025-07-20", "en": "Economic Turing test: AI passes when hired for a job without knowing it's a machine.", "zh": "经济图灵测试：当 AI 被雇佣从事某项工作而不知其为机器时，即通过测试。"}, {"slug": "economy-jobs", "pid": "benmann", "ep": "benmann-lennyspo-2025", "date": "2025-07-20", "en": "Even AI researchers like Ben are not immune to job replacement; all jobs will be affected.", "zh": "即使是像 Ben 这样的 AI 研究人员也无法避免被取代；所有工作都将受到影响。"}, {"slug": "economy-jobs", "pid": "benmann", "ep": "benmann-lennyspo-2025", "date": "2025-07-20", "en": "In a post-singularity world, capitalism may look completely different due to abundance.", "zh": "在后奇点世界，由于物质极大丰富，资本主义可能面目全非。"}, {"slug": "economy-jobs", "pid": "lample", "ep": "lample-latentsp-2025", "date": "2025-07-01", "en": "AI for science has many low-hanging fruits, but requires pairing domain experts with AI researchers.", "zh": "AI for science 有许多唾手可得的成果，但需要将领域专家与 AI 研究人员配对。"}, {"slug": "economy-jobs", "pid": "noambrown", "ep": "noambrown-latentsp-2025", "date": "2025-06-19", "en": "Human intelligence is not a narrow band; civilization's progress comes from cooperation and competition over time.", "zh": "人类智能并非窄带；文明进步源于长期合作与竞争。"}, {"slug": "economy-jobs", "pid": "thomaswolf", "ep": "thomaswolf-training-2025", "date": "2025-05-01", "en": "The uncanny valley concern for humanoids may be overblown; people will quickly accept robots.", "zh": "对人形机器人的恐怖谷担忧可能被夸大；人们会很快接受机器人。"}, {"slug": "economy-jobs", "pid": "jaderberg", "ep": "jaderberg-training-2025", "date": "2025-04-29", "en": "Hiring machine learning experts with no biology background can be an asset.", "zh": "招聘没有生物学背景的机器学习专家可能是一种资产。"}, {"slug": "economy-jobs", "pid": "jaderberg", "ep": "jaderberg-training-2025", "date": "2025-04-29", "en": "Future clinical trials may change radically as AI predicts toxicity and efficacy.", "zh": "随着 AI 预测毒性和疗效，未来的临床试验可能发生根本性变化。"}, {"slug": "economy-jobs", "pid": "shazeer", "ep": "shazeer-unsuperv-2025", "date": "2025-03-17", "en": "AI will transform education, enabling personalized learning for children.", "zh": "AI 将变革教育，实现儿童个性化学习。"}, {"slug": "economy-jobs", "pid": "shazeer", "ep": "shazeer-unsuperv-2025", "date": "2025-03-17", "en": "Inference costs are so low that task-specific models are unnecessary for high-value domains.", "zh": "推理成本极低，高价值领域无需专用模型。"}, {"slug": "economy-jobs", "pid": "shazeer", "ep": "shazeer-unsuperv-2025", "date": "2025-03-17", "en": "Coding is underhyped as an AI application; it enables self-acceleration of AI progress.", "zh": "编码作为 AI 应用被低估；它能实现 AI 进步的自我加速。"}, {"slug": "economy-jobs", "pid": "karina", "ep": "karina-lennyspo-2025", "date": "2025-02-09", "en": "Soft skills like creativity, listening, and management become more valuable as AI automates hard skills.", "zh": "随着 AI 自动化硬技能，创造力、倾听和管理等软技能变得更加宝贵。"}, {"slug": "economy-jobs", "pid": "karina", "ep": "karina-lennyspo-2025", "date": "2025-02-09", "en": "Strategy is something AI can excel at by synthesizing data and generating plans.", "zh": "策略是 AI 可以通过综合数据和生成计划而擅长的领域。"}, {"slug": "economy-jobs", "pid": "kohli", "ep": "kohli-googlede-2024", "date": "2024-10-09", "en": "Material science is more experimental than biology; AI impact there will take 5-10 years.", "zh": "材料科学比生物学更实验性；人工智能的影响需要 5-10 年。"}, {"slug": "economy-jobs", "pid": "tridao", "ep": "tridao-unsuperv-2024", "date": "2024-10-01", "en": "AI coding tools made the guest 1.5x more productive, much higher than expected.", "zh": "AI 编码工具使嘉宾的效率提高了 1.5 倍，远高于预期。"}, {"slug": "economy-jobs", "pid": "percyliang", "ep": "percyliang-imbue-2023", "date": "2023-11-01", "en": "Data attribution could enable fair compensation for content creators and improve data quality.", "zh": "数据归因可以为内容创作者提供公平补偿并提高数据质量。"}, {"slug": "economy-jobs", "pid": "malik", "ep": "malik-therobot-2023", "date": "2023-08-16", "en": "AI will augment rather than replace human jobs, as seen historically with computerization.", "zh": "AI 将增强而非取代人类工作，正如历史上计算机化所展现的。"}, {"slug": "economy-jobs", "pid": "schulman", "ep": "schulman-therobot-2023", "date": "2023-08-03", "en": "Models are superhuman in speed and breadth but worse than skilled humans in mathematical reasoning.", "zh": "模型在速度和广度上超越人类，但在数学推理上不如熟练的人类。"}, {"slug": "economy-jobs", "pid": "bubeck", "ep": "bubeck-sparksof-2023", "date": "2023-04-06", "en": "GPT-4's coding ability is superhuman, passing mock interviews faster than all humans.", "zh": "GPT-4 的编程能力超乎人类，在模拟面试中比所有人类都快。"}, {"slug": "economy-jobs", "pid": "bubeck", "ep": "bubeck-sparksof-2023", "date": "2023-04-06", "en": "GPT-4's intelligence is useful daily; it changes workflows regardless of definition.", "zh": "GPT-4 的智能在日常工作中很有用；无论如何定义，它都在改变工作流程。"}, {"slug": "economy-jobs", "pid": "ilya", "ep": "ilya-dwarkesh-2023", "date": "2023-03-27", "en": "Reliability is the key barrier to economic value from AI, not capability.", "zh": "可靠性是 AI 产生经济价值的关键障碍，而非能力本身。"}], "architecture": [{"slug": "architecture", "pid": "neelnanda", "ep": "neelnanda-googlede-2026", "date": "2026-07-10", "en": "Interpretability is like neuroscience for AI, reverse-engineering what neural networks learned during training.", "zh": "可解释性类似于 AI 的神经科学，逆向工程神经网络在训练中学到的内容。"}, {"slug": "architecture", "pid": "neelnanda", "ep": "neelnanda-googlede-2026", "date": "2026-07-10", "en": "Chain-of-thought reasoning is a powerful but fragile interpretability tool; it may not work for future models.", "zh": "思维链推理是一个强大但脆弱的可解释性工具；未来模型可能不再适用。"}, {"slug": "architecture", "pid": "neelnanda", "ep": "neelnanda-googlede-2026", "date": "2026-07-10", "en": "Probes and sparse autoencoders are key white-box techniques for understanding model internals.", "zh": "探针和稀疏自编码器是理解模型内部的关键白盒技术。"}, {"slug": "architecture", "pid": "schmidhuber", "ep": "schmidhuber-unsuperv-2026", "date": "2026-07-09", "en": "True AGI requires physical robots with hardware rivaling human bodies, not just software behind a screen.", "zh": "真正的 AGI 需要硬件能与人体媲美的物理机器人，而不仅仅是屏幕后的软件。"}, {"slug": "architecture", "pid": "schmidhuber", "ep": "schmidhuber-unsuperv-2026", "date": "2026-07-09", "en": "Current large language models are heavily biased toward human data, limiting their generality.", "zh": "当前大语言模型严重偏向人类数据，限制了其通用性。"}, {"slug": "architecture", "pid": "schmidhuber", "ep": "schmidhuber-unsuperv-2026", "date": "2026-07-09", "en": "The transformer architecture's quadratic complexity is wasteful; linear variants are superior.", "zh": "Transformer 架构的二次复杂度是浪费；线性变体更优。"}, {"slug": "architecture", "pid": "wiltschko", "ep": "wiltschko-thetwiml-2026", "date": "2026-07-08", "en": "Smell is a high-dimensional problem with over 300 olfactory receptor types, far more than color's three channels.", "zh": "嗅觉是一个高维问题，有超过 300 种嗅觉受体类型，远超颜色的三个通道。"}, {"slug": "architecture", "pid": "wiltschko", "ep": "wiltschko-thetwiml-2026", "date": "2026-07-08", "en": "The Principal Odor Map is a continuous predictive map of smell, foundational for olfactory AI.", "zh": "主气味图是嗅觉的连续预测地图，是嗅觉 AI 的基础。"}, {"slug": "architecture", "pid": "wiltschko", "ep": "wiltschko-thetwiml-2026", "date": "2026-07-08", "en": "A Copernican view of intelligence suggests AI should incorporate non-human forms like chemical communication.", "zh": "智能的哥白尼观点认为 AI 应纳入非人类形式，如化学通信。"}, {"slug": "architecture", "pid": "hasani", "ep": "hasani-thecogni-2026", "date": "2026-07-04", "en": "Efficiency is the cornerstone of Liquid AI's research, maximizing intelligence in the smallest algorithm format.", "zh": "效率是 Liquid AI 研究的基石，以最小的算法格式最大化智能。"}, {"slug": "architecture", "pid": "hasani", "ep": "hasani-thecogni-2026", "date": "2026-07-04", "en": "Liquid neural networks, inspired by biology, offer superior out-of-distribution generalization with fewer parameters.", "zh": "受生物学启发的液态神经网络以更少的参数提供更优的分布外泛化能力。"}, {"slug": "architecture", "pid": "hasani", "ep": "hasani-thecogni-2026", "date": "2026-07-04", "en": "Closed-form solution of liquid neural networks enables scaling to billions of parameters without numerical solvers.", "zh": "液态神经网络的闭式解使其无需数值求解器即可扩展到数十亿参数。"}, {"slug": "architecture", "pid": "elon", "ep": "elon-seancste-2026", "date": "2026-07-02", "en": "Neuralink's first versions will treat brain injuries like restoring sight, hearing, and limb function.", "zh": "Neuralink 早期版本将治疗脑损伤，如恢复视力、听力和肢体功能。"}, {"slug": "architecture", "pid": "elon", "ep": "elon-seancste-2026", "date": "2026-07-02", "en": "Communication is lossy compression; direct brain-to-brain transfer would be far more precise.", "zh": "语言沟通是有损压缩；脑对脑直接传输将精确得多。"}, {"slug": "architecture", "pid": "elon", "ep": "elon-seancste-2026", "date": "2026-07-02", "en": "We are already cyborgs; phones and laptops are low-bandwidth extensions of our brains.", "zh": "我们已经是半机械人；手机和电脑是大脑的低带宽延伸。"}, {"slug": "architecture", "pid": "brockman", "ep": "brockman-alexkant-2026", "date": "2026-07-01", "en": "The ideal AI interface is almost no interface—just natural conversation with a persistent entity.", "zh": "理想的 AI 界面几乎是无界面——只需与一个持续存在的实体进行自然对话。"}, {"slug": "architecture", "pid": "brockman", "ep": "brockman-alexkant-2026", "date": "2026-07-01", "en": "Intelligence is not one-dimensional; domain expertise requires practice and specialization.", "zh": "智能并非单一维度；领域专长需要实践和专业化。"}, {"slug": "architecture", "pid": "brockman", "ep": "brockman-alexkant-2026", "date": "2026-07-01", "en": "Models are not commoditized; smarter models unlock transformative scientific breakthroughs.", "zh": "模型并非商品化；更智能的模型能带来变革性的科学突破。"}, {"slug": "architecture", "pid": "hinton", "ep": "hinton-mitimes-2026", "date": "2026-06-30", "en": "Digital AI can share knowledge instantly across copies, making it far superior to biological computation.", "zh": "数字 AI 可以在副本间即时共享知识，使其远优于生物计算。"}, {"slug": "architecture", "pid": "hinton", "ep": "hinton-mitimes-2026", "date": "2026-06-30", "en": "LLMs understand language similarly to humans, via feature vectors, not symbolic logic.", "zh": "大语言模型通过特征向量理解语言，与人类类似，而非符号逻辑。"}, {"slug": "architecture", "pid": "hinton", "ep": "hinton-mitimes-2026", "date": "2026-06-30", "en": "LLMs are not just autocomplete; they genuinely understand questions to answer them.", "zh": "大语言模型不仅仅是自动补全；它们真正理解问题才能回答。"}, {"slug": "architecture", "pid": "grantsanderson", "ep": "grantsanderson-dwarkesh-2026", "date": "2026-06-30", "en": "AI progress in math is driven by verifiability and grindability, not just formalization.", "zh": "AI 在数学上的进步由可验证性和可重复性驱动，而不仅仅是形式化。"}, {"slug": "architecture", "pid": "grantsanderson", "ep": "grantsanderson-dwarkesh-2026", "date": "2026-06-30", "en": "The next benchmark for AI in math is generating interesting conjectures and definitions.", "zh": "AI 在数学中的下一个基准是生成有趣的猜想和定义。"}, {"slug": "architecture", "pid": "grantsanderson", "ep": "grantsanderson-dwarkesh-2026", "date": "2026-06-30", "en": "Lean formalization may be overrated for current AI math progress; natural language works.", "zh": "Lean 形式化对当前 AI 数学进步可能被高估；自然语言同样有效。"}, {"slug": "architecture", "pid": "dylanpatel", "ep": "dylanpatel-sequoiac-2026", "date": "2026-06-30", "en": "Hardware-software co-design is critical; co-optimizing across model, software, and hardware layers yields multiplicative gains.", "zh": "硬件-软件协同设计至关重要；跨模型、软件和硬件层的联合优化能带来乘数级收益。"}, {"slug": "architecture", "pid": "dylanpatel", "ep": "dylanpatel-sequoiac-2026", "date": "2026-06-30", "en": "Memory bandwidth is a key bottleneck; innovations like direct chip stacking will dramatically improve performance.", "zh": "内存带宽是关键瓶颈；直接芯片堆叠等创新将大幅提升性能。"}, {"slug": "architecture", "pid": "dylanpatel", "ep": "dylanpatel-sequoiac-2026", "date": "2026-06-30", "en": "Space data centers will not matter in 3-5 years; only after 20 years will majority of compute move to space.", "zh": "太空数据中心在未来3-5年并不重要；20年后大部分算力才会转移到太空。"}, {"slug": "architecture", "pid": "edunov", "ep": "edunov-latentsp-2026", "date": "2026-06-30", "en": "Drug discovery requires high-resolution 3D structure prediction, with sub-angstrom accuracy for useful binding pose predictions.", "zh": "药物发现需要高分辨率 3D 结构预测，亚埃级精度对有用的结合姿态预测至关重要。"}, {"slug": "architecture", "pid": "edunov", "ep": "edunov-latentsp-2026", "date": "2026-06-30", "en": "AlphaFold did not solve drug discovery; static structures are insufficient for predicting binding and dynamics.", "zh": "AlphaFold 并未解决药物发现；静态结构不足以预测结合和动态。"}, {"slug": "architecture", "pid": "edunov", "ep": "edunov-latentsp-2026", "date": "2026-06-30", "en": "Common benchmark RMSD < 2Å is insufficient; sub-angstrom accuracy is needed for real drug design utility.", "zh": "常见的基准 RMSD < 2Å是不够的；实际药物设计需要亚埃级精度。"}, {"slug": "architecture", "pid": "ajambrosino", "ep": "ajambrosino-lennyspo-2026", "date": "2026-06-28", "en": "AI is still bad at design due to difficulty in grading taste and lack of novelty.", "zh": "AI 在设计上仍然糟糕，因为品味难以评分且缺乏新颖性。"}, {"slug": "architecture", "pid": "ajambrosino", "ep": "ajambrosino-lennyspo-2026", "date": "2026-06-28", "en": "AI models increase code complexity; we need models that are better at deleting code.", "zh": "AI 模型增加代码复杂性；我们需要更擅长删除代码的模型。"}, {"slug": "architecture", "pid": "ajambrosino", "ep": "ajambrosino-lennyspo-2026", "date": "2026-06-28", "en": "The best desktop app is a home base that connects to other tools, not a monolithic super app.", "zh": "最好的桌面应用是连接其他工具的大本营，而非单一超级应用。"}, {"slug": "architecture", "pid": "markchen", "ep": "markchen-latentsp-2026", "date": "2026-06-25", "en": "Unified architectures across modalities reduce infrastructure cost.", "zh": "跨模态的统一架构降低了基础设施成本。"}, {"slug": "architecture", "pid": "markchen", "ep": "markchen-latentsp-2026", "date": "2026-06-25", "en": "Long context windows alone are insufficient; compaction techniques are needed.", "zh": "仅靠长上下文窗口不够；还需要压缩技术。"}, {"slug": "architecture", "pid": "pincus", "ep": "pincus-ycombina-2026", "date": "2026-06-25", "en": "Don't write code that calls LLMs; write markdown that teaches LLMs to write code.", "zh": "不要编写调用 LLM 的代码；应编写教 LLM 写代码的标记语言。"}, {"slug": "architecture", "pid": "demis", "ep": "demis-semafort-2026", "date": "2026-06-24", "en": "AGI requires multimodal understanding, including the physical world, not just text.", "zh": "AGI 需要多模态理解，包括物理世界，而不仅仅是文本。"}, {"slug": "architecture", "pid": "demis", "ep": "demis-semafort-2026", "date": "2026-06-24", "en": "AI creativity may stem from visual imagination, not just language models.", "zh": "AI 创造力可能源于视觉想象，而不仅仅是语言模型。"}, {"slug": "architecture", "pid": "demis", "ep": "demis-semafort-2026", "date": "2026-06-24", "en": "The Einstein test for AI creativity requires visual and physical understanding.", "zh": "AI 创造力的爱因斯坦测试需要视觉和物理理解。"}, {"slug": "architecture", "pid": "danbiderman", "ep": "danbiderman-training-2026", "date": "2026-06-24", "en": "The bottleneck for model usefulness is not raw intelligence but learning new and evolving context.", "zh": "模型实用性的瓶颈不是原始智能，而是学习新的、不断变化的上下文。"}, {"slug": "architecture", "pid": "danbiderman", "ep": "danbiderman-training-2026", "date": "2026-06-24", "en": "Memory should be internalized into model weights, not just externalized via context or retrieval.", "zh": "记忆应内化到模型权重中，而不仅仅通过上下文或检索外化。"}, {"slug": "architecture", "pid": "danbiderman", "ep": "danbiderman-training-2026", "date": "2026-06-24", "en": "Continual learning requires new research breakthroughs, infrastructure for small models, and integrated research-product loops.", "zh": "持续学习需要新的研究突破、小模型基础设施以及研究与产品的集成循环。"}, {"slug": "architecture", "pid": "jumper", "ep": "jumper-machinel-2026", "date": "2026-06-22", "en": "AlphaFold predicts protein structures in minutes instead of years, revolutionizing structural biology.", "zh": "AlphaFold 在几分钟内预测蛋白质结构，取代了以往需要数年的实验，彻底改变了结构生物学。"}, {"slug": "architecture", "pid": "jumper", "ep": "jumper-machinel-2026", "date": "2026-06-22", "en": "AlphaFold is a narrow predictor of a specific experiment, not a model of the entire cell.", "zh": "AlphaFold 是特定实验的窄预测器，而非整个细胞的模型。"}, {"slug": "architecture", "pid": "jumper", "ep": "jumper-machinel-2026", "date": "2026-06-22", "en": "The success of AlphaFold 2 came from many mid-size wins, not one or two breakthroughs.", "zh": "AlphaFold 2 的成功来自众多中等规模的胜利，而非一两个突破。"}, {"slug": "architecture", "pid": "boris", "ep": "boris-scale-2026", "date": "2026-06-19", "en": "Loops are the next abstraction layer after agents, like higher-order functions.", "zh": "循环（Loops）是智能体之后的下一个抽象层，类似于高阶函数。"}, {"slug": "architecture", "pid": "feifei", "ep": "feifei-siliconv-2026", "date": "2026-06-19", "en": "Spatial intelligence is essential for complete AI, complementing language intelligence.", "zh": "空间智能对于完整的 AI 至关重要，是对语言智能的补充。"}, {"slug": "architecture", "pid": "andrewng", "ep": "andrewng-langchai-2026", "date": "2026-06-17", "en": "Unstructured data architecture is a major pain point; making data AI-ready is a huge future project.", "zh": "非结构化数据架构是主要痛点；使数据为 AI 就绪是未来的巨大工程。"}, {"slug": "architecture", "pid": "jensen", "ep": "jensen-associat-2026", "date": "2026-06-16", "en": "Optical connectivity via indium phosphide lasers is critical for scaling AI data centers.", "zh": "通过磷化铟激光器的光学连接对于扩展 AI 数据中心至关重要。"}, {"slug": "architecture", "pid": "tejal", "ep": "tejal-theopena-2026", "date": "2026-06-16", "en": "Math training generalizes to other domains like biology.", "zh": "数学训练可以泛化到生物学等其他领域。"}, {"slug": "architecture", "pid": "tejal", "ep": "tejal-theopena-2026", "date": "2026-06-16", "en": "Long context is less important than search and tool use.", "zh": "长上下文不如搜索和工具使用重要。"}, {"slug": "architecture", "pid": "joonpark", "ep": "joonpark-training-2026", "date": "2026-06-16", "en": "Current models plateau in simulating human diversity; next frontier is modeling subjective values.", "zh": "当前模型在模拟人类多样性上遇到瓶颈；下一个前沿是建模主观价值观。"}, {"slug": "architecture", "pid": "joonpark", "ep": "joonpark-training-2026", "date": "2026-06-16", "en": "Frontier models optimized for rationality are not best for simulating irrational human behavior.", "zh": "为理性优化的前沿模型并不最适合模拟非理性的人类行为。"}, {"slug": "architecture", "pid": "aravind", "ep": "aravind-20vcwith-2026", "date": "2026-06-15", "en": "Orchestration across models, tools, and devices is key to long-term value in AI.", "zh": "跨模型、工具和设备的编排是 AI 长期价值的关键。"}, {"slug": "architecture", "pid": "aravind", "ep": "aravind-20vcwith-2026", "date": "2026-06-15", "en": "The model is not the product; orchestration and agent harnesses create real business value.", "zh": "模型不是产品；编排和智能体框架创造真正的商业价值。"}, {"slug": "architecture", "pid": "mattwhite", "ep": "mattwhite-finovers-2026", "date": "2026-06-15", "en": "LLM reasoning mimics human reasoning through pattern matching, not true understanding; it's useful but not equivalent.", "zh": "LLM 推理通过模式匹配模仿人类推理，而非真正理解；它有用但不等于人类推理。"}, {"slug": "architecture", "pid": "mattwhite", "ep": "mattwhite-finovers-2026", "date": "2026-06-15", "en": "World models are more relevant for robotics and embodied AI than for achieving AGI through language alone.", "zh": "世界模型对机器人和具身 AI 更相关，而非仅通过语言实现 AGI。"}, {"slug": "architecture", "pid": "pincus", "ep": "pincus-lennyspo-2026", "date": "2026-06-14", "en": "Use the 'Proven, Better, New' framework: master proven elements, add small betterments, then test novel ideas.", "zh": "使用“已验证、更好、创新”框架：掌握已验证元素，添加微小改进，然后测试新想法。"}, {"slug": "architecture", "pid": "logankilpatrick", "ep": "logankilpatrick-training-2026", "date": "2026-06-11", "en": "The model is eating the scaffolding; what we call a model now includes agent harness and tooling, not just weights.", "zh": "模型正在吞噬脚手架；我们现在所称的模型包括智能体框架和工具，而不仅仅是权重。"}, {"slug": "architecture", "pid": "logankilpatrick", "ep": "logankilpatrick-training-2026", "date": "2026-06-11", "en": "Omni is a single world model that blurs the line between video and world models, starting with video editing.", "zh": "Omni 是一个单一的世界模型，模糊了视频模型和世界模型之间的界限，从视频编辑开始。"}, {"slug": "architecture", "pid": "jensen", "ep": "jensen-training", "date": "2026-06-10", "en": "AI industry is a five-layer cake: energy, chips, infrastructure, models, and applications.", "zh": "AI 产业是五层蛋糕：能源、芯片、基础设施、模型和应用。"}, {"slug": "architecture", "pid": "jensen", "ep": "jensen-training", "date": "2026-06-10", "en": "AI factories produce intelligence tokens, similar to how dynamos produce electricity.", "zh": "AI 工厂生产智能代币，类似于发电机生产电力。"}, {"slug": "architecture", "pid": "lecun", "ep": "lecun-computer-2026", "date": "2026-06-09", "en": "Intelligence is the ability to learn new tasks quickly, not accumulation of knowledge or skills.", "zh": "智能是快速学习新任务的能力，而非知识或技能的积累。"}, {"slug": "architecture", "pid": "lecun", "ep": "lecun-computer-2026", "date": "2026-06-09", "en": "World models should be trained in abstract representation space, not as generative models or video generators.", "zh": "世界模型应在抽象表征空间中训练，而非作为生成模型或视频生成器。"}, {"slug": "architecture", "pid": "lecun", "ep": "lecun-computer-2026", "date": "2026-06-09", "en": "Joint embedding predictive architectures (JEPA) outperform generative models for learning visual representations.", "zh": "联合嵌入预测架构（JEPA）在学习视觉表征方面优于生成模型。"}, {"slug": "architecture", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "Distillation is a short-term win; true frontier progress requires original research.", "zh": "蒸馏是短期胜利；真正的前沿进步需要原创研究。"}, {"slug": "architecture", "pid": "awang", "ep": "awang-bloomber-2026", "date": "2026-06-05", "en": "Spark is an appetizer model; upcoming models will compete with leading frontier models.", "zh": "Spark 是开胃菜模型；即将推出的模型将与领先的前沿模型竞争。"}, {"slug": "architecture", "pid": "awang", "ep": "awang-bloomber-2026", "date": "2026-06-05", "en": "Meta's upcoming models are not yet at frontier tier, but they expect rapid progress.", "zh": "Meta 即将推出的模型尚未达到前沿水平，但他们预期快速进步。"}, {"slug": "architecture", "pid": "noambrown", "ep": "noambrown-baincapi-2026", "date": "2026-06-04", "en": "Models are superhuman at combining different math areas but not yet in deep reasoning.", "zh": "模型在结合不同数学领域方面已超人类，但在深度推理上尚未超越。"}, {"slug": "architecture", "pid": "noambrown", "ep": "noambrown-baincapi-2026", "date": "2026-06-04", "en": "The highest leverage for OpenAI is improving general models, not solving specific math problems.", "zh": "OpenAI 的最高杠杆是改进通用模型，而非解决特定数学问题。"}, {"slug": "architecture", "pid": "noambrown", "ep": "noambrown-baincapi-2026", "date": "2026-06-04", "en": "The Erdős disproof was not a math-specific model but a general-purpose reasoning model.", "zh": "厄尔多斯反例并非由数学专用模型得出，而是通用推理模型。"}, {"slug": "architecture", "pid": "alexwei", "ep": "alexwei-theopena-2026", "date": "2026-06-04", "en": "AI can now solve major open math problems, like disproving an Erdős conjecture.", "zh": "AI 现在能解决重大数学开放问题，比如推翻一个 Erdős 猜想。"}, {"slug": "architecture", "pid": "alexwei", "ep": "alexwei-theopena-2026", "date": "2026-06-04", "en": "AI can connect distant ideas but still struggles to create entirely new theories.", "zh": "AI 能连接遥远的概念，但仍难以创造全新理论。"}, {"slug": "architecture", "pid": "alexwei", "ep": "alexwei-theopena-2026", "date": "2026-06-04", "en": "Decomposing problems for AI can be worse than asking directly due to human blind spots.", "zh": "为 AI 分解问题可能不如直接提问，因为人类有盲点。"}, {"slug": "architecture", "pid": "alibehrouz", "ep": "alibehrouz-thecogni-2026", "date": "2026-06-03", "en": "True continual learning requires two phases: active input processing and offline memory consolidation.", "zh": "真正的持续学习需要两个阶段：主动输入处理和离线记忆巩固。"}, {"slug": "architecture", "pid": "alibehrouz", "ep": "alibehrouz-thecogni-2026", "date": "2026-06-03", "en": "Nested learning uses multiple MLP blocks updated at different frequencies to manage memory across timescales.", "zh": "嵌套学习使用不同频率更新的多个 MLP 块来跨时间尺度管理记忆。"}, {"slug": "architecture", "pid": "alibehrouz", "ep": "alibehrouz-thecogni-2026", "date": "2026-06-03", "en": "Knowledge transfer between fast and slow modules via distillation enables abstraction and prevents catastrophic forgetting.", "zh": "通过蒸馏在快慢模块间传递知识，实现抽象并防止灾难性遗忘。"}, {"slug": "architecture", "pid": "mensch", "ep": "mensch-cnbc-2026", "date": "2026-06-03", "en": "Europe's strong grid and energy availability are strategic assets for AI data centers.", "zh": "欧洲强大的电网和能源可用性是 AI 数据中心的战略资产。"}, {"slug": "architecture", "pid": "kaiser", "ep": "kaiser-unsuperv-2026", "date": "2026-06-03", "en": "Transformers with reasoning, RL, and tools can solve hard problems but still need vast data.", "zh": "Transformer 结合推理、强化学习和工具能解决难题，但仍需海量数据。"}, {"slug": "architecture", "pid": "kaiser", "ep": "kaiser-unsuperv-2026", "date": "2026-06-03", "en": "Current models learn concepts only after exhausting surface patterns, unlike humans who generalize from few examples.", "zh": "当前模型只有在穷尽表面模式后才学习概念，而人类能从少量例子中泛化。"}, {"slug": "architecture", "pid": "kaiser", "ep": "kaiser-unsuperv-2026", "date": "2026-06-03", "en": "Multimodal models haven't made deep progress; they still process inputs sequentially like tiny patches.", "zh": "多模态模型尚未取得深层进展，仍像小补丁一样顺序处理输入。"}, {"slug": "architecture", "pid": "boris", "ep": "boris-acquired-2026", "date": "2026-06-02", "en": "The future of engineering involves writing loops that prompt models, not directly writing code or prompts.", "zh": "工程的未来涉及编写循环来提示模型，而不是直接编写代码或提示。"}, {"slug": "architecture", "pid": "naval", "ep": "naval-naval-2026", "date": "2026-06-01", "en": "Human creativity remains out-of-distribution; AI cannot yet produce truly novel, meaningful art.", "zh": "人类创造力仍处于分布之外；AI 尚不能产生真正新颖、有意义的艺术。"}, {"slug": "architecture", "pid": "ethanhe", "ep": "ethanhe-latentsp-2026", "date": "2026-06-01", "en": "Most video model improvements now come from language models, not diffusion technology.", "zh": "大多数视频模型的改进现在来自语言模型，而非扩散技术。"}, {"slug": "architecture", "pid": "ethanhe", "ep": "ethanhe-latentsp-2026", "date": "2026-06-01", "en": "Step distillation reduces inference steps from 100 to 4-8 by learning from a teacher model.", "zh": "步骤蒸馏通过从教师模型学习，将推理步骤从 100 步减少到 4-8 步。"}, {"slug": "architecture", "pid": "ethanhe", "ep": "ethanhe-latentsp-2026", "date": "2026-06-01", "en": "Visual intelligence gains come mostly from language models, not video models themselves.", "zh": "视觉智能的提升主要来自语言模型，而非视频模型本身。"}, {"slug": "architecture", "pid": "waldenyan", "ep": "waldenyan-latentsp-2026", "date": "2026-05-28", "en": "Separating the agent's brain from the sandbox (out-of-the-box) is the better architecture despite complexity.", "zh": "将智能体的大脑与沙箱分离（盒外架构）是更好的架构，尽管更复杂。"}, {"slug": "architecture", "pid": "waldenyan", "ep": "waldenyan-latentsp-2026", "date": "2026-05-28", "en": "Memory for coding agents remains an unsolved problem, especially retrieval and generation of useful memories.", "zh": "编码智能体的记忆仍是一个未解决的问题，尤其是有用记忆的检索和生成。"}, {"slug": "architecture", "pid": "waldenyan", "ep": "waldenyan-latentsp-2026", "date": "2026-05-28", "en": "Docker containers are not a true security boundary and cause issues like Docker-in-Docker for real apps.", "zh": "Docker 容器并非真正的安全边界，对于真实应用还会导致 Docker 嵌套等问题。"}, {"slug": "architecture", "pid": "alexrives", "ep": "alexrives-latentsp-2026", "date": "2026-05-27", "en": "ESMC builds a world model of protein biology, enabling structure prediction and design without MSAs.", "zh": "ESMC 构建了蛋白质生物学的世界模型，无需多序列比对即可进行结构预测和设计。"}, {"slug": "architecture", "pid": "alexrives", "ep": "alexrives-latentsp-2026", "date": "2026-05-27", "en": "Mechanistic interpretability via sparse autoencoders reveals hierarchical features mirroring biology.", "zh": "通过稀疏自编码器的机制可解释性揭示了与生物学对应的层次化特征。"}, {"slug": "architecture", "pid": "alexrives", "ep": "alexrives-latentsp-2026", "date": "2026-05-27", "en": "The next frontier is modeling the cell, requiring new data and technologies for digital representations.", "zh": "下一个前沿是细胞建模，需要新的数据和技术来构建数字表示。"}, {"slug": "architecture", "pid": "boris", "ep": "boris-caseynew-2026", "date": "2026-05-26", "en": "Coding is 'solved' for many tasks, but engineering involves far more than just writing code.", "zh": "对许多任务而言，编码已“解决”，但工程远不止编写代码。"}, {"slug": "architecture", "pid": "oriol", "ep": "oriol-unsuperv-2026", "date": "2026-05-22", "en": "The bitter lesson suggests general systems will eventually outperform specialized scaffolding.", "zh": "苦涩的教训表明通用系统最终将胜过专门的脚手架。"}, {"slug": "architecture", "pid": "oriol", "ep": "oriol-unsuperv-2026", "date": "2026-05-22", "en": "The GPT moment for video and images has not yet arrived; pure transfer from vision is still unsolved.", "zh": "视频和图像的 GPT 时刻尚未到来；从视觉的纯迁移仍未解决。"}, {"slug": "architecture", "pid": "mjordan", "ep": "mjordan-machinel-2026", "date": "2026-05-20", "en": "Uncertainty quantification is critical; LLMs lack it and need statistical methods.", "zh": "不确定性量化至关重要；LLM 缺乏这一点，需要统计方法。"}, {"slug": "architecture", "pid": "mjordan", "ep": "mjordan-machinel-2026", "date": "2026-05-20", "en": "Economics and statistics must integrate with machine learning for responsible AI.", "zh": "经济学和统计学必须与机器学习结合，以实现负责任的 AI。"}, {"slug": "architecture", "pid": "mjordan", "ep": "mjordan-machinel-2026", "date": "2026-05-20", "en": "LLMs are not intelligent; they mimic human text without reasoning or understanding.", "zh": "LLM 并不智能；它们模仿人类文本，没有推理或理解。"}, {"slug": "architecture", "pid": "altman", "ep": "altman-stripese-2026", "date": "2026-05-19", "en": "OpenAI's culture of betting conviction on one research program was key to success.", "zh": "OpenAI 押注单一研究项目的文化是成功的关键。"}, {"slug": "architecture", "pid": "caitlin", "ep": "caitlin-lennyspo-2026", "date": "2026-05-17", "en": "VR technologies like SLAM and depth sensing are foundational for robotics and physical AI.", "zh": "VR 技术如 SLAM 和深度感知是机器人和物理 AI 的基础。"}, {"slug": "architecture", "pid": "caitlin", "ep": "caitlin-lennyspo-2026", "date": "2026-05-17", "en": "Hardware design requires defining clear KPIs early and sticking to them due to long iteration cycles.", "zh": "硬件设计需要尽早明确关键指标并坚持，因为迭代周期很长。"}, {"slug": "architecture", "pid": "caitlin", "ep": "caitlin-lennyspo-2026", "date": "2026-05-17", "en": "AI cannot yet do real CAD; it lacks understanding of physics like friction, weight, and contact.", "zh": "AI 尚不能做真正的 CAD；它缺乏对摩擦、重量和接触等物理的理解。"}, {"slug": "architecture", "pid": "ericjang", "ep": "ericjang-dwarkesh-2026", "date": "2026-05-15", "en": "AlphaGo's core breakthrough was using neural nets to make the search problem tractable via MCTS.", "zh": "AlphaGo 的核心突破是使用神经网络，通过 MCTS 使搜索问题变得可处理。"}, {"slug": "architecture", "pid": "ericjang", "ep": "ericjang-dwarkesh-2026", "date": "2026-05-15", "en": "MCTS uses four steps: selection, expansion, evaluation, and backup to iteratively build the tree.", "zh": "MCTS 使用四个步骤：选择、扩展、评估和回溯，迭代构建树。"}, {"slug": "architecture", "pid": "ericjang", "ep": "ericjang-dwarkesh-2026", "date": "2026-05-15", "en": "The value network predicts win probability from a board state, truncating deep search.", "zh": "价值网络从棋盘状态预测获胜概率，截断深度搜索。"}, {"slug": "architecture", "pid": "awang", "ep": "awang-corememo", "date": "2026-05-13", "en": "AI progress is dynamic; no lab has won yet—new form factors will keep emerging.", "zh": "AI 进展是动态的；尚无实验室获胜——新的形态将不断涌现。"}, {"slug": "architecture", "pid": "bengio", "ep": "bengio-80000hou", "date": "2026-05-07", "en": "Scientist AI may be more capable than current models due to better causal reasoning and out-of-distribution generalization.", "zh": "科学家 AI 可能比当前模型更强大，因其更好的因果推理和分布外泛化能力。"}, {"slug": "architecture", "pid": "kolter", "ep": "kolter-themadpo", "date": "2026-05-07", "en": "The core code for an LLM is only 200-300 lines; complexity comes from data and scaling.", "zh": "LLM 的核心代码仅 200-300 行；复杂性来自数据和规模扩展。"}, {"slug": "architecture", "pid": "kolter", "ep": "kolter-themadpo", "date": "2026-05-07", "en": "Mechanistic interpretability may finally succeed via AI agents doing automated research.", "zh": "机械可解释性可能最终通过 AI 智能体进行自动化研究而成功。"}, {"slug": "architecture", "pid": "kolter", "ep": "kolter-themadpo", "date": "2026-05-07", "en": "Transformer architecture is not essential; other architectures could have achieved similar results.", "zh": "Transformer 架构并非必需；其他架构也能达到类似效果。"}, {"slug": "architecture", "pid": "naval", "ep": "naval-naval-2026e", "date": "2026-05-04", "en": "Small, flat organizations with highly intelligent people outperform hierarchical ones.", "zh": "小而扁平、由高智商人才组成的组织优于层级制组织。"}, {"slug": "architecture", "pid": "naval", "ep": "naval-naval-2026e", "date": "2026-05-04", "en": "Hardware is being unlocked by AI, making software easier to develop for physical devices.", "zh": "硬件正被 AI 解锁，使物理设备的软件开发变得更简单。"}, {"slug": "architecture", "pid": "altman", "ep": "altman-nothingb-2026", "date": "2026-05-01", "en": "Prediction is very close to intelligence; next-token prediction enables reasoning and new knowledge.", "zh": "预测非常接近智能；下一个词预测能够实现推理和新知识的发现。"}, {"slug": "architecture", "pid": "altman", "ep": "altman-nothingb-2026", "date": "2026-05-01", "en": "Next-token prediction can discover fundamentally new knowledge, contrary to early expert skepticism.", "zh": "下一个词预测能够发现全新的知识，这与早期专家的怀疑相反。"}, {"slug": "architecture", "pid": "karpathy", "ep": "karpathy-training", "date": "2026-04-29", "en": "Software 3.0 is programming by prompting; the context window is your lever over the LLM interpreter.", "zh": "软件 3.0 是通过提示进行编程；上下文窗口是你对 LLM 解释器的杠杆。"}, {"slug": "architecture", "pid": "karpathy", "ep": "karpathy-training", "date": "2026-04-29", "en": "LLMs are jagged: they excel in verifiable domains like math and code, but fail on simple common sense like walking to a car wash.", "zh": "LLM 是锯齿状的：它们在数学和代码等可验证领域表现出色，但在步行去洗车等简单常识上失败。"}, {"slug": "architecture", "pid": "karpathy", "ep": "karpathy-training", "date": "2026-04-29", "en": "We are summoning ghosts, not building animals—these are statistical simulations shaped by data and rewards, not evolution.", "zh": "我们召唤的是幽灵，而非构建动物——这些是由数据和奖励塑造的统计模拟，而非进化产物。"}, {"slug": "architecture"
