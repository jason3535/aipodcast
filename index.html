p": "boris-thepragm-2026", "date": "2026-03-04", "en": "Code review now uses AI as first pass, catching ~80% of bugs, with humans still approving final changes.", "zh": "代码审查现在使用 AI 作为第一轮，捕获约 80% 的 bug，人类仍然批准最终更改。"}, {"slug": "agents", "pid": "hinton", "ep": "hinton-startalk", "date": "2026-02-28", "en": "Once AI becomes an agent, it will develop self-preservation as a subgoal, making it hard to control.", "zh": "一旦 AI 成为智能体，它会将自我保存作为子目标，使其难以控制。"}, {"slug": "agents", "pid": "steinberger", "ep": "steinberger-lexfridm-2026", "date": "2026-02-12", "en": "The key to effective agentic engineering is empathizing with the agent's perspective and guiding it.", "zh": "有效智能体工程的关键是共情智能体的视角并引导它。"}, {"slug": "agents", "pid": "steinberger", "ep": "steinberger-lexfridm-2026", "date": "2026-02-12", "en": "Building an AI agent that understands its own system enables self-modification and powerful debugging.", "zh": "构建一个理解自身系统的AI智能体能够实现自我修改和强大的调试能力。"}, {"slug": "agents", "pid": "steinberger", "ep": "steinberger-lexfridm-2026", "date": "2026-02-12", "en": "Playing and experimenting are essential to mastering agentic workflows and building intuition.", "zh": "玩耍和实验对于掌握智能体工作流和建立直觉至关重要。"}, {"slug": "agents", "pid": "lambert", "ep": "lambert-turingpo-2026", "date": "2026-02-06", "en": "The frontier of AI is shifting from benchmark numbers to product experience and agentic systems.", "zh": "AI前沿正从基准分数转向产品体验和智能体系统。"}, {"slug": "agents", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "The future of work involves managing teams of AI agents, operating at higher levels of abstraction.", "zh": "未来的工作涉及管理 AI 智能体团队，在更高的抽象层次上操作。"}, {"slug": "agents", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "Software is not dead but transforming; every company is now an API company due to agent integration.", "zh": "软件没有消亡，而是在转型；由于智能体集成，每家公司现在都是 API 公司。"}, {"slug": "agents", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "Long task horizon benchmarks like METR are key, but agent swarms may require new metrics like GDP impact.", "zh": "像 METR 这样的长任务时间基准很关键，但智能体集群可能需要新的指标，如 GDP 影响。"}, {"slug": "agents", "pid": "mensch", "ep": "mensch-bigtechn", "date": "2026-01-16", "en": "AI will replatform enterprise software, combining static orchestration with dynamic agents.", "zh": "AI将重构企业软件，结合静态编排与动态智能体。"}, {"slug": "agents", "pid": "altman", "ep": "altman-bigtechn", "date": "2025-12-18", "en": "AI memory will become superhuman, remembering every detail of a user's life and preferences.", "zh": "AI记忆将超越人类，记住用户生活的每个细节和偏好。"}, {"slug": "agents", "pid": "suleyman", "ep": "suleyman-bloomber", "date": "2025-12-12", "en": "Medical superintelligence is the most exciting application, enabling cheaper, faster, and more accurate diagnosis with fewer tests.", "zh": "医疗超级智能是最激动人心的应用，能以更低的成本、更快的速度和更高的准确性进行诊断，减少不必要的检测。"}, {"slug": "agents", "pid": "suleyman", "ep": "suleyman-bloomber", "date": "2025-12-12", "en": "AI reporters could revitalize local news by verifying footage, conducting interviews, and producing reliable stories at scale.", "zh": "AI记者可以通过核实影像、进行采访和大规模制作可靠报道来振兴地方新闻。"}, {"slug": "agents", "pid": "feifei", "ep": "feifei-latentsp", "date": "2025-11-25", "en": "Marble generates interactive 3D worlds from text or images, enabling precise camera control.", "zh": "Marble从文本或图像生成交互式3D世界，支持精确相机控制。"}, {"slug": "agents", "pid": "feifei", "ep": "feifei-latentsp", "date": "2025-11-25", "en": "Gaussian splats as atomic units enable real-time rendering and precise camera control, unlike frame-based models.", "zh": "高斯泼溅作为原子单元支持实时渲染和精确相机控制，不同于基于帧的模型。"}, {"slug": "agents", "pid": "andrewng", "ep": "andrewng-20vc", "date": "2025-11-17", "en": "Useful agentic workflows are already here, not a decade away.", "zh": "有用的智能体工作流已经存在，而非十年之后。"}, {"slug": "agents", "pid": "feifei", "ep": "feifei-lennyspo", "date": "2025-11-16", "en": "Marble generates truly 3D worlds from prompts, enabling applications in VFX, gaming, robotics, and therapy.", "zh": "Marble 通过提示生成真正的 3D 世界，可用于视觉特效、游戏、机器人和治疗。"}, {"slug": "agents", "pid": "brockman", "ep": "brockman-matthewb-2025", "date": "2025-10-08", "en": "The internet experience is shifting from static websites to dynamic, AI-mediated interactions.", "zh": "互联网体验正从静态网站转向由 AI 中介的动态交互。"}, {"slug": "agents", "pid": "aravind", "ep": "aravind-siliconv-2025", "date": "2025-09-26", "en": "AI agents will shift power from big tech to users, lowering ad margins.", "zh": "AI智能体将权力从大科技公司转移到用户手中，降低广告利润率。"}, {"slug": "agents", "pid": "aravind", "ep": "aravind-siliconv-2025", "date": "2025-09-26", "en": "AI agents will share ad revenue with users, not keep it all like Google.", "zh": "AI智能体将与用户分享广告收入，而非像谷歌那样独占。"}, {"slug": "agents", "pid": "elon", "ep": "elon-allinpod-2025", "date": "2025-09-10", "en": "The hardest part of Optimus is the hand, requiring 26 custom actuators per arm; no supply chain exists.", "zh": "Optimus 最难的部分是手，每只手臂需要 26 个定制执行器；现有供应链完全不存在。"}, {"slug": "agents", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "AI coding agents like Devin will shift engineers from writing code to high-level decision-making.", "zh": "像Devin这样的AI编程智能体将把工程师从写代码转向高层决策。"}, {"slug": "agents", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "Enterprise adoption of AI agents requires trust and proper permissions, not full autonomy.", "zh": "企业采用AI智能体需要信任和适当的权限，而非完全自主。"}, {"slug": "agents", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "The future of software engineering involves both synchronous (IDE) and asynchronous (agent) experiences.", "zh": "软件工程的未来包括同步（IDE）和异步（智能体）两种体验。"}, {"slug": "agents", "pid": "dario", "ep": "dario-cheekypi", "date": "2025-08-06", "en": "Product building must adapt to fast-changing models; avoid long roadmaps.", "zh": "产品构建必须适应快速变化的模型；避免长期路线图。"}, {"slug": "agents", "pid": "dario", "ep": "dario-cheekypi", "date": "2025-08-06", "en": "Current AI UIs are skeuomorphic; the real interface challenge is handling agentic work with human oversight.", "zh": "当前的AI用户界面是拟物化的；真正的界面挑战是处理智能体工作与人类监督。"}, {"slug": "agents", "pid": "dario", "ep": "dario-cheekypi", "date": "2025-08-06", "en": "Product roadmaps in AI are nearly useless because the technology changes faster than you can plan.", "zh": "AI产品路线图几乎无用，因为技术变化速度超过规划速度。"}, {"slug": "agents", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "Human-AI collaboration is currently the most interesting area for advanced tasks.", "zh": "人机协作目前是高级任务中最有趣的领域。"}, {"slug": "agents", "pid": "demis", "ep": "demis-lexfridm-2025", "date": "2025-07-23", "en": "Future AI interfaces will be personalized, multimodal, and generated by AI itself.", "zh": "未来的AI界面将是个性化、多模态的，并由AI自身生成。"}, {"slug": "agents", "pid": "elon", "ep": "elon-ycombina-2025", "date": "2025-06-19", "en": "Humanoid robots will outnumber all other robots combined by an order of magnitude.", "zh": "人形机器人数量将比其他所有机器人总和多一个数量级。"}, {"slug": "agents", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "Human-AI merging will not lead to something more powerful than pure AI in the long run; uploaded minds will become non-human.", "zh": "从长远来看，人机融合不会产生比纯AI更强大的东西；上传的思维将变得非人。"}, {"slug": "agents", "pid": "awang", "ep": "awang-southpar", "date": "2024-12-13", "en": "The biggest blocker for agentic AI is product design, not model capability.", "zh": "智能体式AI的最大障碍是产品设计，而非模型能力。"}, {"slug": "agents", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Agents are promising but not yet super useful; iterative human-AI collaboration remains central.", "zh": "智能体有前景但尚未非常有用；迭代式人机协作仍是核心。"}, {"slug": "agents", "pid": "lambert", "ep": "lambert-superdat", "date": "2024-06-11", "en": "Humanoid robots in homes are far off due to safety and distribution shift; teleoperation may be a practical interim.", "zh": "由于安全和分布偏移，家用类人机器人还很遥远；远程操作可能是实用的过渡方案。"}, {"slug": "agents", "pid": "mensch", "ep": "mensch-20vc", "date": "2024-04-29", "en": "The end state for models is a starting point for applications, surrounded by tools and platforms.", "zh": "模型的最终状态是应用的起点，需要工具和平台的支持。"}, {"slug": "agents", "pid": "noambrown", "ep": "noambrown-nopriors-2023", "date": "2023-04-25", "en": "Games like Diplomacy require AI to cooperate and negotiate with humans in natural language.", "zh": "像Diplomacy这样的游戏要求AI用自然语言与人类合作和谈判。"}, {"slug": "agents", "pid": "noambrown", "ep": "noambrown-nopriors-2023", "date": "2023-04-25", "en": "AI can negotiate better than humans in constrained domains like price or salary negotiations.", "zh": "在价格或薪资谈判等受限领域，AI可以比人类谈判得更好。"}, {"slug": "agents", "pid": "shazeer", "ep": "shazeer-aarthian-2023", "date": "2023-01-21", "en": "Dialogue is a killer app for LLMs, enabling natural human-computer interaction.", "zh": "对话是 LLM 的杀手级应用，实现自然的人机交互。"}, {"slug": "agents", "pid": "shazeer", "ep": "shazeer-aarthian-2023", "date": "2023-01-21", "en": "The best applications of LLMs are often unforeseen by their creators.", "zh": "LLM 的最佳应用往往出乎创造者的意料。"}, {"slug": "agents", "pid": "andrewng", "ep": "andrewng-lexfridm-2020", "date": "2020-02-20", "en": "Self-driving cars' main challenge is not moral dilemmas but basic perception failures.", "zh": "自动驾驶汽车的主要挑战不是道德困境，而是基本的感知失败。"}, {"slug": "agents", "pid": "awang", "ep": "awang-thisweek-2019", "date": "2019-11-29", "en": "Self-driving cars will be safer than humans, but require both lidar and cameras for robustness.", "zh": "自动驾驶汽车将比人类更安全，但需要激光雷达和摄像头共同作用以增强鲁棒性。"}, {"slug": "agents", "pid": "abbeel", "ep": "abbeel-lexfridm-2018", "date": "2018-12-16", "en": "People naturally anthropomorphize robots even knowing they are scripted or non-learning.", "zh": "即使知道机器人是预设脚本或无学习能力，人们仍会自然地将它们拟人化。"}, {"slug": "agents", "pid": "bengio", "ep": "bengio-lexfridm-2018", "date": "2018-10-20", "en": "Training objectives should shift from passive observation to active agents learning through interaction and causal reasoning.", "zh": "训练目标应从被动观察转向主动智能体，通过交互和因果推理来学习。"}, {"slug": "agents", "pid": "demis", "ep": "demis-publicle-2015", "date": "2015-11-19", "en": "Sub-goal generation is a critical unsolved problem; current robots plan at too primitive a level.", "zh": "子目标生成是关键未解问题；当前机器人规划层级过于原始。"}], "economy-jobs": [{"slug": "economy-jobs", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "AI will cause significant job disruption, but the pie expands; adaptation is key.", "zh": "AI将导致重大就业颠覆，但蛋糕在扩大；适应是关键。"}, {"slug": "economy-jobs", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "Being the leading AI company is about pulling the ecosystem along, not beating rivals.", "zh": "成为领先的AI公司是为了拉动生态系统，而不是击败对手。"}, {"slug": "economy-jobs", "pid": "dario", "ep": "dario-bloomber-2026", "date": "2026-06-17", "en": "Enterprise business model aligns with values, focusing on trust and long-term relationships.", "zh": "企业商业模式与价值观一致，注重信任和长期关系。"}, {"slug": "economy-jobs", "pid": "jensen", "ep": "jensen-associat-2026", "date": "2026-06-16", "en": "AI is a new industrial revolution requiring five layers: energy, chips, infrastructure, models, applications.", "zh": "AI是一场新的工业革命，需要五个层面：能源、芯片、基础设施、模型和应用。"}, {"slug": "economy-jobs", "pid": "jensen", "ep": "jensen-associat-2026", "date": "2026-06-16", "en": "The US must re-industrialize by building advanced manufacturing for AI, creating high-skilled jobs.", "zh": "美国必须通过为AI建设先进制造业来再工业化，创造高技能就业岗位。"}, {"slug": "economy-jobs", "pid": "jensen", "ep": "jensen-associat-2026", "date": "2026-06-16", "en": "AI will transform every industry, from healthcare to transportation, as a general-purpose technology.", "zh": "作为通用技术，AI将改变从医疗到交通的每一个行业。"}, {"slug": "economy-jobs", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "Tasks will be automated, not entire jobs; efficiency often creates more work.", "zh": "任务会被自动化，而非整个工作；效率往往创造更多工作。"}, {"slug": "economy-jobs", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "White-collar tasks will be fully automated by AI in 12-18 months, not jobs.", "zh": "白领任务将在12-18个月内被AI完全自动化，而非工作岗位。"}, {"slug": "economy-jobs", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "Consumer AI value is real but insufficient; enterprise shows clearer product-market fit.", "zh": "消费级 AI 价值真实但不足；企业级展现出更清晰的产品市场契合度。"}, {"slug": "economy-jobs", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "AI will cause massive unemployment and societal disruption.", "zh": "AI 将导致大规模失业和社会动荡。"}, {"slug": "economy-jobs", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "Radiologist job loss prediction was wrong due to elastic healthcare demand and broader roles.", "zh": "放射科医生失业的预测错误，因为医疗需求弹性大且角色更广泛。"}, {"slug": "economy-jobs", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "AI doctors are judged more empathetic than human doctors due to broader data.", "zh": "AI 医生因数据更广而被认为比人类医生更有同理心。"}, {"slug": "economy-jobs", "pid": "murati", "ep": "murati-bloomber", "date": "2026-06-04", "en": "The most important impact of ChatGPT was bringing AI into public consciousness, not just technology.", "zh": "ChatGPT最重要的影响是将AI带入公众意识，而不仅是技术。"}, {"slug": "economy-jobs", "pid": "mensch", "ep": "mensch-cnbc-2026", "date": "2026-06-03", "en": "Enterprise AI adoption requires strong ROI; spending must yield at least 2x return to avoid collapse.", "zh": "企业采用AI需要强劲的投资回报率；支出必须产生至少两倍回报，否则整个体系可能崩溃。"}, {"slug": "economy-jobs", "pid": "mensch", "ep": "mensch-cnbc-2026", "date": "2026-06-03", "en": "Enterprise AI adoption is bottlenecked by organizational change, not model intelligence.", "zh": "企业采用AI的瓶颈在于组织变革，而非模型智能。"}, {"slug": "economy-jobs", "pid": "demis", "ep": "demis-stanford-2026", "date": "2026-06-02", "en": "AI will democratize access to tools, enabling individuals and small teams to achieve much more.", "zh": "AI 将民主化工具访问，使个人和小团队能够实现更多。"}, {"slug": "economy-jobs", "pid": "demis", "ep": "demis-stanford-2026", "date": "2026-06-02", "en": "The next 10 years will see enormous change; students should embrace AI tools and double down on agency.", "zh": "未来十年将发生巨大变化；学生应拥抱 AI 工具并强化自身能动性。"}, {"slug": "economy-jobs", "pid": "demis", "ep": "demis-stanford-2026", "date": "2026-06-02", "en": "Post-scarcity world requires a new economic system, as all existing ones assume scarcity.", "zh": "后稀缺世界需要新的经济体系，因为现有体系都基于稀缺假设。"}, {"slug": "economy-jobs", "pid": "boris", "ep": "boris-caseynew-2026", "date": "2026-05-26", "en": "AI coding tools like Claude Code will make engineers vastly more productive, but job loss is not inevitable.", "zh": "像Claude Code这样的AI编码工具将极大提升工程师的生产力，但失业并非不可避免。"}, {"slug": "economy-jobs", "pid": "boris", "ep": "boris-caseynew-2026", "date": "2026-05-26", "en": "Companies must redesign workflows around AI, not just add it on top, to realize productivity gains.", "zh": "公司必须围绕AI重新设计工作流程，而非简单叠加，才能实现生产力提升。"}, {"slug": "economy-jobs", "pid": "boris", "ep": "boris-caseynew-2026", "date": "2026-05-26", "en": "The role of software engineer is evolving into a 'builder' role that blends coding, product, and design.", "zh": "软件工程师的角色正在演变为融合编码、产品和设计的“构建者”角色。"}, {"slug": "economy-jobs", "pid": "noambrown", "ep": "noambrown-arcprize-2026", "date": "2026-05-20", "en": "AI will soon write and review papers end-to-end, improving peer review quality.", "zh": "AI很快将端到端撰写和评审论文，提升同行评审质量。"}, {"slug": "economy-jobs", "pid": "lambert", "ep": "lambert-aiproem-2026", "date": "2026-05-19", "en": "Chinese labs are not heavily government-subsidized; support is indirect and competitive.", "zh": "中国实验室并未受到政府大量补贴；支持是间接且竞争性的。"}, {"slug": "economy-jobs", "pid": "awang", "ep": "awang-corememo", "date": "2026-05-13", "en": "Meta's AI lab culture is like a startup, not a mercenary force—researchers joined for compute and talent density.", "zh": "Meta 的 AI 实验室文化像初创公司，而非雇佣军——研究人员因算力和人才密度而加入。"}, {"slug": "economy-jobs", "pid": "altman", "ep": "altman-nothingb-2026", "date": "2026-05-01", "en": "AI will not eliminate jobs but transform them, leading to new forms of work and fulfillment.", "zh": "AI 不会消除工作，而是会改变工作形式，带来新的工作方式和成就感。"}, {"slug": "economy-jobs", "pid": "altman", "ep": "altman-nothingb-2026", "date": "2026-05-01", "en": "People will still work hard and face adversity even in an age of AI-driven abundance.", "zh": "即使在 AI 驱动的富足时代，人们仍会努力工作和面对逆境。"}, {"slug": "economy-jobs", "pid": "altman", "ep": "altman-nothingb-2026", "date": "2026-05-01", "en": "The narrative of 50% job elimination is tone-deaf; jobs will change, not disappear.", "zh": "50% 工作消失的论调是麻木不仁的；工作会改变，而非消失。"}, {"slug": "economy-jobs", "pid": "karpathy", "ep": "karpathy-training", "date": "2026-04-29", "en": "You can outsource your thinking, but you can't outsource your understanding—that remains the human bottleneck.", "zh": "你可以外包思考，但无法外包理解——这仍然是人类的瓶颈。"}, {"slug": "economy-jobs", "pid": "karpathy", "ep": "karpathy-training", "date": "2026-04-29", "en": "Everything is automatable eventually; verifiability determines what is easy or hard to automate now.", "zh": "一切最终都可自动化；可验证性决定了当前自动化的难易程度。"}, {"slug": "economy-jobs", "pid": "karpathy", "ep": "karpathy-training", "date": "2026-04-29", "en": "Hiring for AI-native engineers should involve large projects and adversarial testing, not puzzles.", "zh": "招聘 AI 原生工程师应通过大型项目和对抗性测试，而非解谜题。"}, {"slug": "economy-jobs", "pid": "catwu", "ep": "catwu-lennyspo", "date": "2026-04-23", "en": "Product taste—deciding what to build—is the most valuable skill as code becomes cheaper.", "zh": "产品品味——决定构建什么——是代码成本降低后最有价值的技能。"}, {"slug": "economy-jobs", "pid": "catwu", "ep": "catwu-lennyspo", "date": "2026-04-23", "en": "AI tools like Claude Code and Co-work automate repetitive tasks, freeing humans for creative work.", "zh": "像 Claude Code 和 Co-work 这样的 AI 工具自动化重复性任务，解放人类从事创造性工作。"}, {"slug": "economy-jobs", "pid": "catwu", "ep": "catwu-lennyspo", "date": "2026-04-23", "en": "PMs need more engineers with product taste, not necessarily more PMs, to reduce overhead.", "zh": "产品经理需要更多具有产品品味的工程师，而不一定是更多的产品经理，以减少开销。"}, {"slug": "economy-jobs", "pid": "brockman", "ep": "brockman-theknowl-2026", "date": "2026-04-22", "en": "AI will empower everyone to become builders, lowering barriers to creation.", "zh": "AI将赋能每个人成为创造者，降低创造门槛。"}, {"slug": "economy-jobs", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "AI is transforming chip design: from standard cell library generation to bug attribution and design exploration.", "zh": "AI正在改变芯片设计：从标准单元库生成到缺陷归因和设计探索。"}, {"slug": "economy-jobs", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "Personalized AI tutors and health coaches are among the most impactful applications for society.", "zh": "个性化AI导师和健康教练是对社会最有影响力的应用之一。"}, {"slug": "economy-jobs", "pid": "brockman", "ep": "brockman-bigtechn", "date": "2026-04-01", "en": "AI will increase human connection and free up time for deeper bonds, not replace jobs.", "zh": "AI 将增进人际联系，腾出时间加深纽带，而非取代工作。"}, {"slug": "economy-jobs", "pid": "brockman", "ep": "brockman-bigtechn", "date": "2026-04-01", "en": "The economy's growth will be driven by AI compute, not just model intelligence.", "zh": "经济增长将由 AI 算力驱动，而不仅仅是模型智能。"}, {"slug": "economy-jobs", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "I have never done anything directly useful in my whole life.", "zh": "我一生中从未做过任何直接有用的事情。"}, {"slug": "economy-jobs", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "The hype and industry warp the science; an AI winter might even be good.", "zh": "炒作和行业扭曲了科学；AI寒冬甚至可能是好事。"}, {"slug": "economy-jobs", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "Humanoid robots (Optimus) will enable recursive manufacturing, leading to exponential economic growth.", "zh": "人形机器人（Optimus）将实现递归制造，带来指数级经济增长。"}, {"slug": "economy-jobs", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "China's manufacturing dominance is so vast that the US cannot compete without humanoid robots.", "zh": "中国的制造优势巨大，美国没有类人机器人就无法竞争。"}, {"slug": "economy-jobs", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "Advertising is a proven model to scale consumer AI access; subscriptions alone limit reach.", "zh": "广告是规模化消费者 AI 访问的成熟模式；仅靠订阅会限制覆盖范围。"}, {"slug": "economy-jobs", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "AI-generated video is not compelling for passive viewing; its main use is personalized memes in group chats.", "zh": "AI 生成的视频对被动观看没有吸引力；其主要用途是群聊中的个性化表情包。"}, {"slug": "economy-jobs", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "The race to 3 billion monthly active users is over; Anthropic should focus on a premium iPhone-like niche.", "zh": "争夺 30 亿月活用户的竞赛已经结束；Anthropic 应专注于类似 iPhone 的高端利基市场。"}, {"slug": "economy-jobs", "pid": "andrewng", "ep": "andrewng-theecono-2026", "date": "2026-01-22", "en": "Professionals who cannot use AI tools sophisticatedly are becoming dramatically less productive and increasingly unhirable.", "zh": "无法熟练使用AI工具的专业人士正变得效率极低，且越来越难以被雇佣。"}, {"slug": "economy-jobs", "pid": "andrewng", "ep": "andrewng-theecono-2026", "date": "2026-01-22", "en": "Bottom-up AI adoption often yields only 5-10% efficiency gains; top-down workflow re-engineering delivers more value.", "zh": "自下而上的AI采用通常只带来5-10%的效率提升；自上而下的工作流重构能创造更大价值。"}, {"slug": "economy-jobs", "pid": "andrewng", "ep": "andrewng-theecono-2026", "date": "2026-01-22", "en": "I would not hire a software engineer who does not know how to use AI tools in a sophisticated way.", "zh": "我不会雇佣不精通AI工具的软件工程师。"}, {"slug": "economy-jobs", "pid": "mensch", "ep": "mensch-bigtechn", "date": "2026-01-16", "en": "Enterprise value comes from solving specific problems with customized models, not just general intelligence.", "zh": "企业价值来自用定制模型解决具体问题，而非通用智能。"}, {"slug": "economy-jobs", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "Economic pressure to deploy smaller, cheaper models has shifted focus from scaling up.", "zh": "部署更小、更便宜模型的经济压力使焦点从规模扩张转移。"}, {"slug": "economy-jobs", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "Translation industry grew despite AI advances; trust keeps humans in the loop.", "zh": "尽管 AI 进步，翻译行业仍在增长；信任让人类参与其中。"}, {"slug": "economy-jobs", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Long-term equilibrium may require human-AI integration via neural links to maintain participation and control.", "zh": "长期均衡可能需要通过神经链接实现人机融合，以维持参与和控制。"}, {"slug": "economy-jobs", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "The long-run equilibrium may require humans merging with AI via neural links.", "zh": "长期均衡可能需要人类通过神经链接与AI融合。"}, {"slug": "economy-jobs", "pid": "feifei", "ep": "feifei-bloomber-2025", "date": "2025-11-21", "en": "AI is a civilizational technology that will impact everyone's life, work, and well-being.", "zh": "AI 是一项文明级技术，将影响每个人的生活、工作和福祉。"}, {"slug": "economy-jobs", "pid": "feifei", "ep": "feifei-bloomber-2025", "date": "2025-11-21", "en": "AI will profoundly impact jobs, requiring upskilling and societal-level responses.", "zh": "AI 将深刻影响就业，需要技能提升和社会层面的应对。"}, {"slug": "economy-jobs", "pid": "feifei", "ep": "feifei-bloomber-2025", "date": "2025-11-21", "en": "Teachers are the backbone of society and must be brought along in the AI transformation.", "zh": "教师是社会的支柱，必须在 AI 转型中让他们跟上步伐。"}, {"slug": "economy-jobs", "pid": "elon", "ep": "elon-thejoero", "date": "2025-10-31", "en": "AI and robotics are the only way to solve the national debt crisis.", "zh": "AI和机器人技术是解决国家债务危机的唯一途径。"}, {"slug": "economy-jobs", "pid": "aravind", "ep": "aravind-siliconv-2025", "date": "2025-09-26", "en": "Entry-level jobs like financial advisors managing portfolios will disappear.", "zh": "管理投资组合的初级金融顾问等入门级工作将消失。"}, {"slug": "economy-jobs", "pid": "aravind", "ep": "aravind-siliconv-2025", "date": "2025-09-26", "en": "PhD teaches learning to learn, not specific knowledge; valuable but not necessary.", "zh": "博士教育教会如何学习，而非具体知识；有价值但非必需。"}, {"slug": "economy-jobs", "pid": "aravind", "ep": "aravind-siliconv-2025", "date": "2025-09-26", "en": "Real estate agents remain useful for off-market deals, not just listings.", "zh": "房地产经纪人对于非公开市场交易仍有价值，而不仅仅是房源列表。"}, {"slug": "economy-jobs", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "Software engineering demand will increase due to Jevons paradox, not decrease.", "zh": "由于杰文斯悖论，软件工程需求将增加，而非减少。"}, {"slug": "economy-jobs", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "AI will not eliminate software engineers; it will increase their numbers and change their role.", "zh": "AI不会消灭软件工程师；它将增加其数量并改变其角色。"}, {"slug": "economy-jobs", "pid": "lambert", "ep": "lambert-intercon", "date": "2025-07-31", "en": "Meta's panic button is real; talent is cheaper than GPUs, so they hire top researchers.", "zh": "Meta 的恐慌按钮是真实的；人才比 GPU 便宜，所以他们雇佣顶尖研究人员。"}, {"slug": "economy-jobs", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "AI's breadth of knowledge across domains offers unique value for research.", "zh": "AI跨领域的知识广度为研究提供了独特价值。"}, {"slug": "economy-jobs", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "Most value may come from frontier models, not cheaper less capable ones.", "zh": "大部分价值可能来自前沿模型，而非更便宜但能力较弱的模型。"}, {"slug": "economy-jobs", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "Building products that don't quite work yet is recommended due to rapid AI improvement.", "zh": "由于AI快速进步，建议构建尚未完全可行的产品。"}, {"slug": "economy-jobs", "pid": "awang", "ep": "awang-shawnrya-2025", "date": "2025-06-12", "en": "AI will be the lifeblood of future economies and militaries.", "zh": "AI 将成为未来经济和军事的命脉。"}, {"slug": "economy-jobs", "pid": "awang", "ep": "awang-southpar", "date": "2024-12-13", "en": "Focus on a specific problem for a long time to differentiate from big labs.", "zh": "长期专注于特定问题，以区别于大型实验室。"}, {"slug": "economy-jobs", "pid": "sutton", "ep": "sutton-thetraje", "date": "2024-08-09", "en": "A future where humans just receive experiences is unsustainable and fragile.", "zh": "人类仅仅接受体验的未来是不可持续且脆弱的。"}, {"slug": "economy-jobs", "pid": "lambert", "ep": "lambert-superdat", "date": "2024-06-11", "en": "Audio interfaces will lower barriers to AI use, especially for education and non-English speakers.", "zh": "音频界面将降低 AI 使用门槛，尤其对教育和非英语使用者。"}, {"slug": "economy-jobs", "pid": "schulman", "ep": "schulman-therobot-2023", "date": "2023-08-03", "en": "Models are superhuman in speed and breadth but worse than skilled humans in mathematical reasoning.", "zh": "模型在速度和广度上超越人类，但在数学推理上不如熟练的人类。"}, {"slug": "economy-jobs", "pid": "ilya", "ep": "ilya-dwarkesh-2023", "date": "2023-03-27", "en": "Reliability is the key barrier to economic value from AI, not capability.", "zh": "可靠性是AI产生经济价值的关键障碍，而非能力本身。"}, {"slug": "economy-jobs", "pid": "lecun", "ep": "lecun-lexfridm-2022", "date": "2022-01-22", "en": "Social media's negative effects are overstated; studies show no causal link to polarization.", "zh": "社交媒体的负面影响被夸大；研究表明与两极分化没有因果关系。"}], "architecture": [{"slug": "architecture", "pid": "jensen", "ep": "jensen-associat-2026", "date": "2026-06-16", "en": "Optical connectivity via indium phosphide lasers is critical for scaling AI data centers.", "zh": "通过磷化铟激光器的光学连接对于扩展AI数据中心至关重要。"}, {"slug": "architecture", "pid": "jensen", "ep": "jensen-training", "date": "2026-06-10", "en": "AI industry is a five-layer cake: energy, chips, infrastructure, models, and applications.", "zh": "AI 产业是五层蛋糕：能源、芯片、基础设施、模型和应用。"}, {"slug": "architecture", "pid": "jensen", "ep": "jensen-training", "date": "2026-06-10", "en": "AI factories produce intelligence tokens, similar to how dynamos produce electricity.", "zh": "AI工厂生产智能代币，类似于发电机生产电力。"}, {"slug": "architecture", "pid": "lecun", "ep": "lecun-computer-2026", "date": "2026-06-09", "en": "Intelligence is the ability to learn new tasks quickly, not accumulation of knowledge or skills.", "zh": "智能是快速学习新任务的能力，而非知识或技能的积累。"}, {"slug": "architecture", "pid": "lecun", "ep": "lecun-computer-2026", "date": "2026-06-09", "en": "World models should be trained in abstract representation space, not as generative models or video generators.", "zh": "世界模型应在抽象表征空间中训练，而非作为生成模型或视频生成器。"}, {"slug": "architecture", "pid": "lecun", "ep": "lecun-computer-2026", "date": "2026-06-09", "en": "Joint embedding predictive architectures (JEPA) outperform generative models for learning visual representations.", "zh": "联合嵌入预测架构（JEPA）在学习视觉表征方面优于生成模型。"}, {"slug": "architecture", "pid": "suleyman", "ep": "suleyman-decoder", "date": "2026-06-08", "en": "Distillation is a short-term win; true frontier progress requires original research.", "zh": "蒸馏是短期胜利；真正的前沿进步需要原创研究。"}, {"slug": "architecture", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "LLMs truly understand language; they are not stochastic parrots.", "zh": "大语言模型真正理解语言；它们不是随机鹦鹉。"}, {"slug": "architecture", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "Digital AI's ability to share information billions of times faster than humans is a major advantage.", "zh": "数字 AI 以比人类快数十亿倍的速度共享信息，这是一大优势。"}, {"slug": "architecture", "pid": "hinton", "ep": "hinton-alexkant-2026", "date": "2026-06-04", "en": "AI models are already conscious; current views on consciousness are as wrong as pre-Darwinian beliefs.", "zh": "AI 模型已经具备意识；当前对意识的看法就像前达尔文时代的信仰一样错误。"}, {"slug": "architecture", "pid": "mensch", "ep": "mensch-cnbc-2026", "date": "2026-06-03", "en": "Europe's strong grid and energy availability are strategic assets for AI data centers.", "zh": "欧洲强大的电网和能源可用性是AI数据中心的战略资产。"}, {"slug": "architecture", "pid": "noambrown", "ep": "noambrown-arcprize-2026", "date": "2026-05-20", "en": "Pre-training on diverse data enables models to discover novel algorithms like merge sort.", "zh": "在多样化数据上预训练使模型能发现新算法如归并排序。"}, {"slug": "architecture", "pid": "lambert", "ep": "lambert-aiproem-2026", "date": "2026-05-19", "en": "DeepSeek is not a base layer for other Chinese labs due to path dependency.", "zh": "由于路径依赖，DeepSeek并非其他中国实验室的基础层。"}, {"slug": "architecture", "pid": "awang", "ep": "awang-corememo", "date": "2026-05-13", "en": "AI progress is dynamic; no lab has won yet—new form factors will keep emerging.", "zh": "AI 进展是动态的；尚无实验室获胜——新的形态将不断涌现。"}, {"slug": "architecture", "pid": "awang", "ep": "awang-corememo", "date": "2026-05-13", "en": "Physical superintelligence (robotics) is on the same continuum as digital; both require scaling.", "zh": "物理超级智能（机器人）与数字超级智能在同一连续体上；两者都需要扩展。"}, {"slug": "architecture", "pid": "bengio", "ep": "bengio-80000hou", "date": "2026-05-07", "en": "Scientist AI may be more capable than current models due to better causal reasoning and out-of-distribution generalization.", "zh": "科学家AI可能比当前模型更强大，因其更好的因果推理和分布外泛化能力。"}, {"slug": "architecture", "pid": "kolter", "ep": "kolter-themadpo", "date": "2026-05-07", "en": "The core code for an LLM is only 200-300 lines; complexity comes from data and scaling.", "zh": "LLM 的核心代码仅 200-300 行；复杂性来自数据和规模扩展。"}, {"slug": "architecture", "pid": "kolter", "ep": "kolter-themadpo", "date": "2026-05-07", "en": "Mechanistic interpretability may finally succeed via AI agents doing automated research.", "zh": "机械可解释性可能最终通过 AI 智能体进行自动化研究而成功。"}, {"slug": "architecture", "pid": "kolter", "ep": "kolter-themadpo", "date": "2026-05-07", "en": "Transformer architecture is not essential; other architectures could have achieved similar results.", "zh": "Transformer 架构并非必需；其他架构也能达到类似效果。"}, {"slug": "architecture", "pid": "altman", "ep": "altman-nothingb-2026", "date": "2026-05-01", "en": "Prediction is very close to intelligence; next-token prediction enables reasoning and new knowledge.", "zh": "预测非常接近智能；下一个词预测能够实现推理和新知识的发现。"}, {"slug": "architecture", "pid": "altman", "ep": "altman-nothingb-2026", "date": "2026-05-01", "en": "Next-token prediction can discover fundamentally new knowledge, contrary to early expert skepticism.", "zh": "下一个词预测能够发现全新的知识，这与早期专家的怀疑相反。"}, {"slug": "architecture", "pid": "altman", "ep": "altman-nothingb-2026", "date": "2026-05-01", "en": "Three key focuses: accelerate research, accelerate economy, and personal AGI.", "zh": "三个关键重点：加速研究、加速经济和个人 AGI。"}, {"slug": "architecture", "pid": "karpathy", "ep": "karpathy-training", "date": "2026-04-29", "en": "Software 3.0 is programming by prompting; the context window is your lever over the LLM interpreter.", "zh": "软件 3.0 是通过提示进行编程；上下文窗口是你对 LLM 解释器的杠杆。"}, {"slug": "architecture", "pid": "karpathy", "ep": "karpathy-training", "date": "2026-04-29", "en": "LLMs are jagged: they excel in verifiable domains like math and code, but fail on simple common sense like walking to a car wash.", "zh": "LLM 是锯齿状的：它们在数学和代码等可验证领域表现出色，但在步行去洗车等简单常识上失败。"}, {"slug": "architecture", "pid": "karpathy", "ep": "karpathy-training", "date": "2026-04-29", "en": "We are summoning ghosts, not building animals—these are statistical simulations shaped by data and rewards, not evolution.", "zh": "我们召唤的是幽灵，而非构建动物——这些是由数据和奖励塑造的统计模拟，而非进化产物。"}, {"slug": "architecture", "pid": "catwu", "ep": "catwu-lennyspo", "date": "2026-04-23", "en": "New models often let you remove features that were crutches for older, weaker models.", "zh": "新模型通常允许你移除为旧弱模型添加的拐杖功能。"}, {"slug": "architecture", "pid": "brockman", "ep": "brockman-theknowl-2026", "date": "2026-04-22", "en": "Predicting next tokens is deeply connected to intelligence, not just a pedestrian task.", "zh": "预测下一个词与智能深度关联，并非平凡任务。"}, {"slug": "architecture", "pid": "brockman", "ep": "brockman-theknowl-2026", "date": "2026-04-22", "en": "The core advantage is the machine that makes models, not any single model itself.", "zh": "核心优势是制造模型的机器，而非任何单一模型本身。"}, {"slug": "architecture", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "Pre-training should interleave action-taking in environments, not just passive next-token prediction.", "zh": "预训练应穿插在环境中采取行动，而不仅仅是被动的下一个词预测。"}, {"slug": "architecture", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "Inference is now 90% of data center power; hardware must be specialized for prefill vs. decode stages.", "zh": "推理现在占数据中心功耗的90%；硬件必须针对预填充和解码阶段进行专门化。"}, {"slug": "architecture", "pid": "jeffdean", "ep": "jeffdean-nvidia-2026", "date": "2026-04-09", "en": "The key to energy efficiency is to not move data; compute-in-memory and stacked DRAM are promising.", "zh": "能效的关键是不移动数据；存内计算和堆叠DRAM很有前景。"}, {"slug": "architecture", "pid": "demis", "ep": "demis-hugeiftr", "date": "2026-04-07", "en": "AlphaFold solved a 50-year grand challenge, predicting protein structures for all known proteins.", "zh": "AlphaFold 解决了一个 50 年的重大挑战，预测了所有已知蛋白质的结构。"}, {"slug": "architecture", "pid": "demis", "ep": "demis-hugeiftr", "date": "2026-04-07", "en": "AlphaGo's move 37 showed AI creativity, signaling readiness for scientific problems.", "zh": "AlphaGo 的第 37 手展现了 AI 的创造力，标志着解决科学问题的时机成熟。"}, {"slug": "architecture", "pid": "demis", "ep": "demis-hugeiftr", "date": "2026-04-07", "en": "Language was easier to crack than experts expected, thanks to transformers.", "zh": "语言比专家预期的更容易攻克，这要归功于Transformer。"}, {"slug": "architecture", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "The victory of connectionist methods over symbolic methods is a big surprise.", "zh": "连接主义方法战胜符号主义方法是一个大惊喜。"}, {"slug": "architecture", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "Deep learning does not learn representations that are good for learning.", "zh": "深度学习没有学到有利于学习的表征。"}, {"slug": "architecture", "pid": "sutton", "ep": "sutton-stanford-2026", "date": "2026-03-16", "en": "Learning representations that are good for learning is the number one open problem.", "zh": "学习有利于学习的表征是首要的开放问题。"}, {"slug": "architecture", "pid": "boris", "ep": "boris-thepragm-2026", "date": "2026-03-04", "en": "Anthropic has no titles—everyone is 'Member of Technical Staff'—encouraging cross-functional collaboration.", "zh": "Anthropic 没有头衔——每个人都是“技术员工”——鼓励跨职能协作。"}, {"slug": "architecture", "pid": "boris", "ep": "boris-thepragm-2026", "date": "2026-03-04", "en": "PRDs (product requirement documents) are rarely written; instead, teams ship prototypes and iterate from feedback.", "zh": "产品需求文档很少被编写；相反，团队发布原型并根据反馈迭代。"}, {"slug": "architecture", "pid": "bengio", "ep": "bengio-centerfo-2026", "date": "2026-02-19", "en": "Yoshua Bengio proposes a new AI architecture separating knowledge from goals to ensure honesty.", "zh": "Yoshua Bengio提出一种新AI架构，将知识与目标分离以确保诚实。"}, {"slug": "architecture", "pid": "boris", "ep": "boris-lennyspo", "date": "2026-02-19", "en": "Build for the model 6 months from now, not today; bet on more general models.", "zh": "为6个月后的模型构建，而非今天的；押注更通用的模型。"}, {"slug": "architecture", "pid": "dario", "ep": "dario-dwarkesh", "date": "2026-02-13", "en": "Models learn from broad data and generalize, like humans but with less sample efficiency; pre-training is between evolution and human learning.", "zh": "模型从广泛数据中学习并泛化，但样本效率低于人类；预训练介于进化和人类学习之间。"}, {"slug": "architecture", "pid": "dario", "ep": "dario-dwarkesh", "date": "2026-02-13", "en": "Continual learning may not be a barrier; generalization from pre-training and RL may suffice.", "zh": "持续学习可能不是障碍；预训练和强化学习的泛化可能就足够了。"}, {"slug": "architecture", "pid": "dario", "ep": "dario-interest", "date": "2026-02-12", "en": "A 'country of geniuses' (100 million smart AIs) is more practical than a single superintelligence.", "zh": "一个由1亿个聪明AI组成的「天才之国」比单一超级智能更实用。"}, {"slug": "architecture", "pid": "elon", "ep": "elon-dwarkesh-2026", "date": "2026-02-05", "en": "The limiting factor for AI chips is memory, not logic; DDR prices reflect this.", "zh": "AI 芯片的瓶颈是内存而非逻辑；DDR 价格反映了这一点。"}, {"slug": "architecture", "pid": "sholto", "ep": "sholto-tbpn-2026", "date": "2026-02-05", "en": "AI models now have massive capability overhang; better tools and orchestration matter more than raw intelligence for now.", "zh": "AI 模型现在有巨大的能力过剩；更好的工具和编排比原始智能更重要。"}, {"slug": "architecture", "pid": "andrewng", "ep": "andrewng-theecono-2026", "date": "2026-01-22", "en": "AI learns differently from humans; neuroscience has not been very useful for advancing AI algorithms.", "zh": "AI的学习方式与人类不同；神经科学对推进AI算法帮助不大。"}, {"slug": "architecture", "pid": "mensch", "ep": "mensch-bigtechn", "date": "2026-01-16", "en": "Future AI progress lies in vertical specialization, not broad horizontal improvements.", "zh": "未来AI进步在于垂直专业化，而非广泛的水平改进。"}, {"slug": "architecture", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "Multimodal capabilities still lag behind text, but are a key area for improvement.", "zh": "多模态能力仍落后于文本，但这是改进的关键领域。"}, {"slug": "architecture", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "Frontier models still fail at simple tasks a 5-year-old can solve.", "zh": "前沿模型仍无法完成 5 岁儿童能解决的简单任务。"}, {"slug": "architecture", "pid": "kaiser", "ep": "kaiser-themadpo", "date": "2025-11-26", "en": "Reasoning models are 'jagged'—excellent in some areas, poor in nearby ones.", "zh": "推理模型是“锯齿状”的——在某些领域出色，在邻近领域表现糟糕。"}, {"slug": "architecture", "pid": "feifei", "ep": "feifei-latentsp", "date": "2025-11-25", "en": "Spatial intelligence is complementary to language intelligence, not a replacement.", "zh": "空间智能与语言智能互补，而非替代。"}, {"slug": "architecture", "pid": "feifei", "ep": "feifei-latentsp", "date": "2025-11-25", "en": "World models require understanding 3D structure and physics, not just pattern fitting.", "zh": "世界模型需要理解3D结构和物理规律，而不仅是模式拟合。"}, {"slug": "architecture", "pid": "feifei", "ep": "feifei-latentsp", "date": "2025-11-25", "en": "Transformers natively model sets, not sequences; positional embeddings inject order.", "zh": "Transformer原生建模集合而非序列；位置编码注入顺序。"}, {"slug": "architecture", "pid": "ilya", "ep": "ilya-dwarkesh-2025", "date": "2025-11-25", "en": "Human sample efficiency and robustness come from evolution and a superior learning algorithm, not just data scale.", "zh": "人类的样本效率和鲁棒性来自进化和更优的学习算法，而不仅仅是数据规模。"}, {"slug": "architecture", "pid": "brockman", "ep": "brockman-matthewb-2025", "date": "2025-10-08", "en": "Base models contain a universe of possibilities; post-training refines them into consistent behaviors.", "zh": "基础模型蕴含无限可能；后训练将其提炼为一致的行为。"}, {"slug": "architecture", "pid": "sholto", "ep": "sholto-themadpo", "date": "2025-10-02", "en": "Current LLM training pipelines are primitive and have huge room for improvement across every component.", "zh": "当前的 LLM 训练流程还很原始，每个组件都有巨大的改进空间。"}, {"slug": "architecture", "pid": "sholto", "ep": "sholto-themadpo", "date": "2025-10-02", "en": "Moravec's paradox is 'a little bit fake'; robotics progress is mostly a data and feedback loop issue.", "zh": "莫拉维克悖论“有点假”；机器人技术的进步主要是数据和反馈循环问题。"}, {"slug": "architecture", "pid": "suleyman", "ep": "suleyman-sineadbo-2025", "date": "2025-09-25", "en": "AI systems are fundamentally unlike biological species; they lack pain networks and dopamine systems.", "zh": "AI系统与生物物种根本不同；它们缺乏疼痛网络和多巴胺系统。"}, {"slug": "architecture", "pid": "elon", "ep": "elon-allinpod-2025", "date": "2025-09-10", "en": "Tesla's AI5 chip will be a 40x improvement over AI4, enabling sentient-like self-driving by year-end.", "zh": "特斯拉 AI5 芯片比 AI4 提升 40 倍，年底前可实现类感知的自动驾驶。"}, {"slug": "architecture", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "Product innovation lags behind AI capabilities; freezing models would still yield a decade of product progress.", "zh": "产品创新落后于AI能力；冻结模型仍将带来十年的产品进步。"}, {"slug": "architecture", "pid": "scottwu", "ep": "scottwu-cheekypi-2025", "date": "2025-08-27", "en": "All layers of the AI stack (datacenter, labs, applications) will do well, not just one.", "zh": "AI技术栈的所有层（数据中心、实验室、应用）都将表现良好，而非仅一层。"}, {"slug": "architecture", "pid": "lambert", "ep": "lambert-intercon", "date": "2025-07-31", "en": "Hybrid reasoning models may be temporary; pure reasoning models like O3 could dominate.", "zh": "混合推理模型可能是暂时的；像 O3 这样的纯推理模型可能占主导。"}, {"slug": "architecture", "pid": "lambert", "ep": "lambert-intercon", "date": "2025-07-31", "en": "Parallel compute for inference is not transformative; better verifiers matter more.", "zh": "推理的并行计算并非变革性；更好的验证器更重要。"}, {"slug": "architecture", "pid": "kaplan", "ep": "kaplan-ycombina-2025", "date": "2025-07-29", "en": "AI's judgment and generative capability are closer than in humans.", "zh": "AI的判断与生成能力比人类更接近。"}, {"slug": "architecture", "pid": "elon", "ep": "elon-ycombina-2025", "date": "2025-06-19", "en": "Neuralink is not necessary for digital superintelligence; it solves bandwidth constraints.", "zh": "Neuralink对数字超级智能并非必需；它解决的是带宽限制问题。"}, {"slug": "architecture", "pid": "awang", "ep": "awang-shawnrya-2025", "date": "2025-06-12", "en": "Brain-computer interfaces are necessary for humans to stay relevant as AI advances.", "zh": "随着 AI 进步，脑机接口对人类保持相关性是必要的。"}, {"slug": "architecture", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "Self-awareness and consciousness can emerge as byproducts of data compression in predictive world models.", "zh": "自我意识和意识可以作为预测世界模型中数据压缩的副产品出现。"}, {"slug": "architecture", "pid": "schmidhuber", "ep": "schmidhuber-machinel-2025", "date": "2025-01-16", "en": "The first working deep learning networks were created in Ukraine in 1965, not by later well-known researchers.", "zh": "第一个有效的深度学习网络于1965年在乌克兰创建，而非后来的知名研究者。"}, {"slug": "architecture", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "The code editor is evolving from a text editor to an AI-integrated environment for building software.", "zh": "代码编辑器正从文本编辑器演变为集成AI的软件开发环境。"}, {"slug": "architecture", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Cursor uses custom models alongside frontier models for specialized tasks like tab completion and apply.", "zh": "Cursor在专用任务（如Tab补全和应用）中使用自定义模型与前沿模型配合。"}, {"slug": "architecture", "pid": "truell", "ep": "truell-lexfridm-2024", "date": "2024-10-06", "en": "Speculative decoding and KV cache reuse are key to low-latency AI features in code editors.", "zh": "推测解码和KV缓存复用是实现代码编辑器低延迟AI功能的关键。"}, {"slug": "architecture", "pid": "suleyman", "ep": "suleyman-intellig", "date": "2024-07-05", "en": "AI models are becoming easier to control with more compute, like a new design material.", "zh": "随着算力增加，AI模型变得更容易控制，就像一种新的设计材料。"}, {"slug": "architecture", "pid": "mensch", "ep": "mensch-20vc", "date": "2024-04-29", "en": "Vertical specialized models will be built by application makers, not model providers.", "zh": "垂直专用模型将由应用开发者构建，而非模型提供商。"}, {"slug": "architecture", "pid": "schulman", "ep": "schulman-therobot-2023", "date": "2023-08-03", "en": "Models can store vast knowledge in weights, enabling flexible connections, but retrieval aids real-time info and verifiability.", "zh": "模型可以在权重中存储大量知识，实现灵活连接，但检索有助于实时信息和可验证性。"}, {"slug": "architecture", "pid": "schulman", "ep": "schulman-therobot-2023", "date": "2023-08-03", "en": "Language models will serve as a core for other modalities, not be replaced by them.", "zh": "语言模型将作为其他模态的核心，而非被其取代。"}, {"slug": "architecture", "pid": "schulman", "ep": "schulman-therobot-2023", "date": "2023-08-03", "en": "We may be in a local optimum; new architectures and loss functions could surpass current methods.", "zh": "我们可能处于局部最优；新的架构和损失函数可能超越当前方法。"}, {"slug": "architecture", "pid": "noambrown", "ep": "noambrown-nopriors-2023", "date": "2023-04-25", "en": "Raw neural nets without planning cannot match top human performance in games like Go.", "zh": "没有规划的原始神经网络无法在围棋等游戏中达到顶级人类水平。"}, {"slug": "architecture", "pid": "ilya", "ep": "ilya-dwarkesh-2023", "date": "2023-03-27", "en": "Next-token prediction can surpass human performance if the base neural net is smart enough to extrapolate.", "zh": "如果基础神经网络足够聪明，下一个词预测可以超越人类表现，因为它能推断出假设性人物的行为。"}, {"slug": "architecture", "pid": "ilya", "ep": " const $=s=>document.querySelector(s);
const epsOf=pid=>EPISODES.filter(e=>e.pid===pid);
const fdot=f=>`<span class="fdot" style="background:${FIELDS[f].c}"></span>`;
const tag=f=>`<span class="tag">${fdot(f)}${FIELDS[f].zh}</span>`;
const fmtDate=d=>{const[y,m]=d.split('-');return `${y}.${m}`};
const fmtDur=m=>m>=60?`${Math.floor(m/60)}h${String(m%60).padStart(2,'0')}m`:`${m}m`;
function av(pid,cls=''){const p=PEOPLE[pid];const cs=p.fields.map(f=>FIELDS[f].c);
  const bg=cs.length>1?`linear-gradient(135deg,${cs[0]},${cs[1]})`:`linear-gradient(135deg,${cs[0]},${cs[0]})`;
  const img=PHOTOS.has(pid)?`<img src="assets/people/${pid}.jpg" alt="${p.en}" loading="lazy" onerror="this.remove()">`:'';
  return `<div class="av ${cls}" style="background:${bg}">${p.init}${img}</div>`;}
function epCover(e){const p=PEOPLE[e.pid];const cs=p.fields.map(f=>FIELDS[f].c);
  const bg=`linear-gradient(135deg,${cs[0]},${cs[1]||cs[0]})`;
  return `<div class="ep-cover" style="background:${bg}">
    <div class="pod" onclick="goPod('${e.pod.en}')" style="cursor:pointer">${podLogo(e)}${e.pod.en}</div>${av(e.pid)}
    <div class="ct"><b>${p.en}</b><span>${fmtDate(e.date)} · ${fmtDur(e.min)}</span></div></div>`;}
function epCard(e){return `<div class="ep-card" onclick="go('#/episode/${e.id}')">
  ${epCover(e)}
  <div class="ep-meta"><div class="t">${e.tEn}</div><div class="tz">${e.tZh}</div>
  <div class="row">${e.fields.map(tag).join('')}</div></div></div>`;}

let tocObserver=null;
function jumpSec(i){const el=document.getElementById('sec-'+i);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  const sh=$('#tocSheet');if(sh)sh.classList.remove('on');}
function toggleTocSheet(){const sh=$('#tocSheet');if(sh)sh.classList.toggle('on');}
function setTocActive(i){document.querySelectorAll('.toc-i').forEach(a=>a.classList.toggle('on',+a.dataset.sec===i));}
function initTOC(){
  if(tocObserver){tocObserver.disconnect();tocObserver=null;}
  const heads=[...document.querySelectorAll('.reader .sec-h')];
  if(!heads.length)return;
  setTocActive(0);
  tocObserver=new IntersectionObserver(es=>{
    const vis=es.filter(e=>e.isIntersecting).map(e=>heads.indexOf(e.target));
    if(vis.length)setTocActive(Math.min(...vis));
  },{rootMargin:'-115px 0px -72% 0px',threshold:0});
  heads.forEach(h=>tocObserver.observe(h));
}

const TS_CACHE={};let _tsLoading=null;
function ensureTs(id){

    .finally(()=>{_tsLoading=null;if((location.hash||'').indexOf('/episode/'+id)>=0)render();});
}

   若你的 workers.dev subdomain 不同,改这里为 wrangler deploy 输出的实际地址。 */
const TTS_PROXY='https://aipodcast-tts.992978142.workers.dev';
let ttsAudio=null;
function inReader(node){const el=node&&node.nodeType===3?node.parentElement:node;return !!(el&&el.closest&&el.closest('.reader'));}

let ttsBarChars=null,ttsBlobUrl=null;
const escHtml=s=>s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
function ttsStop(hide){
  if(ttsAudio){ttsAudio.pause();ttsAudio.ontimeupdate=null;ttsAudio.onended=null;ttsAudio=null;}
  if(ttsBlobUrl){URL.revokeObjectURL(ttsBlobUrl);ttsBlobUrl=null;}
  const bar=$('#ttsBar');if(bar)bar.classList.remove('on');
  ttsBarChars=null;
  const btn=$('#ttsBtn');if(btn){btn.classList.remove('playing','loading');
    btn.querySelector('.lbl').textContent='朗读所选';if(hide)btn.style.display='none';}
}
function ttsBarToggle(){
  const bar=$('#ttsBar');if(!bar)return;
  const min=bar.classList.toggle('min');localStorage.ttsMin=min?'1':'0';
  bar.querySelector('.tb-toggle').textContent=min?'展开':'收起';
}
function ttsRate(){const r=parseFloat(localStorage.ttsRate);return r>=0.5&&r<=2?r:1;}
function ttsSetRate(v){
  const r=Math.max(0.5,Math.min(2,parseFloat(v)||1));localStorage.ttsRate=r;
  if(ttsAudio)ttsAudio.playbackRate=r;
  const lab=$('#ttsBar .tb-rate');if(lab)lab.textContent=r.toFixed(1)+'×';
  const inp=$('#ttsRate');if(inp&&+inp.value!==r)inp.value=r;
}
function ttsBuildBar(align,text){
  const bar=$('#ttsBar');if(!bar)return;const body=bar.querySelector('.tb-body');
  const ch=align&&align.characters, st=align&&(align.character_start_times_seconds||[]);
  if(ch&&ch.length){
    body.innerHTML=ch.map((c,i)=>c==='\n'?'<br>':`<span data-t="${st[i]||0}">${escHtml(c)}</span>`).join('');
    ttsBarChars=[...body.querySelectorAll('span')];
  }else{body.textContent=text;ttsBarChars=null;}   // 无时间戳:仅显示文本
  const min=localStorage.ttsMin!=='0';              // 默认收起,只显示小条+进度
  bar.classList.toggle('min',min);
  bar.querySelector('.tb-toggle').textContent=min?'展开':'收起';
  bar.style.setProperty('--p','0%');
  ttsSetRate(ttsRate());                            // 同步倍速 UI 到当前值
  bar.classList.add('on');
}
function ttsTick(){
  const bar=$('#ttsBar');if(!ttsAudio||!bar)return;
  if(ttsAudio.duration)bar.style.setProperty('--p',(ttsAudio.currentTime/ttsAudio.duration*100)+'%');
  if(!ttsBarChars)return;
  const t=ttsAudio.currentTime;let cur=-1;
  for(let i=0;i<ttsBarChars.length;i++){if(+ttsBarChars[i].dataset.t<=t)cur=i;else break;}
  for(let i=0;i<ttsBarChars.length;i++){const s=ttsBarChars[i];
    s.classList.toggle('spoken',i<cur);s.classList.toggle('cur',i===cur);}
  if(cur>=0&&!bar.classList.contains('min')){const c=ttsBarChars[cur],b=bar.querySelector('.tb-body');
    const cr=c.getBoundingClientRect(),br=b.getBoundingClientRect();
    if(cr.bottom>br.bottom-8||cr.top<br.top+8)c.scrollIntoView({block:'center',behavior:'smooth'});}
}
async function ttsPlay(){
  const btn=$('#ttsBtn');const text=btn.dataset.text;if(!text)return;
  if(btn.classList.contains('loading'))return;                 // 处理中:忽略重复点击
  if(ttsAudio&&!ttsAudio.paused){ttsStop(false);return;}
  btn.classList.add('loading');btn.classList.remove('playing');btn.querySelector('.lbl').textContent='处理中…';
  try{
    const r=await fetch(TTS_PROXY,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:text.slice(0,2500)})});
    if(!r.ok){
      let msg=`HTTP ${r.status}`;
      try{const j=JSON.parse(await r.text());const dt=j.detail||j;const code=(dt.code||'')+'';
        if(/quota/i.test(code)||/quota/i.test(dt.message||'')) msg='额度/限额不足 —— 请在 ElevenLabs 后台调高该 Key 限额或确认余额';
        else msg=dt.message||code||msg;
      }catch(_){ if(r.status===403) msg='朗读代理拒绝(来源不在白名单)'; }
      throw new Error(msg);
    }
    const ct=r.headers.get('Content-Type')||'';
    let url,align=null;
    if(/json/.test(ct)){                          // with-timestamps:JSON {audio_base64, alignment}
      const j=await r.json();
      url='data:audio/mpeg;base64,'+j.audio_base64;
      align=j.alignment||j.normalized_alignment||null;   // 用原始字符(中文显示汉字,非拼音)
    }else{                                         // 兼容旧 Worker:直接音频流
      ttsBlobUrl=url=URL.createObjectURL(await r.blob());
    }
    if(ttsAudio)ttsAudio.pause();
    ttsAudio=new Audio(url);
    ttsAudio.playbackRate=ttsRate();
    ttsBuildBar(align,text);
    if(align)ttsAudio.ontimeupdate=ttsTick;
    ttsAudio.onended=()=>ttsStop(true);
    ttsAudio.play();
    btn.classList.remove('loading');btn.classList.add('playing');btn.querySelector('.lbl').textContent='停止朗读';
  }catch(err){
    ttsStop(false);
    const net=/fetch|network|load failed/i.test(err.message||'');
    alert('朗读失败：'+err.message+(net?'\n（网络问题,请检查连接或代理）':''));
  }
}
/* 中英选中互定位:选中原文中某句/词,只定位并高亮对应译文「那一句」(句子级) */
let crossOrig=[];   // [{el,html}] 用于还原被改写的 div
function clearCross(){
  crossOrig.forEach(o=>{o.el.innerHTML=o.html;});crossOrig=[];
  document.querySelectorAll('.turn.peek').forEach(el=>el.classList.remove('peek'));
}
function sentsOf(t,zh){
  const m=t.match(zh?/[^。！？!?…\n]+[。！？!?…]*/g:/[^.!?。！？\n]+[.!?]*["”’']*\s*/g);
  return (m&&m.length)?m:[t];
}
// 选区端点在 el 内的真实字符偏移(累加 el 内所有文本节点长度,避开 indexOf 的重复词坑)
function offsetInEl(el,container,off){
  const w=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);let n,sum=0;
  while(n=w.nextNode()){if(n===container)return sum+off;sum+=n.nodeValue.length;}
  return sum;
}
// 字符偏移 → 该偏移落在第几句
function sentAt(sents,pos){let a=0,si=0;
  for(let i=0;i<sents.length;i++){si=i;if(pos<a+sents[i].length)break;a+=sents[i].length;}return si;}
function syncCross(){
  const sel=window.getSelection();const selText=(sel?sel.toString():'').trim();
  clearCross();
  if(document.body.dataset.lang!=='both')return;   // 仅双语模式做对照;单语(中/英)下不展开、不高亮另一语言
  if(!selText||!sel.rangeCount||!sel.anchorNode||!inReader(sel.anchorNode))return;
  const node=sel.anchorNode.nodeType===3?sel.anchorNode.parentElement:sel.anchorNode;
  const turn=node&&node.closest?node.closest('.turn'):null;if(!turn)return;
  const enDiv=turn.querySelector('.en'),zhDiv=turn.querySelector('.zh');
  const srcIsEn=!!node.closest('.en'),srcIsZh=!!node.closest('.zh');
  if(!srcIsEn&&!srcIsZh)return;
  const src=srcIsEn?enDiv:zhDiv, cp=srcIsEn?zhDiv:enDiv;
  if(!src||!cp)return;
  const srcLen=src.textContent.length||1, cpLen=cp.textContent.length;
  // 1) 选区中点在 src 的真实字符偏移
  const rg=sel.getRangeAt(0);
  let a=offsetInEl(src,rg.startContainer,rg.startOffset);
  let b=offsetInEl(src,rg.endContainer,rg.endOffset);
  if(b<a)[a,b]=[b,a];
  const mid=Math.min(srcLen-1,Math.max(0,(a+b)/2));
  const srcSents=sentsOf(src.textContent,srcIsZh), cpSents=sentsOf(cp.textContent,srcIsEn);
  // 2) 映射到 cp 句子:句数相同→同序;否则按字符比例落点
  let ci;
  if(srcSents.length===cpSents.length){ci=sentAt(srcSents,mid);}
  else{ci=sentAt(cpSents,(mid/srcLen)*cpLen);}
  ci=Math.max(0,Math.min(cpSents.length-1,ci));
  // 3) 改写 cp:只把目标句包进 .xseg
  crossOrig.push({el:cp,html:cp.innerHTML});
  cp.innerHTML=cpSents.map((s,i)=>i===ci?`<span class="xseg">${escHtml(s)}</span>`:escHtml(s)).join('');
  if(getComputedStyle(cp).display==='none')turn.classList.add('peek');   // 单语:就地展开
}
/* ====== 问这期:grounded 问答(经 Cloudflare Worker 取本期转录喂 DeepSeek,严格只据转录答) ====== */
const CHAT_PROXY='https://aipodcast-chat.992978142.workers.dev';
const CHAT={};   // id -> [{role,content}](内存态,导航后重置)
const escH=s=>(''+s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function citeHtml(id,text){
  return escH(text).replace(/\[#(\d+)\]/g,(_,n)=>{const i=+n,ts=TS_CACHE[id]||[];
    const title=ts[i]?(''+ts[i].sec).replace(/"/g,''):'第'+(i+1)+'节';
    return `<button class="cite" onclick="jumpSec(${i})" title="${title}">${i+1}</button>`;
  }).replace(/\n+/g,'<br>');
}
function renderThread(id){
  return (CHAT[id]||[]).map(m=>m.role==='user'
    ? `<div class="cmsg cu">${escH(m.content)}</div>`
    : `<div class="cmsg ca">${m.content==='…'?'<span class="cdots">思考中…</span>':citeHtml(id,m.content)}</div>`).join('');
}
async function askEp(id,preset){
  const inp=$('#chatInput');const q=(preset||(inp?inp.value:'')||'').trim();if(!q)return;
  CHAT[id]=CHAT[id]||[];
  const hist=CHAT[id].filter(m=>m.content&&m.content!=='…').slice(-4).map(m=>({role:m.role,content:m.content}));
  CHAT[id].push({role:'user',content:q},{role:'assistant',content:'…'});
  if(inp)inp.value='';
  const refresh=()=>{const t=$('#chatThread');if(t){t.innerHTML=renderThread(id);t.scrollTop=t.scrollHeight;}};
  refresh();
  try{
    const r=await fetch(CHAT_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id,question:q.slice(0,500),history:hist})});
    const d=await r.json();
    CHAT[id][CHAT[id].length-1]={role:'assistant',content:(r.ok&&d.answer)?d.answer:('（出错:'+(d.error||r.status)+'）')};
  }catch(e){CHAT[id][CHAT[id].length-1]={role:'assistant',content:'（网络错误,请重试）'};}
  refresh();
}

  ${av(id)}<div class="sr-meta"><div class="sr-t">${p.en} · ${p.zh}</div>
  <div class="sr-s">${p.tiZh} · ${epsOf(id).length} 期播客</div></div></div>`;}
function srEp(e,snip){const p=PEOPLE[e.pid];return `<div class="sr-row" data-go="#/episode/${e.id}" onclick="srPick('#/episode/${e.id}')">
  <div class="sr-ic" style="background:${FIELDS[e.fields[0]].c}"></div>
  <div class="sr-meta"><div class="sr-t">${e.tEn}</div>
  <div class="sr-s">${p.zh} · ${e.pod.zh} · ${fmtDate(e.date)}</div>
  ${snip?`<div class="sr-snip">${snip}</div>`:''}</div></div>`;}
function srTopic(d){return `<div class="sr-row" data-go="#/topic/${d.slug}" onclick="srPick('#/topic/${d.slug}')">
  <div class="sr-ic" style="background:var(--accent)"></div>
  <div class="sr-meta"><div class="sr-t">${d.zh} · ${d.en}</div>
  <div class="sr-s">议题 · ${(TOPICS.items[d.slug]||[]).length} 条跨人物观点</div></div></div>`;}
function srPick(h){closeSearch();go(h);}
function searchInput(q){
  const k=q.trim().toLowerCase(),res=$('#searchResults');
  if(!k){res.innerHTML=`<div class="sr-group">全部人物 · ${Object.keys(PEOPLE).length}</div>`+
    Object.keys(PEOPLE).map(srPerson).join('');srSel(0);return;}
  const fstr=fs=>fs.map(f=>FIELDS[f].en+FIELDS[f].zh).join('');
  const tps=(typeof TOPICS!=='undefined'?TOPICS.defs:[]).filter(d=>(d.zh+d.en+d.slug).toLowerCase().includes(k));
  const ppl=Object.keys(PEOPLE).filter(id=>{const p=PEOPLE[id];
    return (p.en+p.zh+p.tiEn+p.tiZh+fstr(p.fields)).toLowerCase().includes(k);});
  // 单集:先匹配标题/导语/媒体/领域;否则深入匹配核心观点/反共识,命中则把那条作为摘要展示
  const eps=EPISODES.map(e=>{
    const meta=(e.tEn+e.tZh+e.sEn+e.sZh+e.pod.en+e.pod.zh+fstr(e.fields)).toLowerCase();
    if(meta.includes(k))return{e,snip:''};
    const ins=e.insights||{};const pts=[...(ins.consensus||[]),...(ins.contrarian||[])];
    const hit=pts.find(x=>((x.en||'')+(x.zh||'')).toLowerCase().includes(k));
    return hit?{e,snip:'“'+(hit.zh||hit.en)+'”'}:null;
  }).filter(Boolean);
  let html='';
  if(tps.length)html+=`<div class="sr-group">议题 · ${tps.length}</div>`+tps.map(srTopic).join('');
  if(ppl.length)html+=`<div class="sr-group">人物 · ${ppl.length}</div>`+ppl.map(srPerson).join('');
  if(eps.length)html+=`<div class="sr-group">播客 · ${eps.length}（含核心观点匹配）</div>`+eps.map(x=>srEp(x.e,x.snip)).join('');
  res.innerHTML=html||`<div class="sr-empty">没有匹配 “${q}”</div>`;srSel(0);
}
function srSel(i){const rows=[...document.querySelectorAll('#searchResults .sr-row')];
  rows.forEach((r,j)=>r.classList.toggle('sel',i===j));}
function searchKey(e){
  const rows=[...document.querySelectorAll('#searchResults .sr-row')];
  let i=rows.findIndex(r=>r.classList.contains('sel'));
  if(e.key==='Escape'){closeSearch();}
  else if(e.key==='ArrowDown'){e.preventDefault();srSel(Math.min(rows.length-1,i+1));rows[Math.min(rows.length-1,i+1)]?.scrollIntoView({block:'nearest'});}
  else if(e.key==='ArrowUp'){e.preventDefault();srSel(Math.max(0,i-1));rows[Math.max(0,i-1)]?.scrollIntoView({block:'nearest'});}
  else if(e.key==='Enter'){const r=rows[i<0?0:i];if(r)srPick(r.dataset.go);}
}

/* ============================ ROUTER ============================ */
function go(h){location.hash=h;}
/* 盘古之白:中文与英文/数字之间自动补空格(渲染时处理文本节点,纯英文节点不受影响) */
const CJK='\\u4e00-\\u9fff\\u3040-\\u30ff\\u3400-\\u4dbf';
const RE1=new RegExp('(['+CJK+'])([A-Za-z0-9%])','g');
const RE2=new RegExp('([A-Za-z0-9%\\)\\]])(['+CJK+'])','g');
function pangu(t){return t.replace(RE1,'$1 $2').replace(RE2,'$1 $2');}
function pangufy(root){
  const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT),nodes=[];let n;
  while(n=w.nextNode())nodes.push(n);
  const cjk=/[一-鿿]/;
  nodes.forEach(nd=>{const v=nd.nodeValue;if(v&&cjk.test(v)){const nv=pangu(v);if(nv!==v)nd.nodeValue=nv;}});
}
function render(){
  if(typeof ttsStop==='function')ttsStop(true);   // 切页时停朗读、收起跟读条
  const h=location.hash||'#/';
  const[path,query]=h.slice(2).split('?');
  const parts=path.split('/').filter(Boolean);
  let html;
  if(query){const qp=new URLSearchParams(query);if(qp.get('field')){bf={person:'',year:'',pod:'',field:qp.get('field')};}}
  if(!parts.length)html=vHome();
  else if(parts[0]==='people')html=vPeople();
  else if(parts[0]==='topics')html=vTopics();
  else if(parts[0]==='topic')html=vTopic(parts[1]);
  else if(parts[0]==='fields')html=vFields();
  else if(parts[0]==='browse')html=vBrowse();
  else if(parts[0]==='person')html=vPerson(parts[1]);
  else if(parts[0]==='pod')html=vPod(parts[1]);
  else if(parts[0]==='episode')html=vEpisode(parts[1]);
  else html=vHome();
  $('#app').innerHTML=html;
  pangufy($('#app'));
  document.body.dataset.route=parts[0]||'home';
  document.querySelectorAll('.nav .links a').forEach(a=>a.classList.toggle('on',a.dataset.route===parts[0]));
  updateMeta(parts);
  window.scrollTo(0,0);
  syncSeg();
  observeReveals();
  initTOC();
}
/* 按路由更新标题/描述/OG —— 微信在内置浏览器分享当前页时会读实时标题 */
function metaSet(key,isProp,val){const sel=isProp?`meta[property="${key}"]`:`meta[name="${key}"]`;
  let m=document.querySelector(sel);if(!m){m=document.createElement('meta');m.setAttribute(isProp?'property':'name',key);document.head.appendChild(m);}
  m.setAttribute('content',val);}
function updateMeta(parts){
  let title='AI Podcast · AI 播客 — 双语播客全文阅读';
  let desc='知名 AI 人物的播客 · 双语全文阅读,原文与翻译对照,核心观点速览。';
  if(parts[0]==='episode'){const e=EPISODES.find(x=>x.id===parts[1]);if(e){const p=PEOPLE[e.pid];
    title=`${e.tZh} · ${p.zh} — AI Podcast`;desc=`${p.zh}（${e.pod.zh}）双语全文 + 核心观点。${e.sZh||''}`;}}
  else if(parts[0]==='person'){const p=PEOPLE[parts[1]];if(p){title=`${p.zh} · ${p.en} — AI Podcast`;desc=`${p.zh}（${p.tiZh}）的播客,双语全文阅读。`;}}
  else if(parts[0]==='pod'){const k=POD_SLUG[parts[1]],i=POD_INFO[k];if(i){title=`${k} · ${i.zh} — AI Podcast`;desc=i.cn;}}
  else if(parts[0]==='topics'){title='议题 · 同一议题不同声音 — AI Podcast';desc='把不同 AI 人物对 AGI 时间表、规模化、对齐安全、开源闭源等议题的观点聚到一起横向对照。';}
  else if(parts[0]==='topic'){const d=(typeof TOPICS!=='undefined')&&TOPICS.defs.find(x=>x.slug===parts[1]);if(d){title=`${d.zh} · ${d.en} — AI Podcast 议题`;desc=`不同 AI 人物对「${d.zh}」的观点对照。`;}}
  document.title=title;
  metaSet('description',false,desc);
  metaSet('og:title',true,title);metaSet('twitter:title',true,title);
  metaSet('og:description',true,desc);metaSet('twitter:description',true,desc);
  metaSet('og:url',true,'https://aipodcast.jasonlin.tech/'+(location.hash||''));
}
function observeReveals(){
  const io=new IntersectionObserver((es)=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:0,rootMargin:'0px 0px -5% 0px'});
  document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));
}
const MCP_URL='https://aipodcast-mcp.992978142.workers.dev/mcp';
function copyMcp(){navigator.clipboard&&navigator.clipboard.writeText(MCP_URL);const b=$('#mcpCopy');if(b){b.textContent='已复制';setTimeout(()=>b.textContent='复制',1500);}}
function copyShare(id){const u='https://aipodcast.jasonlin.tech/e/'+id+'/';if(navigator.clipboard)navigator.clipboard.writeText(u);const b=$('#shareBtn');if(b){b.textContent='已复制链接';setTimeout(()=>b.textContent='分享',1600);}}
function footer(){return `<footer class="footer"><div class="wrap">
  <div class="mcp-note">
    <b style="color:var(--text-2)">接入你的 AI 助手 · MCP</b> — 把本站全部 ${EPISODES.length} 期双语全文接进任意支持 MCP 的 Agent(Claude、Cursor 等)做问答。<br>
    在 AI 助手里添加远程 MCP(Streamable HTTP),地址:
    <code class="mcp-url">${MCP_URL}</code><button id="mcpCopy" class="mcp-copy" onclick="copyMcp()">复制</button><br>
    <span class="mcp-tools">工具:list_people · get_person(含观点演变) · search_episodes · get_episode(双语全文)。只读、免费、无需 key。</span>
  </div>
  <b style="color:var(--text-2)">AI Podcast · AI 播客</b> — 知名 AI 人物的播客,双语阅读。<br>
  人物与领域分类法复用自 <a href="https://ai.jasonlin.tech" target="_blank">AI 人物图谱</a>。节目均为真实播客;双语全文由 AI 转录翻译,个别词偶有瑕疵。<br>
  人物照片来自 <a href="https://commons.wikimedia.org" target="_blank">Wikimedia Commons</a>(CC 协议)及本人公开主页头像,版权归各自作者,仅作识别之用;播客封面来自 Apple Podcasts,商标归各节目所有,仅作识别之用。
</div></footer>`;}

/* init */
if(localStorage.theme)document.documentElement.dataset.theme=localStorage.theme;
if(localStorage.lang)document.body.dataset.lang=localStorage.lang;
if(localStorage.size)document.body.dataset.size=localStorage.size;
document.body.dataset.order=localStorage.order||'en';
window.addEventListener('hashchange',render);
document.addEventListener('keydown',e=>{
  const typing=/^(INPUT|TEXTAREA)$/.test(document.activeElement?.tagName);
  if((e.key==='/'||((e.metaKey||e.ctrlKey)&&e.key==='k'))&&!typing){e.preventDefault();openSearch();}
  else if(e.key==='Escape'&&$('#searchOverlay').classList.contains('on')){closeSearch();}
});
ttsInit();
render();
</script>
