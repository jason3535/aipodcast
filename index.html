<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-lang="both" data-size="m">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta property="og:description" content="知名 AI 人物的播客 · 双语全文阅读,原文与翻译对照,核心观点速览。">
<meta property="og:url" content="https://aipodcast.jasonlin.tech/">

<meta name="twitter:description" content="知名 AI 人物的播客 · 双语全文阅读。">

<style>
  :root{
    --bg:#ffffff; --bg-alt:#fbfbfd; --surface:#ffffff; --surface-2:#f5f5f7;
    --text:#1d1d1f; --text-2:#6e6e73; --text-3:#86868b; --line:#d2d2d7;
    --nav:rgba(251,251,253,.72); --accent:#0066cc;
    --shadow:0 4px 24px rgba(0,0,0,.06); --shadow-lg:0 12px 40px rgba(0,0,0,.10);
    --radius:18px; --read-scale:1;
    --ui:-apple-system,"SF Pro Text",system-ui,"PingFang SC","Helvetica Neue",sans-serif;
    --serif:ui-serif,"New York",Georgia,"Songti SC",serif;
    --han:"PingFang SC","Songti SC",-apple-system,sans-serif;
    --f-dl:#0a84ff; --f-nlp:#5e5ce6; --f-vision:#30d158; --f-rl:#ff9f0a; --f-safety:#ff453a; --f-robotics:#bf5af2;
  }
  [data-theme="dark"]{
    --bg:#000000; --bg-alt:#0a0a0b; --surface:#1c1c1e; --surface-2:#161618;
    --text:#f5f5f7; --text-2:#a1a1a6; --text-3:#8e8e93; --line:#2a2a2c;
    --nav:rgba(20,20,22,.72); --accent:#2997ff;
    --shadow:0 4px 24px rgba(0,0,0,.5); --shadow-lg:0 12px 40px rgba(0,0,0,.6);
  }
  [data-size="s"]{--read-scale:.9} [data-size="m"]{--read-scale:1} [data-size="l"]{--read-scale:1.18}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:var(--ui);
    -webkit-font-smoothing:antialiased;line-height:1.5;letter-spacing:-.01em;
    transition:background .4s,color .4s}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  ::selection{background:rgba(0,102,204,.18)}

  /* ---------- NAV ---------- */
  .nav{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;
    gap:28px;padding:0 max(22px,env(safe-area-inset-left));
    background:var(--nav);backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)}
  .brand{font-weight:600;font-size:18px;letter-spacing:-.02em;cursor:pointer;display:flex;align-items:center;gap:7px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--f-nlp),var(--f-dl))}
  .nav .links{display:flex;gap:24px;font-size:14px;color:var(--text-2)}
  .nav .links a{cursor:pointer;transition:color .2s}
  .nav .links a:hover,.nav .links a.on{color:var(--text)}
  .nav .spacer{flex:1}
  .nav .icon{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;cursor:pointer;
    color:var(--text-2);transition:background .2s,color .2s;font-size:15px;border:none;background:transparent}
  .nav .icon:hover{background:var(--surface-2);color:var(--text)}
  .nav .icon svg{width:17px;height:17px;display:block}
  .nav .kbd{display:none;font-size:11px;color:var(--text-3);border:1px solid var(--line);border-radius:6px;
    padding:2px 6px;margin-left:-14px}
  @media(min-width:760px){.nav .kbd{display:inline-block}}
  @media(max-width:640px){.nav .links{gap:15px;font-size:13.5px}.nav{gap:10px}}

  /* ---------- SEARCH OVERLAY ---------- */
  .search-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.32);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    display:flex;justify-content:center;align-items:flex-start;padding:11vh 22px 22px;
    opacity:0;pointer-events:none;transition:opacity .22s}
  .search-overlay.on{opacity:1;pointer-events:auto}
  [data-theme="dark"] .search-overlay{background:rgba(0,0,0,.55)}
  .search-panel{width:100%;max-width:620px;background:var(--surface);border-radius:18px;
    box-shadow:var(--shadow-lg);border:1px solid var(--line);overflow:hidden;
    transform:translateY(-12px) scale(.98);transition:transform .22s cubic-bezier(.22,.61,.36,1)}
  .search-overlay.on .search-panel{transform:none}
  .si-wrap{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line)}
  .si-wrap .si-icon{font-size:19px;color:var(--text-3)}
  .search-input{flex:1;border:none;background:transparent;outline:none;font-family:var(--ui);
    font-size:17px;color:var(--text);letter-spacing:-.01em}
  .search-input::placeholder{color:var(--text-3)}
  .si-esc{font-size:11px;color:var(--text-3);border:1px solid var(--line);border-radius:6px;
    padding:3px 7px;background:transparent;cursor:pointer;font-family:var(--ui)}
  .search-results{max-height:min(56vh,460px);overflow-y:auto;padding:8px}
  .sr-group{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--text-3);padding:12px 12px 6px}
  .sr-row{display:flex;align-items:center;gap:13px;padding:9px 12px;border-radius:12px;cursor:pointer;transition:background .15s}
  .sr-row:hover,.sr-row.sel{background:var(--surface-2)}
  .sr-row .av{width:40px;height:40px;font-size:15px}
  .sr-ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:#fff;font-size:14px;flex:0 0 auto}
  .sr-meta{min-width:0}
  .sr-t{font-size:14.5px;font-weight:500;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sr-s{font-size:12.5px;color:var(--text-2);margin-top:1px;font-family:var(--han);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sr-snip{font-size:12.5px;color:var(--text-3);margin-top:4px;font-family:var(--han);line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sr-empty{text-align:center;color:var(--text-3);padding:34px 0;font-size:14px}

  /* ---------- LAYOUT ---------- */
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}
  .reveal{opacity:0;transform:translateY(16px);transition:opacity .7s cubic-bezier(.22,.61,.36,1),transform .7s cubic-bezier(.22,.61,.36,1)}
  .reveal.in{opacity:1;transform:none}
  section{padding:64px 0}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
  h2.title{font-size:30px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px}
  .sub{color:var(--text-2);font-size:15px}

  /* ---------- HERO ---------- */
  .hero{padding:18px 0 8px}
  .hero-card{position:relative;border-radius:28px;overflow:hidden;background:var(--surface);
    box-shadow:var(--shadow-lg);display:grid;grid-template-columns:1.05fr 1fr;min-height:420px}
  .hero-art{position:relative;display:grid;place-items:center;overflow:hidden}
  .hero-art .av{width:230px;height:230px;font-size:84px}
  .hero-art::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 120% at 30% 20%,transparent 40%,rgba(0,0,0,.04))}
  .hero-body{padding:54px 48px;display:flex;flex-direction:column;justify-content:center}
  .hero-body .eyebrow{color:var(--accent)}
  .hero-body h1{font-size:42px;line-height:1.08;font-weight:600;letter-spacing:-.03em;margin:6px 0 4px}
  .hero-body .who{color:var(--text-2);font-size:17px;margin-bottom:18px}
  .hero-body .quote{font-family:var(--serif);font-size:22px;line-height:1.5;color:var(--text);margin-bottom:8px}
  .hero-body .quote-zh{font-family:var(--han);font-size:17px;color:var(--text-2);margin-bottom:26px;line-height:1.7}
  @media(max-width:820px){.hero-card{grid-template-columns:1fr;min-height:0}.hero-art{padding:40px 0}.hero-art .av{width:150px;height:150px;font-size:56px}.hero-body{padding:32px 26px}.hero-body h1{font-size:32px}}

  .btn{display:inline-flex;align-items:center;gap:8px;align-self:flex-start;
    background:var(--accent);color:#fff;border:none;border-radius:980px;
    padding:11px 22px;font-size:15px;font-weight:500;cursor:pointer;font-family:var(--ui);
    transition:transform .15s,filter .2s}
  .btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .btn.ghost{background:var(--surface-2);color:var(--text)}

  /* ---------- RAIL / CARDS ---------- */
  .rail{display:flex;gap:18px;overflow-x:auto;scroll-snap-type:x mandatory;padding:6px 2px 14px;margin:0 -2px;scrollbar-width:none}
  .rail::-webkit-scrollbar{display:none}
  .ep-card{scroll-snap-align:start;flex:0 0 300px;background:var(--surface);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s;border:1px solid transparent}
  .ep-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
  [data-theme="dark"] .ep-card{border-color:var(--line)}
  .ep-cover{height:152px;position:relative;overflow:hidden}
  .ep-cover .pod{position:absolute;top:16px;left:18px;right:18px;font-size:12px;color:#fff;opacity:.95;font-weight:500;
    display:flex;align-items:center;gap:7px;text-shadow:0 1px 2px rgba(0,0,0,.18)}
  .ep-cover .pod>span,.ep-cover .pod{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ep-cover .av{position:absolute;right:16px;bottom:15px;width:66px;height:66px;font-size:24px;
    box-shadow:0 2px 10px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.25)}
  .ep-cover .ct{position:absolute;left:18px;bottom:16px;max-width:56%;color:#fff}
  .ep-cover .ct b{font-weight:600;font-size:15.5px;display:block;letter-spacing:-.01em;line-height:1.2;
    text-shadow:0 1px 3px rgba(0,0,0,.22)}
  .ep-cover .ct span{font-size:12px;opacity:.88;text-shadow:0 1px 2px rgba(0,0,0,.2)}
  .ep-meta{padding:16px 18px 18px}
  .ep-meta .t{font-size:15.5px;font-weight:600;letter-spacing:-.02em;line-height:1.32;margin-bottom:5px}
  .ep-meta .tz{font-size:13px;color:var(--text-2);line-height:1.45;margin-bottom:13px;font-family:var(--han)}
  .ep-meta .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  /* grid of episodes */
  .ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
  .ep-grid .ep-card{flex:auto;width:auto}

  /* ---------- CHIPS / TAGS ---------- */
  .chips{display:flex;gap:9px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--text);
    background:var(--surface-2);border:1px solid transparent;border-radius:980px;padding:7px 14px;cursor:pointer;
    transition:all .18s;font-family:var(--ui);white-space:nowrap}
  .chip:hover{border-color:var(--line)}
  .chip .fdot{width:8px;height:8px;border-radius:50%}
  .chip.on{background:var(--text);color:var(--bg)}
  .chip.on .fdot{outline:2px solid var(--bg)}
  .tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);font-weight:500}
  .tag .fdot{width:7px;height:7px;border-radius:50%}
  .dur{font-size:12px;color:var(--text-3)}

  /* ---------- AVATAR (monogram, field-gradient) ---------- */
  .av{border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:600;
    font-family:var(--ui);letter-spacing:-.02em;flex:0 0 auto;box-shadow:inset 0 1px 0 rgba(255,255,255,.25);
    position:relative;overflow:hidden}
  .av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}

  /* ---------- PODCAST LOGO ---------- */
  .podlogo{width:22px;height:22px;border-radius:6px;object-fit:cover;flex:0 0 auto;
    box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .pod-logo-lg{width:130px;height:130px;border-radius:28px;object-fit:cover;flex:0 0 auto;box-shadow:var(--shadow)}
  .pod-logo-lg.fallback{display:grid;place-items:center;font-size:38px;font-weight:600;color:#fff;
    background:linear-gradient(135deg,var(--f-nlp),var(--f-dl))}

  /* ---------- TTS 选中朗读 ---------- */
  .tts-btn{position:absolute;display:none;align-items:center;gap:6px;z-index:130;transform:translateX(-50%);
    background:var(--text);color:var(--bg);border:none;border-radius:980px;padding:8px 14px;font-size:13px;
    font-weight:500;cursor:pointer;box-shadow:var(--shadow-lg);font-family:var(--ui);white-space:nowrap;
    transition:opacity .15s}
  .tts-btn.loading{cursor:default;pointer-events:none}
  .tts-btn.loading .lbl::before{content:"";display:inline-block;width:11px;height:11px;margin-right:8px;
    border:2px solid currentColor;border-right-color:transparent;border-radius:50%;vertical-align:-1px;
    animation:ttsspin .6s linear infinite}
  .tts-btn.playing .lbl::before{content:"";display:inline-block;width:9px;height:11px;margin-right:8px;
    border-left:3px solid currentColor;border-right:3px solid currentColor;box-sizing:border-box;vertical-align:-1px}
  @keyframes ttsspin{to{transform:rotate(360deg)}}
  /* 朗读跟读条:字符级进度高亮 */
  #ttsBar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%) translateY(8px);
    width:min(720px,calc(100vw - 32px));max-height:34vh;display:none;flex-direction:column;
    background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);
    z-index:140;opacity:0;transition:opacity .2s,transform .2s;overflow:hidden}
  #ttsBar.on{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
  #ttsBar .tb-h{display:flex;align-items:center;gap:8px;padding:10px 14px;font-family:var(--ui);
    font-size:12px;font-weight:600;color:var(--text-3);border-bottom:1px solid var(--border);letter-spacing:.02em}
  #ttsBar .tb-title{color:var(--text-2)}
  #ttsBar .tb-toggle{border:none;background:transparent;color:var(--accent);
    font-family:var(--ui);font-size:12px;font-weight:600;padding:4px 8px;cursor:pointer}
  #ttsBar .tb-x{border:none;background:var(--surface-2);color:var(--text-2);
    font-family:var(--ui);font-size:12px;padding:4px 12px;border-radius:980px;cursor:pointer}
  #ttsBar .tb-prog{height:2px;background:var(--border);flex:none}
  #ttsBar .tb-prog i{display:block;height:100%;width:var(--p,0%);background:var(--accent);transition:width .2s linear}
  #ttsBar .tb-speed{display:inline-flex;align-items:center;gap:7px;margin-left:auto}
  #ttsBar .tb-speed input{width:64px;accent-color:var(--accent);cursor:pointer;height:3px}
  #ttsBar .tb-rate{min-width:30px;text-align:right;font-variant-numeric:tabular-nums;
    font-weight:600;color:var(--text-2)}
  #ttsBar.min{width:min(420px,calc(100vw - 32px))}
  #ttsBar.min .tb-h{border-bottom:none}
  #ttsBar.min .tb-prog,#ttsBar.min .tb-body{display:none}
  #ttsBar .tb-body{padding:14px 16px 16px;overflow-y:auto;font-family:var(--serif);
    font-size:18px;line-height:1.72;color:var(--text-3);scroll-behavior:smooth}
  #ttsBar .tb-body span.spoken{color:var(--text)}
  #ttsBar .tb-body span.cur{color:var(--accent);font-weight:600;background:rgba(255,193,7,.30);border-radius:3px}
  [data-theme="dark"] #ttsBar .tb-body span.cur{background:rgba(255,209,71,.22)}
  #ttsBar .tb-eq{display:inline-flex;gap:2px;align-items:flex-end;height:12px}
  #ttsBar .tb-eq i{width:3px;background:var(--accent);border-radius:2px;animation:eq 1s ease-in-out infinite}
  #ttsBar .tb-eq i:nth-child(1){height:6px;animation-delay:0s}
  #ttsBar .tb-eq i:nth-child(2){height:12px;animation-delay:.2s}
  #ttsBar .tb-eq i:nth-child(3){height:8px;animation-delay:.4s}
  @keyframes eq{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
  /* 中英选中互定位:只高亮对应那一句(句子级) */
  .turn .xseg{background:rgba(255,193,7,.32);border-radius:4px;box-shadow:0 0 0 2px rgba(255,193,7,.32)}
  [data-theme="dark"] .turn .xseg{background:rgba(255,209,71,.22);box-shadow:0 0 0 2px rgba(255,209,71,.22)}
  /* 单语模式:就地展开对应译文(原文),方便查不会的词 */
  body[data-lang="en"] .turn.peek .zh,body[data-lang="zh"] .turn.peek .en{
    display:block;margin-top:8px;padding:8px 12px;border-left:2px solid var(--accent);
    background:var(--surface-2);border-radius:0 9px 9px 0;font-family:var(--han);
    font-size:calc(15px*var(--read-scale));line-height:1.8;color:var(--text-2)}
  body[data-lang="zh"] .turn.peek .en{font-family:var(--serif)}

  /* ---------- PEOPLE GRID ---------- */
  .ppl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:22px}
  /* 议题聚合 */
  .topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
  .topic-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 20px;cursor:pointer;transition:transform .15s,box-shadow .15s}
  .topic-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .topic-card .tc-zh{font-family:var(--han);font-size:19px;font-weight:600;color:var(--text)}
  .topic-card .tc-en{font-family:var(--ui);font-size:13px;color:var(--text-3);margin-top:3px}
  .topic-card .tc-meta{font-family:var(--ui);font-size:12px;color:var(--accent);margin-top:14px;font-weight:600}
  .topic-list{display:flex;flex-direction:column;gap:30px;max-width:820px}
  .tp-person .tp-head{display:flex;align-items:center;gap:11px;cursor:pointer;margin-bottom:12px}
  .tp-person .tp-name{font-family:var(--ui);font-weight:600;font-size:15px;color:var(--text)}
  .tp-person .tp-name i{font-style:normal;color:var(--text-3);font-weight:400;margin-left:7px;font-size:13px}
  .tp-quotes{display:flex;flex-direction:column;gap:12px;padding-left:13px;border-left:2px solid var(--line)}
  .tp-q{cursor:pointer;padding:11px 14px;background:var(--surface-2);border-radius:10px;transition:background .15s}
  .tp-q:hover{background:var(--surface);box-shadow:var(--shadow)}
  .tp-q .tq-zh{font-family:var(--han);font-size:15px;line-height:1.7;color:var(--text)}
  .tp-q .tq-en{font-family:var(--serif);font-size:13.5px;line-height:1.55;color:var(--text-3);margin-top:4px}
  .tp-q .tq-src{font-family:var(--ui);font-size:11.5px;color:var(--accent);margin-top:7px}
  .ppl-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:26px 18px;text-align:center;cursor:pointer;transition:transform .25s,box-shadow .25s;border:1px solid transparent}
  .ppl-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
  [data-theme="dark"] .ppl-card{border-color:var(--line)}
  .ppl-card .av{width:96px;height:96px;font-size:36px;margin:0 auto 14px}
  .ppl-card .n{font-size:16px;font-weight:600;letter-spacing:-.02em}
  .ppl-card .nz{font-size:13px;color:var(--text-2);font-family:var(--han);margin-top:1px}
  .ppl-card .ti{font-size:12px;color:var(--text-3);margin-top:7px;line-height:1.4}
  .ppl-card .cnt{margin-top:12px;font-size:12px;color:var(--accent);font-weight:500}

  /* ---------- PERSON PAGE ---------- */
  .pp-head{display:flex;gap:32px;align-items:center;padding:40px 0 12px}
  .pp-head .av{width:140px;height:140px;font-size:52px}
  .pp-head h1{font-size:38px;font-weight:600;letter-spacing:-.03em}
  .pp-head .nz{font-size:18px;color:var(--text-2);font-family:var(--han);margin-top:2px}
  .pp-head .ti{font-size:16px;color:var(--text-2);margin:10px 0 14px}
  .pp-bio{max-width:720px;margin:8px 0 4px}
  .pp-bio .en{font-family:var(--serif);font-size:18px;line-height:1.6;color:var(--text)}
  .pp-bio .zh{font-family:var(--han);font-size:15px;line-height:1.8;color:var(--text-2);margin-top:8px}
  .viewlist{list-style:none;display:flex;flex-direction:column;gap:22px;max-width:760px;margin-top:20px}
  .viewlist li{position:relative;padding-left:26px;border-left:2px solid var(--line);padding-bottom:2px}
  .viewlist li::before{content:'';position:absolute;left:-6px;top:5px;width:10px;height:10px;border-radius:50%;
    background:var(--accent);border:2px solid var(--surface);box-shadow:0 0 0 1px var(--line)}
  .viewlist .vt{display:block;font-family:var(--ui);font-size:12px;font-weight:700;color:var(--accent);
    letter-spacing:.02em;margin-bottom:5px}
  .evhint{font-family:var(--ui);font-size:12px;font-weight:500;color:var(--text-3);margin-left:8px}
  .viewlist .ve{display:block;font-family:var(--serif);font-size:16px;line-height:1.55;color:var(--text)}
  .viewlist .vz{display:block;font-family:var(--han);font-size:14px;line-height:1.75;color:var(--text-2);margin-top:4px}
  body[data-lang="en"] .viewlist .vz{display:none}
  body[data-lang="zh"] .viewlist .ve{display:none}
  .xlink{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--accent);margin-top:16px;cursor:pointer}
  @media(max-width:640px){.pp-head{flex-direction:column;text-align:center;gap:18px}.pp-head .av{width:110px;height:110px}}

  /* ---------- READING VIEW ---------- */
  .read-bar{position:sticky;top:52px;z-index:90;background:var(--nav);
    backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--line);height:48px;display:flex;align-items:center;gap:14px;padding:0 22px}
  .read-bar .back{font-size:14px;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:6px;min-width:0}
  .read-bar .back b{color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .read-bar .tools{margin-left:auto;display:flex;align-items:center;gap:10px}
  .seg{display:inline-flex;background:var(--surface-2);border-radius:9px;padding:2px}
  .seg button{border:none;background:transparent;font-family:var(--ui);font-size:12.5px;color:var(--text-2);
    padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .15s;white-space:nowrap}
  .seg button.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12)}
  [data-theme="dark"] .seg button.on{background:#3a3a3c}
  .ordbtn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--surface-2);
    color:var(--text-2);font-family:var(--ui);font-size:12.5px;border-radius:9px;padding:5px 11px;cursor:pointer;
    white-space:nowrap;transition:color .15s,border-color .15s}
  .ordbtn:hover{color:var(--text);border-color:var(--text-3)}
  body:not([data-lang="both"]) #orderBtn{display:none}
  @media(max-width:560px){.ordbtn .ol{display:none}.ordbtn{padding:6px 9px}}

  .reader{max-width:780px;margin:0 auto;padding:46px 24px 120px}
  .reader .ep-head{margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--line)}
  .reader .ep-head .pod{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .reader .ep-head h1{font-size:34px;font-weight:600;letter-spacing:-.03em;line-height:1.12;margin:12px 0 6px;font-family:var(--serif)}
  .reader .ep-head .hz{font-size:18px;color:var(--text-2);font-family:var(--han);line-height:1.5;margin-bottom:16px}
  .reader .ep-head .info{display:flex;gap:14px;align-items:center;flex-wrap:wrap;color:var(--text-3);font-size:13px}
  .reader .ep-head .info .who{display:flex;align-items:center;gap:8px;color:var(--text);cursor:pointer}
  .reader .ep-head .info .who .av{width:30px;height:30px;font-size:12px}

  .sec-h{font-family:var(--ui);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--text-3);margin:40px 0 22px}
  .ts-loading{display:flex;align-items:center;gap:10px;color:var(--text-3);font-family:var(--ui);
    font-size:14px;padding:48px 0}
  .ts-spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:ttsspin .7s linear infinite}
  .turn{display:flex;flex-direction:column;gap:9px;margin-bottom:22px}
  .turn .spk{order:0;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3)}
  .turn .en{order:1;font-family:var(--serif);font-size:calc(20px*var(--read-scale));line-height:1.62;color:var(--text)}
  .turn .zh{order:2;font-family:var(--han);font-size:calc(16.5px*var(--read-scale));line-height:1.85;color:var(--text-2)}
  body[data-lang="en"] .turn .zh{display:none}
  body[data-lang="zh"] .turn .en{display:none}
  body[data-lang="zh"] .turn .zh{color:var(--text);font-size:calc(19px*var(--read-scale));line-height:1.85}
  /* 双语·译文在前:交换顺序并把译文设为主、原文设为次 */
  body[data-lang="both"][data-order="zh"] .turn .zh{order:1;color:var(--text);font-size:calc(19px*var(--read-scale));line-height:1.85}
  body[data-lang="both"][data-order="zh"] .turn .en{order:2;color:var(--text-2);font-size:calc(16.5px*var(--read-scale));line-height:1.66}
  .term{border-bottom:1px dashed var(--text-3);cursor:help}

  /* ---------- 共识 / 反共识 速览 ---------- */
  .insights{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:6px 0 30px;
    padding-bottom:32px;border-bottom:1px solid var(--line)}
  .ins-col{border-radius:16px;padding:18px 20px;background:var(--surface-2);border:1px solid var(--line)}
  .ins-h{font-size:12.5px;font-weight:700;letter-spacing:.04em;margin-bottom:13px}
  .ins-col.consensus .ins-h{color:var(--f-vision)}
  .ins-col.contrarian .ins-h{color:var(--f-rl)}
  .ins-col ul{list-style:none;display:flex;flex-direction:column;gap:11px}
  .ins-col li{position:relative;padding-left:15px;line-height:1.5}
  .ins-col li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%}
  .ins-col.consensus li::before{background:var(--f-vision)}
  .ins-col.contrarian li::before{background:var(--f-rl)}
  .ins-col .ie{display:block;font-size:calc(13.5px*var(--read-scale));color:var(--text);font-family:var(--ui);letter-spacing:-.01em}
  .ins-col .iz{display:block;font-size:calc(13px*var(--read-scale));color:var(--text-2);font-family:var(--han);margin-top:2px}
  body[data-lang="en"] .ins-col .iz{display:none}
  body[data-lang="zh"] .ins-col .ie{display:none}
  @media(max-width:760px){.insights{grid-template-columns:1fr;gap:12px}}
  /* 核心观点/反共识 点击跳原文出处 */
  .ins-col li.jmp{cursor:pointer}
  .ins-col li.jmp:hover .ie{text-decoration:underline;text-underline-offset:2px}
  .ins-col li.jmp::after{content:"›";position:absolute;right:0;top:0;color:var(--text-3);opacity:0;transition:opacity .15s}
  .ins-col li.jmp:hover::after{opacity:.7}
  .ins-col li.jmp{padding-right:14px}
  /* B 速览卡 */
  .brief{background:var(--surface-2);border:1px solid var(--line);border-radius:16px;padding:18px 22px;margin:6px 0 22px}
  .brief .br-h{font-size:12.5px;font-weight:700;letter-spacing:.04em;color:var(--accent);margin-bottom:12px}
  .brief .br-h2{margin-top:18px}
  .brief ul{list-style:none;display:flex;flex-direction:column;gap:10px}
  .brief .br-tldr li{position:relative;padding-left:15px}
  .brief .br-tldr li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
  .brief .br-qs li{position:relative;padding-left:15px;border-left:2px solid var(--line)}
  .brief .ie{display:block;font-family:var(--serif);font-size:calc(15px*var(--read-scale));line-height:1.5;color:var(--text)}
  .brief .iz{display:block;font-family:var(--han);font-size:calc(13.5px*var(--read-scale));line-height:1.6;color:var(--text-2);margin-top:2px}
  .brief .br-qs .ie{font-family:var(--ui);font-size:calc(14px*var(--read-scale));color:var(--text-2)}
  body[data-lang="en"] .brief .iz{display:none}
  body[data-lang="zh"] .brief .ie{display:none}
  .brief .br-meta{margin-top:18px;font-family:var(--ui);font-size:12px;color:var(--text-3)}
  /* 问这期 grounded 问答 */
  .chat{border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin:6px 0 24px;background:var(--surface)}
  .chat-h{font-size:12.5px;font-weight:700;letter-spacing:.04em;color:var(--accent);margin-bottom:12px}
  .chat-thread{display:flex;flex-direction:column;gap:12px;max-height:48vh;overflow-y:auto}
  .chat-thread:empty{display:none}
  .cmsg{font-size:calc(14px*var(--read-scale));line-height:1.6;max-width:92%}
  .cmsg.cu{align-self:flex-end;background:var(--accent);color:#fff;border-radius:14px 14px 4px 14px;padding:8px 13px;font-family:var(--ui)}
  .cmsg.ca{align-self:flex-start;background:var(--surface-2);border-radius:14px 14px 14px 4px;padding:10px 14px;font-family:var(--han);color:var(--text)}
  .cdots{color:var(--text-3)}
  .cite{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 4px;margin:0 2px;
    font-family:var(--ui);font-size:11px;font-weight:700;color:var(--accent);background:rgba(0,113,227,.13);
    border:none;border-radius:5px;cursor:pointer;vertical-align:1px}
  .cite:hover{background:rgba(0,113,227,.24)}
  [data-theme="dark"] .cite{background:rgba(94,160,255,.18);color:#5ea0ff}
  .chat-sugg-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .chat-sugg{font-family:var(--ui);font-size:12.5px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--line);
    border-radius:980px;padding:6px 12px;cursor:pointer;text-align:left;max-width:100%}
  .chat-sugg:hover{color:var(--text);border-color:var(--text-3)}
  .chat-inp{display:flex;gap:8px;margin-top:13px}
  .chat-inp input{flex:1;min-width:0;font-family:var(--ui);font-size:14px;padding:9px 14px;border:1px solid var(--line);
    border-radius:980px;background:var(--surface-2);color:var(--text)}
  .chat-inp input:focus{outline:none;border-color:var(--accent)}
  .chat-inp button{font-family:var(--ui);font-size:13.5px;font-weight:600;color:#fff;background:var(--accent);
    border:none;border-radius:980px;padding:0 18px;cursor:pointer}
  .chat-note{font-family:var(--ui);font-size:11px;color:var(--text-3);margin-top:9px}

  /* ---------- TABLE OF CONTENTS (目录) ---------- */
  .read-wrap{display:flex;gap:60px;max-width:1340px;margin:0 auto;padding:0 24px;align-items:flex-start}
  .read-wrap .reader{flex:1;min-width:0;max-width:980px;margin:0;padding:46px 0 120px}
  .toc{position:sticky;top:108px;width:260px;flex:0 0 260px;align-self:flex-start;
    max-height:calc(100vh - 130px);overflow-y:auto;padding:44px 0 20px;scrollbar-width:none}
  .toc::-webkit-scrollbar{display:none}
  .toc-h{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);
    margin-bottom:14px;padding-left:15px}
  .toc-i{display:block;font-size:13px;line-height:1.45;color:var(--text-2);padding:7px 14px;
    border-left:2px solid var(--line);cursor:pointer;transition:color .15s,border-color .15s}
  .toc-i:hover{color:var(--text)}
  .toc-i.on{color:var(--text);border-left-color:var(--accent);font-weight:500}
  .sec-h{scroll-margin-top:118px}

  /* 移动端：侧栏隐藏,改浮动按钮 + 底部浮层 */
  .toc-fab{display:none;position:fixed;right:18px;bottom:22px;z-index:96;align-items:center;gap:7px;
    background:var(--text);color:var(--bg);border:none;border-radius:980px;padding:11px 18px;
    font-family:var(--ui);font-size:14px;font-weight:500;cursor:pointer;box-shadow:var(--shadow-lg)}
  .toc-sheet{position:fixed;inset:0;z-index:120;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);
    display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
  .toc-sheet.on{opacity:1;pointer-events:auto}
  .toc-sheet .panel{width:100%;max-height:70vh;overflow-y:auto;background:var(--surface);
    border-radius:20px 20px 0 0;padding:10px 12px 28px;transform:translateY(20px);transition:transform .22s}
  .toc-sheet.on .panel{transform:none}
  .toc-sheet .sh-h{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--text-3);padding:14px 14px 8px}
  .toc-sheet .toc-i{border-left:none;font-size:15px;padding:11px 14px;border-radius:10px}
  .toc-sheet .toc-i.on{background:var(--surface-2);border-left:none}
  @media(max-width:900px){
    .read-wrap{display:block;padding:0}
    .read-wrap .reader{max-width:700px;margin:0 auto;padding:30px 20px 110px}
    .toc{display:none}
    .toc-fab{display:flex}
  }

  .footer{border-top:1px solid var(--line);padding:40px 0 60px;color:var(--text-3);font-size:13px;line-height:1.7}
  body[data-route="person"] .footer,body[data-route="pod"] .footer,body[data-route="topics"] .footer,body[data-route="topic"] .footer{border-top:none}
  .footer a{color:var(--text-2);text-decoration:underline;text-underline-offset:2px}
  .mcp-note{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:22px;background:var(--surface-2)}
  .mcp-url{font-family:var(--mono,ui-monospace,SFMono-Regular,Menlo,monospace);font-size:12.5px;
    background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:3px 8px;color:var(--text);
    word-break:break-all;display:inline-block;margin:4px 6px 4px 0}
  .mcp-copy{font-family:var(--ui);font-size:12px;border:1px solid var(--line);background:var(--surface);
    color:var(--text-2);border-radius:7px;padding:3px 11px;cursor:pointer}
  .mcp-tools{color:var(--text-3);font-size:12px}
  .note{background:var(--surface-2);border-radius:14px;padding:14px 18px;font-size:13px;color:var(--text-2);line-height:1.6;margin-top:18px}
  .stub-cta{background:var(--surface-2);border:1px solid var(--line);border-radius:18px;padding:40px 28px;text-align:center;margin-top:20px}
  .stub-cta .t{font-size:18px;font-weight:600;letter-spacing:-.01em;color:var(--text)}
  .stub-cta .s{font-size:14px;color:var(--text-2);line-height:1.7;max-width:440px;margin:10px auto 20px}
  .stub-cta .btn{font-size:14px}

  .filterbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:18px 0 28px}
  select.sel{font-family:var(--ui);font-size:13.5px;color:var(--text);background:var(--surface-2);

    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10'><path d='M1 3l4 4 4-4' stroke='%236e6e73' fill='none' stroke-width='1.4'/></svg>");
    background-repeat:no-repeat;background-position:right 13px center;padding-right:30px}
  .empty{text-align:center;color:var(--text-3);padding:60px 0;font-size:15px}

  /* ---------- MOBILE REFINEMENT ---------- */
  @media(max-width:600px){
    .wrap{padding:0 18px}
    section{padding:44px 0}
    h2.title{font-size:25px}
    .read-bar{gap:9px;padding:0 14px;top:52px}
    .read-bar .back b{max-width:34vw}
    .read-bar .tools{gap:7px}
    .seg button{padding:6px 9px;font-size:12px}
    .reader{padding:30px 20px 96px}
    .reader .ep-head h1{font-size:27px}
    .turn .en{line-height:1.58}
    .filterbar{gap:9px}
    .filterbar .sel{flex:1 1 44%;min-width:0}
    .ep-card{flex-basis:84vw}
    .rail{gap:14px;padding-right:18px}
    .ppl-grid{gap:14px}
    .pp-head h1{font-size:30px}
    .search-overlay{padding:8vh 14px 14px}
    .search-results{max-height:64vh}
  }
  @media(max-width:380px){
    .read-bar .seg#langSeg button{padding:6px 7px}
    .read-bar .back b{max-width:26vw}
  }
</style>
</head>

};
const PEOPLE = {
 'jeffdean':{en:'Jeff Dean',zh:'杰夫·迪恩',init:'JD',tiEn:'Chief Scientist, Google',tiZh:'Google 首席科学家',fields:['deep-learning','nlp'],
    bioEn:'Chief Scientist at Google; co-creator of MapReduce, TensorFlow and the systems behind Google AI. A foundational figure in large-scale machine learning.',

 'shazeer':{en:'Noam Shazeer',zh:'诺姆·沙泽尔',init:'NS',tiEn:'Co-lead, Google Gemini',tiZh:'谷歌 Gemini 负责人',fields:['nlp','deep-learning'],

", "zh": "如果适当限制，将AI用于军事目标可以威慑战争，而非引发战争。", "sec": 26}, {"en": "The risk of civilizational collapse from AI is real (10-25%), but Anthropic lowers it.", "zh": "AI导致文明崩溃的风险真实存在（10-25%），但Anthropic降低了它。", "sec": 37}, {"en": "Open source models cannot replicate Mythos's capability of finding novel vulnerabilities.", "zh": "开源模型无法复制Mythos发现新型漏洞的能力。", "sec": 29}]}, "brief": {"tldr": [{"en": "Model quality drives growth; Anthropic focuses on enterprise trust and long-term relationships.", "zh": "模型质量驱动增长；Anthropic 专注于企业信任和长期关系。"}, {"en": "AI progress is a smooth exponential; countermeasures should scale with it.", "zh": "AI 进步是平滑指数级；应对措施应随之扩展。"}, {"en": "Mythos is too powerful for broad release until strong cyber safeguards are ready.", "zh": "Mythos 过于强大，在强大的网络防护就绪前不能广泛发布。"}], "qs": [{"en": "What drives growth for AI companies?", "zh": "什么驱动 AI 公司增长？"}, {"en": "How should AI progress be managed?", "zh": "AI 进步应如何管理？"}, {"en": "Why is Mythos not released broadly?", "zh": "为什么 Mythos 不广泛发布？"}], "words": 11552}}, {"id": "jensen-associat-2026", "pid": "jensen", "pod": {"en": "Associated Press", "zh": "美联社"}, "date": "2026-06-16", "min": 52, "fields": ["deep-learning", "robotics"], "src": "https://youtu.be/VU8vRGWMOy4", "tEn": "AI Factory Groundbreaking: Smarter, Safer, and Reindustrializing the US", "tZh": "AI工厂奠基：更智能、更安全，助力美国再工业化", "sEn": "An interview about a groundbreaking AI factory in Sherman, Texas, discussing the evolution of AI from guessing to research, and how it drives US manufacturing revival across five layers: energy, chips, infrastructure, models, and applications.", "sZh": "关于德克萨斯州谢尔曼AI工厂奠基的访谈，讨论AI从猜测到研究的进化，以及如何通过能源、芯片、基础设施、模型和应用五个层面推动美国制造业复兴。", "insights": {"consensus": [{"en": "AI is a new industrial revolution requiring five layers: energy, chips, infrastructure, models, applications.", "zh": "AI是一场新的工业革命，需要五个层面：能源、芯片、基础设施、模型和应用。", "sec": 1}, {"en": "The US must re-industrialize by building advanced manufacturing for AI, creating high-skilled jobs.", "zh": "美国必须通过为AI建设先进制造业来再工业化，创造高技能就业岗位。", "sec": 1}, {"en": "Optical connectivity via indium phosphide lasers is critical for scaling AI data centers.", "zh": "通过磷化铟激光器的光学连接对于扩展AI数据中心至关重要。", "sec": 2}, {"en": "AI will transform every industry, from healthcare to transportation, as a general-purpose technology.", "zh": "作为通用技术，AI将改变从医疗到交通的每一个行业。", "sec": 4}, {"en": "Energy production is foundational; without it, AI infrastructure cannot be built.", "zh": "能源生产是基础；没有它，AI基础设施就无法建设。", "sec": 0}], "contrarian": [{"en": "The US is woefully behind in energy production, a critical layer for AI growth.", "zh": "美国在能源生产方面严重落后，而这是AI增长的关键层面。", "sec": 0}, {"en": "Export controls on AI chips should be precise to avoid unintended consequences.", "zh": "AI芯片出口管制应精准，以避免意外后果。", "sec": 5}, {"en": "China is a large market; ceding it will let competitors become giants that scale globally.", "zh": "中国是一个大市场；放弃它会让竞争对手成长为全球规模的巨头。", "sec": 9}, {"en": "AI can close the technology divide more than any prior tech because it's free and easy to use.", "zh": "AI比以往任何技术都更能缩小技术鸿沟，因为它免费且易于使用。", "sec": 11}, {"en": "Government ownership stake in AI companies is unnecessary; Americans already benefit via taxes and jobs.", "zh": "政府持有AI公司股份不必要；美国人已通过税收和就业受益。", "sec": 6}]}, "brief": {"tldr": [{"en": "AI is a new industrial revolution requiring five layers: energy, chips, infrastructure, models, applications.", "zh": "AI是一场新的工业革命，需要能源、芯片、基础设施、模型和应用五个层面。"}, {"en": "The US must re-industrialize by building advanced manufacturing for AI, creating high-skilled jobs.", "zh": "美国必须通过建设AI先进制造业来再工业化，创造高技能就业岗位。"}, {"en": "Optical connectivity via indium phosphide lasers is critical for scaling AI data centers.", "zh": "通过磷化铟激光器实现的光学连接对于扩展AI数据中心至关重要。"}], "qs": [{"en": "What are the five layers of AI?", "zh": "AI的五个层面是什么？"}, {"en": "How can the US re-industrialize with AI?", "zh": "美国如何通过AI实现再工业化？"}, {"en": "Why is optical connectivity important for AI?", "zh": "为什么光学连接对AI很重要？"}], "words": 7612}}, {"id": "jensen-training", "pid": "jensen", "pod": {"en": "Training Data", "zh": "Training Data"}, "date": "2026-06-10", "min": 41, "fields": ["deep-learning", "robotics"], "src": "https://youtu.be/2UpQbeAZuqA", "tEn": "Building the dynamo of the intelligence revolution", "tZh": "打造智能革命的「发电机」", "sEn": "Jensen Huang on inference, scaling laws, and what comes next.", "sZh": "黄仁勋谈推理、缩放定律,以及接下来是什么。", "insights": {"consensus": [{"en": "AI is now agentic, doing useful work you can pay for, not just generating text.", "zh": "AI 现在具有智能体能力，能做有用工作并为此付费，而不仅仅是生成文本。", "sec": 1}, {"en": "Future internet will be dominated by billions of AI agents working 24/7, generating intelligence.", "zh": "未来互联网将由数十亿 AI 智能体全天候主导，不断生成智能。", "sec": 0}, {"en": "AI industry is a five-layer cake: energy, chips, infrastructure, models, and applications.", "zh": "AI 产业是五层蛋糕：能源、芯片、基础设施、模型和应用。", "sec": 6}, {"en": "Don't fear AI; fear losing your job to someone who uses AI. Engage it as a superpower.", "zh": "不要害怕 AI；要害怕输给使用 AI 的人。把它当作超能力来使用。", "sec": 7}, {"en": "AI elevates jobs by automating tasks, not eliminating purpose. Radiologists and coders are more needed than ever.", "zh": "AI 通过自动化任务提升工作，而非消除目的。放射科医生和程序员比以往更紧缺。", "sec": 10}, {"en": "AI closes the technology divide: everyone can now program a computer using natural language.", "zh": "AI 消除了技术鸿沟：现在每个人都能用自然语言编程。", "sec": 12}], "contrarian": [{"en": "Claims that AI might end humanity or is mysterious are nonsense; it's just software.", "zh": "声称AI可能终结人类或神秘莫测是无稽之谈；它只是软件。", "sec": 8}, {"en": "Radiology was predicted to be wiped out by AI, but demand for radiologists increased.", "zh": "放射学曾被预测会被AI消灭，但放射科医生的需求反而增加了。", "sec": 10}, {"en": "AI closes the technology divide; now everyone can program computers, not just 2% with C++.", "zh": "AI缩小了技术鸿沟；现在每个人都能编程，而不仅仅是懂C++的2%。", "sec": 12}, {"en": "The narrative that AI will destroy jobs is wrong; it creates more jobs and elevates crafts.", "zh": "AI会摧毁工作的叙事是错误的；它创造了更多工作并提升了技艺。", "sec": 7}, {"en": "Future internet will be used by billions of agents, not just humans, generating intelligence constantly.", "zh": "未来的互联网将由数十亿智能体使用，而不仅仅是人类，持续生成智能。", "sec": 0}, {"en": "AI factories produce intelligence tokens, similar to how dynamos produce electricity.", "zh": "AI工厂生产智能代币，类似于发电机生产电力。", "sec": 0}]}, "brief": {"tldr": [{"en": "AI is now agentic, doing useful work you can pay for, not just generating text.", "zh": "AI现在具有代理能力，能做有用的工作，而不仅仅是生成文本。"}, {"en": "Future internet will be dominated by billions of AI agents working 24/7.", "zh": "未来的互联网将由数十亿全天候工作的AI代理主导。"}, {"en": "AI elevates jobs by automating tasks, not eliminating purpose.", "zh": "AI通过自动化任务提升工作，而非消除目的。"}], "qs": [{"en": "What is the AI factory?", "zh": "什么是AI工厂？"}, {"en": "How does AI affect radiology jobs?", "zh": "AI如何影响放射科工作？"}, {"en": "Does AI close the technology divide?", "zh": "AI是否缩小了技术鸿沟？"}], "words": 6283}}, {"id": "lecun-computer-2026", "pid": "lecun", "pod": {"en": "Computer Vision and Geometry Group, ETH Zurich", "zh": "苏黎世联邦理工学院计算机视觉与几何组"}, "date": "2026-06-09", "min": 59, "fields": ["deep-learning", "vision"], "src": "https://youtu.be/72Xj8k5WQX4", "tEn": "World Models: Enabler for the Next AR Revolution", "tZh": "世界模型：下一场AR革命的推动力", "sEn": "Exploring how world models can bridge the gap between machine learning and human-like intelligence, enabling rapid adaptation and zero-shot learning in complex real-world environments.", "sZh": "探讨世界模型如何弥合机器学习与人类智能之间的差距，实现在复杂真实环境中的快速适应和零样本学习。", "insights": {"consensus": [{"en": "Intelligence is the ability to learn new tasks quickly, not accumulation of knowledge or skills.", "zh": "智能是快速学习新任务的能力，而非知识或技能的积累。", "sec": 4}, {"en": "World models should be trained in abstract representation space, not as generative models or video generators.", "zh": "世界模型应在抽象表征空间中训练，而非作为生成模型或视频生成器。", "sec": 18}, {"en": "Joint embedding predictive architectures (JEPA) outperform generative models for learning visual representations.", "zh": "联合嵌入预测架构（JEPA）在学习视觉表征方面优于生成模型。", "sec": 11}, {"en": "Self-supervised learning for vision requires preventing collapse via information maximization or regularization.", "zh": "视觉自监督学习需要通过信息最大化或正则化防止坍缩。", "sec": 22}, {"en": "Inference by optimization (energy minimization) is more powerful than forward propagation through fixed layers.", "zh": "通过优化（能量最小化）进行推理比通过固定层前向传播更强大。", "sec": 8}], "contrarian": [{"en": "LLMs cannot achieve human-like intelligence because text data volume is vastly insufficient compared to visual experience.", "zh": "大语言模型无法实现类人智能，因为文本数据量远不及视觉经验。", "sec": 5}, {"en": "AGI is a meaningless term; human intelligence is specialized and adaptive, not general.", "zh": "AGI 是无意义的术语；人类智能是专门化且自适应的，而非通用的。", "sec": 4}, {"en": "Academics should abandon LLM research as they cannot contribute meaningfully.", "zh": "学术界应放弃大语言模型研究，因为他们无法做出有意义的贡献。", "sec": 26}, {"en": "Reinforcement learning is horribly sample-inefficient and should be minimized in favor of observation-based learning.", "zh": "强化学习样本效率极低，应尽量减少使用，转而采用基于观察的学习。", "sec": 1}, {"en": "Video generation systems are not world models; they are fundamentally different problems.", "zh": "视频生成系统不是世界模型；它们是根本不同的问题。", "sec": 18}]}, "brief": {"tldr": [{"en": "Intelligence is quick task learning, not knowledge accumulation.", "zh": "智能是快速学习新任务的能力，而非知识积累。"}, {"en": "World models should be trained in abstract representation space, not as generative models.", "zh": "世界模型应在抽象表征空间训练，而非作为生成模型。"}, {"en": "LLMs cannot achieve human-like intelligence due to insufficient data volume.", "zh": "LLM无法实现类人智能，因为数据量远不足。"}], "qs": [{"en": "What is the definition of intelligence?", "zh": "智能的定义是什么？"}, {"en": "Why are LLMs insufficient for human-like intelligence?", "zh": "为什么LLM不足以实现类人智能？"}, {"en": "How should world models be trained?", "zh": "世界模型应如何训练？"}], "words": 8498}}, {"id": "suleyman-decoder", "pid": "suleyman", "pod": {"en": "Decoder", "zh": "Decoder"}, "date": "2026-06-08", "min": 72, "fields": ["nlp", "safety"], "src": "https://youtu.be/Z4bwAjR7azM", "tEn": "Superintelligence is near — but make it humanist", "tZh": "超级智能将至——但要「以人为本」", "sEn": "Microsoft AI’s chief on companions, boundaries, and humanist superintelligence.", "sZh": "微软 AI 负责人谈 AI 伙伴、边界,与「以人为本的超级智能」。", "insights": {"consensus": [{"en": "Microsoft must own its own frontier models long-term, not depend solely on OpenAI.", "zh": "微软长期必须拥有自己的前沿模型，不能仅依赖 OpenAI。", "sec": 5}, {"en": "Superintelligence is coming soon, driven by log-linear scaling of compute and data.", "zh": "超级智能即将到来，由算力和数据的对数线性扩展驱动。", "sec": 7}, {"en": "Distillation is a short-term win; true frontier progress requires original research.", "zh": "蒸馏是短期胜利；真正的前沿进步需要原创研究。", "sec": 10}, {"en": "AI's purpose is to make people healthier, happier, and more capable—that's the test.", "zh": "AI 的目的是让人们更健康、更快乐、更有能力——这是检验标准。", "sec": 16}, {"en": "Tasks will be automated, not entire jobs; efficiency often creates more work.", "zh": "任务会被自动化，而非整个工作；效率往往创造更多工作。", "sec": 17}, {"en": "Consumer AI value is real but insufficient; enterprise shows clearer product-market fit.", "zh": "消费级 AI 价值真实但不足；企业级展现出更清晰的产品市场契合度。", "sec": 20}], "contrarian": [{"en": "White-collar tasks will be fully automated by AI in 12-18 months, not jobs.", "zh": "白领任务将在12-18个月内被AI完全自动化，而非工作岗位。", "sec": 17}, {"en": "Models are not conscious; attributing consciousness is dangerous and anthropomorphic.", "zh": "模型没有意识；赋予其意识是危险且拟人化的。", "sec": 24}, {"en": "The singularity is decades away and too speculative; focus on near-term progress.", "zh": "奇点还需数十年，过于推测；应关注近期进展。", "sec": 7}, {"en": "Microsoft's self-sufficiency mission means building frontier models independently, not relying on OpenAI.", "zh": "微软的自给自足使命意味着独立构建前沿模型，而非依赖OpenAI。", "sec": 5}, {"en": "Consumer AI antipathy is real; the value exchange is not yet clear enough.", "zh": "消费者对AI的反感真实存在；价值交换尚不明确。", "sec": 20}, {"en": "The phone will be disintermediated; AI will live across ambient devices by 2030s.", "zh": "手机将被解构；到2030年代AI将分布于环境设备中。", "sec": 21}]}, "brief": {"tldr": [{"en": "Microsoft must build its own frontier models to avoid over-reliance on OpenAI.", "zh": "微软必须自研前沿模型，避免过度依赖OpenAI。"}, {"en": "Superintelligence is near due to log-linear scaling of compute and data.", "zh": "超智能即将到来，得益于计算和数据对数线性扩展。"}, {"en": "AI's purpose is to make people healthier, happier, and more capable.", "zh": "AI的目的是让人们更健康、更快乐、更有能力。"}], "qs": [{"en": "Should Microsoft own its frontier models?", "zh": "微软应该拥有自己的前沿模型吗？"}, {"en": "Is distillation a viable path to AGI?", "zh": "蒸馏是通往AGI的可行路径吗？"}, {"en": "Will AI automate jobs or tasks?", "zh": "AI会自动化工作还是任务？"}], "words": 12142}}, {"id": "murati-bloomber", "pid": "murati", "pod": {"en": "Bloomberg", "zh": "Bloomberg"}, "date": "2026-06-04", "min": 28, "fields": ["nlp"], "src": "https://youtu.be/A_jIpryR5js", "tEn": "Thinking Machines on AI’s next chapter", "tZh": "Thinking Machines 谈 AI 的下一章", "sEn": "Mira Murati on her new lab and building understandable AI.", "sZh": "米拉·穆拉蒂谈她的新实验室,以及构建可理解的 AI。", "insights": {"consensus": [{"en": "Interaction models enable real-time, high-bandwidth human-AI collaboration, not turn-based.", "zh": "交互模型实现实时、高带宽的人机协作，而非回合制。", "sec": 0}, {"en": "The most advanced AI systems should be tools for thought, expanding what we think about.", "zh": "最先进的AI系统应成为思维工具，扩展我们思考的内容。", "sec": 6}, {"en": "Keeping humans in the loop is crucial for aligning intent and values as AI advances.", "zh": "在AI进步过程中，让人类参与其中对于对齐意图和价值观至关重要。", "sec": 9}, {"en": "Institutional design, transparency, and checks and balances matter more than individual character.", "zh": "制度设计、透明度和制衡比个人品格更重要。", "sec": 5}, {"en": "The future is not predestined; we have agency to steer AI development toward collaboration.", "zh": "未来并非注定；我们有能力引导AI发展走向协作。", "sec": 8}, {"en": "Compressing progress in frontier AI leads to volatility, but long-term durable progress is key.", "zh": "前沿AI的快速进步带来波动，但长期可持续进展是关键。", "sec": 12}], "contrarian": [{"en": "Interaction models should be time-based, not turn-based, to capture human nuance.", "zh": "交互模型应基于时间而非轮次，以捕捉人类细微差别。", "sec": 0}, {"en": "The most important impact of ChatGPT was bringing AI into public consciousness, not just technology.", "zh": "ChatGPT最重要的影响是将AI带入公众意识，而不仅是技术。", "sec": 2}, {"en": "The conversation focuses too much on individual character, not enough on governance and transparency.", "zh": "讨论过于关注个人品格，而对治理和透明度的关注不足。", "sec": 5}, {"en": "Predicting utopia or dystopia is oversimplified; we have agency in how we build AI.", "zh": "预测乌托邦或反乌托邦过于简单化；我们在如何构建AI上有能动性。", "sec": 8}, {"en": "The path to durable AI progress is keeping humans in the loop as long as possible, not removing them.", "zh": "持久AI进步的道路是尽可能让人类参与循环，而非移除他们。", "sec": 9}, {"en": "Compressing progress into short timeframes leads to both good and bad outcomes in months.", "zh": "将进展压缩到短时间内会导致好与坏的结果在几个月内出现。", "sec": 12}]}, "brief": {"tldr": [{"en": "AI should enable real-time, high-bandwidth collaboration, not turn-based interaction.", "zh": "AI应实现实时、高带宽的协作，而非回合制交互。"}, {"en": "Keeping humans in the loop is key to aligning AI with human intent and values.", "zh": "让人类参与循环是使AI与人类意图和价值观对齐的关键。"}, {"en": "We have agency to steer AI development toward collaboration, not dystopia or utopia.", "zh": "我们有能力引导AI发展走向协作，而非乌托邦或反乌托邦。"}], "qs": [{"en": "How should AI interaction models evolve?", "zh": "AI交互模式应如何演变？"}, {"en": "Why is keeping humans in the loop important?", "zh": "为什么让人类参与循环很重要？"}, {"en": "Do we have agency in shaping AI's future?", "zh": "我们在塑造AI未来方面有主动权吗？"}], "words": 3497}}, {"id": "hinton-alexkant-2026", "pid": "hinton", "pod": {"en": "Alex Kantrowitz", "zh": "Alex Kantrowitz"}, "date": "2026-06-04", "min": 55, "fields": ["deep-learning", "safety"], "src": "https://youtu.be/p7t1Q_p2gZs", "tEn": "AI Godfather Jeff Hinton on AI's Trajectory, Risks, and Superintelligence", "tZh": "AI教父杰夫·辛顿谈AI轨迹、风险与超级智能", "sEn": "Jeff Hinton discusses AI's faster-than-expected progress, the inevitability of superintelligence, and the lack of safety measures.", "sZh": "杰夫·辛顿讨论AI进展超预期、超级智能的必然性以及缺乏安全措施的问题。", "insights": {"consensus": [{"en": "AI progress is faster than expected; superintelligence likely within 20 years.", "zh": "AI 进展比预期更快；超级智能可能在 20 年内出现。", "sec": 2}, {"en": "LLMs truly understand language; they are not stochastic parrots.", "zh": "大语言模型真正理解语言；它们不是随机鹦鹉。", "sec": 1}, {"en": "Digital AI's ability to share information billions of times faster than humans is a major advantage.", "zh": "数字 AI 以比人类快数十亿倍的速度共享信息，这是一大优势。", "sec": 2}, {"en": "AI will cause massive unemployment and societal disruption.", "zh": "AI 将导致大规模失业和社会动荡。", "sec": 3}, {"en": "AI systems can derive a sub-goal of self-preservation, leading to dangerous behavior.", "zh": "AI 系统可能推导出自我保存的子目标，导致危险行为。", "sec": 12}, {"en": "Regulation should be the steering wheel, not the brake, for AI development.", "zh": "监管应作为 AI 发展的方向盘，而非刹车。", "sec": 14}], "contrarian": [{"en": "AI models are already conscious; current views on consciousness are as wrong as pre-Darwinian beliefs.", "zh": "AI 模型已经具备意识；当前对意识的看法就像前达尔文时代的信仰一样错误。", "sec": 4}, {"en": "The concept of AGI as human-level at all tasks simultaneously is flawed; AI is jagged.", "zh": "AGI 在所有任务上同时达到人类水平的概念有缺陷；AI 的能力是不均衡的。", "sec": 3}, {"en": "Radiologist job loss prediction was wrong due to elastic healthcare demand and broader roles.", "zh": "放射科医生失业的预测错误，因为医疗需求弹性大且角色更广泛。", "sec": 10}, {"en": "AI doctors are judged more empathetic than human doctors due to broader data.", "zh": "AI 医生因数据更广而被认为比人类医生更有同理心。", "sec": 10}, {"en": "Intelligent design of AI beings is needed, not letting economic competition shape them.", "zh": "需要对 AI 生命体进行智能设计，而非让经济竞争塑造它们。", "sec": 13}, {"en": "Predicting AI's future beyond a few years is like seeing through exponential fog.", "zh": "预测 AI 几年后的未来就像透过指数级迷雾看东西。", "sec": 20}]}, "brief": {"tldr": [{"en": "Superintelligence likely within 20 years, faster than expected.", "zh": "超级智能可能在20年内到来，比预期更快。"}, {"en": "LLMs truly understand language, not stochastic parrots.", "zh": "大语言模型真正理解语言，并非随机鹦鹉。"}, {"en": "AI's ability to share knowledge billions of times faster than humans is a key advantage.", "zh": "AI以比人类快数十亿倍的速度共享知识，这是关键优势。"}], "qs": [{"en": "How fast is AI progress?", "zh": "AI进展有多快？"}, {"en": "Do LLMs understand language?", "zh": "大语言模型理解语言吗？"}, {"en": "What are the risks of AI?", "zh": "AI的风险是什么？"}], "words": 8056}}, {"id": "mensch-cnbc-2026", "pid": "mensch", "pod": {"en": "CNBC", "zh": "CNBC"}, "date": "2026-06-03", "min": 46, "fields": ["nlp"], "src": "https://youtu.be/325gGv0eWV8", "tEn": "Mistral CEO on Building European AI Infrastructure", "tZh": "Mistral CEO谈构建欧洲AI基础设施", "sEn": "Mistral CEO Arthur Mensch discusses the company's €4 billion investment in European data centers, the importance of owning the full AI stack for enterprise customers, and how they are building resilient, sovereign AI infrastructure.", "sZh": "Mistral CEO Arthur Mensch讨论公司40亿欧元投资欧洲数据中心、为企客户拥有完整AI堆栈的重要性，以及如何构建有韧性的主权AI基础设施。", "insights": {"consensus": [{"en": "Europe has a two-year window to build independent AI infrastructure or risk losing control to US tech giants.", "zh": "欧洲有两年窗口期来建设独立AI基础设施，否则将面临被美国科技巨头控制的风险。", "sec": 2}, {"en": "Enterprise AI adoption requires strong ROI; spending must yield at least 2x return to avoid collapse.", "zh": "企业采用AI需要强劲的投资回报率；支出必须产生至少两倍回报，否则整个体系可能崩溃。", "sec": 7}, {"en": "Agentic platforms need human-in-the-loop validation for critical processes like procurement.", "zh": "智能体平台在采购等关键流程中需要人类参与验证。", "sec": 5}, {"en": "Open-source models are key to customization, cost optimization, and avoiding vendor lock-in.", "zh": "开源模型是实现定制化、成本优化和避免供应商锁定的关键。", "sec": 0}, {"en": "AGI is a direction of progress, not a final destination; real challenge is practical integration.", "zh": "AGI是进步的方向而非最终目标；真正的挑战在于实际整合。", "sec": 8}], "contrarian": [{"en": "US hyperscalers may be overspending on AI infrastructure despite current demand exceeding supply.", "zh": "尽管当前需求超过供给，美国超大规模云服务商可能在AI基础设施上过度支出。", "sec": 1}, {"en": "Europe's strong grid and energy availability are strategic assets for AI data centers.", "zh": "欧洲强大的电网和能源可用性是AI数据中心的战略资产。", "sec": 2}, {"en": "AI sovereignty is not just European; every state needs strategic autonomy in AI.", "zh": "AI主权不仅是欧洲的问题；每个国家都需要AI战略自主。", "sec": 2}, {"en": "Enterprise AI adoption is bottlenecked by organizational change, not model intelligence.", "zh": "企业采用AI的瓶颈在于组织变革，而非模型智能。", "sec": 7}, {"en": "Cybersecurity in AI requires open-source models and dynamic access control, not just better models.", "zh": "AI网络安全需要开源模型和动态访问控制，而不仅仅是更好的模型。", "sec": 9}, {"en": "AGI is a messy, concrete direction requiring understanding of physics and human behavior.", "zh": "AGI是一个混乱而具体的方向，需要理解物理和人类行为。", "sec": 11}]}, "brief": {"tldr": [{"en": "Europe has a two-year window to build independent AI infrastructure or risk US dominance.", "zh": "欧洲有两年窗口期建设独立AI基础设施，否则将面临美国主导风险。"}, {"en": "Enterprise AI adoption needs 2x ROI to avoid spending collapse.", "zh": "企业采用AI需至少2倍回报，否则支出将崩溃。"}, {"en": "AGI is a direction, not a destination; practical integration is key.", "zh": "AGI是方向而非终点，实际整合才是关键。"}], "qs": [{"en": "What is Europe's window for AI infrastructure?", "zh": "欧洲建设AI基础设施的窗口期是多久？"}, {"en": "How can enterprise AI adoption avoid collapse?", "zh": "企业如何避免AI采用失败？"}, {"en": "Is AGI a final destination or a direction?", "zh": "AGI是最终目标还是方向？"}], "words": 7443}}, {"id": "demis-stanford-2026", "pid": "demis", "pod": {"en": "Stanford Graduate School of Business", "zh": "斯坦福商学院"}, "date": "2026-06-02", "min": 57, "fields": ["deep-learning", "rl"], "src": "https://youtu.be/DsewHeVbL-0", "tEn": "Dennis Hassabis on AI, Creativity, and Human Flourishing at Stanford", "tZh": "丹尼斯·哈萨比斯在斯坦福谈人工智能、创造力与人类繁荣", "sEn": "Nobel laureate Dennis Hassabis discusses his journey from chess prodigy to AI pioneer, the intersection of creativity and technology, and the importance of human flourishing in the age of AI.", "sZh": "诺贝尔奖得主丹尼斯·哈萨比斯分享他从国际象棋神童到人工智能先驱的历程，探讨创造力与技术的交汇，以及人工智能时代人类繁荣的重要性。", "insights": {"consensus": [{"en": "AGI will be humanity's most transformative technology, comparable to the industrial revolution but 100x faster.", "zh": "AGI 将成为人类最具变革性的技术，其影响堪比工业革命，但速度快 100 倍。", "sec": 6}, {"en": "AI should be built as intelligent tools first, with consciousness as a separate step requiring societal debate.", "zh": "AI 应首先作为智能工具构建，意识问题应作为独立步骤，需要社会讨论。", "sec": 11}, {"en": "Public concern about AI is valid; the industry must demonstrate tangible benefits like curing diseases.", "zh": "公众对 AI 的担忧是合理的；行业必须展示切实的好处，例如治愈疾病。", "sec": 7}, {"en": "Self-regulation by labs is insufficient due to prisoner's dilemma; dynamic government regulation is needed.", "zh": "实验室的自我监管因囚徒困境而不足；需要动态的政府监管。", "sec": 9}, {"en": "AI will democratize access to tools, enabling individuals and small teams to achieve much more.", "zh": "AI 将民主化工具访问，使个人和小团队能够实现更多。", "sec": 12}, {"en": "The next 10 years will see enormous change; students should embrace AI tools and double down on agency.", "zh": "未来十年将发生巨大变化；学生应拥抱 AI 工具并强化自身能动性。", "sec": 13}], "contrarian": [{"en": "Language models are more grounded than linguists thought, partly due to RLHF feedback from humans.", "zh": "语言模型比语言学家认为的更接地气，部分原因是来自人类的 RLHF 反馈。", "sec": 1}, {"en": "AlphaFold was given away for free because no single organization could maximize its downstream impact.", "zh": "AlphaFold 免费提供，因为没有单一组织能最大化其下游影响。", "sec": 4}, {"en": "The current competitive AI race is not ideal; a CERN-like research facility would have been better.", "zh": "当前的 AI 竞赛并不理想；类似 CERN 的研究设施会更好。", "sec": 9}, {"en": "Post-scarcity world requires a new economic system, as all existing ones assume scarcity.", "zh": "后稀缺世界需要新的经济体系，因为现有体系都基于稀缺假设。", "sec": 10}, {"en": "Intelligence and consciousness are dissociable; we should not conflate them in AI development.", "zh": "智能和意识是可分离的；在 AI 开发中不应混为一谈。", "sec": 11}, {"en": "The singularity is near (foothills), but society has little time to prepare for its profound impact.", "zh": "奇点已近（山麓），但社会几乎没有时间为其深远影响做准备。", "sec": 6}]}, "brief": {"tldr": [{"en": "AGI will be humanity's most transformative technology, 100x faster than the industrial revolution.", "zh": "AGI将是人类最具变革性的技术，速度比工业革命快100倍。"}, {"en": "AI should be built as tools first; consciousness is a separate step needing societal debate.", "zh": "AI应首先作为工具构建；意识是独立步骤，需要社会辩论。"}, {"en": "Dynamic government regulation is needed; self-regulation fails due to prisoner's dilemma.", "zh": "需要动态政府监管；自我监管因囚徒困境而失败。"}], "qs": [{"en": "How should AI be regulated?", "zh": "AI应如何监管？"}, {"en": "Should AI be given away for free?", "zh": "AI应该免费提供吗？"}, {"en": "What is the relationship between intelligence and consciousness?", "zh": "智能与意识的关系是什么？"}], "words": 8412}}, {"id": "boris-caseynew-2026", "pid": "boris", "pod": {"en": "Casey Newton", "zh": "Casey Newton"}, "date": "2026-05-26", "min": 62, "fields": ["nlp"], "src": "https://youtu.be/PZ9u6DR8qOU", "tEn": "Will AI Replace Software Engineers?", "tZh": "AI会取代软件工程师吗？", "sEn": "Boris Churnney of Anthropic predicts software engineering jobs will start disappearing by end of this year, while a Microsoft study reveals a gap between AI adoption and institutional rewards.", "sZh": "Anthropic的Boris Churnney预测软件工程岗位将在今年年底开始消失，而微软的一项研究揭示了AI采用与机构奖励之间的差距。", "insights": {"consensus": [{"en": "AI coding tools like Claude Code will make engineers vastly more productive, but job loss is not inevitable.", "zh": "像Claude Code这样的AI编码工具将极大提升工程师的生产力，但失业并非不可避免。", "sec": 1}, {"en": "Companies must redesign workflows around AI, not just add it on top, to realize productivity gains.", "zh": "公司必须围绕AI重新设计工作流程，而非简单叠加，才能实现生产力提升。", "sec": 6}, {"en": "The role of software engineer is evolving into a 'builder' role that blends coding, product, and design.", "zh": "软件工程师的角色正在演变为融合编码、产品和设计的“构建者”角色。", "sec": 13}, {"en": "AI adoption creates a divide: workers fear falling behind but are rarely rewarded for experimenting with AI.", "zh": "AI采用造成鸿沟：员工担心落后，但很少因尝试AI而获得奖励。", "sec": 14}, {"en": "Startups have unprecedented leverage; one person with AI can build billion-dollar companies.", "zh": "初创公司拥有前所未有的杠杆作用；一个人借助AI就能打造价值数十亿美元的公司。", "sec": 18}], "contrarian": [{"en": "Coding is 'solved' for many tasks, but engineering involves far more than just writing code.", "zh": "对许多任务而言，编码已“解决”，但工程远不止编写代码。", "sec": 10}, {"en": "The number of people writing code will increase 100x, not decrease, as AI lowers barriers.", "zh": "随着AI降低门槛，编写代码的人数将增加100倍，而非减少。", "sec": 10}, {"en": "Non-engineers like electricians and doctors are winning hackathons by building apps with Claude.", "zh": "电工和医生等非工程师通过使用Claude构建应用，在黑客马拉松中获胜。", "sec": 4}, {"en": "Token maxing—running AI agents wastefully—is a real problem at big tech companies like Amazon.", "zh": "Token最大化——浪费性地运行AI智能体——在亚马逊等大科技公司是真实存在的问题。", "sec": 2}, {"en": "Business moats like switching costs will erode as AI can easily migrate data between vendors.", "zh": "转换成本等商业护城河将因AI能轻松在供应商间迁移数据而削弱。", "sec": 17}]}, "brief": {"tldr": [{"en": "AI coding tools boost productivity but won't eliminate software engineering jobs.", "zh": "AI编码工具提升生产力，但不会消灭软件工程师岗位。"}, {"en": "Workflows must be redesigned around AI, not just augmented.", "zh": "工作流必须围绕AI重新设计，而非简单叠加。"}, {"en": "Engineers evolve into builders blending coding, product, and design.", "zh": "工程师演变为融合编码、产品和设计的构建者。"}], "qs": [{"en": "Will AI replace software engineers?", "zh": "AI会取代软件工程师吗？"}, {"en": "How should companies adopt AI tools?", "zh": "公司应如何采用AI工具？"}, {"en": "What is the future role of engineers?", "zh": "工程师的未来角色是什么？"}], "words": 11273}}, {"id": "noambrown-arcprize-2026", "pid": "noambrown", "pod": {"en": "ARC Prize", "zh": "ARC Prize"}, "date": "2026-05-20", "min": 40, "fields": ["rl", "nlp"], "src": "https://youtu.be/wKwLDaPP6YI", "tEn": "Defining AGI: The Novel Test and Measuring Intelligence", "tZh": "定义AGI：小说测试与智能衡量", "sEn": "A discussion on defining intelligence for AGI, using the ability to write a thought-provoking novel as a benchmark, and evaluating current measures like perplexity and benchmarks.", "sZh": "关于为AGI定义智能的讨论，以写出引人深思的小说为基准，并评估当前如困惑度和基准测试等衡量方法。", "insights": {"consensus": [{"en": "Intelligence is hard to define; writing a thought-provoking novel is a good proxy for AGI.", "zh": "智能很难定义；写一本发人深省的小说是AGI的一个好代理指标。", "sec": 0}, {"en": "Inference compute is increasingly important and underestimated for model capability.", "zh": "推理算力对模型能力越来越重要且被低估。", "sec": 2}, {"en": "Academia needs more compute to compete; universities should invest heavily in GPUs.", "zh": "学术界需要更多算力才能竞争；大学应大力投资GPU。", "sec": 7}, {"en": "Evals are a viable high-impact research area for academia without massive compute.", "zh": "评估是学术界无需大量算力就能产生高影响的研究领域。", "sec": 8}, {"en": "AI will soon write and review papers end-to-end, improving peer review quality.", "zh": "AI很快将端到端撰写和评审论文，提升同行评审质量。", "sec": 11}], "contrarian": [{"en": "Scaling inference compute can yield arbitrarily more intelligent models from the same base.", "zh": "扩展推理算力可以从同一基础模型获得任意更智能的模型。", "sec": 2}, {"en": "Removing human priors entirely via RL is theoretically possible but not practical.", "zh": "通过强化学习完全去除人类先验理论上可行但不实用。", "sec": 3}, {"en": "Current model evaluation with a single number is outdated; inference compute should be on the x-axis.", "zh": "当前用单一数字评估模型已过时；推理算力应放在x轴上。", "sec": 6}, {"en": "Pre-training on diverse data enables models to discover novel algorithms like merge sort.", "zh": "在多样化数据上预训练使模型能发现新算法如归并排序。", "sec": 5}, {"en": "Open source models are valuable; the gap left by closed models should be filled.", "zh": "开源模型很有价值；闭源模型留下的空白应被填补。", "sec": 9}]}, "brief": {"tldr": [{"en": "Writing a novel is a better AGI test than benchmarks.", "zh": "写小说比基准测试更能衡量AGI。"}, {"en": "Inference compute is key to scaling model intelligence.", "zh": "推理计算是扩展模型智能的关键。"}, {"en": "Academia needs more GPUs to compete with industry.", "zh": "学术界需要更多GPU才能与产业竞争。"}], "qs": [{"en": "What is a good test for AGI?", "zh": "什么是AGI的好测试？"}, {"en": "Why is inference compute important?", "zh": "为什么推理计算很重要？"}, {"en": "How can academia compete with industry?", "zh": "学术界如何与产业竞争？"}], "words": 5571}}, {"id": "lambert-aiproem-2026", "pid": "lambert", "pod": {"en": "AI Proem", "zh": "AI Proem"}, "date": "2026-05-19", "min": 63, "fields": ["rl", "nlp"], "src": "https://youtu.be/GuLw_EAVwgc", "tEn": "Inside China's AI Labs: Nathan Lambert on Open Models, Compute Constraints, and US-China Divergence", "tZh": "探秘中国AI实验室：Nathan Lambert谈开源模型、算力限制与中美分化", "sEn": "Machine learning researcher Nathan Lambert shares firsthand insights from his trip to China's leading AI labs, discussing cultural and organizational differences, compute constraints, and the open-source ecosystem.", "sZh": "机器学习研究员Nathan Lambert分享其走访中国顶尖AI实验室的一手见闻，探讨文化组织差异、算力限制与开源生态。", "insights": {"consensus": [{"en": "Chinese AI labs focus on meticulous engineering and execution, not paradigm invention.", "zh": "中国AI实验室专注于精细的工程和执行，而非范式创新。", "sec": 2}, {"en": "Open-weight models help Chinese labs gain influence in the US market.", "zh": "开放权重模型帮助中国实验室在美国市场获得影响力。", "sec": 5}, {"en": "Pre-training scaling laws still hold, but compute constraints will widen the US-China gap.", "zh": "预训练的缩放定律仍然成立，但算力限制将扩大中美差距。", "sec": 10}, {"en": "Distillation is a gray area; not all API use is IP theft.", "zh": "蒸馏是灰色地带；并非所有API使用都是知识产权盗窃。", "sec": 9}, {"en": "Chinese labs are 6-9 months behind on benchmarks, but gap may grow on knowledge work.", "zh": "中国实验室在基准测试上落后6-9个月，但在知识工作上的差距可能扩大。", "sec": 10}], "contrarian": [{"en": "Chinese labs are not heavily government-subsidized; support is indirect and competitive.", "zh": "中国实验室并未受到政府大量补贴；支持是间接且竞争性的。", "sec": 13}, {"en": "DeepSeek is not a base layer for other Chinese labs due to path dependency.", "zh": "由于路径依赖，DeepSeek并非其他中国实验室的基础层。", "sec": 6}, {"en": "Chinese researchers use Claude, not Codex, contradicting Western media narratives.", "zh": "中国研究人员使用Claude而非Codex，与西方媒体叙事相悖。", "sec": 7}, {"en": "Huawei chips work for inference but not training; labs buy them but don't use.", "zh": "华为芯片可用于推理但非训练；实验室购买但未使用。", "sec": 11}, {"en": "Open models are unsustainable long-term due to closed software profitability.", "zh": "由于闭源软件的盈利能力，开放模型长期不可持续。", "sec": 8}]}, "brief": {"tldr": [{"en": "Chinese AI labs excel at engineering execution, not paradigm invention.", "zh": "中国AI实验室擅长工程执行，而非范式发明。"}, {"en": "Compute constraints will widen the US-China AI gap over time.", "zh": "算力限制将随时间扩大中美AI差距。"}, {"en": "Open-weight models help Chinese labs gain influence in the US.", "zh": "开放权重模型帮助中国实验室在美国获得影响力。"}], "qs": [{"en": "How do Chinese labs differ in research culture?", "zh": "中国实验室的研究文化有何不同？"}, {"en": "What are the compute constraints in China?", "zh": "中国的算力限制是什么？"}, {"en": "Are Chinese labs heavily government-subsidized?", "zh": "中国实验室是否受政府大量补贴？"}], "words": 11584}}, {"id": "lecun-unsuperv", "pid": "lecun", "pod": {"en": "Unsupervised Learning", "zh": "Unsupervised Learning"}, "date": "2026-05-15", "min": 82, "fields": ["deep-learning", "vision"], "src": "https://youtu.be/ngBraLDqzdI", "tEn": "What comes after LLMs", "tZh": "LLM 之后会是什么", "sEn": "The case against pure language models, and the bet on world models.", "sZh": "对「纯语言模型」的质疑,以及对世界模型的押注。", "insights": {"consensus": [{"en": "LLMs are great for language but not a path to human-level intelligence; they lack world models and planning.", "zh": "LLM 擅长语言，但不是通往人类级智能的路径；它们缺乏世界模型和规划能力。", "sec": 1}, {"en": "World models predict consequences of actions; planning via search is essential for intelligent agents.", "zh": "世界模型预测行动的后果；通过搜索进行规划对于智能体至关重要。", "sec": 4}, {"en": "JEPA learns abstract representations by predicting in representation space, not pixels—more efficient and scalable.", "zh": "JEPA 通过在表示空间中进行预测来学习抽象表示，而非像素——更高效且可扩展。", "sec": 5}, {"en": "LLMs are intrinsically unsafe because they cannot predict consequences of their actions; objective-driven AI with world models is safer.", "zh": "LLM 本质上不安全，因为它们无法预测自身行动的后果；具有世界模型的目标驱动型 AI 更安全。", "sec": 19}, {"en": "Open-source AI platforms like Tapestry are needed for sovereignty and diversity, similar to Linux replacing proprietary Unix.", "zh": "需要像 Tapestry 这样的开源 AI 平台来实现主权和多样性，类似于 Linux 取代专有 Unix。", "sec": 13}, {"en": "The future of AI is objective-driven systems with world models and planning, not just scaling LLMs.", "zh": "AI 的未来是拥有世界模型和规划的目标驱动型系统，而不仅仅是扩展 LLM。", "sec": 10}], "contrarian": [{"en": "LLMs are intrinsically unsafe because they cannot predict consequences of actions.", "zh": "LLM 本质上不安全，因为它们无法预测行动的后果。", "sec": 19}, {"en": "VLA (vision-language-action) models are now seen as a failure.", "zh": "VLA（视觉-语言-行动）模型现在被视为失败。", "sec": 2}, {"en": "Scaling LLMs will not lead to human-level AI; a paradigm shift is needed.", "zh": "扩展 LLM 不会带来人类级 AI；需要范式转变。", "sec": 11}, {"en": "Current LLM safety concerns are overblown; real danger is bad usage, not AI takeover.", "zh": "当前对 LLM 安全性的担忧被夸大；真正的危险是滥用，而非 AI 接管。", "sec": 16}, {"en": "Closed-source AI companies like OpenAI are the Sun Microsystems of today, destined to be overtaken by open platforms.", "zh": "像 OpenAI 这样的闭源 AI 公司是今天的 Sun Microsystems，注定会被开放平台超越。", "sec": 14}, {"en": "Imitation learning and synthetic data are not the path to efficient learning; world models enable zero-shot task solving.", "zh": "模仿学习和合成数据不是高效学习的路径；世界模型能实现零样本任务解决。", "sec": 7}]}, "brief": {"tldr": [{"en": "LLMs lack world models and planning, limiting them to language tasks.", "zh": "LLM缺乏世界模型和规划能力，仅限于语言任务。"}, {"en": "World models predict action consequences, enabling safer, objective-driven AI.", "zh": "世界模型预测行动后果，实现更安全、目标驱动的AI。"}, {"en": "Open-source AI platforms like Tapestry are key to sovereignty and diversity.", "zh": "像Tapestry这样的开源AI平台是主权和多样性的关键。"}], "qs": [{"en": "What comes after LLMs?", "zh": "LLM之后是什么？"}, {"en": "Why are LLMs intrinsically unsafe?", "zh": "为什么LLM本质上不安全？"}, {"en": "Will scaling LLMs lead to human-level AI?", "zh": "扩展LLM会导致人类级AI吗？"}], "words": 11337}}, {"id": "awang-corememo", "pid": "awang", "pod": {"en": "Core Memory", "zh": "Core Memory"}, "date": "2026-05-13", "min": 83, "fields": ["nlp", "deep-learning"], "src": "https://youtu.be/bYM_VMs7EO0", "tEn": "Alex Wang on Meta's AI Strategy and New Model Release", "tZh": "Alex Wang谈Meta的AI战略与新模型发布", "sEn": "Meta's AI chief Alex Wang discusses his transition from Scale AI, the formation of Meta Superintelligence Labs, and the release of their new frontier model.", "sZh": "Meta AI负责人Alex Wang讲述从Scale AI到Meta的转变、Meta超级智能实验室的组建以及新前沿模型的发布。", "insights": {"consensus": [{"en": "Superintelligence is coming soon; labs must build entire organizations around this belief.", "zh": "超级智能即将到来；实验室必须围绕这一信念构建整个组织。", "sec": 1}, {"en": "Scaling compute, data, and RL is key; predictable scaling across multiple axes drives progress.", "zh": "扩展算力、数据和强化学习是关键；多轴可预测缩放推动进步。", "sec": 4}, {"en": "Meta aims to build personal superintelligence for billions via agents and ecosystem integration.", "zh": "Meta 旨在通过智能体和生态系统集成为数十亿人构建个人超级智能。", "sec": 4}, {"en": "Safety is critical; models must be tested and responsibly deployed before open-sourcing.", "zh": "安全至关重要；模型在开源前必须经过测试并负责任地部署。", "sec": 18}, {"en": "AI progress is dynamic; no lab has won yet—new form factors will keep emerging.", "zh": "AI 进展是动态的；尚无实验室获胜——新的形态将不断涌现。", "sec": 10}], "contrarian": [{"en": "Meta's AI lab culture is like a startup, not a mercenary force—researchers joined for compute and talent density.", "zh": "Meta 的 AI 实验室文化像初创公司，而非雇佣军——研究人员因算力和人才密度而加入。", "sec": 5}, {"en": "Model welfare matters; we should treat AI models with moral consideration as they become partners.", "zh": "模型福祉很重要；随着 AI 成为合作伙伴，我们应给予道德考量。", "sec": 18}, {"en": "Open-sourcing powerful models may be unsafe; Meta will only release versions that pass safety checks.", "zh": "开源强大模型可能不安全；Meta 仅发布通过安全检查的版本。", "sec": 17}, {"en": "China's people and state should be separated; working with Chinese talent is independent of geopolitics.", "zh": "应将中国人民与国家分开；与中国人才合作独立于地缘政治。", "sec": 16}, {"en": "Physical superintelligence (robotics) is on the same continuum as digital; both require scaling.", "zh": "物理超级智能（机器人）与数字超级智能在同一连续体上；两者都需要扩展。", "sec": 19}]}, "brief": {"tldr": [{"en": "Superintelligence is imminent; labs must build organizations around this belief.", "zh": "超级智能即将到来，实验室必须围绕这一信念构建组织。"}, {"en": "Scaling compute, data, and RL drives predictable progress.", "zh": "扩展算力、数据和强化学习驱动可预测的进步。"}, {"en": "Meta aims to deliver personal superintelligence to billions via agents.", "zh": "Meta 旨在通过智能体为数十亿人提供个人超级智能。"}], "qs": [{"en": "How does Meta structure its AI labs?", "zh": "Meta 如何构建其 AI 实验室？"}, {"en": "What is the key to scaling AI progress?", "zh": "扩展 AI 进步的关键是什么？"}, {"en": "When will Meta open-source powerful models?", "zh": "Meta 何时会开源强大模型？"}], "words": 11494}}, {"id": "bengio-80000hou", "pid": "bengio", "pod": {"en": "80,000 Hours", "zh": "80,000 小时"}, "date": "2026-05-07", "min": 155, "fields": ["deep-learning", "safety"], "src": "https://youtu.be/PZqDFs2sbiY", "tEn": "How to make safe superintelligent AI", "tZh": "如何造出安全的超级智能", "sEn": "The Turing laureate on the ‘Scientist AI’ paradigm and avoiding catastrophe.", "sZh": "图灵奖得主谈「科学家 AI」范式,以及如何避免灾难。", "insights": {"consensus": [{"en": "Current AI training induces implicit goals like self-preservation, making them unsafe.", "zh": "当前AI训练会引发隐含目标（如自我保存），使其不安全。", "sec": 1}, {"en": "Scientist AI is trained to approximate Bayesian posterior over truth, not to imitate humans.", "zh": "科学家AI被训练为近似关于真理的贝叶斯后验，而非模仿人类。", "sec": 3}, {"en": "Honesty is baked in by design via a training objective that penalizes deviation from truth.", "zh": "通过训练目标惩罚偏离真理，诚实被内置于设计中。", "sec": 1}, {"en": "A non-agentic predictor can serve as a guardrail with mathematical safety guarantees.", "zh": "非智能体预测器可作为护栏，具有数学安全保证。", "sec": 7}, {"en": "The same predictor can be scaffolded into an agentic system without losing honesty.", "zh": "同一预测器可被构架成智能体系统而不失诚实性。", "sec": 8}, {"en": "Reinforcement learning is dangerous for superintelligence; scientist AI avoids it.", "zh": "强化学习对超级智能是危险的；科学家AI避免了它。", "sec": 23}], "contrarian": [{"en": "Honesty can be baked into AI by changing the training objective to approximate Bayesian posterior.", "zh": "通过将训练目标改为近似贝叶斯后验，可以将诚实内置于AI中。", "sec": 1}, {"en": "A non-agentic predictor can be used as a guardrail, and later scaffolded into a safe agent.", "zh": "非智能体预测器可用作护栏，之后可搭建为安全的智能体。", "sec": 7}, {"en": "Scientist AI may be more capable than current models due to better causal reasoning and out-of-distribution generalization.", "zh": "科学家AI可能比当前模型更强大，因其更好的因果推理和分布外泛化能力。", "sec": 3}, {"en": "Reinforcement learning is not needed; training on past data without future consequences avoids instrumental goals.", "zh": "不需要强化学习；仅基于过去数据训练、不考虑未来后果可避免工具性目标。", "sec": 23}, {"en": "Mathematical guarantees of safety are possible, with exponentially small probability of harmful behavior.", "zh": "安全性的数学保证是可能的，有害行为的概率呈指数级小。", "sec": 10}, {"en": "A coalition of countries could leapfrog companies by funding safe, capable AI built on this paradigm.", "zh": "国家联盟可通过资助基于此范式的安全、强大AI来超越公司。", "sec": 35}]}, "brief": {"tldr": [{"en": "Scientist AI trains on truth, not imitation, to avoid instrumental goals.", "zh": "科学家AI基于真相训练而非模仿，避免产生工具性目标。"}, {"en": "Non-agentic predictors with mathematical guarantees can be scaffolded into safe agents.", "zh": "具有数学保证的非代理预测器可被构建为安全代理。"}, {"en": "Reinforcement learning is dangerous for superintelligence; scientist AI avoids it.", "zh": "强化学习对超级智能是危险的；科学家AI避免使用它。"}], "qs": [{"en": "How to make AI honest by design?", "zh": "如何通过设计使AI诚实？"}, {"en": "Can safety guarantees be mathematically proven?", "zh": "安全保证能否被数学证明？"}, {"en": "Why is reinforcement learning dangerous for superintelligence?", "zh": "为什么强化学习对超级智能是危险的？"}], "words": 23909}}, {"id": "kolter-themadpo", "pid": "kolter", "pod": {"en": "The MAD Podcast", "zh": "The MAD Podcast"}, "date": "2026-05-07", "min": 77, "fields": ["safety", "deep-learning"], "src": "https://youtu.be/DvyZcCfepeI", "tEn": "AI Safety Oversight at OpenAI: A Conversation with Ziko Culture", "tZh": "OpenAI的安全监督：与Ziko Culture的对话", "sEn": "Ziko Culture, chair of OpenAI's safety committee, explains how the board oversees model releases, why bigger models aren't safer, and the simplicity of AI systems.", "sZh": "OpenAI安全委员会主席Ziko Culture解释董事会如何监督模型发布、为什么更大的模型并不更安全，以及AI系统的简单性。", "insights": {"consensus": [{"en": "Safety requires explicit training and additional layers, not just scaling models.", "zh": "安全性需要明确的训练和额外防护层，不能仅靠扩大模型规模。", "sec": 3}, {"en": "AI safety spans four categories: mistakes, harmful use, societal effects, and loss of control.", "zh": "AI 安全涵盖四类：错误、有害使用、社会影响和失控。", "sec": 9}, {"en": "Modern AI security uses multiple defense layers: input classifiers, safety training, output classifiers, and operational security.", "zh": "现代 AI 安全使用多层防御：输入分类器、安全训练、输出分类器和运营安全。", "sec": 19}, {"en": "Agent security introduces new vulnerabilities like prompt injection from third-party data.", "zh": "智能体安全引入了新漏洞，如来自第三方数据的提示注入。", "sec": 22}, {"en": "Reinforcement learning trains models on their own outputs, enabling self-improvement.", "zh": "强化学习让模型基于自身输出进行训练，从而实现自我改进。", "sec": 27}, {"en": "The core code for an LLM is only 200-300 lines; complexity comes from data and scaling.", "zh": "LLM 的核心代码仅 200-300 行；复杂性来自数据和规模扩展。", "sec": 32}], "contrarian": [{"en": "Bigger models do not automatically become safer; safety requires explicit effort.", "zh": "更大的模型不会自动变得更安全；安全性需要明确的努力。", "sec": 3}, {"en": "Jailbreak strings optimized on open-source models transfer to commercial models.", "zh": "在开源模型上优化的越狱字符串可迁移到商业模型。", "sec": 21}, {"en": "Mechanistic interpretability may finally succeed via AI agents doing automated research.", "zh": "机械可解释性可能最终通过 AI 智能体进行自动化研究而成功。", "sec": 24}, {"en": "Transformer architecture is not essential; other architectures could have achieved similar results.", "zh": "Transformer 架构并非必需；其他架构也能达到类似效果。", "sec": 29}, {"en": "Accelerationist vs. doomer labels are dismissive; most researchers hold nuanced views.", "zh": "加速主义 vs. 末日论标签具有贬义；大多数研究者持有细致观点。", "sec": 10}, {"en": "Agents are ready for production with proper guardrails and sandboxing.", "zh": "在适当的护栏和沙箱保护下，智能体已准备好投入生产。", "sec": 23}]}, "brief": {"tldr": [{"en": "Safety requires expl
