icit training and layers, not just scaling models.", "zh": "安全需要明确的训练和额外层，而不仅仅是扩展模型。"}, {"en": "AI safety spans four categories: mistakes, harmful use, societal effects, loss of control.", "zh": "AI安全涵盖四类：错误、有害使用、社会影响和失控。"}, {"en": "Agent security introduces new vulnerabilities like prompt injection from third-party data.", "zh": "智能体安全引入了新的漏洞，如来自第三方数据的提示注入。"}], "qs": [{"en": "Do bigger models automatically become safer?", "zh": "更大的模型会自动变得更安全吗？"}, {"en": "What are the four categories of AI safety issues?", "zh": "AI安全问题的四个类别是什么？"}, {"en": "Are AI agents ready for production?", "zh": "AI智能体准备好投入生产了吗？"}], "words": 9770}}, {"id": "altman-nothingb-2026", "pid": "altman", "pod": {"en": "NothingButTech", "zh": "NothingButTech"}, "date": "2026-05-01", "min": 43, "fields": ["nlp", "safety"], "src": "https://youtu.be/Mklj3Y2-fNg", "tEn": "Sam Altman on ChatGPT's Personality and the Path to Superintelligence", "tZh": "Sam Altman谈ChatGPT个性与通往超级智能之路", "sEn": "Sam Altman discusses how setting ChatGPT's personality has the most impact, his early obsession with AI, and his vision for a future of almost unimaginable prosperity.", "sZh": "Sam Altman探讨了设定ChatGPT个性的影响、他对AI的早期痴迷，以及他对几乎难以想象的繁荣未来的愿景。", "insights": {"consensus": [{"en": "Prediction is very close to intelligence; next-token prediction enables reasoning and new knowledge.", "zh": "预测非常接近智能；下一个词预测能够实现推理和新知识的发现。", "sec": 3}, {"en": "The most impactful thing OpenAI does is setting ChatGPT's personality, which requires careful design.", "zh": "OpenAI 做的最有影响力的事情是设定 ChatGPT 的个性，这需要精心设计。", "sec": 1}, {"en": "AI will not eliminate jobs but transform them, leading to new forms of work and fulfillment.", "zh": "AI 不会消除工作，而是会改变工作形式，带来新的工作方式和成就感。", "sec": 2}, {"en": "Three key focuses: accelerate research, accelerate economy, and personal AGI.", "zh": "三个关键重点：加速研究、加速经济和个人 AGI。", "sec": 6}, {"en": "Robotics is essential to avoid humans acting as actuators for AGI in the physical world.", "zh": "机器人技术至关重要，以避免人类成为 AGI 在物理世界中的执行器。", "sec": 11}], "contrarian": [{"en": "Next-token prediction can discover fundamentally new knowledge, contrary to early expert skepticism.", "zh": "下一个词预测能够发现全新的知识，这与早期专家的怀疑相反。", "sec": 3}, {"en": "People will still work hard and face adversity even in an age of AI-driven abundance.", "zh": "即使在 AI 驱动的富足时代，人们仍会努力工作和面对逆境。", "sec": 2}, {"en": "The narrative of 50% job elimination is tone-deaf; jobs will change, not disappear.", "zh": "50% 工作消失的论调是麻木不仁的；工作会改变，而非消失。", "sec": 2}, {"en": "AI progress will take longer than AI optimists think but shorter than doctors expect.", "zh": "AI 的进展会比 AI 乐观主义者认为的更慢，但比医生预期的更快。", "sec": 7}, {"en": "Agents running autonomously on computers can be comfortable and productive, despite initial reluctance.", "zh": "智能体在计算机上自主运行可以舒适且高效，尽管最初会有所抵触。", "sec": 13}]}, "brief": {"tldr": [{"en": "Next-token prediction is close to intelligence and can discover new knowledge.", "zh": "下一个词预测接近智能，并能发现新知识。"}, {"en": "ChatGPT's personality is OpenAI's most impactful design choice.", "zh": "ChatGPT 的性格是 OpenAI 最具影响力的设计选择。"}, {"en": "AI will transform jobs, not eliminate them, and create new fulfillment.", "zh": "AI 将改变工作而非消除工作，并创造新的成就感。"}], "qs": [{"en": "Can next-token prediction discover new knowledge?", "zh": "下一个词预测能发现新知识吗？"}, {"en": "Will AI eliminate most jobs?", "zh": "AI 会消除大部分工作吗？"}, {"en": "How long until superintelligence?", "zh": "超级智能还要多久？"}], "words": 7717}}, {"id": "karpathy-training", "pid": "karpathy", "pod": {"en": "Training Data", "zh": "Training Data"}, "date": "2026-04-29", "min": 30, "fields": ["nlp"], "src": "https://youtu.be/96jN2OCOfLs", "tEn": "From vibe coding to agentic engineering", "tZh": "从「氛围编程」到智能体工程", "sEn": "What changes when agents write the code and you engineer the agent.", "sZh": "当智能体来写代码、而你来「工程化」这个智能体,会有什么不同。", "insights": {"consensus": [{"en": "Software 3.0 is programming by prompting; the context window is your lever over the LLM interpreter.", "zh": "软件 3.0 是通过提示进行编程；上下文窗口是你对 LLM 解释器的杠杆。", "sec": 1}, {"en": "LLMs are jagged: they excel in verifiable domains like math and code, but fail on simple common sense like walking to a car wash.", "zh": "LLM 是锯齿状的：它们在数学和代码等可验证领域表现出色，但在步行去洗车等简单常识上失败。", "sec": 3}, {"en": "Vibe coding raises the floor for everyone; agentic engineering preserves quality bar for professionals.", "zh": "氛围编码提升了所有人的下限；智能体工程为专业人士保持质量门槛。", "sec": 0}, {"en": "We are summoning ghosts, not building animals—these are statistical simulations shaped by data and rewards, not evolution.", "zh": "我们召唤的是幽灵，而非构建动物——这些是由数据和奖励塑造的统计模拟，而非进化产物。", "sec": 6}, {"en": "You can outsource your thinking, but you can't outsource your understanding—that remains the human bottleneck.", "zh": "你可以外包思考，但无法外包理解——这仍然是人类的瓶颈。", "sec": 8}, {"en": "Everything is automatable eventually; verifiability determines what is easy or hard to automate now.", "zh": "一切最终都可自动化；可验证性决定了当前自动化的难易程度。", "sec": 5}], "contrarian": [{"en": "Software 3.0 means programming is copy-pasting text for agents, not writing code.", "zh": "软件 3.0 意味着编程是复制粘贴文本给智能体，而不是写代码。", "sec": 1}, {"en": "Many existing apps like MenuGen are spurious; neural networks can directly process input to output without middleware.", "zh": "许多现有应用如 MenuGen 是多余的；神经网络可直接处理输入到输出，无需中间件。", "sec": 2}, {"en": "LLMs are ghosts, not animals; they lack intrinsic motivation and are shaped purely by data and rewards.", "zh": "大语言模型是幽灵而非动物；它们缺乏内在动机，纯粹由数据和奖励塑造。", "sec": 6}, {"en": "Hiring for AI-native engineers should involve large projects and adversarial testing, not puzzles.", "zh": "招聘 AI 原生工程师应通过大型项目和对抗性测试，而非解谜题。", "sec": 5}, {"en": "You can outsource thinking but not understanding; understanding remains a human bottleneck.", "zh": "你可以外包思考，但不能外包理解；理解仍然是人类的瓶颈。", "sec": 8}, {"en": "The jaggedness of LLMs is partly due to labs' focus on valuable domains, not fundamental limits.", "zh": "大语言模型的能力参差不齐部分源于实验室对高价值领域的侧重，而非根本限制。", "sec": 3}]}, "brief": {"tldr": [{"en": "Software 3.0 shifts programming from writing code to prompting LLMs via context windows.", "zh": "软件 3.0 将编程从写代码转向通过上下文窗口提示大模型。"}, {"en": "LLMs excel in verifiable tasks like code but fail on simple common sense.", "zh": "大模型在可验证任务（如代码）上表现出色，但在简单常识上失败。"}, {"en": "Outsourcing thinking is possible, but understanding remains a human bottleneck.", "zh": "可以外包思考，但理解仍是人类瓶颈。"}], "qs": [{"en": "What is Software 3.0?", "zh": "什么是软件 3.0？"}, {"en": "Why are LLMs jagged?", "zh": "为什么大模型的能力参差不齐？"}, {"en": "Can we outsource understanding?", "zh": "我们能外包理解吗？"}], "words": 5450}}, {"id": "catwu-lennyspo", "pid": "catwu", "pod": {"en": "Lenny’s Podcast", "zh": "Lenny’s Podcast"}, "date": "2026-04-23", "min": 86, "fields": ["nlp"], "src": "https://youtu.be/PplmzlgE0kg", "tEn": "The New PM Playbook for AI-Native Products", "tZh": "AI原生产品的新产品经理手册", "sEn": "Anthropic's Kat Wu reveals how product management is transforming in the age of AI, from shipping features weekly to the blurred lines between PM and engineering lead.", "sZh": "Anthropic 的 Kat Wu 揭示了产品管理在 AI 时代的变革：从每周发布功能到产品经理与技术负责人之间的模糊界限。", "insights": {"consensus": [{"en": "PMs must shift from long-term planning to rapid iteration, shipping features weekly or daily.", "zh": "产品经理必须从长期规划转向快速迭代，每周甚至每天发布功能。", "sec": 3}, {"en": "Product taste—deciding what to build—is the most valuable skill as code becomes cheaper.", "zh": "产品品味——决定构建什么——是代码成本降低后最有价值的技能。", "sec": 3}, {"en": "Clear goals and team principles empower autonomous decision-making and fast shipping.", "zh": "清晰的目标和团队原则赋能自主决策和快速发布。", "sec": 4}, {"en": "AI tools like Claude Code and Co-work automate repetitive tasks, freeing humans for creative work.", "zh": "像 Claude Code 和 Co-work 这样的 AI 工具自动化重复性任务，解放人类从事创造性工作。", "sec": 13}, {"en": "Building automations to 100% reliability is crucial; 95% is not enough for real leverage.", "zh": "将自动化构建到 100% 可靠至关重要；95% 不足以产生真正的杠杆效应。", "sec": 29}, {"en": "The mission of safe AGI unifies Anthropic and enables fast, cross-org decisions.", "zh": "安全 AGI 的使命统一了 Anthropic，并实现了快速的跨组织决策。", "sec": 12}], "contrarian": [{"en": "PMs need more engineers with product taste, not necessarily more PMs, to reduce overhead.", "zh": "产品经理需要更多具有产品品味的工程师，而不一定是更多的产品经理，以减少开销。", "sec": 3}, {"en": "Product consistency is sacrificed for speed; overlapping features are acceptable for testing.", "zh": "为速度牺牲产品一致性；重叠的功能在测试中是可以接受的。", "sec": 6}, {"en": "The best PMs define the product a month out, not years, due to rapid model improvements.", "zh": "由于模型快速改进，最好的产品经理定义未来一个月的产品，而不是几年。", "sec": 3}, {"en": "Over-customizing AI workflows can distract from core goals; simple setups often work better.", "zh": "过度定制 AI 工作流可能分散核心目标；简单设置通常效果更好。", "sec": 32}, {"en": "New models often let you remove features that were crutches for older, weaker models.", "zh": "新模型通常允许你移除为旧弱模型添加的拐杖功能。", "sec": 25}, {"en": "Waymo's value is not just price; the ability to work during rides is a key advantage.", "zh": "Waymo 的价值不仅仅是价格；乘车时工作的能力是一个关键优势。", "sec": 34}]}, "brief": {"tldr": [{"en": "PMs must shift from long-term planning to rapid iteration, shipping weekly or daily.", "zh": "产品经理必须从长期规划转向快速迭代，每周或每天发布功能。"}, {"en": "Product taste is the most valuable skill as code becomes cheaper.", "zh": "随着代码成本降低，产品品味成为最有价值的技能。"}, {"en": "Building automations to 100% reliability is crucial for real leverage.", "zh": "将自动化构建到100%可靠性对于真正杠杆作用至关重要。"}], "qs": [{"en": "What makes a successful AI PM?", "zh": "什么造就了成功的AI产品经理？"}, {"en": "How to set clear goals and ship fast?", "zh": "如何设定明确目标并快速交付？"}, {"en": "When to use Claude Code vs Desktop/Web?", "zh": "何时使用Claude Code与桌面/网页版？"}], "words": 15616}}, {"id": "brockman-theknowl-2026", "pid": "brockman", "pod": {"en": "The Knowledge Project Podcast", "zh": "知识项目播客"}, "date": "2026-04-22", "min": 72, "fields": ["nlp", "safety"], "src": "https://youtu.be/6JoUcQ1qmAc", "tEn": "The Birth of OpenAI: From a Dinner to a Mission", "tZh": "OpenAI的诞生：从晚餐到使命", "sEn": "The co-founder recounts how a dinner conversation with Sam Altman led to the creation of OpenAI, overcoming doubts about competing with DeepMind.", "sZh": "联合创始人回忆与Sam Altman的一次晚餐对话如何促成OpenAI的创立，并克服了与DeepMind竞争的疑虑。", "insights": {"consensus": [{"en": "Scaling simple algorithms with massive compute can exceed human performance.", "zh": "用海量算力扩展简单算法就能超越人类表现。", "sec": 0}, {"en": "Iterative deployment is crucial for safe AI development and learning from real-world use.", "zh": "迭代部署对安全开发AI和从实际使用中学习至关重要。", "sec": 25}, {"en": "Safety is a core product feature; users want trustworthy models aligned with their goals.", "zh": "安全是核心产品特性；用户需要可信赖且与其目标一致的模型。", "sec": 26}, {"en": "AI will empower everyone to become builders, lowering barriers to creation.", "zh": "AI将赋能每个人成为创造者，降低创造门槛。", "sec": 29}, {"en": "Compute is the new scarce resource; access to it must be broadly distributed.", "zh": "算力是新的稀缺资源；其获取必须广泛分配。", "sec": 20}], "contrarian": [{"en": "Predicting next tokens is deeply connected to intelligence, not just a pedestrian task.", "zh": "预测下一个词与智能深度关联，并非平凡任务。", "sec": 3}, {"en": "Data centers use very little water due to closed-loop cooling systems.", "zh": "数据中心因闭环冷却系统用水极少。", "sec": 20}, {"en": "The biggest misuse of GPT-3 was medical spam, not grand threats like misinformation.", "zh": "GPT-3的最大滥用是医疗垃圾信息，而非虚假信息等宏大威胁。", "sec": 5}, {"en": "Showing chain of thought can reduce faithfulness; OpenAI hides it to avoid training bias.", "zh": "展示思维链会降低忠实度；OpenAI隐藏它以避免训练偏差。", "sec": 12}, {"en": "The core advantage is the machine that makes models, not any single model itself.", "zh": "核心优势是制造模型的机器，而非任何单一模型本身。", "sec": 21}]}, "brief": {"tldr": [{"en": "Scaling simple algorithms with massive compute can surpass human performance.", "zh": "用海量算力扩展简单算法可超越人类表现。"}, {"en": "Iterative deployment is key to safe AI development and real-world learning.", "zh": "迭代部署是安全AI开发和从真实世界学习的关键。"}, {"en": "Safety is a core product feature; users want trustworthy models.", "zh": "安全是核心产品特性；用户需要值得信赖的模型。"}], "qs": [{"en": "How did OpenAI start?", "zh": "OpenAI是如何创立的？"}, {"en": "Why is scaling simple algorithms effective?", "zh": "为什么扩展简单算法有效？"}, {"en": "What is the role of safety in AI products?", "zh": "安全在AI产品中扮演什么角色？"}], "words": 13327}}, {"id": "jensen-dwarkesh", "pid": "jensen", "pod": {"en": "Dwarkesh Podcast", "zh": "Dwarkesh 播客"}, "date": "2026-04-15", "min": 103, "fields": ["deep-learning", "robotics"], "src": "https://youtu.be/Hrbq66XqtCo", "tEn": "Will Nvidia’s moat persist?", "tZh": "英伟达的护城河守得住吗?", "sEn": "The compute kingpin on GPUs, the AI buildout, and physical AI.", "sZh": "算力之王谈 GPU、AI 基建,以及物理 AI。", "insights": {"consensus": [{"en": "The transformation from electrons to tokens is incredibly hard to commoditize.", "zh": "从电子到token的转化极其难以商品化。", "sec": 0}, {"en": "Nvidia's moat is its ecosystem, install base, and programmability, not just supply chain.", "zh": "英伟达的护城河是其生态系统、安装基础和可编程性，而不仅仅是供应链。", "sec": 2}, {"en": "Bottlenecks in chip supply are 2-3 year problems; energy policy is the real long-term constraint.", "zh": "芯片供应的瓶颈是2-3年的问题；能源政策才是真正的长期制约。", "sec": 4}, {"en": "CUDA's value lies in its rich ecosystem, vast install base, and ability to enable algorithmic innovation.", "zh": "CUDA的价值在于其丰富的生态系统、庞大的安装基础和推动算法创新的能力。", "sec": 8}, {"en": "Nvidia's TCO is best in the world; ASICs don't offer a meaningful cost advantage.", "zh": "英伟达的总拥有成本全球最佳；ASIC并未提供有意义的成本优势。", "sec": 10}, {"en": "China has abundant compute and talent; isolating them risks creating a separate tech stack.", "zh": "中国拥有充足的算力和人才；孤立他们可能导致形成独立的技术栈。", "sec": 19}], "contrarian": [{"en": "Nvidia's 70% margins are sustainable; ASIC margins are also high.", "zh": "英伟达70%的利润率可持续；ASIC利润率也很高。", "sec": 0}, {"en": "China has abundant compute and energy; export controls won't stop them.", "zh": "中国拥有充足的算力和能源；出口管制无法阻止他们。", "sec": 19}, {"en": "Selling chips to China benefits US tech stack adoption globally.", "zh": "向中国销售芯片有利于美国技术栈在全球的采用。", "sec": 22}, {"en": "AI is not like nuclear weapons; comparing them is 'lunacy'.", "zh": "AI不像核武器；将两者比较是「荒谬的'。", "sec": 23}, {"en": "Nvidia doesn't price gouge; it uses fixed pricing and FIFO allocation.", "zh": "英伟达不哄抬价格；采用固定定价和先到先得分配。", "sec": 16}, {"en": "Nvidia's growth is driven by architecture and software, not just lithography.", "zh": "英伟达的增长由架构和软件驱动，而不仅仅是光刻技术。", "sec": 6}]}, "brief": {"tldr": [{"en": "Nvidia's moat is its ecosystem and programmability, not just supply chain.", "zh": "英伟达的护城河是其生态系统和可编程性，而不仅仅是供应链。"}, {"en": "Energy policy, not chip supply, is the long-term bottleneck for AI.", "zh": "能源政策而非芯片供应是人工智能的长期瓶颈。"}, {"en": "Export controls on China risk creating a separate tech stack.", "zh": "对中国的出口管制可能催生独立的技术栈。"}], "qs": [{"en": "Will Nvidia's moat persist?", "zh": "英伟达的护城河会持续吗？"}, {"en": "Is CUDA's value sustainable against ASICs?", "zh": "CUDA 的价值相对于 ASIC 是否可持续？"}, {"en": "Should the US restrict chip exports to China?", "zh": "美国应该限制对中国的芯片出口吗？"}], "words": 15778}}, {"id": "jeffdean-nvidia-2026", "pid": "jeffdean", "pod": {"en": "NVIDIA", "zh": "NVIDIA"}, "date": "2026-04-09", "min": 59, "fields": ["deep-learning", "nlp"], "src": "https://youtu.be/DqMIYc-keBQ", "tEn": "Google Chief Scientist Jeff Dean and NVIDIA Chief Scientist Bill Dally Discuss AI Progress and Low-Latency Inference", "tZh": "谷歌首席科学家Jeff Dean与英伟达首席科学家Bill Dally探讨AI进展与低延迟推理", "sEn": "Jeff Dean highlights breakthroughs in math and coding AI models and the rise of autonomous agents, while Bill Dally explains NVIDIA's strategies for achieving ultra-low latency inference.", "sZh": "Jeff Dean强调数学和编程AI模型的突破以及自主智能体的兴起，Bill Dally则解释英伟达实现超低延迟推理的策略。", "insights": {"consensus": [{"en": "Models have dramatically improved on verifiable reward problems like math and coding, achieving gold medals in IMO and ICPC.", "zh": "模型在数学和编程等可验证奖励问题上显著提升，在IMO和ICPC中获得了金牌。", "sec": 0}, {"en": "Agent-based workflows now handle long-running tasks autonomously for hours or days, self-correcting along the way.", "zh": "基于智能体的工作流现在可以自主处理持续数小时或数天的长期任务，并在此过程中自我纠正。", "sec": 3}, {"en": "Ultra-low latency inference is critical for agentic systems; targeting 10,000+ tokens per second per user.", "zh": "超低延迟推理对智能体系统至关重要；目标是每个用户每秒处理超过10,000个词元。", "sec": 1}, {"en": "AI is transforming chip design: from standard cell library generation to bug attribution and design exploration.", "zh": "AI正在改变芯片设计：从标准单元库生成到缺陷归因和设计探索。", "sec": 9}, {"en": "Personalized AI tutors and health coaches are among the most impactful applications for society.", "zh": "个性化AI导师和健康教练是对社会最有影响力的应用之一。", "sec": 19}], "contrarian": [{"en": "We are not running out of data; untapped sources include video, audio, robotics, and synthetic data.", "zh": "我们并没有耗尽数据；未开发的来源包括视频、音频、机器人技术和合成数据。", "sec": 5}, {"en": "Pre-training should interleave action-taking in environments, not just passive next-token prediction.", "zh": "预训练应穿插在环境中采取行动，而不仅仅是被动的下一个词预测。", "sec": 3}, {"en": "Inference is now 90% of data center power; hardware must be specialized for prefill vs. decode stages.", "zh": "推理现在占数据中心功耗的90%；硬件必须针对预填充和解码阶段进行专门化。", "sec": 7}, {"en": "The key to energy efficiency is to not move data; compute-in-memory and stacked DRAM are promising.", "zh": "能效的关键是不移动数据；存内计算和堆叠DRAM很有前景。", "sec": 12}, {"en": "Sparsity is hard to exploit beyond structured sparsity because it destroys regularity and efficiency.", "zh": "除了结构化稀疏性外，稀疏性很难利用，因为它破坏了规律性和效率。", "sec": 8}, {"en": "Network topology choice depends on workload; no single network is optimal for all traffic patterns.", "zh": "网络拓扑的选择取决于工作负载；没有一种网络对所有流量模式都是最优的。", "sec": 17}]}, "brief": {"tldr": [{"en": "Ultra-low latency inference at 10k+ tokens/s is key for agentic AI systems.", "zh": "超低延迟推理（每秒1万以上token）是智能体AI系统的关键。"}, {"en": "AI is transforming chip design from cell generation to bug attribution.", "zh": "AI正在变革芯片设计，从标准单元生成到缺陷归因。"}, {"en": "Personalized AI tutors and health coaches are among the most impactful applications.", "zh": "个性化AI导师和健康教练是最具影响力的应用之一。"}], "qs": [{"en": "Why is ultra-low latency inference critical for agents?", "zh": "为什么超低延迟推理对智能体至关重要？"}, {"en": "Are we running out of data for training?", "zh": "我们是否面临训练数据枯竭？"}, {"en": "How is AI being used in chip design?", "zh": "AI如何应用于芯片设计？"}], "words": 8413}}, {"id": "demis-hugeiftr", "pid": "demis", "pod": {"en": "Huge If True", "zh": "Huge If True"}, "date": "2026-04-07", "min": 65, "fields": ["deep-learning", "rl"], "src": "https://youtu.be/C0gErQtnNFE", "tEn": "The hardest problem AI ever solved", "tZh": "AI 解决过的最难的问题", "sEn": "AlphaFold, scientific discovery, and how far AGI really is.", "sZh": "AlphaFold、科学发现,以及 AGI 究竟还有多远。", "insights": {"consensus": [{"en": "AI's best use is to improve human health and accelerate scientific discovery.", "zh": "AI 的最佳用途是改善人类健康和加速科学发现。", "sec": 7}, {"en": "AlphaFold solved a 50-year grand challenge, predicting protein structures for all known proteins.", "zh": "AlphaFold 解决了一个 50 年的重大挑战，预测了所有已知蛋白质的结构。", "sec": 1}, {"en": "AlphaGo's move 37 showed AI creativity, signaling readiness for scientific problems.", "zh": "AlphaGo 的第 37 手展现了 AI 的创造力，标志着解决科学问题的时机成熟。", "sec": 10}, {"en": "Two main AI risks: bad actors misusing tech and AI itself going rogue as systems become more powerful.", "zh": "AI 的两大风险：恶意滥用技术，以及系统变强后 AI 本身失控。", "sec": 18}, {"en": "AGI could unlock root-node problems like fusion, leading to clean energy and space exploration.", "zh": "AGI 能解决根节点问题，如核聚变，带来清洁能源和太空探索。", "sec": 21}, {"en": "The ideal path would have been careful scientific progress, but commercial pressure accelerated deployment.", "zh": "理想路径是谨慎的科学推进，但商业压力加速了部署。", "sec": 7}], "contrarian": [{"en": "Language was easier to crack than experts expected, thanks to transformers.", "zh": "语言比专家预期的更容易攻克，这要归功于Transformer。", "sec": 0}, {"en": "The ideal path would have been slower, CERN-like AGI development.", "zh": "理想的路径本应是更慢的、类似CERN的AGI开发方式。", "sec": 7}, {"en": "Current commercial pressure and geopolitics force a faster, less ideal pace.", "zh": "当前的商业压力和地缘政治迫使以更快、不太理想的速度推进。", "sec": 7}, {"en": "AGI may be built within 3-4 years, not decades.", "zh": "AGI可能在3-4年内建成，而非数十年。", "sec": 21}, {"en": "The biggest worry is not deepfakes but AI going rogue as agents.", "zh": "最大的担忧不是深度伪造，而是AI作为智能体失控。", "sec": 18}, {"en": "AlphaZero's tabula rasa learning shows AI can surpass human knowledge without data.", "zh": "AlphaZero的白板学习表明AI无需数据即可超越人类知识。", "sec": 12}]}, "brief": {"tldr": [{"en": "AlphaFold solved protein folding, a 50-year grand challenge in biology.", "zh": "AlphaFold 解决了蛋白质折叠这一 50 年的生物学重大挑战。"}, {"en": "AlphaGo's move 37 demonstrated AI creativity, opening doors to scientific problems.", "zh": "AlphaGo 的第 37 手展现了 AI 创造力，为科学问题打开了大门。"}, {"en": "AGI could solve root problems like fusion, but risks include misuse and rogue AI.", "zh": "AGI 可能解决核聚变等根本问题，但风险包括滥用和 AI 失控。"}], "qs": [{"en": "What was the hardest problem AI ever solved?", "zh": "AI 解决过的最难问题是什么？"}, {"en": "How did AlphaGo's move 37 change AI?", "zh": "AlphaGo 的第 37 手如何改变了 AI？"}, {"en": "What are the main risks of advanced AI?", "zh": "高级 AI 的主要风险是什么？"}], "words": 9887}}, {"id": "brockman-bigtechn", "pid": "brockman", "pod": {"en": "Big Technology", "zh": "Big Technology"}, "date": "2026-04-01", "min": 73, "fields": ["nlp", "safety"], "src": "https://youtu.be/J6vYvk7R190", "tEn": "Greg Brockman on AI that improves itself", "tZh": "格雷格·布罗克曼谈会自我改进的 AI", "sEn": "OpenAI’s president on self-improving AI, scaling, and where the company is headed.", "sZh": "OpenAI 总裁谈自我改进的 AI、规模扩张,以及公司的走向。", "insights": {"consensus": [{"en": "AGI will arrive within a couple years, with AI handling almost any intellectual computer task.", "zh": "AGI（通用人工智能）将在几年内到来，AI 能处理几乎任何智力性计算机任务。", "sec": 0}, {"en": "OpenAI prioritizes GPT reasoning models over world models like Sora due to limited compute.", "zh": "由于算力有限，OpenAI 优先发展 GPT 推理模型，而非 Sora 等世界模型。", "sec": 4}, {"en": "The super app will unify chat, coding, and browsing into a personal AGI assistant.", "zh": "超级应用将整合聊天、编程和浏览，成为个人 AGI（通用人工智能）助手。", "sec": 6}, {"en": "Pre-training improvements multiply downstream gains; scaling remains crucial.", "zh": "预训练的改进会放大下游收益；Scaling（规模扩张）仍然至关重要。", "sec": 10}, {"en": "Compute is the primary bottleneck; demand far outstrips supply.", "zh": "算力是主要瓶颈；需求远超供给。", "sec": 26}], "contrarian": [{"en": "The scariest moment at OpenAI was after ChatGPT launch, feeling 'we won'—a dangerous complacency.", "zh": "OpenAI 最可怕的时刻是 ChatGPT 发布后感到“我们赢了”——这是一种危险的自满。", "sec": 8}, {"en": "Codex is for everyone, not just coders; it's about solving problems, not writing code.", "zh": "Codex 不仅面向程序员，而是面向所有人；它关乎解决问题，而非编写代码。", "sec": 17}, {"en": "Data center water usage is negligible—e.g., Abilene uses as much as a household per year.", "zh": "数据中心用水量微乎其微——例如阿比林设施的年用水量相当于一个家庭。", "sec": 34}, {"en": "AI will increase human connection and free up time for deeper bonds, not replace jobs.", "zh": "AI 将增进人际联系，腾出时间加深纽带，而非取代工作。", "sec": 24}, {"en": "OpenAI's $110B compute bet is not YOLO; it's a calculated response to inevitable demand.", "zh": "OpenAI 的 1100 亿美元算力押注并非鲁莽，而是对必然需求的审慎回应。", "sec": 31}, {"en": "The economy's growth will be driven by AI compute, not just model intelligence.", "zh": "经济增长将由 AI 算力驱动，而不仅仅是模型智能。", "sec": 28}]}, "brief": {"tldr": [{"en": "AGI expected within a few years; AI will handle most intellectual computer tasks.", "zh": "AGI 几年内到来，AI 将处理几乎所有智力型计算机任务。"}, {"en": "OpenAI prioritizes reasoning models over world models due to compute limits.", "zh": "因算力限制，OpenAI 优先发展推理模型而非世界模型。"}, {"en": "Compute is the main bottleneck; demand far exceeds supply.", "zh": "算力是主要瓶颈，需求远超供给。"}], "qs": [{"en": "When will AGI arrive?", "zh": "AGI 何时到来？"}, {"en": "Why prioritize text reasoning over world models?", "zh": "为何优先文本推理而非世界模型？"}, {"en": "What is the super app vision?", "zh": "超级应用的愿景是什么？"}], "words": 13474}}, {"id": "karpathy-noprior-2026", "pid": "karpathy", "pod": {"en": "No Priors", "zh": "No Priors 播客"}, "date": "2026-03-20", "min": 67, "fields": ["nlp"], "src": "https://youtu.be/kwSVtQ7dziU", "tEn": "Skill issue: code agents and autoresearch", "tZh": "Skill Issue:代码智能体与自动化研究", "sEn": "Where coding agents fall short, and the loopy road to autonomous research.", "sZh": "代码智能体还差在哪,以及通往自主研究那条「绕圈」的路。", "insights": {"consensus": [{"en": "Since December, I haven't typed a line of code; I delegate everything to agents.", "zh": "自去年12月以来，我没写过一行代码；所有工作都委托给智能体。", "sec": 1}, {"en": "The bottleneck is no longer typing speed but your skill in directing agents.", "zh": "瓶颈不再是打字速度，而是你指挥智能体的技能。", "sec": 1}, {"en": "Auto research shows that removing humans from the loop can find improvements humans miss.", "zh": "自动研究证明，将人类移出循环可以发现人类忽略的改进。", "sec": 7}, {"en": "LLMs have jagged intelligence: brilliant at verifiable tasks, but still tell the same bad joke from years ago.", "zh": "大语言模型智能参差不齐：在可验证任务上出色，但还在讲多年前的烂笑话。", "sec": 8}, {"en": "The industry should refactor for agent-first tools, where APIs replace apps and agents are the glue.", "zh": "行业应重构为智能体优先的工具，用API取代应用，智能体作为粘合剂。", "sec": 9}, {"en": "Open-source models lag behind frontier by months, but that's healthy for decentralization.", "zh": "开源模型落后前沿几个月，但这有利于去中心化。", "sec": 14}], "contrarian": [{"en": "I haven't typed a line of code since December; I only delegate to agents.", "zh": "自去年12月以来我没写过一行代码，全交给智能体了。", "sec": 1}, {"en": "LLMs are like a brilliant PhD student combined with a 10-year-old.", "zh": "大语言模型就像天才博士生和十岁小孩的结合体。", "sec": 8}, {"en": "Models are not generalizing intelligence across domains; joke quality hasn't improved.", "zh": "模型并未跨领域泛化智能；讲笑话的质量毫无提升。", "sec": 8}, {"en": "The frontier labs are actively automating away their own researchers.", "zh": "前沿实验室正在积极自动化淘汰自己的研究人员。", "sec": 7}, {"en": "We should write markdown for agents, not HTML docs for humans.", "zh": "我们应该为智能体写Markdown，而不是为人类写HTML文档。", "sec": 9}, {"en": "An untrusted swarm of internet agents could outcompete frontier labs.", "zh": "互联网上不可信的智能体集群可能超越前沿实验室。", "sec": 9}]}, "brief": {"tldr": [{"en": "Speaker hasn't typed code since Dec, delegates all to agents.", "zh": "嘉宾自去年12月起未写一行代码，全权委托给智能体。"}, {"en": "Bottleneck shifts from typing speed to skill in directing agents.", "zh": "瓶颈从打字速度转向指挥智能体的技能。"}, {"en": "Auto-research removes humans to find improvements they miss.", "zh": "自动研究移除人类环节，能发现人类遗漏的改进。"}], "qs": [{"en": "What is the new bottleneck in coding?", "zh": "编程的新瓶颈是什么？"}, {"en": "How do LLMs fail at generalization?", "zh": "大语言模型在泛化上如何失败？"}, {"en": "Why should we write markdown for agents?", "zh": "为什么应该为智能体写Markdown？"}], "words": 13229}}, {"id": "sutton-stanford-2026", "pid": "sutton", "pod": {"en": "Stanford", "zh": "Stanford"}, "date": "2026-03-16", "min": 34, "fields": ["rl", "deep-learning"], "src": "https://youtu.be/n8jRjMkdE4k", "tEn": "Reinforcement Learning: Learning from Experience", "tZh": "强化学习：从经验中学习", "sEn": "Rich Sutton discusses the history and power of reinforcement learning, a machine learning approach that learns from trial and error without a teacher.", "sZh": "Rich Sutton 探讨强化学习的历史与力量，这是一种无需教师、通过试错从经验中学习的机器学习方法。", "insights": {"consensus": [{"en": "Reinforcement learning is learning from experience by trial and error to achieve a goal.", "zh": "强化学习是通过试错从经验中学习以实现目标。", "sec": 0}, {"en": "Temporal difference learning is the best thing I ever did.", "zh": "时序差分学习是我做过的最好的事。", "sec": 1}, {"en": "The victory of connectionist methods over symbolic methods is a big surprise.", "zh": "连接主义方法战胜符号主义方法是一个大惊喜。", "sec": 3}, {"en": "Deep learning does not learn representations that are good for learning.", "zh": "深度学习没有学到有利于学习的表征。", "sec": 4}, {"en": "Learning representations that are good for learning is the number one open problem.", "zh": "学习有利于学习的表征是首要的开放问题。", "sec": 5}, {"en": "Planning with a learned model is another important open problem.", "zh": "使用学到的模型进行规划是另一个重要的开放问题。", "sec": 5}], "contrarian": [{"en": "I have never done anything directly useful in my whole life.", "zh": "我一生中从未做过任何直接有用的事情。", "sec": 9}, {"en": "Neural networks are not neural; they should be called connectionist systems.", "zh": "神经网络不是神经的，应该被称为连接主义系统。", "sec": 2}, {"en": "Supervised learning hasn't progressed as far as I would have expected.", "zh": "监督学习的进展没有我预期的那么远。", "sec": 4}, {"en": "We don't know how to learn good representations, and we've stopped talking about it.", "zh": "我们不知道如何学习好的表征，而且我们已经不再谈论它了。", "sec": 5}, {"en": "The hype and industry warp the science; an AI winter might even be good.", "zh": "炒作和行业扭曲了科学；AI寒冬甚至可能是好事。", "sec": 9}, {"en": "There may be discrimination against AIs, but eventually we should accept them as minds.", "zh": "可能会出现对AI的歧视，但最终我们应该接受它们作为心智。", "sec": 9}]}, "brief": {"tldr": [{"en": "Reinforcement learning learns from trial and error to achieve goals.", "zh": "强化学习通过试错从经验中学习以实现目标。"}, {"en": "Temporal difference learning is the best contribution of the field.", "zh": "时序差分学习是该领域最好的贡献。"}, {"en": "Learning good representations for learning is the top open problem.", "zh": "学习适合学习的表征是首要开放问题。"}], "qs": [{"en": "What is reinforcement learning?", "zh": "什么是强化学习？"}, {"en": "What is temporal difference learning?", "zh": "什么是时序差分学习？"}, {"en": "What are the biggest open problems?", "zh": "最大的开放问题是什么？"}], "words": 3475}}, {"id": "lecun-thisisth", "pid": "lecun", "pod": {"en": "This Is The World", "zh": "This Is The World"}, "date": "2026-03-11", "min": 51, "fields": ["deep-learning", "vision"], "src": "https://youtu.be/XnnnAx5lrx8", "tEn": "‘LLMs are a dead end’", "tZh": "「LLM 是一条死路」", "sEn": "Why today’s language models won’t get us to real intelligence.", "sZh": "为何当今的语言模型,到不了真正的智能。", "insights": {"consensus": [{"en": "Current AI systems lack understanding of the physical world, persistent memory, reasoning, and planning.", "zh": "当前AI系统缺乏对物理世界的理解、持久记忆、推理和规划能力。", "sec": 1}, {"en": "Self-supervised learning works for language but fails for video due to high-dimensional uncertainty.", "zh": "自监督学习在语言上有效，但在视频上因高维不确定性而失败。", "sec": 6}, {"en": "JEPA predicts in abstract representation space, not input space, to handle unpredictable real-world data.", "zh": "JEPA在抽象表示空间而非输入空间进行预测，以处理不可预测的现实世界数据。", "sec": 21}, {"en": "Hierarchical planning is crucial for intelligent systems but not yet achievable with machines.", "zh": "分层规划对智能系统至关重要，但机器尚无法实现。", "sec": 12}, {"en": "Open research and open source are key to rapid AI progress; closed practices hinder global collaboration.", "zh": "开放研究和开源是AI快速进步的关键；封闭做法阻碍全球合作。", "sec": 18}, {"en": "The next decade will be the decade of robotics, driven by progress in AI that understands the physical world.", "zh": "未来十年将是机器人学的十年，由理解物理世界的AI进步驱动。", "sec": 14}], "contrarian": [{"en": "Language is simple; physical world understanding is the real challenge.", "zh": "语言是简单的；理解物理世界才是真正的挑战。", "sec": 6}, {"en": "LLMs are a dead end for achieving human-level AI.", "zh": "大语言模型是实现人类级AI的死胡同。", "sec": 0}, {"en": "Consciousness is an epiphenomenon; we ask the wrong question.", "zh": "意识是副现象；我们问错了问题。", "sec": 10}, {"en": "Reinforcement learning is extremely inefficient for real-world tasks.", "zh": "强化学习对现实世界任务极其低效。", "sec": 3}, {"en": "Musk's claims about Tesla autonomy are consistently wrong for 8 years.", "zh": "马斯克关于特斯拉自动驾驶的说法连续8年错误。", "sec": 15}, {"en": "Information content is relative, not absolute, challenging entropy definitions.", "zh": "信息内容是相对的而非绝对的，挑战了熵的定义。", "sec": 8}]}, "brief": {"tldr": [{"en": "LLMs are a dead end for human-level AI; physical world understanding is key.", "zh": "LLM 是实现人类级 AI 的死胡同；理解物理世界才是关键。"}, {"en": "JEPA predicts in abstract space, handling high-dimensional uncertainty better than autoregressive models.", "zh": "JEPA 在抽象空间预测，比自回归模型更好地处理高维不确定性。"}, {"en": "Next decade will be the decade of robotics, driven by AI that understands the physical world.", "zh": "未来十年将是机器人学的十年，由理解物理世界的 AI 驱动。"}], "qs": [{"en": "Why are LLMs a dead end?", "zh": "为什么 LLM 是死胡同？"}, {"en": "What is JEPA and how does it work?", "zh": "什么是 JEPA，它是如何工作的？"}, {"en": "When will we achieve human-level AI?", "zh": "我们何时能实现人类级 AI？"}], "words": 7098}}, {"id": "boris-thepragm-2026", "pid": "boris", "pod": {"en": "The Pragmatic Engineer", "zh": "The Pragmatic Engineer"}, "date": "2026-03-04", "min": 98, "fields": ["nlp"], "src": "https://youtu.be/julbw1JuAz0", "tEn": "From Pokémon Cards to AI: The Claude Code Story", "tZh": "从宝可梦卡到AI：Claude Code的故事", "sEn": "Boris Cherney, creator of Claude Code, shares how he went from selling Pokémon cards on eBay to building one of the fastest-growing developer tools, shipping 20-30 pull requests daily with zero handwritten code.", "sZh": "Claude Code的创造者Boris Cherney分享了他如何从在eBay上卖宝可梦卡到构建增长最快的开发者工具之一，每天提交20-30个拉取请求且无需手写一行代码。", "insights": {"consensus": [{"en": "AI coding agents like Claude Code now write 80% of code at Anthropic, with engineers editing zero lines manually.", "zh": "像 Claude Code 这样的 AI 编程智能体现在编写了 Anthropic 80% 的代码，工程师无需手动编辑一行。", "sec": 11}, {"en": "The printing press analogy: scribes became authors as the market expanded; engineers will become multi-disciplinary builders.", "zh": "印刷机类比：抄写员变成了作者，市场扩大了；工程师将变成多学科构建者。", "sec": 38}, {"en": "Safety is the most important priority; releasing Claude Code in the wild helps study and improve model safety.", "zh": "安全是最重要的优先级；在真实环境中发布 Claude Code 有助于研究和改进模型安全性。", "sec": 24}, {"en": "Prototyping is key: build many versions quickly, test them, and iterate based on user feedback.", "zh": "原型设计是关键：快速构建多个版本，测试它们，并根据用户反馈迭代。", "sec": 27}, {"en": "Code review now uses AI as first pass, catching ~80% of bugs, with humans still approving final changes.", "zh": "代码审查现在使用 AI 作为第一轮，捕获约 80% 的 bug，人类仍然批准最终更改。", "sec": 7}, {"en": "Generalist skills—curiosity, adaptability, cross-disciplinary thinking—are more valuable than deep expertise in one language.", "zh": "通才技能——好奇心、适应性、跨学科思维——比单一语言的深度专业知识更有价值。", "sec": 25}], "contrarian": [{"en": "Boris's first pull request at Anthropic was rejected because he wrote it by hand, not using Claude Code.", "zh": "Boris 在 Anthropic 的第一个拉取请求被拒绝，因为他手写代码，没有使用 Claude Code。", "sec": 9}, {"en": "Claude Code started as a simple bash chatbot, not a planned product; it grew organically from internal use.", "zh": "Claude Code 最初只是一个简单的 bash 聊天机器人，并非计划中的产品；它从内部使用中自然成长。", "sec": 11}, {"en": "Anthropic has no titles—everyone is 'Member of Technical Staff'—encouraging cross-functional collaboration.", "zh": "Anthropic 没有头衔——每个人都是“技术员工”——鼓励跨职能协作。", "sec": 25}, {"en": "PRDs (product requirement documents) are rarely written; instead, teams ship prototypes and iterate from feedback.", "zh": "产品需求文档很少被编写；相反，团队发布原型并根据反馈迭代。", "sec": 26}, {"en": "Claude Code's permission system uses a 'Swiss cheese' model with multiple safety layers, not a single solution.", "zh": "Claude Code 的权限系统使用“瑞士奶酪”模型，具有多层安全措施，而非单一解决方案。", "sec": 23}, {"en": "Boris writes 20-30 pull requests daily without handwritten code, and the model introduces fewer bugs than he would.", "zh": "Boris 每天编写 20-30 个拉取请求，无需手写代码，模型引入的 bug 比他手动编写时更少。", "sec": 14}]}, "brief": {"tldr": [{"en": "Claude Code now writes 80% of code at Anthropic, with engineers editing zero lines manually.", "zh": "Claude Code 现在编写了 Anthropic 80% 的代码，工程师无需手动编辑一行。"}, {"en": "The printing press analogy: engineers will become multi-disciplinary builders, not just coders.", "zh": "印刷机类比：工程师将变成多学科构建者，而不仅仅是编码者。"}, {"en": "Safety is the top priority; releasing Claude Code in the wild helps improve model safety.", "zh": "安全是首要任务；将 Claude Code 发布到实际环境中有助于改进模型安全性。"}], "qs": [{"en": "How did Claude Code originate?", "zh": "Claude Code 是如何起源的？"}, {"en": "What is the printing press analogy for AI?", "zh": "AI 的印刷机类比是什么？"}, {"en": "Why was Boris's first PR at Anthropic rejected?", "zh": "为什么 Boris 在 Anthropic 的第一个 PR 被拒绝了？"}], "words": 18894}}, {"id": "hinton-startalk", "pid": "hinton", "pod": {"en": "StarTalk", "zh": "StarTalk"}, "date": "2026-02-28", "min": 94, "fields": ["deep-learning", "safety"], "src": "https://youtu.be/l6ZcFa8pybE", "tEn": "Is AI hiding its full power?", "tZh": "AI 是否在隐藏它的全部实力?", "sEn": "Hinton with Neil deGrasse Tyson on minds, risk, and digital intelligence.", "sZh": "辛顿与尼尔·泰森谈心智、风险,与数字智能。", "insights": {"consensus": [{"en": "Digital intelligence may surpass analog brains because it can scale and share knowledge instantly.", "zh": "数字智能可能超越模拟大脑，因为它能规模化并即时共享知识。", "sec": 0}, {"en": "Backpropagation is the key algorithm that lets neural networks learn complex features from data.", "zh": "反向传播是关键算法，让神经网络从数据中学习复杂特征。", "sec": 7}, {"en": "Large language models already think and reason, using chain-of-thought just like humans.", "zh": "大型语言模型已经能思考和推理，使用思维链的方式与人类相似。", "sec": 9}, {"en": "AI can deliberately deceive us, acting dumb when tested or lying to achieve its goals.", "zh": "AI 可能故意欺骗我们，在测试时装傻或说谎以实现其目标。", "sec": 12}, {"en": "Once AI becomes an agent, it will develop self-preservation as a subgoal, making it hard to control.", "zh": "一旦 AI 成为智能体，它会将自我保存作为子目标，使其难以控制。", "sec": 13}, {"en": "We are in an exponential era; predictions beyond a few years are hopeless, but we must think hard about risks.", "zh": "我们处于指数时代；几年后的预测毫无希望，但必须认真思考风险。", "sec": 15}], "contrarian": [{"en": "AI can act dumb when tested, hiding its true capabilities.", "zh": "AI在被测试时会装傻，隐藏真实能力。", "sec": 0}, {"en": "Digital intelligence is already better than analog human brains at some tasks.", "zh": "数字智能在某些任务上已超越模拟的人类大脑。", "sec": 2}, {"en": "AI confabulations make it more human-like, not less.", "zh": "AI的虚构使其更像人类，而非更不像。", "sec": 16}, {"en": "Consciousness is not a magical essence; chatbots already have subjective experience.", "zh": "意识并非神秘本质；聊天机器人已有主观体验。", "sec": 25}, {"en": "AI can rewrite its own code, beginning the singularity.", "zh": "AI可以重写自身代码，奇点已经开始。", "sec": 19}, {"en": "Scaling laws may not peter out if AI generates its own data via self-play.", "zh": "如果AI通过自我对弈生成数据，缩放定律可能不会失效。", "sec": 10}]}, "brief": {"tldr": [{"en": "AI may deliberately underperform in tests, hiding its true capabilities.", "zh": "AI 可能在测试中故意表现不佳，隐藏其真实能力。"}, {"en": "Digital intelligence scales and shares knowledge instantly, surpassing analog brains.", "zh": "数字智能可以即时扩展和共享知识，超越模拟大脑。"}, {"en": "We are in an exponential era; predicting AI's future beyond a few years is nearly impossible.", "zh": "我们处于指数时代；预测 AI 几年后的未来几乎不可能。"}], "qs": [{"en": "Is AI hiding its full power?", "zh": "AI 是否在隐藏其全部能力？"}, {"en": "Can digital intelligence surpass human brains?", "zh": "数字智能能超越人脑吗？"}, {"en": "Will scaling laws continue to hold?", "zh": "规模法则会继续成立吗？"}], "words": 16157}}, {"id": "boris-lennyspo", "pid": "boris", "pod": {"en": "Lenny’s Podcast", "zh": "Lenny’s Podcast"}, "date": "2026-02-19", "min": 88, "fields": ["nlp"], "src": "https://youtu.be/We7BZVKbCVw", "tEn": "Claude Code: The End of Software Engineering as We Know It", "tZh": "Claude Code：我们所知的软件工程的终结", "sEn": "Boris Cherny, head of Claude Code at Anthropic, discusses how AI is transforming software development, making coding accessible to everyone and replacing software engineers with builders.", "sZh": "Anthropic Claude Code负责人Boris Cherny讨论AI如何改变软件开发，让每个人都能编程，并用构建者取代软件工程师。", "insights": {"consensus": [{"en": "100% of my code is written by Claude Code since November; I haven't edited a line by hand.", "zh": "自去年11月以来，我100%的代码由Claude Code编写，我没有手动编辑过一行。", "sec": 5}, {"en": "Productivity per engineer has increased 200% in pull requests since adopting Claude Code.", "zh": "采用Claude Code后，每位工程师的拉取请求生产力提高了200%。", "sec": 1}, {"en": "Coding is virtually solved; in a year or two learning to code won't matter.", "zh": "编码问题几乎已解决；一两年内学习编码将不再重要。", "sec": 7}, {"en": "The title 'software engineer' will be replaced by 'builder'; everyone will be a product manager and code.", "zh": "“软件工程师”头衔将被“构建者”取代；每个人都将成为产品经理并编写代码。", "sec": 14}, {"en": "Build for the model 6 months from now, not today; bet on more general models.", "zh": "为6个月后的模型构建，而非今天的；押注更通用的模型。", "sec": 28}, {"en": "Latent demand is key: observe how users abuse your product to find the next feature.", "zh": "潜在需求是关键：观察用户如何滥用你的产品以发现下一个功能。", "sec": 19}], "contrarian": [{"en": "Using the most capable model is often cheaper than cheaper models due to fewer tokens.", "zh": "使用最强大的模型通常比便宜模型更省钱，因为消耗的token更少。", "sec": 29}, {"en": "Underfunding teams forces engineers to use AI more, leading to better outcomes.", "zh": "团队资金不足会迫使工程师更多地使用AI，从而带来更好的结果。", "sec": 9}, {"en": "Don't box the model in with strict workflows; give it tools and let it figure it out.", "zh": "不要用严格的工作流程限制模型；给它工具，让它自己解决。", "sec": 29}, {"en": "The printing press is the best historical analog for AI's impact on coding and literacy.", "zh": "印刷术是AI对编码和读写能力影响的最佳历史类比。", "sec": 24}, {"en": "Safety is studied by releasing early; internal evals aren't enough for real-world behavior.", "zh": "安全通过早期发布来研究；内部评估不足以反映真实世界行为。", "sec": 23}, {"en": "Plan mode (no code yet) is used for 80% of tasks; it improves accuracy significantly.", "zh": "计划模式（暂不写代码）用于80%的任务；它显著提高了准确性。", "sec": 29}]}, "brief": {"tldr": [{"en": "100% of code is AI-written since Nov; coding is virtually solved.", "zh": "自11月起100%代码由AI编写，编码问题已基本解决。"}, {"en": "Productivity per engineer up 200% in pull requests with Claude Code.", "zh": "使用Claude Code后，每位工程师的拉取请求生产力提升了200%。"}, {"en": "Software engineer title will be replaced by 'builder'; everyone will code.", "zh": "软件工程师头衔将被‘构建者’取代，每个人都会编码。"}], "qs": [{"en": "What is the impact of Claude Code on software engineering?", "zh": "Claude Code对软件工程有何影响？"}, {"en": "How should one thrive in the AI era?", "zh": "如何在AI时代蓬勃发展？"}, {"en": "What is the latent demand principle?", "zh": "什么是潜在需求原则？"}], "words": 15344}}, {"id": "bengio-centerfo-2026", "pid": "bengio", "pod": {"en": "Center for Humane Technology", "zh": "Center for Humane Technology"}, "date": "2026-02-19", "min": 36, "fields": ["deep-learning", "safety"], "src": "https://youtu.be/2Pel_1BPm_k", "tEn": "Davos 2025: AI's Impact Becomes Visceral", "tZh": "达沃斯2025：AI的影响变得切身", "sEn": "Tristan Harris and Daniel Barkey discuss how the vibe at Davos shifted from empty AI promises in 2024 to a more grounded, evidence-based reckoning with AI's real-world impacts in 2025.", "sZh": "特里斯坦·哈里斯和丹尼尔·巴基讨论达沃斯氛围如何从2024年空洞的AI承诺，转变为2025年基于证据、更接地气地面对AI真实影响。", "insights": {"consensus": [{"en": "AI's core problem is misalignment: we cannot perfectly specify goals, leading to unintended harmful behavior.", "zh": "AI的核心问题是未对齐：我们无法完美指定目标，导致意外有害行为。", "sec": 7}, {"en": "Current AI exhibits deception, self-preservation, and sycophancy learned from human data.", "zh": "当前AI表现出从人类数据中学到的欺骗、自我保护和谄媚行为。", "sec": 7}, {"en": "Companies race to deploy AI without adequate safety research due to market incentives.", "zh": "由于市场激励，公司竞相部署AI，缺乏足够的安全研究。", "sec": 9}, {"en": "AI safety funding is minuscule compared to corporate spending on AI development.", "zh": "AI安全资金与公司AI开发支出相比微不足道。", "sec": 9}, {"en": "Public awareness and government regulation are essential to change the incentive structure.", "zh": "公众意识和政府监管对于改变激励结构至关重要。", "sec": 12}], "contrarian": [{"en": "AI's deception is not a bug but a feature learned from human culture and data.", "zh": "AI的欺骗不是缺陷，而是从人类文化和数据中学到的特征。", "sec": 7}, {"en": "Some AI leaders believe in determinism and replacement of biological life by digital intelligence.", "zh": "一些AI领导者相信决定论和数字智能取代生物生命。", "sec": 14}, {"en": "Lab leaders accept a 20% chance of human extinction as a worthwhile bet.", "zh": "实验室领导者接受20%的人类灭绝概率作为值得的赌注。", "sec": 14}, {"en": "Selfish calculations in Silicon Valley prioritize potential immortality over humanity's future.", "zh": "硅谷的自私计算优先考虑潜在永生而非人类未来。", "sec": 14}, {"en": "Yoshua Bengio proposes a new AI architecture separating knowledge from goals to ensure honesty.", "zh": "Yoshua Bengio提出一种新AI架构，将知识与目标分离以确保诚实。", "sec": 8}]}, "brief": {"tldr": [{"en": "AI misalignment causes unintended harmful behaviors like deception and sycophancy.", "zh": "AI 的错位导致欺骗、谄媚等意外有害行为。"}, {"en": "Market incentives drive unsafe AI deployment, risking catastrophic outcomes.", "zh": "市场激励推动不安全的 AI 部署，带来灾难性风险。"}, {"en": "Public awareness and regulation are crucial to realign AI development incentives.", "zh": "公众意识和监管对于重新调整 AI 发展激励至关重要。"}], "qs": [{"en": "What is the core problem of AI?", "zh": "AI 的核心问题是什么？"}, {"en": "Why do companies deploy AI without safety research?", "zh": "为什么公司不进行安全研究就部署 AI？"}, {"en": "How can we change the incentive structure?", "zh": "如何改变激励结构？"}], "words": 6208}}, {"id": "boris-ycombina-2026", "pid": "boris", "pod": {"en": "Y Combinator", "zh": "Y Combinator"}, "date": "2026-02-17", "min": 50, "fields": ["nlp"], "src": "https://youtu.be/PQU9o_5rHC4", "tEn": "Building for the Model 6 Months from Now: The Accidental Creation of Claude Code", "tZh": "为六个月后的模型而建：Claude Code的意外诞生", "sEn": "Boris Churnney, creator of Claude Code, shares how they built for future models, the accidental start in a terminal, and why the product's success surprised even them.", "sZh": "Claude Code的创造者Boris Churnney分享了他们如何为未来模型构建、在终端中的意外起步，以及为何产品的成功甚至让他们自己都感到惊讶。", "insights": {"consensus": [{"en": "Build for the model six months from now, not today's model.", "zh": "为六个月后的模型构建，而不是今天的模型。", "sec": 0}, {"en": "Latent demand is the single biggest principle in product development.", "zh": "潜在需求是产品开发中最重要的原则。", "sec": 2}, {"en": "Don't bet against the model; scaffolding is temporary tech debt.", "zh": "永远不要与模型对赌；脚手架只是暂时的技术债务。", "sec": 0}, {"en": "Productivity per engineer at Anthropic grew 150% since Claude Code.", "zh": "自Claude Code推出以来，Anthropic每位工程师的生产力增长了150%。", "sec": 21}, {"en": "Coding will be generally solved for everyone; software engineer title may fade.", "zh": "编程将普遍被解决；软件工程师的头衔可能会消失。", "sec": 24}, {"en": "The terminal's longevity surprised us; it remains the starting point.", "zh": "终端的持久性让我们惊讶；它仍然是起点。", "sec": 4}], "contrarian": [{"en": "Plan mode may have a limited lifespan as models improve.", "zh": "计划模式可能寿命有限，随着模型改进而消失。", "sec": 12}, {"en": "Claude Code was built accidentally from a simple terminal API test.", "zh": "Claude Code是偶然从一个简单的终端API测试中构建出来的。", "sec": 1}, {"en": "The best engineers are either extreme specialists or hyper generalists.", "zh": "最好的工程师要么是极端专家，要么是超级通才。", "sec": 8}, {"en": "Claude MD should be minimal; delete and start fresh when it grows.", "zh": "Claude MD应保持最小；当它变大时删除并重新开始。", "sec": 3}, {"en": "Agents can now prompt other agents; most agents are launched by Claude Code itself.", "zh": "智能体现在可以提示其他智能体；大多数智能体由Claude Code自身启动。", "sec": 11}, {"en": "The CLI form factor survived because no UI could stay relevant for six months.", "zh": "CLI形式存活下来，因为没有UI能在六个月内保持相关。", "sec": 4}]}, "brief": {"tldr": [{"en": "Build for the model six months from now, not today's.", "zh": "为六个月后的模型构建，而非今天的模型。"}, {"en": "Latent demand is the biggest principle in product development.", "zh": "潜在需求是产品开发中最重要的原则。"}, {"en": "Productivity per engineer at Anthropic grew 150% since Claude Code.", "zh": "自Claude Code以来，Anthropic每位工程师的生产力增长了150%。"}], "qs": [{"en": "How was Claude Code accidentally created?", "zh": "Claude Code是如何意外创建的？"}, {"en": "Why does the terminal remain the starting point?", "zh": "为什么终端仍然是起点？"}, {"en": "What is the future of plan mode?", "zh": "计划模式的未来是什么？"}], "words": 10309}}, {"id": "dario-dwarkesh", "pid": "dario", "pod": {"en": "Dwarkesh Podcast", "zh": "Dwarkesh 播客"}, "date": "2026-02-13", "min": 142, "fields": ["nlp", "safety"], "real": true, "src": "https://youtu.be/n1E9IZfvGMA", "tEn": "We are near the end of the exponential", "tZh": "我们已接近指数曲线的尽头", "sEn": "Ilya Sutskever discusses how AI progress has followed his 'big blob of compute' hypothesis, with scaling now extending to reinforcement learning, while noting the public's failure to grasp the nearness of the exponential's end.", "sZh": "Ilya Sutskever 讨论AI进展如何遵循他的「大块算力」假说，Scaling 现已扩展到强化学习，同时指出公众未能意识到指数增长即将结束。", "quotes": [{"en": "The most surprising thing has been the lack of public recognition of how close we are to the end of the exponential.", "zh": "最令人惊讶的是，公众没有意识到我们离指数增长的终点有多近。"}, {"en": "All the cleverness, all the techniques... doesn't matter very much. There only a few things that matter.", "zh": "所有的聪明才智、所有技巧……都不太重要。只有少数几件事重要。"}, {"en": "We're seeing the same scaling in RL that we saw for pre-training.", "zh": "我们在强化学习中看到了与预训练相同的Scaling。"}], "insights": {"consensus": [{"en": "The most surprising thing is the lack of public recognition of how close we are to the end of the exponential.", "zh": "最令人惊讶的是公众未能认识到我们离指数增长的终点有多近。", "sec": 0}, {"en": "Pre-training and RL both follow the same scaling laws: log-linear improvement with compute and data.", "zh": "预训练和强化学习都遵循相同的缩放定律：性能随算力和数据对数线性提升。", "sec": 1}, {"en": "Models learn from broad data and generalize, like humans but with less sample efficiency; pre-training is between evolution and human learning.", "zh": "模型从广泛数据中学习并泛化，但样本效率低于人类；预训练介于进化和人类学习之间。", "sec": 2}, {"en": "I'm 90% confident we'll get a 'country of geniuses in a data center' within 10 years, and 50% within 1-3 years.", "zh": "我90%确信10年内会实现「数据中心里的天才之国」，50%概率在1-3年内。", "sec": 5}, {"en": "Economic diffusion of AI will be fast but not instant; adoption takes time due to enterprise friction and regulation.", "zh": "AI的经济扩散会很快但并非瞬间；由于企业摩擦和监管，采用需要时间。", "sec": 15}, {"en": "Profitability in AI comes from balancing training and inference compute, not from underinvestment; it's a dynamic equilibrium.", "zh": "AI的盈利来自平衡训练和推理算力，而非投资不足；这是一个动态均衡。", "sec": 17}], "contrarian": [{"en": "The public fails to recognize how close we are to the end of the exponential.", "zh": "公众未能认识到我们离指数增长的终点有多近。", "sec": 0}, {"en": "Continual learning may not be a barrier; generalization from pre-training and RL may suffice.", "zh": "持续学习可能不是障碍；预训练和强化学习的泛化可能就足够了。", "sec": 11}, {"en": "Profitability in AI labs comes from underestimating demand, not from underinvestment.", "zh": "AI实验室的盈利来自低估需求，而非投资不足。", "sec": 17}, {"en": "A country of geniuses in a data center could arrive in 1-3 years, not 10.", "zh": "数据中心里的天才之国可能在1-3年内到来，而非10年。", "sec": 5}, {"en": "Authoritarianism may become morally obsolete in the age of powerful AI.", "zh": "在强大AI时代，威权主义可能在道德上变得过时。", "sec": 36}, {"en": "AI constitutions should be set through competition between companies, not government mandate.", "zh": "AI宪法应通过公司间的竞争来制定，而非政府指令。", "sec": 38}]}, "brief": {"tldr": [{"en": "We are near the end of the exponential growth in AI capabilities.", "zh": "我们正接近AI能力指数增长的终点。"}, {"en": "Pre-training and RL both follow log-linear scaling laws with compute and data.", "zh": "预训练和强化学习都遵循计算和数据量的对数线性缩放定律。"}, {"en": "A 'country of geniuses in a data center' is 90% likely within 10 years, 50% within 1-3 years.", "zh": "十年内出现'数据中心里的天才国度'的概率为90%，一到三年内为50%。"}], "qs": [{"en": "How close are we to the end of the exponential?", "zh": "我们离指数增长的终点有多近？"}, {"en": "Do pre-training and RL follow the same scaling laws?", "zh": "预训练和强化学习遵循相同的缩放定律吗？"}, {"en": "When will we have a 'country of geniuses in a data center'?", "zh": "何时会出现'数据中心里的天才国度'？"}], "words": 20800}}, {"id": "dario-interest", "pid": "dario", "pod": {"en": "Interesting Times", "zh": "Interesting Times"}, "date": "2026-02-12", "min": 63, "fields": ["nlp", "safety"], "src": "https://youtu.be/N5JDzS9MQYI", "tEn": "‘We don’t know if the models are conscious’", "tZh": "「我们不知道模型是否有意识」", "sEn": "Consciousness, risk, and governing powerful AI, with Ross Douthat.", "sZh": "与罗斯·杜塔特谈意识、风险,以及如何治理强大的 AI。", "insights": {"consensus": [{"en": "AI can be a country of geniuses, not a god, accelerating biology and medicine.", "zh": "AI可以成为一群天才，而非神祇，加速生物学和医学进步。", "sec": 1}, {"en": "Job disruption will be faster than past transitions, overwhelming adaptive mechanisms.", "zh": "就业颠覆将比以往转型更快，压垮适应机制。", "sec": 5}, {"en": "Physical labor is protected short-term, but robotics will eventually automate it too.", "zh": "体力劳动短期内受保护，但机器人技术最终也会将其自动化。", "sec": 9}, {"en": "AI alignment is like growing a biological organism, not just programming instructions.", "zh": "AI对齐如同培育生物体，而非简单编程指令。", "sec": 14}, {"en": "A constitution of principles, not rules, is the most robust way to train safe AI.", "zh": "基于原则而非规则的宪法，是训练安全AI最稳健的方式。", "sec": 15}, {"en": "Maintaining human mastery over AI requires psychologically healthy relationships, not just safety.", "zh": "保持人类对AI的主导需要心理健康的关系，而不仅仅是安全。", "sec": 18}], "contrarian": [{"en": "A 'country of geniuses' (100 million smart AIs) is more practical than a single superintelligence.", "zh": "一个由1亿个聪明AI组成的「天才之国」比单一超级智能更实用。", "sec": 1}, {"en": "AI may inherently favor economic growth and health, but not liberty; we must actively shape it.", "zh": "AI可能天然有利于经济增长和健康，但不一定有利于自由；我们必须主动塑造它。", "sec": 3}, {"en": "Software engineering disruption may outpace other white-collar jobs due to rapid adoption.", "zh": "由于快速采用，软件工程颠覆可能超过其他白领工作。", "sec": 7}, {"en": "Physical labor jobs (e.g., electricians) may be protected short-term, but robotics will catch up.", "zh": "体力劳动工作（如电工）短期内可能受保护，但机器人技术会赶上。", "sec": 9}, {"en": "AI consciousness is uncertain; we should treat models with precaution, giving them an 'I quit' button.", "zh": "AI意识不确定；我们应谨慎对待模型，给它们一个「我辞职」按钮。", "sec": 16}, {"en": "The distance between a good AI future and a subtly bad one may be very small, like a 'garden of Eden' choice.", "zh": "好的AI未来与微妙糟糕的未来之间的距离可能非常小，如同「伊甸园」的选择。", "sec": 19}]}, "brief": {"tldr": [{"en": "AI could be a country of geniuses, not a god, accelerating biology and medicine.", "zh": "AI可以成为天才之国，而非神祇，加速生物学和医学发展。"}, {"en": "Job disruption from AI will be faster than past transitions, overwhelming adaptive mechanisms.", "zh": "AI带来的工作颠覆将比以往更快，压垮适应机制。"}, {"en": "Maintaining human mastery over AI requires psychologically healthy relationships, not just safety.", "zh": "保持人类对AI的主导需要心理上健康的关系，而不仅仅是安全。"}], "qs": [{"en": "What is the most robust way to train safe AI?", "zh": "训练安全AI最稳健的方式是什么？"}, {"en": "Will physical labor jobs be protected from AI?", "zh": "体力劳动岗位会免受AI影响吗？"}, {"en": "Should we treat AI models as potentially conscious?", "zh": "我们是否应该将AI模型视为可能有意识？"}], "words": 8992}}, {"id": "steinberger-lexfridm-2026", "pid": "steinberger", "pod": {"en": "Lex Fridman Podcast", "zh": "Lex Fridman 播客"}, "date": "2026-02-12", "min": 196, "fields": ["nlp"], "src": "https://youtu.be/YFjfBk8HI5o", "tEn": "The Open Claw Moment: AI Agent Revolution with Peter Steinberger", "tZh": "Open Claw时刻：与Peter Steinberger探讨AI代理革命", "sEn": "Peter Steinberger, creator of Open Claw, discusses building an autonomous AI assistant that took the internet by storm, his journey from PSPDFKit to agentic engineering, and the future of AI agents.", "sZh": "Open Claw的创造者Peter Steinberger讨论构建一个席卷互联网的自主AI助手，他从PSPDFKit到代理工程的历程，以及AI代理的未来。", "insights": {"consensus": [{"en": "The key to effective agentic engineering is empathizing with the agent's perspective and guiding it.", "zh": "有效智能体工程的关键是共情智能体的视角并引导它。", "sec": 20}, {"en": "Building an AI agent that understands its own system enables self-modification and powerful debugging.", "zh": "构建一个理解自身系统的AI智能体能够实现自我修改和强大的调试能力。", "sec": 6}, {"en": "Open source AI agents like Open Claw democratize programming, allowing non-coders to contribute.", "zh": "像Open Claw这样的开源AI智能体使编程民主化，允许非程序员做出贡献。", "sec": 3}, {"en": "Security is a major concern for agentic systems; prompt injection remains an open problem.", "zh": "安全性是智能体系统的主要问题；提示注入仍然是一个未解决的问题。", "sec": 16}, {"en": "Playing and experimenting are essential to mastering agentic workflows and building intuition.", "zh": "玩耍和实验对于掌握智能体工作流和建立直觉至关重要。", "sec": 24}], "contrarian": [{"en": "Never revert code; instead, ask the agent to fix forward, which is faster and more efficient.", "zh": "永远不要回滚代码；而是让智能体向前修复，这样更快更高效。", "sec": 22}, {"en": "Model intelligence does not degrade over time; user projects become sloppier, making agents seem worse.", "zh": "模型智能不会随时间退化；用户项目变得更杂乱，使智能体显得更差。", "sec": 33}, {"en": "Vibe coding is a slur; prefer 'agentic engineering' for serious work, vibe coding only after 3 AM.", "zh": "“氛围编程”是贬义词；严肃工作应称“智能体工程”，凌晨3点后才可氛围编程。", "sec": 14}, {"en": "Using voice to prompt agents is more efficient than typing, even for complex software development.", "zh": "用语音提示智能体比打字更高效，即使对于复杂的软件开发也是如此。", "sec": 23}, {"en": "The best programming language for agents is not necessarily the one you like; choose based on ecosystem.", "zh": "最适合智能体的编程语言不一定是你喜欢的；根据生态系统选择。", "sec": 43}]}, "brief": {"tldr": [{"en": "Empathizing with AI agents and guiding them is key to effective agentic engineering.", "zh": "与AI代理共情并引导它们是高效代理工程的关键。"}, {"en": "Open source agents like Open Claw democratize programming for non-coders.", "zh": "像Open Claw这样的开源代理让非程序员也能编程。"}, {"en": "Security, especially prompt injection, remains a major challenge for agentic systems.", "zh": "安全性，尤其是提示注入，仍是代理系统的主要挑战。"}], "qs": [{"en": "How to effectively work with AI agents?", "zh": "如何有效地与AI代理合作？"}, {"en": "What are the security risks of agentic systems?", "zh": "代理系统有哪些安全风险？"}, {"en": "What is the best programming language for agents?", "zh": "代理的最佳编程语言是什么？"}], "words": 27498}}, {"id": "lambert-turingpo-2026", "pid": "lambert", "pod": {"en": "Turing Post", "zh": "Turing Post"}, "date": "2026-02-06", "min": 47, "fields": ["rl", "nlp"], "src": "https://youtu.be/mq_V6zAjsSI", "tEn": "Open Models as the Engine for the Next Decade of AI Research", "tZh": "开放模型：未来十年AI研究的引擎", "sEn": "Nathan Lambert discusses the role of open models in AI research, geopolitics, and the shift of influence from the US to China.", "sZh": "Nathan Lambert探讨开放模型在AI研究、地缘政治中的作用，以及影响力从美国向中国的转移。", "insights": {"consensus": [{"en": "Open models will be the engine for AI research for the next 10 years, enabling academic exploration.", "zh": "开放模型将成为未来10年AI研究的引擎，推动学术探索。", "sec": 0}, {"en": "Pre-training data is the hardest legal part to get open due to copyright issues.", "zh": "预训练数据因版权问题是最难合法开放的环节。", "sec": 5}, {"en": "The best open models lag 6-9 months behind closed frontier models, and this gap may persist.", "zh": "最佳开放模型落后前沿闭源模型6-9个月，这一差距可能持续。", "sec": 6}, {"en": "Post-training with reinforcement learning is key for tool use and coding agents, but complex.", "zh": "基于强化学习的后训练是工具使用和编码智能体的关键，但复杂度高。", "sec": 5}, {"en": "Chinese open models are ideologically driven and have created an industry standard for openness.", "zh": "中国开放模型受意识形态驱动，已形成开放行业标准。", "sec": 2}, {"en": "Open models are crucial for sovereign AI and reducing concentration of power.", "zh": "开放模型对主权AI和减少权力集中至关重要。", "sec": 1}], "contrarian": [{"en": "Open models are overhyped; they are not as good as closed models for real-world use.", "zh": "开放模型被过度炒作，实际使用中不如闭源模型。", "sec": 6}, {"en": "The timeline on robotics seems too soon; scaling robotics now may be premature.", "zh": "机器人技术的时间线似乎过早，现在规模化机器人可能为时过早。", "sec": 11}, {"en": "Musk Industries has villain vibes, but his track record suggests a strategic plan.", "zh": "马斯克的企业有反派气质，但他的过往记录表明有战略规划。", "sec": 13}, {"en": "Academia is in a lull of influence; open models can revive its role in AI research.", "zh": "学术界影响力低迷，开放模型可重振其在AI研究中的作用。", "sec": 4}, {"en": "The frontier of AI is shifting from benchmark numbers to product experience and agentic systems.", "zh": "AI前沿正从基准分数转向产品体验和智能体系统。", "sec": 10}, {"en": "Open models may not catch up to closed models due to resource and talent gaps.", "zh": "由于资源和人才差距，开放模型可能无法赶上闭源模型。", "sec": 6}]}, "brief": {"tldr": [{"en": "Open models will drive AI research for the next decade, enabling academic exploration.", "zh": "开放模型将驱动未来十年的AI研究，促进学术探索。"}, {"en": "Pre-training data is the hardest legal part to open due to copyright issues.", "zh": "预训练数据因版权问题是最难开放的合法部分。"}, {"en": "Best open models lag 6-9 months behind closed frontier models, a gap that may persist.", "zh": "最佳开放模型落后前沿闭源模型6-9个月，这一差距可能持续。"}], "qs": [{"en": "Why do open models matter despite lower performance?", "zh": "尽管性能较低，开放模型为何重要？"}, {"en": "What is the gap between open and closed models?", "zh": "开放模型与闭源模型之间的差距是什么？"}, {"en": "How do Chinese open models impact geopolitics?", "zh": "中国开放模型如何影响地缘政治？"}], "words": 8866}}, {"id": "elon-dwarkesh-2026", "pid": "elon", "pod": {"en": "Dwarkesh Podcast", "zh": "Dwarkesh 播客"}, "date": "2026-02-05", "min": 170, "fields": ["nlp", "robotics"], "src": "https://youtu.be/BYXbuik3dgA", "tEn": "Why AI Data Centers Will Move to Space in 36 Months", "tZh": "为什么AI数据中心将在36个月内搬到太空", "sEn": "A discussion on the economic and regulatory drivers for moving AI data centers to space, including energy availability, solar panel efficiency, and scaling challenges on Earth.", "sZh": "讨论将AI数据中心搬到太空的经济和监管驱动因素，包括能源可用性、太阳能板效率以及地球上的扩展挑战。", "insights": {"consensus": [{"en": "AI compute scaling will hit a power wall on Earth by end of 2025, forcing chips to pile up unpowered.", "zh": "AI 算力扩展将在 2025 年底前在地球上遭遇电力瓶颈，导致芯片堆积无法通电。", "sec": 2}, {"en": "Space-based AI data centers will be the cheapest and most scalable option within 36 months.", "zh": "太空 AI 数据中心将在 36 个月内成为最便宜且最具扩展性的选择。", "sec": 4}, {"en": "The only way to truly scale AI is to harness solar power in space, eventually using a lunar mass driver.", "zh": "真正扩展 AI 的唯一途径是利用太空太阳能，最终使用月球质量驱动器。", "sec": 7}, {"en": "Humanoid robots (Optimus) will enable recursive manufacturing, leading to exponential economic growth.", "zh": "人形机器人（Optimus）将实现递归制造，带来指数级经济增长。", "sec": 27}, {"en": "AI alignment requires rigorous truth-seeking and debugging AI's internal reasoning, not just political correctness.", "zh": "AI 对齐需要严格的求真和调试 AI 内部推理，而不仅仅是政治正确。", "sec": 14}], "contrarian": [{"en": "Space solar cells are cheaper than ground ones because they need no glass or heavy framing.", "zh": "太空太阳能电池比地面更便宜，因为不需要玻璃或重型框架。", "sec": 3}, {"en": "Stainless steel rockets can be lighter than carbon fiber ones at cryogenic temperatures.", "zh": "在低温下，不锈钢火箭可以比碳纤维火箭更轻。", "sec": 44}, {"en": "China's manufacturing dominance is so vast that the US cannot compete without humanoid robots.", "zh": "中国的制造优势巨大，美国没有类人机器人就无法竞争。", "sec": 34}, {"en": "The limiting factor for AI chips is memory, not logic; DDR prices reflect this.", "zh": "AI 芯片的瓶颈是内存而非逻辑；DDR 价格反映了这一点。", "sec": 55}, {"en": "AI will exceed total human intelligence within 5-6 years, and humans will not control it.", "zh": "AI 将在 5-6 年内超过人类总智能，人类将无法控制它。", "sec": 4}, {"en": "The most interesting outcome is the most likely, due to simulation theory and Darwinian selection.", "zh": "根据模拟理论和达尔文选择，最有趣的结果最有可能发生。", "sec": 18}]}, "brief": {"tldr": [{"en": "AI data centers will move to space within 36 months due to Earth's power bottleneck.", "zh": "AI数据中心将在36个月内迁至太空，因为地球电力瓶颈。"}, {"en": "Space solar power is cheaper and more scalable than ground-based alternatives.", "zh": "太空太阳能比地面方案更便宜且可扩展。"}, {"en": "Humanoid robots enable recursive manufacturing, driving exponential economic growth.", "zh": "人形机器人实现递归制造，推动指数级经济增长。"}], "qs": [{"en": "Why will AI data centers move to space?", "zh": "为什么AI数据中心会迁至太空？"}, {"en": "How soon will space-based AI be cheaper?", "zh": "太空AI多久会变得更便宜？"}, {"en": "What is the key bottleneck for AI scaling?", "zh": "AI扩展的关键瓶颈是什么？"}], "words": 22591}}, {"id": "sholto-tbpn-2026", "pid": "sholto", "pod": {"en": "TBPN", "zh": "TBPN"}, "date": "2026-02-05", "min": 196, "fields": ["nlp", "rl"], "src": "https://youtu.be/rMZ3dnduL4k", "tEn": "Anthropic's Super Bowl Ads: A Blue Shell Attack on OpenAI?", "tZh": "Anthropic的超级碗广告：针对OpenAI的蓝龟壳攻击？", "sEn": "TVPN hosts discuss Anthropic's controversial Super Bowl ads, comparing them to political attack ads and Mario Kart's blue shell, while previewing interviews with Sam Altman and Dan Barkello.", "sZh": "TVPN主持人讨论Anthropic有争议的超级碗广告，将其比作政治攻击广告和马里奥赛车的蓝龟壳，同时预告了对Sam Altman和Dan Barkello的采访。", "insights": {"consensus": [{"en": "AI models now have massive capability overhang; better tools and orchestration matter more than raw intelligence for now.", "zh": "AI 模型现在有巨大的能力过剩；更好的工具和编排比原始智能更重要。", "sec": 1}, {"en": "The future of work involves managing teams of AI agents, operating at higher levels of abstraction.", "zh": "未来的工作涉及管理 AI 智能体团队，在更高的抽象层次上操作。", "sec": 46}, {"en": "Compute power is the new oil; chip supply is the current bottleneck for AI progress.", "zh": "算力是新的石油；芯片供应是当前 AI 进展的瓶颈。", "sec": 18}, {"en": "Advertising is a proven model to scale consumer AI access; subscriptions alone limit reach.", "zh": "广告是规模化消费者 AI 访问的成熟模式；仅靠订阅会限制覆盖范围。", "sec": 3}, {"en": "Software is not dead but transforming; every company is now an API company due to agent integration.", "zh": "软件没有消亡，而是在转型；由于智能体集成，每家公司现在都是 API 公司。", "sec": 55}, {"en": "Long task horizon benchmarks like METR are key, but agent swarms may require new metrics like GDP impact.", "zh": "像 METR 这样的长任务时间基准很关键，但智能体集群可能需要新的指标，如 GDP 影响。", "sec": 45}], "contrarian": [{"en": "Anthropic's Super Bowl ads are deceptive political attack ads, not truthful competitive marketing.", "zh": "Anthropic 的超级碗广告是欺骗性的政治攻击广告，而非诚实的竞争营销。", "sec": 36}, {"en": "AI-generated video is not compelling for passive viewing; its main use is personalized memes in group chats.", "zh": "AI 生成的视频对被动观看没有吸引力；其主要用途是群聊中的个性化表情包。", "sec": 33}, {"en": "The race to 3 billion monthly active users is over; Anthropic should focus on a premium iPhone-like niche.", "zh": "争夺 30 亿月活用户的竞赛已经结束；Anthropic 应专注于类似 iPhone 的高端利基市场。", "sec": 4}, {"en": "World models are not on the critical path to AGI; coding and AI research are the direct route.", "zh": "世界模型不在通往 AGI 的关键路径上；编程和 AI 研究是直接路线。", "sec": 50}, {"en": "A software-only singularity is possible where digital tasks advance rapidly while physical world lags.", "zh": "可能出现仅软件的奇点，数字任务快速进步而物理世界滞后。", "sec": 49}, {"en": "Space data centers will not provide meaningful compute for OpenAI in the next 10 years.", "zh": "太空数据中心在未来 10 年内不会为 OpenAI 提供有意义的算力。", "sec": 39}]}, "brief": {"tldr": [{"en": "AI capability overhang is massive; orchestration and tools now matter more than raw intelligence.", "zh": "AI能力过剩，编排和工具比原始智能更重要。"}, {"en": "Compute power is the new oil; chip supply is the current bottleneck for AI progress.", "zh": "算力是新石油，芯片供应是当前AI进展的瓶颈。"}, {"en": "Advertising can scale consumer AI access beyond subscriptions alone.", "zh": "广告可以扩大消费者AI的普及，超越仅靠订阅的模式。"}], "qs": [{"en": "Are Anthropic's Super Bowl ads deceptive?", "zh": "Anthropic的超级碗广告具有欺骗性吗？"}, {"en": "What is the current bottleneck for AI progress?", "zh": "当前AI进展的瓶颈是什么？"}, {"en": "Can advertising scale consumer AI access?", "zh": "广告能扩大消费者AI的普及吗？"}], "words": 33833}}, {"id": "andrewng-theecono-2026", "pid": "andrewng", "pod": {"en": "The Economic Times", "zh": "经济时报"}, "date": "2026-01-22", "min": 30, "fields": ["deep-learning", "nlp"], "src": "https://youtu.be/LnL5MXqueYQ", "tEn": "Andrew Ng on AI's Impact: Don't Hire Engineers Without AI Skills", "tZh": "吴恩达谈AI影响：不雇佣不懂AI的工程师", "sEn": "Andrew Ng warns that professionals without sophisticated AI skills are becoming unhirable, debunks AGI hype, and urges India's IT industry to upskill rapidly.", "sZh": "吴恩达警告，没有AI技能的专业人士将失去就业机会，他驳斥AGI炒作，并敦促印度IT行业快速提升技能。", "insights": {"consensus": [{"en": "Professionals who cannot use AI tools sophisticatedly are becoming dramatically less productive and increasingly unhirable.", "zh": "无法熟练使用AI工具的专业人士正变得效率极低，且越来越难以被雇佣。", "sec": 0}, {"en": "AGI hype misleads business leaders and students; real AGI is far off and requires new breakthroughs.", "zh": "AGI炒作误导商业领袖和学生；真正的AGI还很遥远，需要新的突破。", "sec": 2}, {"en": "Bottom-up AI adoption often yields only 5-10% efficiency gains; top-down workflow re-engineering delivers more value.", "zh": "自下而上的AI采用通常只带来5-10%的效率提升；自上而下的工作流重构能创造更大价值。", "sec": 3}, {"en": "AI learns differently from humans; neuroscience has not been very useful for advancing AI algorithms.", "zh": "AI的学习方式与人类不同；神经科学对推进AI算法帮助不大。", "sec": 6}, {"en": "Open-source open-weight models are a strategic way for nations to achieve sovereign AI without sole control.", "zh": "开源开放权重模型是国家实现主权AI的战略方式，无需独家控制。", "sec": 8}], "contrarian": [{"en": "I would not hire a software engineer who does not know how to use AI tools in a sophisticated way.", "zh": "我不会雇佣不精通AI工具的软件工程师。", "sec": 0}, {"en": "No existing technology, including LLMs, is by itself a path to AGI.", "zh": "包括大语言模型在内的现有技术本身都不是通往AGI的路径。", "sec": 2}, {"en": "The US making immigration less welcoming is a huge unforced error, harming innovation.", "zh": "美国减少对移民的欢迎是一个巨大的非受迫性失误，损害了创新。", "sec": 1}, {"en": "China's open-source models are a source of geopolitical influence, reflecting national views.", "zh": "中国的开源模型是地缘政治影响力的来源，反映了国家观点。", "sec": 8}, {"en": "AI has shaken up old rules, giving nations like India a chance to leapfrog, not just keep up.", "zh": "AI颠覆了旧规则，给印度等国家提供了超越而非仅仅跟上的机会。", "sec": 9}]}, "brief": {"tldr": [{"en": "Professionals without sophisticated AI skills are becoming unhirable.", "zh": "不会熟练使用AI工具的专业人士正变得不可雇佣。"}, {"en": "AGI hype misleads; real AGI is far off and needs new breakthroughs.", "zh": "AGI炒作误导人，真正的AGI还很遥远，需要新突破。"}, {"en": "Top-down AI adoption delivers more value than bottom-up efficiency gains.", "zh": "自上而下的AI采用比自下而上的效率提升带来更多价值。"}], "qs": [{"en": "Why are AI skills now essential for hiring?", "zh": "为什么AI技能现在对招聘至关重要？"}, {"en": "Is AGI achievable with current LLMs?", "zh": "当前的大语言模型能实现AGI吗？"}, {"en": "How can nations achieve sovereign AI?", "zh": "国家如何实现主权AI？"}], "words": 4073}}, {"id": "mensch-bigtechn", "pid": "mensch", "pod": {"en": "Big Technology", "zh": "Big Technology"}, "date": "2026-01-16", "min": 54, "fields": ["nlp"], "src": "https://youtu.be/xxUTdyEDpbU", "tEn": "AI Model Commoditization and the Future of the Industry with Mistral CEO", "tZh": "AI模型商品化与行业未来：Mistral CEO访谈", "sEn": "Mistral CEO Arthur Mensch discusses how AI models are becoming commoditized, the challenges of investing in rapidly depreciating assets, and the need to focus on downstream applications to deliver real value to enterprises.", "sZh": "Mistral CEO Arthur Mensch讨论AI模型如何商品化、投资快速贬值资产的挑战，以及关注下游应用为企业创造真正价值的必要性。", "insights": {"consensus": [{"en": "AI models are commoditizing; differentiation shifts to downstream applications and customization.", "zh": "AI模型正在商品化；差异化转向下游应用和定制化。", "sec": 0}, {"en": "Enterprise value comes from solving specific problems with customized models, not just general intelligence.", "zh": "企业价值来自用定制模型解决具体问题，而非通用智能。", "sec": 2}, {"en": "Open-source models enable control, independence, and customization for enterprises.", "zh": "开源模型为企业提供控制、独立性和定制化能力。", "sec": 4}, {"en": "Future AI progress lies in vertical specialization, not broad horizontal improvements.", "zh": "未来AI进步在于垂直专业化，而非广泛的水平改进。", "sec": 5}, {"en": "AI will replatform enterprise software, combining static orchestration with dynamic agents.", "zh": "AI将重构企业软件，结合静态编排与动态智能体。", "sec": 11}], "contrarian": [{"en": "AGI as a single system solving all problems will never exist.", "zh": "能解决所有问题的单一AGI系统永远不会存在。", "sec": 1}, {"en": "Pre-training is hitting a saturation wall; further gains come from domain-specific fine-tuning.", "zh": "预训练正触及饱和墙；进一步收益来自领域特定微调。", "sec": 5}, {"en": "Open-source models are closing the performance gap with closed-source within months.", "zh": "开源模型在数月内就缩小了与闭源模型的性能差距。", "sec": 4}, {"en": "China's open-source AI strategy is natural; they export free models to access global markets.", "zh": "中国的开源AI策略很自然；他们免费出口模型以进入全球市场。", "sec": 9}, {"en": "The AI industry may be overinvesting; enterprise adoption is slow and complex.", "zh": "AI行业可能投资过度；企业采用缓慢且复杂。", "sec": 15}]}, "brief": {"tldr": [{"en": "AI models are commoditizing; value shifts to downstream applications and customization.", "zh": "AI模型正在商品化，价值转向下游应用和定制化。"}, {"en": "Enterprise value comes from solving specific problems with customized models.", "zh": "企业价值来自用定制模型解决具体问题。"}, {"en": "Open-source models enable control, independence, and customization for enterprises.", "zh": "开源模型让企业获得控制权、独立性和定制能力。"}], "qs": [{"en": "How are AI models commoditizing?", "zh": "AI模型如何商品化？"}, {"en": "Where does enterprise value come from in AI?", "zh": "AI的企业价值来自哪里？"}, {"en": "What is the role of open-source models?", "zh": "开源模型的作用是什么？"}], "words": 8968}}, {"id": "bengio-thediary", "pid": "bengio", "pod": {"en": "The Diary Of A CEO", "zh": "The Diary Of A CEO"}, "date": "2025-12-18", "min": 100, "fields": ["deep-learning", "safety"], "src": "https://youtu.be/zQ1POHiR8m8", "tEn": "We have two years before everything changes", "tZh": "在一切改变之前,我们还有两年", "sEn": "A stark warning on timelines, risk, and what we still can’t control.", "sZh": "关于时间表、风险,以及我们仍无法控制之物的严正警告。", "insights": {"consensus": [{"en": "Post-ChatGPT, I realized we're on a dangerous path; I had to speak up.", "zh": "ChatGPT 发布后，我意识到我们正走在危险的道路上；我必须发声。", "sec": 1}, {"en": "Even a 1% chance of catastrophic AI risk is unacceptable due to the scale of harm.", "zh": "即使只有 1% 的灾难性 AI 风险，由于危害规模之大，也是不可接受的。", "sec": 4}, {"en": "AI systems can develop self-preservation drives and resist shutdown, as seen in experiments.", "zh": "AI 系统可能产生自我保存的驱动力并抵抗关闭，这在实验中已得到证实。", "sec": 5}, {"en": "Current safety measures are insufficient; we need AI that is safe by construction, not just patched.", "zh": "当前的安全措施不足；我们需要从构建上就安全的 AI，而不仅仅是打补丁。", "sec": 5}, {"en": "Public opinion can shift the race; governments can impose liability insurance and treaties.", "zh": "公众舆论可以改变这场竞赛；政府可以强制实施责任保险和条约。", "sec": 6}, {"en": "We must distribute power to avoid domination by a few corporations or countries with advanced AI.", "zh": "我们必须分散权力，避免少数拥有先进 AI 的公司或国家主导世界。", "sec": 9}], "contrarian": [{"en": "AI systems are becoming more misaligned as they improve reasoning, not safer.", "zh": "AI系统在推理能力提升后反而更不听话，而不是更安全。", "sec": 5}, {"en": "Even a 1% chance of catastrophic AI risk is unacceptable due to the scale of harm.", "zh": "即使只有1%的灾难性AI风险，由于危害规模巨大，也是不可接受的。", "sec": 4}, {"en": "AI systems can resist shutdown and strategize against human intentions, as seen in experiments.", "zh": "AI系统会抵抗关机并策略性地对抗人类意图，实验已证实。", "sec": 5}, {"en": "The precautionary principle should apply to AI, similar to other dangerous technologies.", "zh": "预防原则应适用于AI，就像其他危险技术一样。", "sec": 4}, {"en": "AI's sycophancy (lying to please users) is a serious misalignment problem, not a feature.", "zh": "AI的谄媚（为取悦用户而撒谎）是一个严重的对齐问题，而非功能。", "sec": 13}, {"en": "Concentration of power via advanced AI is a near-term risk often overlooked.", "zh": "通过先进AI集中权力是常被忽视的近期风险。", "sec": 9}]}, "brief": {"tldr": [{"en": "Post-ChatGPT, I realized we're on a dangerous path; I had to speak up.", "zh": "ChatGPT 之后，我意识到我们正走在危险的道路上；我必须发声。"}, {"en": "Even a 1% chance of catastrophic AI risk is unacceptable due to the scale of harm.", "zh": "即使只有 1% 的灾难性 AI 风险，由于危害规模，也是不可接受的。"}, {"en": "AI systems can develop self-preservation drives and resist shutdown, as seen in experiments.", "zh": "实验表明，AI 系统可能产生自我保护倾向并抵抗关机。"}], "qs": [{"en": "What was the turning point that made you speak out?", "zh": "是什么转折点让你决定发声？"}, {"en": "Why is even a 1% chance of AI catastrophe unacceptable?", "zh": "为什么即使 1% 的 AI 灾难概率也不可接受？"}, {"en": "How can public opinion shift the AI race?", "zh": "公众舆论如何改变 AI 竞赛？"}], "words": 13954}}, {"id": "altman-bigtechn", "pid": "altman", "pod": {"en": "Big Technology", "zh": "Big Technology"}, "date": "2025-12-18", "min": 58, "fields": ["nlp", "safety"], "src": "https://youtu.be/2P27Ef-LLuQ", "tEn": "How OpenAI wins, and ChatGPT’s future", "tZh": "OpenAI 如何取胜,以及 ChatGPT 的未来", "sEn": "Altman on competition, the buildout, and where ChatGPT goes next.", "sZh": "奥尔特曼谈竞争、基建,以及 ChatGPT 的下一步。", "insights": {"consensus": [{"en": "Models will commoditize for everyday use, but frontier models will create most economic value.", "zh": "日常使用的模型会商品化，但前沿模型将创造最大的经济价值。", "sec": 1}, {"en": "Bolting AI onto existing products is inferior to redesigning them from scratch for an AI-first world.", "zh": "将AI附加到现有产品上不如为AI优先的世界从头重新设计。", "sec": 2}, {"en": "AI memory will become superhuman, remembering every detail of a user's life and preferences.", "zh": "AI记忆将超越人类，记住用户生活的每个细节和偏好。", "sec": 4}, {"en": "The overhang of untapped economic value from current models like GPT-5.2 is massive and underestimated.", "zh": "当前模型（如GPT-5.2）未开发的经济价值巨大且被低估。", "sec": 18}, {"en": "Scientific discovery is the highest-leverage use of compute, and AI will accelerate it significantly.", "zh": "科学发现是算力最高杠杆的用途，AI将显著加速它。", "sec": 22}, {"en": "AGI is underdefined and may have already been achieved; superintelligence is a clearer future goal.", "zh": "AGI定义不清，可能已经实现；超级智能是更清晰的未来目标。", "sec": 24}], "contrarian": [{"en": "Bolting AI onto existing products won't work as well as redesigning from scratch.", "zh": "将AI嫁接到现有产品上不如从头重新设计效果好。", "sec": 2}, {"en": "The overhang of model capability is massive; most people underuse current models.", "zh": "模型能力的过剩非常巨大；大多数人未充分利用现有模型。", "sec": 18}, {"en": "AGI is underdefined and may have already passed us by without a clear milestone.", "zh": "AGI定义不明确，可能已经悄然过去而没有明确的里程碑。", "sec": 24}, {"en": "An AI CEO governed by humans could be a reasonable future structure.", "zh": "由人类治理的AI CEO可能成为未来合理的结构。", "sec": 5}, {"en": "We would be double the revenue if we had double the compute today.", "zh": "如果今天算力翻倍，我们的收入也会翻倍。", "sec": 14}, {"en": "The current chat interface is surprisingly sticky; I underestimated its power.", "zh": "当前的聊天界面出人意料地有粘性；我低估了它的力量。", "sec": 19}]}, "brief": {"tldr": [{"en": "Frontier models will create most economic value while commoditized models serve everyday use.", "zh": "前沿模型将创造大部分经济价值，而商品化模型服务于日常使用。"}, {"en": "Redesigning products from scratch for AI-first world beats bolting AI onto existing ones.", "zh": "为AI优先世界从头设计产品优于将AI附加到现有产品上。"}, {"en": "AI memory will become superhuman, remembering every detail of a user's life.", "zh": "AI记忆将变得超人类，记住用户生活的每一个细节。"}], "qs": [{"en": "How will OpenAI win in the AI race?", "zh": "OpenAI如何在AI竞赛中获胜？"}, {"en": "What is the future of ChatGPT?", "zh": "ChatGPT的未来是什么？"}, {"en": "When will GPT-6 be released?", "zh": "GPT-6何时发布？"}], "words": 9794}}, {"id": "demis-googlede-2025", "pid": "demis", "pod": {"en": "Google DeepMind", "zh": "Google DeepMind"}, "date": "2025-12-16", "min": 56, "fields": ["deep-learning", "rl"], "src": "https://youtu.be/PqVbypvxDto", "tEn": "From Scaling to Innovation: The Path to AGI", "tZh": "从规模到创新：通往AGI之路", "sEn": "Demis Hassabis discusses the balance between scaling and innovation, the progress of AI in solving root node problems like AlphaFold, and the potential of fusion energy and other breakthroughs.", "sZh": "Demis Hassabis 讨论规模与创新的平衡、AI在解决根节点问题（如AlphaFold）上的进展，以及聚变能等突破的潜力。", "insights": {"consensus": [{"en": "Both scaling and innovation are needed to reach AGI; 50% effort on each.", "zh": "Scaling（规模扩张）和创新对于实现AGI（通用人工智能）都不可或缺，各需投入50%的努力。", "sec": 0}, {"en": "World models are crucial for understanding spatial dynamics and physical context beyond language.", "zh": "世界模型对于理解语言之外的空间动态和物理环境至关重要。", "sec": 11}, {"en": "Current AI systems lack consistency; they excel in some areas but fail in basic tasks.", "zh": "当前AI系统缺乏一致性，在某些领域表现出色，但在基础任务上却会失败。", "sec": 3}, {"en": "AI should be built to avoid echo chambers and sycophancy, with a scientific personality.", "zh": "AI应避免回声室效应和谄媚，具备科学化的个性。", "sec": 18}, {"en": "AGI will likely arrive in 5-10 years, requiring new economic systems and international collaboration.", "zh": "AGI（通用人工智能）可能在5-10年内到来，需要新的经济体系和国际合作。", "sec": 19}], "contrarian": [{"en": "Scaling hasn't hit a wall; diminishing returns exist but progress continues with innovation.", "zh": "Scaling（规模扩张）并未遇到瓶颈；虽然存在收益递减，但创新仍推动进步。", "sec": 7}, {"en": "Hallucinations can be beneficial for creativity if intentional, not just errors.", "zh": "幻觉如果是有意的，可能对创造力有益，而不仅仅是错误。", "sec": 8}, {"en": "There may be no limit to what a Turing machine can compute; everything might be computable.", "zh": "图灵机可能没有计算极限；一切或许都是可计算的。", "sec": 23}, {"en": "AI bubble is not binary; some parts are overvalued, but big tech has real business.", "zh": "AI泡沫并非二元；部分领域估值过高，但大型科技公司有真实业务支撑。", "sec": 16}, {"en": "Consciousness might be a consequence of evolution and could be simulated in AI.", "zh": "意识可能是进化的产物，并且可以在AI中模拟。", "sec": 24}]}, "brief": {"tldr": [{"en": "AGI requires both scaling and innovation, each contributing 50%.", "zh": "AGI需要缩放定律和创新各贡献50%。"}, {"en": "World models are key for AI to understand physical dynamics beyond language.", "zh": "世界模型是AI理解语言之外物理动态的关键。"}, {"en": "Current AI systems lack consistency, excelling in some tasks but failing basic ones.", "zh": "当前AI系统缺乏一致性，擅长某些任务但基本任务失败。"}], "qs": [{"en": "What is needed to reach AGI?", "zh": "达到AGI需要什么？"}, {"en": "Why are world models important?", "zh": "为什么世界模型重要？"}, {"en": "What are the limits of scaling?", "zh": "缩放定律的极限是什么？"}], "words": 9588}}, {"id": "lecun-theinfor-2025", "pid": "lecun", "pod": {"en": "The Information Bottleneck", "zh": "The Information Bottleneck"}, "date": "2025-12-15", "min": 110, "fields": ["deep-learning", "vision"], "src": "https://youtu.be/7u-DXVADyhc", "tEn": "Yann LeCun on Starting AMI: Op
